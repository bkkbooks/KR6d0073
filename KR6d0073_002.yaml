body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯上天竺講寺住山比丘一如集注妙法蓮華經譬喻品第三譬者比況也喻者曉訓也託此況彼寄淺訓深前法説周作三乘一乘説廣明五佛開三顯一上根利智圓聞獲悟中下之流抱迷未受動執生疑踟蹰岐道是故更約三車一車譬喻而説使其悟解故言譬喻品以類比況謂之譬開曉令悟謂之喻二身子領解二初經家敘起二初敘內解爾時舍利弗踊躍歡喜內解在心名喜喜動於形名踴躍從妙人聞妙法得妙解故踊躍歡喜也初住名歡喜住初行亦名歡喜行初地亦名歡喜地身子既是上根利智必是超入之歡喜設不超入亦是初住之歡喜也妙樂云初住名歡喜者三法開發同初地故二敘外儀即起合掌瞻仰尊顏即起合掌表昔權實為二如掌不合今解權即實如二掌合故云合掌向佛者昔權非佛因實非佛果今解權即實成大圓因因必趨果故云向佛瞻仰尊顏者表其解實實即佛境非方便法瞻仰尊顏無餘思念表開佛知見也二身子自陳二初長行三初標三喜而白佛言今從世尊聞此法音心懷踴躍得未曾有今從世尊標我身見佛身故名身喜聞此法音依於佛口聞而歡喜故名口喜得未曾有是我意解佛意故名意喜二釋失三初明昔不見佛為身失所以者何至甚自感傷失於如來無量知見昔佛為菩薩受記我不預斯事見佛義遠既不見佛故無身喜聞如是法者若日照高山時密有聞義顯如聾啞不得言聞如是法也秖是方等教中聞大乘實慧與今不殊故言聞如是法也受記者亦是方等中與菩薩記二乘不預甚自感傷者思益淨名中聞褒大折小內疑而外鄙名為感傷失如來知見者失佛眼之見失佛智之知也二明昔不聞法為口失世尊我常獨處山林樹下至是我等咎非世尊也以身處山林心執小道則不聞法故無口喜同入法性者謂與菩薩同入正出其執小之過以由不知小乘法性之外別有妙理菩薩得之故也既執所入之一理疑於三教能入之門見佛授菩薩記則疑佛有偏所以成過是我等咎者由我迷權何關理教由我惑實何關佛偏追述昔非仰謝如來是為引過自歸也妙樂云三教者三乘之教也三明昔意不解為意失所以者何若我等待説所因至終日竟夜每自剋責以不待説所因則無實解又不識方便故無權解解無故故無意喜待説所因有二義一不受待對於前二不停待於後初華嚴明三諦之慧是得佛之因以此待對於我而我不受是失之於前諸佛法久後要當説真實我不停待匆匆取小是失之於後若待此前後必得大乘度脫也不解方便等者不知三乘是方便之權輒便信受取證小果對佛陳過故云世尊我從昔來等不待説所因者自責不解實也不解方便者自責不解權也三結成二初結而今從佛聞所未聞至身意泰然快得安隱從佛是結身喜聞法是結口喜斷諸疑悔是結意喜二成今日乃知真是佛子從佛口生從法化生得佛法分乃知真是佛子近佛義成結身成也從佛口生結口成也從法化生結意成也二偈頌三初頌標喜爾時舍利弗欲重宣此義而説偈言我聞是法音得所未曾有心懷大歡喜疑網皆已除二頌釋喜三初頌見佛喜昔來蒙佛教不失於大乘至聞亦除憂惱長行明失知見頌中明不失大乘長行論失論遠頌論近論得文互現耳二頌不聞法二初頌上身遠故不聞我處於山谷或在林樹下至金色三十二一足下安平如奩底二足下千輻輪相三手足指長四手足柔軟五手足指合縵網六足跟滿足七足趺高好八伊尼延鹿王腨音善腸也九立手摩膝十陰藏相如馬王十一身縱廣等十二諸毛孔上生青色柔軟十三毛上向右旋十四金色光十五身光面各一丈十六皮膚細滑不受塵水不停蚊蚋十七兩足下兩手兩肩項中七處皆滿十八兩腋下滿十九身如師子二十身端直二十一肩圓好二十二四十齒具足二十三齒白淨齊密根深二十四四牙白而大二十五頰車如師子二十六咽中津液得味中上味二十七舌大薄覆面至髮際二十八梵音深遠如迦陵頻伽聲二十九眼色如金精三十眼睫如牛王三十一眉間白毫相如兜羅綿三十二頂肉髻成十力諸解脫同共一法中而不得此事八十種妙好一無見頂相二鼻高好孔不現三眉如初月四耳輪輻相五身堅實六骨際如鈎鎖七身一時回如象王八行時足去地四寸而印文現九爪如赤銅色十膝骨堅著圓好十一身清潔十二身柔軟十三身不曲十四指長纖圓十五指文藏覆十六脈深不現十七踝不現十八身潤澤十九身自持不逶迤二十身滿足二十一容儀備足二十二容儀滿足二十三住處安無能動者二十四威振一切二十五一切樂觀二十六面不長大二十七正容貌不撓色二十八面具滿足二十九唇如頻婆果色三十言音深遠三十一臍深圓好三十二毛右旋三十三手足滿三十四手足如意三十五手文明直三十六手文長三十七手文不斷三十八一切惡心衆生見者和悅三十九面廣姝好四十面淨滿如月四十一隨衆生意和悅與語四十二毛孔出香氣四十三口出無上香四十四容儀如師子四十五進止如象王四十六行法如鵝王四十七頭如摩陀那果四十八一切聲分具足四十九四牙白利五十舌赤色五十一舌薄五十二毛紅色五十三毛軟淨五十四眼廣長五十五孔門相具五十六手足赤白如蓮華色五十七臍不出五十八腹不現五十九細腹六十身不傾動六十一身持重六十二其身大六十三身長六十四手足軟滑六十五四邊光各一丈六十六光照身而行六十七等視衆生六十八不輕衆生六十九隨衆生音聲不增不減七十説法不著七十一隨衆生語言説法七十二發音報衆聲七十三次第有因緣説法七十四一切衆生不能盡觀相七十五觀無厭足七十六髮長好七十七髮不亂七十八髮旋好七十九髮色青珠八十手足有德相十八不共法一身無失二口無失三念無失四無異想五無不定心六無不知已捨佛於一切法悉皆照知方捨無有一法不經心知而捨者七欲無減欲度一切心無厭足故八精進無減九念無減十慧無減十一解脫無減佛具二種解脫一有為解脫謂無漏智慧相應解脫也二無為解脫謂一切煩惱都盡無餘也十二解脫知見無減十三一切身業隨智慧行十四一切口業隨智慧行十五一切意業隨智慧行十六智慧知過去世無礙十七智慧知未來世無礙十八智慧知現在世無礙如是等功德而我皆已失至令衆至道場我常於日夜者生死為夜涅槃為日為生死中有涅槃為生死外有涅槃若得悟時二疑雙遣妙樂云若生死中有涅槃即大乘意若生死中無涅槃即小乘意昔於機中有此疑故於今日有此疑事所以思惟欲問也二頌入法性故不聞我本著邪見至爾時心自謂得至於滅度邪見是凡夫著入法性是二乘著凡夫初著邪見世尊為説真空之法拔其邪見二乘既證真空當爾之時莫不自謂已得究竟涅槃故凡夫二乘俱不聞大乘法也梵志即婆羅門其人種類自云從梵天口生唯五天竺有餘國即無也三頌心得解而今乃自覺非是實滅度至永盡滅無餘涅槃亦翻滅度昔所證涅槃非大涅槃若得作佛惑盡果亡方名大乘涅槃也佛於大衆中説我當作佛三頌結成聞如是法音疑悔悉已除至我聞疑網斷説我當作佛者方便品云我記如是人來世成佛道是也聞佛所説等者初聞略開三顯一動執生疑疑佛為魔今知佛昔因緣譬説皆是為實施權權既即實故心安疑斷也佛説過去世無量滅度佛至謂是魔所為身子既聞五佛開權顯實方知世尊今日所説是真實道非魔作佛惱亂我心波旬正音波卑夜此云惡常有惡意成惡法故上長行中明不待所因不解方便今頌中聞當作佛是得所因聞五佛道同解魔非魔是解方便互顯一邊耳聞佛柔軟音深遠甚微妙至教化諸菩薩初一行半頌結前三句結口喜後三句結意喜次一行頌成三如來述成三初昔曾教大爾時佛告舍利弗至我以方便引導汝故生我法中無上道者十住婆沙論云身無上謂相好受持無上謂自利利他具足無上謂到彼岸智慧無上謂四無礙不思議無上謂六波羅蜜解脫無上謂大涅槃行無上謂聖行梵行瓔珞經十三云道當清淨穢濁非道道當一心多想非道道當知足多欲非道道當恭敬憍慢非道道當檢意放逸非道道當顯耀自隱非道道當連屬無行非道道當覺悟愚惑非道道當教化矜吝非道道近善友習惡非道如是等種種明無上道今經以圓道為無上道若偏若次皆他經所論長夜隨我受學者昔雖大化未破界內無明惑暗心中隨佛受學故云長夜等縱若未破見思所聞一句成了因種納種在識永劫不失以暗望明暗尚非謬況今真悟寧是虗耶故舉昔曾教大述見佛不謬也我以方便引導汝故生我法中者此義兩向若昔以大化今生大解故云引導生我法中此屬初曾教大意若令免惡道權以小引故云引導生我法中此屬第二中忘取小意二中忘取小舍利弗我昔教汝志願佛道至而便自謂已得滅度汝今悉忘者自有中途廢大習小名中途悉忘若而今自謂已得滅度即是而今悉忘由忘大習小致有憂悔而得聞法不虗也三還為説大我今還欲令汝憶念至教菩薩法佛所護念我今還欲令汝憶念本願即是述其得解不虗先施權教成其中途小善後顯真實遂其本願大心也四佛與授記二初長行十初劫數舍利弗汝於未來世過無量無邊不可思議劫此下是授記段若得大解自知得佛何俟須記記有四意一昔未記二乘而今須記二中下未悟以記勉勵之三令聞者結緣四滿其本願是故記也妙樂云問既得記已何故更經若干劫耶答若記菩薩但通途云得無生等今記聲聞須約劫國應佛成處須有機緣此諸聲聞昔未曾有淨土之行蒙記已後與物結緣物機不同致劫多少又諸聲聞時不同者為逗物宜隨機長短機緣不等初住何殊二行因供養若干千萬億佛奉持正法具足菩薩所行之道三得果當得作佛號曰華光至天人師佛世尊四國土國名離垢至其傍各有七寶行樹常有華果五説法華光如來亦以三乘至以本願故説三乘法準今釋迦故云亦以舍利下明説三意土淨唯一酬願説三即施即廢問何處願説準大悲空藏經云身子於六十劫行菩薩道因婆羅門乞眼唾而踐之身子瞋退作凡夫願成佛日開三乘法故云以本願等也六劫名其劫名大寶莊嚴至其國中以菩薩為大寶故七衆數彼諸菩薩無量無邊至如是菩薩充滿其國八壽量舍利弗華光佛壽十二小劫至其國人民壽八小劫九補處華光如來過十二小劫至其佛國土亦復如是十正像舍利弗是華光佛滅度之後至亦三十二小劫大論四十八云舍利弗正法三十二小劫者三災飢病刀滅衆生者名小劫又直是時節名小劫如説法華經六十小劫亦是時節數耳非三災滅外物為小劫也二偈頌二初頌長行九初超頌得果爾時世尊欲重宣此義而説偈言舍利弗來世成佛普智尊號名曰華光當度無量衆二追頌行因供養無數佛具足菩薩行十力等功德證於無上道十力等者即指佛果方名為力初住分得名為功德所言等者非唯供養佛兼淨土行或由分得十力功德成初住記三超頌劫名過無量劫已劫名大寶嚴四頌國土淨世界名離垢清淨無瑕穢至常有華果實五超頌衆數彼國諸菩薩志念常堅固至善學菩薩道神通波羅蜜謂六神通六波羅蜜也六追頌説法如是等大士華光佛所化七超頌壽量佛為王子時棄國捨世榮至壽命八小劫八法住久近佛滅度之後正法住於世至像法三十二九供養舍利舍利廣流布天人普供養二總結歎華光佛所為其事皆如是至宜應自欣慶宜應自欣慶者成初入歡喜位之解也初住能百佛世界作佛行地倍是五四衆領解二初長行三初經家敘衆喜爾時四部衆比丘比丘尼至心大歡喜踊躍無量二陳供養各各脫身所著上衣至一時俱作雨衆天華各各脫衣等者此中通語四衆八部出家二衆言上衣者即大衣也而自回轉者表聞身子得記法性自然而轉因果依正自他悉轉也三正領解二初領開權而作是言佛昔於波羅奈初轉法輪二領顯實今乃復轉無上最大法輪最大法輪者最是今經圓中圓也大是人理教行四種妙也或境智等十妙或心佛衆生三妙妙法之輪名妙法輪二偈頌二初頌上開權顯實爾時諸天子欲重宣此義而説偈言昔於波羅奈至是法甚深奧少有能信者四諦如前釋五衆者五陰也言昔於波羅奈等即是説藏教今復轉最妙等即是説圓教法華開顯藏圓相對故不述中間方等般若也二述得解隨喜回向我等從昔來數聞世尊説至盡回向佛道初一行自述次二行半隨喜後一行回向我等亦如是者如身子之領解如身子被佛述成如身子之得記也二三品半為中根人譬説四初半品正譬喻開顯二初請三初述自無疑爾時舍利弗白佛言至三藐三菩提記此去為中根作譬喻説凡有四品今品正是譬喻開三顯一信解品明中根得解藥草品明如來述成授記品明授記此四番皆約譬説是為譬喻周也二述他有惑是諸千二百心自在者至聞所未聞皆墮疑惑佛常教化下執昔三乘之教也我見者無明不了於名色陰入界等法中妄計有我我所之實有無見者有即常見無即斷見等即等於亦有亦無非有非無諸見而今於世尊下執昔一理也昔説三是究竟今又説一為真實昔三今一同異不分故言皆墮疑惑妙樂云聞所未聞者聞法説中身子四段昔教所無三普為四衆善哉世尊願為四衆説其因緣令離疑悔因緣者前三後一之因緣也妙樂云問前法説中示前三後一聞既不悟今還請於前三後一與前何別答言因緣者即是前三後一始末根由故云因緣前四佛章略釋迦章稍廣雖以五濁用釋於權始末未明故使中根於茲不曉譬説委明輪回之相具列三車出宅之由兼示索三與一之意廣敘等賜等子等心此乃方酬因緣之請也二答二初發起二初抑令憤勇爾時佛告舍利弗至是諸所説皆為化菩薩故我先不言下指上開權皆為阿耨菩提指上顯實皆為化菩薩者若權若實皆入佛道上已明言云何執教迷暗不解如此責之乃是抑令憤勇也二引令速進然舍利弗今當復以至諸有智者以譬喻得解此引接安慰也前斥責既切恐鄙懟自沉今許其譬喻更明此義若能解者猶稱智也二譬喻二初長行二初開譬二初總譬六初長者譬三初名行舍利弗若國邑聚落名如賓行如主行有親疏名有遠近故舉處所以顯名行也封疆為國最遠宰治為邑居中聚落是鄰閭最近長者名行遍此三處近不見其細陋遠但挹其高風口無擇言身無擇行意無擇法名行相稱真實大人今譬實報土為國方便土為邑同居土為聚落內合如來三業隨智慧行於此三土稱機施化名稱普聞德周法界也二位號有大長者長者譬如來世間長者備十德一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上敬十下歸姓則三皇五帝之裔左貂右插之家位則輔弼丞相鹽梅阿衡富則銅陵金谷豐饒侈靡威則嚴霜隆重不肅而成智則胸如武庫權奇超拔年則蒼蒼稜稜物儀所伏行則白圭無玷所行如言禮則節度庠序世所式瞻上則一人所敬下則四海所歸十德具焉名大長者出世長者即是如來姓則從三世真如實際中生位則功成道著十號無極富則法財萬德悉皆具滿威則十力雄猛降伏魔外智則一心三智無不通達年則早成正覺久遠若斯行則三業隨智運動無失禮則具佛威儀心大如海上則十方種覺所共稱譽下則七方便人而來依止是名出世佛大長者即釋迦一化之主也三德業其年衰邁財富無量多有田宅及諸僮僕年高則博達今古譬佛智德衰邁則根志純熟譬佛斷德財富無量總譬萬德也田宅別譬也田能養命譬禪定資般若宅可棲身譬實境為實智所託若論福德無行而不修若論智慧無境而不照故曰多有田宅也僮僕者給侍使人譬方便知見皆已具足和光六道曲順萬機即實智之僮僕也二舍宅譬其家廣大家宅譬上安隱對不安隱不安隱譬三界也衆生冗冗皆宅三界如來應化統而家之故言廣大也三一門譬唯有一門一門者譬上宣示佛道門也佛道理一理為教所詮故名為門文云以佛教門出三界苦得涅槃證是也門有二宅門車門宅者生死也門者出要路也此方便教之詮也車者大乘法也門者圓教之詮也大小雖同有能所須辨權寶二能若識二能則二所有在若識實所權之能所俱成實能且以今昔言之宅是所出車是所入宅門是所出之路車門是所入之路既二路不同出入各異故宅門非車門也若今開之宅與車一二門何殊是故三乘俱有二義四五百人多諸人衆一百二百乃至五百人止住其中五百人譬上五道衆生也五火起譬二初出所燒宅相譬六道果報堂閣朽故墻壁隤落柱根腐敗梁棟傾危堂譬欲界閣譬色無色界三界皆無常故云朽墻壁譬地水火風四大頽落譬減損柱根譬命腐敗譬危殆不久梁棟譬意識傾危譬遷變不停此釋通於三界己他若就己身作觀釋者堂譬身之下分閣譬頭等上分墻壁譬皮肉頽落譬老朽柱根譬兩足腐敗譬無常梁棟譬脊骨傾危譬命終二明能燒之火譬八苦五濁周匝俱時歘然火起焚燒舍宅八苦遍在四大四生故言周匝並皆無常故云俱時歘然譬本無今有本無此苦無明故有六三十子長者諸子若十二十或至三十在此宅中譬上知衆生性欲天性相關則子義成性欲不同故有三十若十是菩薩子二十三十是二乘子此機俱得出宅故名為子皆言十者悉有十智之性故云內有智性但無如實智性耳十智者世智他心智苦集滅道智法智比智盡智無生智二別譬四初長者見火譬四初明能見長者見標出能見譬上我以佛眼觀見也二明所見是大火從四面起標出所見譬上所見六道衆生也大火譬三界五濁八苦也四面譬身受心法也身受心法即宅之四面於身起淨倒於受起樂倒於心起常倒於法起我倒起此四倒故有生老病死愛別離怨憎會求不得五陰盛苦譬如大火從四面起也若知身不淨受是苦心無常法無我即煩惱火滅又依下文以生老病死為四面也三明驚怖即大驚怖而作是念至安隱得出譬上為衆生故而起大悲心也即大驚怖者念其退大善故驚憂其將起重惡故怖驚即對慈念其無樂怖即對悲憂其有苦我雖能於此所燒之門安隱得出者即是釋成慈悲驚怖之義雖是未盡之辭明佛以智慧力能尋正教見所詮諦不為五濁八苦所危故名安不為四倒暴風所動故名隱蕭然纍外故名出衆生不爾為火所燒如來慈悲猶為憂火所熾故言我雖等也四廣前所見而諸子等於火宅內至心不厭患無求出意著見名嬉著愛名戲又著見故耽湎四見名嬉唐喪其功名戲又著愛故耽湎五塵名嬉空無所獲名戲由見愛故空生徒死而無厭離如彼兒戲不覺不知者都不言有火名不覺不解火是熱法名不知不畏火能傷身名不驚不慮火能斷命故不怖以譬衆生全不覺五陰八苦不知四倒三毒既不識惑云何憂慮惑侵法身傷於慧命如是不覺於苦不知於集不驚失道不怖失滅逼身者五識也身為八苦所逼逼近也濁在五識名之為近以切己故名為逼以一一苦皆由五識以對於境故也身心不厭患者心即意識心王也不厭無常之苦不患煩惱之集也無求出意者不修道求滅也今謂火宅本譬五濁嬉譬見濁戲譬煩煩濁不覺不知不驚不怖譬衆生濁火來逼身苦痛切己譬命濁心不厭患無求出意譬劫濁二捨几用車譬二初捨几譬二初勸門擬宜三初擬宜舍利弗是長者作是思惟至若以几案從舍出之譬上念用大化三七日思惟也身手有力者身譬神通荷負手譬智慧提拔依三昧斷德則有神通依智慧智德則有説法衣裓几案者三藏法師云衣裓是外國盛華之器今取合譬文云若我但以神力及智慧力讚如來知見力無所畏者衆生不能以是得度神力即是身慧力即是手如上説知見譬衣裓無畏譬几十力譬案如來以神通發動此三法以智慧宣説此三法無機息化當知知見譬衣裓名略義玄四無畏譬几於法小廣十力譬案於法則廣佛於三七思惟欲作如是廣略説之而衆生不堪故言衣裓几案也二不受復更思惟是舍唯有一門至未有所識戀著戲處譬上衆生諸根鈍云何而可度也唯有一門與上車門義同此中亦是宣一佛乘之車門也今更明通別別者一謂一理一道清淨門謂正教通於所通教理寬博則非狹小斷常及七方便衆生不能以此理教自通將談無機故言狹小耳通者理純無雜故言一即理能通故言門微妙難知故言狹小幼稚等者二萬佛所教無上道大乘善根微弱名幼稚若聞大乘能生謗毀名未有所識戀著戲處者前明善弱此明惡強即是因時深著見愛果時深著依正欲界著六塵色界著禪味無色界著定故上文云衆生諸根鈍著樂癡所盲不堪聞大乘也三放捨或當墮落為火所燒此是放捨善誘譬上無機息化我寧不説法疾入於涅槃也墮落有二一者幼稚憶本戲處故墮落又善弱惡強二俱無識執物不堅故墮落譬著五欲墮在三途也二者善弱無識謗毀大乘墮落三途也二誡門擬宜三初擬宜我當為説怖畏之事至具告諸子汝等速出既著戲處故説怖事令得免五濁火燒五陰舍宜應捨離故云宜時疾出若久住著必斷善根故云無令為火之所燒害二不受父雖憐愍善誘喻至何者為舍云何為失不驚不畏者不驚故不生聞慧不畏故不生思慧不識八苦五濁能燒善根如不知火不識陰界入法是諸苦器如不識舍不知喪失法身之由如不知何者為失三放捨但東西走戲視父而已背明向暗如東西生死往還速疾如馳走於中起見愛如戲也雖用大擬不從大教故言視父而已妙樂云若明見苦集東西向明以不知苦故而起於集如日東而西走不識集故而招於苦如日西而東馳死如往生如還生死不絶如馳走機扣於應故名為視機生不受故云而已已者息也二用車譬四初擬宜三車譬爾時長者即作是念至令諸子等得免斯害譬上尋念過去佛亦作三乘化也前言苦痛切己猶是未死今云必為所焚即有死義也上文於所燒之門安隱得出今云若不時出必為所焚此義云何須知前得出者即是法身出今言若不時出等者即是應身示同衆生有疾若衆生有善成機受化則與應身時出若衆生善斷無機不受化即不與應身時出即是俱為所焚也我今當設方便者欲設三乘之權也妙樂云法身出者且約小乘五分法身也受化則機應俱濟故云時出不受化則機息應謝灰斷入滅義當俱焚二先心所好譬父知諸子先心各有所好至情必樂著譬上作是思惟時十方佛皆現等明有小乘得度之機也其昔曾習小是知先心性欲不同是知各有所好既知習小故以小接既知性欲不同故開一為三又知本曾習大名知先心中厭老死名各有所好三三車希有譬三初勸轉而告之言汝等所可玩好至汝若不取後必憂悔此歎三車希有譬譬上正施三乘思惟是事已即趣波羅奈也二示轉如此種種羊車鹿車牛車今在門外可以遊戲羊車譬聲聞乘鹿車譬緣覺乘牛車譬菩薩乘如下文釋今在門外者今許在門外斷見思出三界外方得故也三證轉汝等於此火宅宜速出來隨汝所欲皆當與汝四適子所願譬爾時諸子聞父所説珍玩之物至爭出火宅譬上受行悟入是名轉法輪也前偈本略今譬事廣廣明修因至果適願者機教相稱即聞慧也心勇鋭者思心動慮即思慧也互相推排者推四真諦理排伏見惑邪正未決名為互相此入修慧屬暖頂位也競者競取勝理初則遍觀上下八諦歷十六行相競趣真道後則縮觀至欲界苦諦下趣苦法忍此是忍法位也共者是世第一位同觀欲界苦諦與忍位不別故云共也馳走者入見道十五心速疾見理故云馳走既斷見惑分得涅槃譬上便有涅槃音也爭出者即修道位也爭出三界成無學果斷思惑盡方出火宅即譬上及以阿羅漢法僧差別名也三等賜大車譬四初見子免難歡喜譬是時長者見諸子等安隱得出至歡喜踊躍譬上我即作是念至今我喜無畏兩行一句偈也若子未免難父則憂念若得離火心即泰然以子歡喜其父亦喜也四衢者譬四諦也以四諦觀異名為四衢見惑雖除思惑猶在不名露地三界思盡名為露地住果不進故云而坐見思惑盡真諦理顯故云無復障礙不為見思所局故云泰然生滅度安隱想故言歡喜也二諸子向父索車譬時諸子等各白父言至羊車鹿車牛車願時賜與譬上大乘機發我見佛子等志求佛道者咸以恭敬心皆來至佛所兩行偈也就此明索車文無索字依此請辭明索車耳索有三意一機索者鹿苑證小之後至方等中冥有大益被斥不謗理在有求大乘之意名為機索二情索者至般若會領知大法樂大心起縱不彰言索義漸切名為情索三口索者來至法華因方便品初聞佛略説皆指為方便動宿疑情是故發言三請名為口索三等賜諸子大車譬三初總標兩章二初子等舍利弗爾時長者各賜諸子此下譬上於諸菩薩中正直捨方便但説無上道也此明子等者譬一切衆生等有佛性佛性同故等是子也二車等等一大車此明車等者以法等故無非佛法譬一切法皆摩訶衍等是大車而言各賜者各隨本習四諦六度無量諸法開示真實舊習不同故言各皆摩訶衍故言大車二廣明車等二初廣敘車體三初敘高廣其車高廣衆寶莊校至重敷婉筵安置丹枕假名車有高廣相譬如來知見深遠橫周法界之邊際竪徹三諦之源底故言高廣也衆寶莊校者譬萬行修飾也周匝欄楯者譬總持持萬善遮衆惡也四面懸鈴者譬四無礙辨下化衆生也張設幰蓋者譬四無量衆德之中慈悲最高普覆一切也珍奇雜寶而嚴飾者真實萬善嚴此慈悲大經云慈若具足十力無畏名如來慈寶繩交絡者譬四弘誓堅固大慈心也垂諸華纓者譬四攝神通等悅動衆生也重敷婉筵者譬觀練熏修一切諸禪重沓柔軟也安置丹枕者枕有內外若車外枕者車若駕運隨所到處須此支昂譬即動而靜即靜而動動靜即十乘中通塞義也若車內枕者休息身首譬一行三昧息一切智一切行也丹即赤色譬無分別法也妙樂云法界三諦並非橫竪雖無橫竪法界從遍言橫則便三諦名異言竪則便二明白牛駕以白牛膚色充潔至行步平正其疾如風駕以白牛者譬無漏般若能導三教諦緣度一切萬行到薩婆若也白是色本即與本淨無漏相應體具萬德如膚充煩惱不染如色潔又四念處為白牛四正勤中二世善滿如膚充二世惡盡如色潔四如意足稱行者心如形體姝好筋譬五根住立能生義也力譬五力摧伏幹用義也行步平正譬定慧均等又譬七覺調平其疾如風譬八正道中行速疾到薩婆若也三明僕從又多僕從而侍衛之僕從者譬方便波羅蜜能屈曲隨人給侍使令即衆魔外道二乘小行皆隨方便智用故淨名云皆吾侍也又果地神通運役隨意即僕從也妙樂云此中僕從與偈中儐從言異意同儐者進也導也侍衛者供左右也二釋有車由所以者何是大長者財富無量種種諸藏悉皆充溢財富藏溢譬果地福慧圓滿也藏有行藏理藏一切法趣檀尸忍等是趣不過者是約行為如來藏一切法趣陰入界根塵等是趣不過者是約理明如來藏自行此行理名充以此化他名溢妙樂云福慧圓滿者行理窮也福成行也慧趣理也遍一切法故財無量皆具二德故云種種三廣明心等二初廣心等而作是念我財物無極至各各與之不宜差別此明心等也由財物無極是子無偏是故心等若富而非子是子而貧則心不得等也七寶大車其數無量者譬今經開顯若教若行皆摩訶衍又方等般若念處正勤根力覺道種種異名皆開示實相歷一切法亦復如是故言無量也各各與之不宜差別者不移本習而示真實如身子於智慧開佛知見具一切佛法目連於禪定開佛知見具一切佛法餘人亦爾以心等故不宜差別也二釋心等所以者何以我此物周給一國猶尚不匱何況諸子初釋財多尚周一國況復諸子譬大圓因遍該善惡況佛知見耶次釋子等者非子尚充況是子耶譬佛無緣者尚度況有緣子耶妙樂云非子者且貶正因不同緣了故抑言非尚度者緣了之子是先結緣者而熟脫之正因之子未結緣者為其下種故云尚度故以種者況先結緣四諸子得車歡喜譬是時諸子各乘大車得未曾有非本所望譬上菩薩聞是法疑網皆已除也三乘之人本求羊鹿水牛之車期出分段今得白牛大車盡於變易過本所望豈不歡喜四長者無虗譬三初問起舍利弗於汝意云何至寧有虗妄不初佛問者本但許三而今與一非虗妄不欲令身子領實故以虗妄問之二答釋二初免難不虗亦名以重奪輕不虗三初標章舍利弗言不也世尊至全其軀命非為虗妄二解釋何以故若全身命便為已得玩好之具全身免火已得大寶濟子重命豈應有虗妙樂云全於小乘五分法身入空慧命則為已得昔來所玩疏文乃以小乘五分為身用況大乘實慧為命也三結況況復方便於彼火宅而拔濟之免八苦之火全五分之身已是大寶況二萬佛所大乘慧命圓因成就佛知見開寧是虗妄妙樂云初用小濟存五分身已得珍玩況常於火宅方便教小本在於大而今獲大豈虗妄耶二不乖本心不虗亦名過本望不虗三初標章世尊若是長者乃至不與最小一車猶不虗妄此述長者本意若小若大俱有本心大本為本小本非本許小不與尚無所乖況更與大寧乖本意但小非究竟不須更與故云不與耳二解釋何以故是長者先作是意至以是因緣無虗妄也本知無小而許小者意令方便得出火宅既昔方便非佛本意不與小車不乖本意豈虗妄耶三結況何況長者自知財富無量欲饒益諸子等與大車與一大車過本所望是故不虗三述歎佛告舍利弗善哉善哉如汝所言二善哉者述其免難不乖二不虗也問佛何不自説不虗答佛許三與一自説為難身子説不虗取信為易二合譬二初合總譬六初合上長者三初合位號舍利弗如來亦復如是如來無量德號略舉十義如上説二合名行則為一切世間之父一切世間將處所以定名行也上云國邑聚落今合譬直云一切世間者通指同居方便實報三土皆是妙色妙心果報之處如來遍應三處即一切世間之父也妙樂云皆是妙色妙心果報處者既云一切世間之父故此三土皆是如來證道色心果報之處寂光既遍遮那亦等諸身既與法身量同諸土亦與寂光不異故曰妙色妙心也三合德業於諸怖畏衰惱憂患至具足方便智慧波羅蜜於諸怖畏無明永盡合上衰邁顯斷德也成就無量知見合上年高顯智德也力無畏等合上外德財富無量也神力者深修禪定能得神通合上田也智慧力者智必照境如身之託處合上宅也具足方便波羅蜜合上諸僕從也二合五百人大慈大悲常無懈倦恆求善事利益一切慈悲是施化之本一切是五道衆生恆為慈悲所被合上五百人也三合舍宅譬而生三界朽故火宅四合三十子為度衆生衆生有緣親者前度合上三十子也五合上火起生老病死憂悲苦惱愚癡暗蔽三毒之火合上歘然火起譬也總有八苦今略言四一生苦有五種初受胎二至終三增長四出胎五種類二老苦有二種一念念二至終又有二種增長滅壞三病苦四大不調即有二種一身病二心病四死苦有三種一業報二惡對三時節代謝又有二種一病死二外緣三毒者一貪毒若以迷心對一切順情之境引取無厭名為貪毒二瞋毒若以迷心對一切違情之境便起忿怒即是瞋毒三癡毒若一切事理之法無明不了起諸邪行即是癡毒毒以沉毒為義惱壞之甚故云沉毒以其能壞出世善心故名為毒也六合上一門教化令得阿耨多羅三藐三菩提教能詮理尋理起行即得菩提故知教理共用合上唯有一門譬也二合別譬四初合見火譬四初合能見眼見合上能見之眼即是如來寂照智眼能見也二合所見火諸衆生為生老病死至如是等種種諸苦合上所見之火從四面起也此中明八苦為火四苦如前釋貪著追求是求不得苦後受地獄天上人間是五陰苦愛別離苦者捨所愛故即是壞苦怨憎會苦者即是苦苦苦心領於苦境故也此之八苦從四倒起故上文云從四面起也三合廣前所見衆生沒在其中歡喜遊戲至雖遭大苦不以為患合上所見火譬諸子不覺不知等也不觀苦集故不生厭不觀道滅故不求解脫雖遭大苦不以為患合上心不厭患無求出意也四合起怖畏舍利弗佛見此已便作是念至令其遊戲合上我雖能於此所燒之門安隱得出意也應拔其苦難者即大悲之力拔五濁之苦也與無量樂者即大慈之力與其大樂也二合捨几用車二初合捨几三初合擬宜舍利弗如來復作是念至衆生不能以是得度上譬有勸誡今但合勸不合誡勸修為正誡惡是傍故也今擬宜中但以神力者合上身力智慧力者合上手力讚如來知見合衣裓力無畏合几案若佛初出即用此擬宜衆生不能以此得度也二合無機所以者何是諸衆生至何由能解佛之智慧釋不得度合上子不受勸譬也正由五濁障重未免生死等火大乘微妙不能得入故言何由能解佛之智慧此一句合上唯有一門而復狹小小故不能解佛智慧也三合息化二初牒前三譬三初身手救不得譬舍利弗如彼長者雖復身手有力而不用之合上放捨善誘無機息化也此文雖無放捨語息化意甚分明也二牒施三車譬但以殷勤方便勉濟諸子火宅之難三牒等賜大車譬然後各與珍寶大車二正合息化如來亦復如是雖有力無所畏而不用之二合用車四初合擬宜三車但以智慧方便於三界火宅拔濟衆生二合知子先心為説三乘聲聞辟支佛佛乘三乘者乘以運載為義聲聞以四諦為乘緣覺以十二因緣為乘菩薩以六度為乘運出三界歸於涅槃也六度菩薩於當教內亦稱大乘今名佛乘者菩薩三十四心頓斷見思習氣而得成佛故名佛乘三合歎車希有三初合示轉而作是言汝等莫得至聲聞辟支佛佛乘三界是示苦諦勿貪粗弊乃至生愛是示集諦色謂男女形貌及世間玄黃赤白等聲謂絲竹環珮之聲及男女歌詠之聲等香謂男女身香及世間飲食香等味謂種種飲食肴膳美味等觸謂男女身分柔軟細滑等此名五塵亦名五欲速出三界是示滅道二諦滅道即是示其三界外有智斷三乘之果故令速出三界當得三乘三乘正取道滅為體合上三車今在門外可以遊戲也二合證轉我今為汝保任此事至以是方便誘進衆生合上隨汝所欲皆當與汝也三合勸轉復作是言汝等當知至便得無量安隱快樂合上歎希有也如此三乘是諸佛方便引物儀式故衆聖所稱得無生智為自在得盡智為無繫我生已盡不受後有名無所依所作已辦梵行已立名無所求以無漏等勤修道品也根即五根力即五力覺即七覺支道即八正道禪定等如前釋住於真空涅槃故云安隱快樂也四合適子所願三初合羊車舍利弗若有衆生內有智性至為求羊車出於火宅內有智性者宿習三乘樂欲成三乘智性故佛施三乘之教也內有智性乃至從佛聞法信受合上聞父所説珍玩之物適其願故聞慧也殷勤合上心各勇鋭思慧也精進合上推排推是推理排是排惡惡去故精理明故進修慧也欲速出下合上競共馳走是名聲聞乘合上爭出火宅聲聞者聞佛聲教故曰聲聞聲聞不能化他如羊不顧後羣故以羊車譬聲聞乘也二合鹿車若有衆生從佛世尊至為求鹿車出於火宅梵語辟支迦羅此云緣覺言求自然慧者從十二因緣門入此門本自有之非佛天人所作名自然慧不從他聞復名自然慧也大論云有道人問佛大德十二因緣佛作耶佛言我不作又問餘人作耶佛言亦非餘人作有佛無佛本性有之深知諸法因緣者支佛逆順兩緣百千萬世觀因緣等故云深知也支佛是法行人從他聞法少自推義多故取譬於鹿鹿不依人故也別行疏云支佛譬鹿猶有回願之慈也三合牛車若有衆生從佛世尊至為求牛車出於火宅菩薩稱一切智者不同二乘乃是佛智菩薩望此修因即是不乘兼運之意也菩薩慈悲化物如牛之安忍運載故以牛車譬菩薩乘也然牛車有水牛白牛之異水牛車喻六度菩薩乘也大白牛車喻圓教一佛乘也私謂一切智既不同二乘自然智無師智即不同緣覺三合等賜大車二初雙牒二譬二初牒免難舍利弗如彼長者至安隱得出火宅到無畏處上譬有四今但合二合免難義兼索車合等賜義兼歡喜二牒等賜自惟財富無量等以大車而賜諸子二雙合二譬二初合免難如來亦復如是至出三界苦怖畏險道得涅槃樂門有三義入義出義別義若三界為宅五陰為舍由迷一色心而入一色心即是入宅生死之門若作出義者是乘從三界出即是稟藏通二教教下所詮之理為門若別義者即是稟別教下所詮之理為門也今言佛教門者正是藏通二教教下之理共為門得出三界而免難也妙樂云三義皆以所詮之理為門者意顯獨教門義不成經雖云教必須對理故知別教雖詮別理亦非車門但對藏通而立別名由緣別理故名為別別教十住與藏通人咸出火宅據出火宅同仍可名通十住所證又同兩教涅槃故亦可云得涅槃樂二合等賜五初合有車之由如來爾時便作是念至力無畏等諸佛法藏無量智慧者合上財富無量庫藏充溢也二合廣其心等是諸衆生皆是我子至皆以如來滅度而滅度之合上我財物無量不應以下劣小車與諸子也如來滅度者即大乘三德涅槃也三合等心章門是諸衆生脫三界者合上各賜諸子等也四合等車章門悉與諸佛禪定解脫等娛樂之具五合正廣大車皆是一相一種聖所稱歎能生淨妙第一之樂合上高廣乃至僕從等大車譬也一相是實相即法身一種是種智即般若能生淨妙之樂樂即無苦名為解脫三德高廣具足莊嚴收羅衆德名摩訶衍四合無虗妄譬二初牒許小與大舍利弗如彼長者至然彼長者無虗妄之咎三車誘引本為除其五濁五濁既除大善自全故但與大車也二合不乖本心二初合解釋如來亦復如是無有虗妄至但以大乘而度脫之合上我以方便令子得出也二合結況何以故如來有無量智慧至於一佛乘分別説三合上何況長者自知財富無量欲饒益諸子故許三與一非是虗也此釋小異於前前意為令諸子得出意不在三既出不與亦非虗妄今明如來出世本欲説大但為小智樂著三界故以方便誘引既已得出還與大乘即稱本心故言能與衆生大乘之法但不能盡受也若華嚴中能受即為與大不俟開一為三不能受者以方便力於一佛乘分別説三三由衆生非佛本意故用此釋成不乖本心不虗也妙樂云小異於前者前云意不在三今云本欲與大雖復小殊名異義同也二偈頌二初百行偈頌重頌上長行二初頌開譬二初頌總譬四初頌長者佛欲重宣此義而説偈言譬如長者頌上位號即兼得名行德業既有長人之德即知名行遍為國邑所崇亦知內外年德俱高喻佛具足智斷慈悲萬德也二頌舍宅二初頌宅廣大有一大宅二廣出宅體其宅久故而復頓弊三界無始為久非今所造為故無常卑鄙為頓弊妙樂云三界無始為久者問若從因説或當無始若從依報初禪已下賢劫近成云何無始答衆生無始具三界因惑種不忘故云無始故依報處壞而復成第四禪去及無色界雖無災壞因果相成皆是無始無常故也然終不如約正報釋其義自便此下三行廣出宅體明所燒之相堂舍高危一云頭為殿腹為堂背為舍念念相續無常為高危一云色界為堂欲界為舍不免墮落名為高危妙樂云念念等者相續故高無常故危如云頭殿腹堂即觀心一釋也如云色堂欲舍等即因緣一釋也柱根摧朽梁揀傾斜基陛隤毀命根支持如柱亦云兩足為柱根生異滅三相所遷名摧朽也意識綱維以為梁棟諸苦所壞如傾斜過去行業為基陛衰老之時為頽毀妙樂云意識綱維者統御一身其猶梁揀樹立一屋墻壁圮坼泥塗阤落覆苫亂墜椽梠差脫墻壁者一云四大為墻壁皮膚為泥塗四威儀不正為亂墜五識不聰不相主境為差脫亦云墻壁圮坼如皮膚皴朽壯色鮮淨如初泥塗老死枯朽如後阤落髮鬚朽老則皆脫落如覆苫亂墜筋骨老弱支節不援如椽梠差脫周障屈曲雜穢充遍周障是六識屈曲是六根六識緣六根取境難關故言屈曲六塵遍染六根故言雜穢充遍三頌五百人有五百人止住其中三乘根性為五道所攝兼得三十子譬也四頌火起四初明地上事譬欲界火起四初明所燒之類譬衆生十使二初正明所燒二初明禽獸被燒譬五鈍使二初譬五初譬慢使鴟梟雕鷲烏鵲鳩鴿慢使衆生自舉輕他如鳥為性陵高下視故以八鳥譬八慢也陵他為慢自貴為憍文殊問經明八憍今用譬八鳥壯盛憍如鴟性憍如梟富憍如雕自在憍如鷲壽命憍如烏聰明憍如鵲行善憍如鳩色憍如鴿二譬瞋使蚖蛇蝮蠍蜈蚣蚰蜒此譬瞋使瞋有三種一非理瞋謂不問可否歘起瞋心二順理瞋謂人實惱我三諍論瞋謂著己所解為是謂他説行為非蚖蛇毒盛不觸而吸譬非理生瞋蝮蠍若觸則螫譬執理瞋蜈蚣蚰蜒譬戲論瞋世人云赤頸者是蜈蚣不赤者是蚰蜒蚖音元又吾官切即蜥蜴又毒蛇也蝮芳六切一曰𮓸鼻上有針大者長七八尺蠍許蝎切一名蠍虎毒蟲也蚰蜒亦毒蟲蟲三譬癡使守宮百足鼬貍鼷鼠至𧏙蜋諸蟲而集其上此譬癡使於境不了曰癡即無明也無明有二一獨頭二相應守宮百足等兀然譬獨頭無明鼬貍鼷鼠譬相應無明諸惡蟲輩者從癡根本備起諸結使也交橫馳走者明諸使相緣或緣三界如交橫起之速疾如馳走屎尿下明癡心所著之境皆無常苦無我不淨故云屎尿臭處不淨流溢由癡不了於中計常樂我淨而生染著故云𧏙蜋諸蟲而集其上守宮即蝘蜒博物志云以器養之食以丹砂乃可防間淫逸故謂之守宮百足者十誦律云蛣𧏙也鼬舍救切野鼠赤黃色食鼠鼷音奚小鼠也𧏙蜋亦名蛣蜋烏甲蟲丸糞土者四譬貪使狐狼野干咀嚼踐踏至飢羸慞惶處處求食此譬貪使貪有二種一有力二無力有力者以威勢取如狼狐等無力者但能從他乞索粗弊如野干等咀在呂切含味也嚼下明貪取境引物向己如咀嚼不以道理如踐踏又貪心取境有用不用有用而取如咀嚼不用而取如踐踏貪心取境或取一物或取多物其有齊畔如嚌嚙也骨肉狼藉者積聚五塵不知止足也羣狗競來搏伯各切手擊也撮者此有力貪搏撮無力之者飢羸慞惶者貪不知足如飢求不能得如羸種種營覓如慞惶多欲之人雖富而貪處處求食者馳逐五塵之境也野干似狐而小形色青黃尾大嚌狙詣切嚙者或云沒齒咬也撮者蹙聚而捎取之也慞惶者恐懼也五譬疑使鬬諍摣掣啀喍嘷吠此譬疑使猶豫二邊名疑未決是非名鬬諍意謂為是名掣復謂為非名摣側加也啀喍嘷吠者發言論決是非之理也妙樂云摣者釋名云叉也謂五指俱取也掣牽也亦云向前曰摣向後曰掣啀喍者聚唇露齒也嘷吠者出聲大吼也止觀云狐疑未決為啀喍陵恐於他為嘷吠如守家狗令他畏故而吠也二結其舍恐怖變狀如是結上五鈍使也二明鬼神被燒譬五利使二初總明處處皆有魑魅魍魎此總譬五利使身見等五觸處生著造次恆有故名利使遍緣四諦五陰下故言處處皆有夫鬼神有智禽獸則無故以利使譬鬼神鈍使喻禽獸妙樂云魑魅者物之精也俗書云山澤之怪謂之魑西京賦云山神虎形曰魑宅神豬頭人形曰魅魍魎者木石變怪也玉篇云水神也二別明五初譬邪見夜叉惡鬼食噉人肉至鬬諍之聲甚可怖畏此譬邪見由計斷常不信因果故名邪見夜叉亦云藥叉是捷疾鬼譬邪見撥無因果人是善報譬出世因果不雜煩惱邪見之心撥無此理如食人肉也毒蟲之屬是惡報譬世間因果雜諸煩惱邪見之心撥無此理如噉毒蟲之屬也孚乳産生者世間之法從自類因生自類果也各自藏護者因能有果名藏必得不失名護又人肉是善毒蟲是惡邪見之心撥無善惡因果之事如夜叉噉食人肉毒蟲也孚乳産生者總説善惡並有因果相生之用也食之既飽者邪見之心成就也惡心轉熾者邪見之心增廣也鬬諍之聲者內心成就外彰言教宣於無因無果之法能令聞者墮落三途故言甚可怖畏也孚乳者妙樂引玉篇云伏卵曰孚通俗文云卵化曰孚廣雅云孚亦生也乳者養也故鳥生曰孚獸生曰乳自類等者即同類因得等流果以子似父故以喻之二譬戒取鳩槃茶鬼蹲踞土埵至往返遊行縱逸嬉戲此譬戒取執邪為道名非因計因及雞狗等戒名戒取鳩槃茶此云甕形以其形似甕故即魔鬼乃鬼之勝者譬修有漏善能勝諸蟲也蹲踞土埵者外道修十善戒能生六欲天六天是欲界高處如土埵也又外道持戒能修禪定初得欲界定或得未來定未來定未脫欲界欲界之頂如土埵也或離一尺二尺者得色界定如一尺得無色定如二尺得升上界為往退墮為返起戒取之見如縱逸嬉戲妙樂云鳩槃茶者可畏鬼也蹲虗坐也踞實坐也捉狗兩足撲令失聲以腳加頸怖狗自樂狗足如因捉之如謗故謗無苦因如捉狗足謗無苦因之上復謗無苦果如腳加頸苦因本得苦果如狗之有聲邪見之人撥言苦因無得苦果之理如撲普木切小擊也令失聲既謗無苦因苦果如怖狗自樂也妙樂云謗無苦因者只指非因計因即是謗也本是世因謂是出世即是謗無兩因故譬捉狗兩足也三譬身見復有諸鬼其身長大至發大惡聲呌呼求食此譬身見於陰入界中妄計為身名身見竪入三世計我名長橫遍五陰計我名大計我自在不修善法即無慚愧故言裸形以惡莊嚴故言黑無功德資故言瘦計我者不出三界故言常住其中計我在心發言宣説有我之相故言發大惡聲冀因此説望得道果故言呌求食也裸郎果切本作裸赤體也又袒也四譬見取復有諸鬼其咽如針此譬見取謂因此見通至非想名見取非想無常而計涅槃如咽細命危而保其壽故言其咽如針妙樂云見取者非果計果非想非是涅槃之果計之為常無色唯心名為咽細三界壽極名為命危計之為常名為保壽保壽正當計果義也五譬邊見復有諸鬼首如牛頭至飢渴所逼呌喚馳走此譬邊見於身見上計我計斷常執常非斷執斷非常隨執一邊名邊見斷常二邊如牛頭二角為身是我為我是身依我見起邊見如頭兩角也計斷常之過能斷出世善根如食人肉能斷世善根如或復噉狗或時計常或時計斷前後回轉如頭髮髼亂計常即破斷計斷即破常如殘害凶險無有智定食飲自資如飢渴所逼各陳二見如呌喚馳走妙樂云若計常者身非是我身斷我常若計斷者身斷我斷或俱常斷具如止觀第五記二總結利鈍夜叉餓鬼諸惡鳥獸至如是諸難恐畏無量初二句總結欲界煩惱之相亦是結利鈍衆生之相上句利下句鈍次二句通約利鈍二使並是有漏之心無道味之食故云飢由飢故生死速疾故云急四向者見惑雖多不出四句窺看窗牖者窺私竊也明其邪觀空理慕仰道味雖復觀察而滯著心多不會正理如窺窗見空不得無礙也後二句收廣結非也妙樂云由隔窗牖故見空而偏空無偏正由從窗窺理無是非計者成過由過墮惡故恐畏無量也二明火起之由譬五濁所由是朽故宅屬於一人其人近出未久之間三界是佛化應之處發心已來誓願度脫故云屬於一人長者在宅能令慎火由出去後諸子無知故令火起內合正由如來大通佛時常教是等令伏五濁如令慎火但衆生感既盡如來應亦捨此等於後便起五濁如令火起佛於他土赴緣非是永去故言近出三明火起之勢譬正起五濁於後宅舍忽然火起至摧折墮落墻壁崩倒三界為宅五陰為舍四面是處所即身受心法也於身受心法起四倒五濁八苦故云一時相續漸增故云俱熾命根斷為𪹼風刀解體為裂又受苦呻吟悲痛之聲名為𪹼諸根破壞為裂氣斷骨離筋絶為摧折墮落四大解散為墻壁崩倒也四明被燒之相譬八苦五濁諸鬼神等揚聲大呌至周慞惶怖不能自出例上鬼神譬利使之人若計常者謂法定常已有還無無即常故計斷者謂法定斷唯此一死更無復續皆唱言定説其事已顯故言揚聲大呌也雕鷲諸鳥譬鈍使鳩槃茶等譬利使中戒取鈍使及戒取本不計斷今見無常但生疑怖不知出離之方故言慞惶不能自出妙樂云初二句屬見惑次一句屬思惑後三句明不出所以專由於見故重云鳩槃茶等周慞補注云楚辭聯翱翔兮周章王逸注云周流也經或作慞訓懼正作章二明穴中事譬色界火起四初所燒之類惡獸毒蟲藏竄孔穴毗舍闍鬼亦住其中四禪之定如孔穴雖復不及門外敞豁猶得免於猛焰譬入四禪定中雖未出界外猶得免於欲界粗惡也利使衆生亦得禪定如毗舍闍鬼亦住其中翻譯名義云毗舍闍此云噉精氣噉人及五穀精氣妙樂云初二句鈍使次二句利使二火起之由薄福德故由少福故近惡遇苦三火起之勢為火所逼孔穴之中雖無猛焰猶有熱惱譬四禪雖無欲界惡亦有喜樂愛味細苦故言為火所逼四被燒之相共相殘害飲血噉肉至臭煙蓬㶿四面充塞利鈍諸使衆生得禪是同所計各異互相是非如相殘害也既於禪中起諸見則不能生無漏定慧但著禪味如飲血又著覺觀等五支如噉肉野干是譬欲界貪於欲界修未來定已斷此貪故言並已前死亦名食噉禪定之貪如大惡獸能吞欲界之貪故云競來食噉欲界四倒八苦如猛焰色界四倒八苦如臭煙以煙過焰故以煙譬色界色界亦通身受心法及以四大如四面咸苦故云充塞三明空中事譬無色火起二初所燒之類蜈蚣蚰蜒毒蛇之類為火所燒爭走出穴前欲界中以蜈蚣譬瞋今無色界中亦以蜈蚣譬瞋色界中雖不言蜈蚣而云毒蟲即兼蜈蚣故知瞋通三界也毒蛇等者厭色界定出向無色厭色粗境觀無色法如毒蛇類火燒出穴妙樂云前云藏穴以譬色界今乃出穴故譬無色色界如穴厭下如燒欣上如出穴二所燒之相鳩槃茶鬼隨取而食至飢渴熱惱周慞悶走若得無色定必滅下界緣故云隨取而食非想居於最頂猶尚不免顛倒諸苦如頭上火然也非想亦有八苦之火心生異念名生苦念念不住名老苦行心擾擾妨定名病苦退定是死苦求定不得是求不得苦求定不得必有於障即怨憎會苦失定時苦名愛別離苦四陰心即五盛陰苦無無漏飲食所資故飢渴所惱猶是輪回故周慞悶走也四總結成三界衆難非一其宅如是甚可怖畏毒害火災衆難非一頌總譬竟二頌別譬三初頌長者見火譬三初頌能見是時宅主在門外立聞有人言宅主即長者是能見之人門外立者正頌上我雖能於所燒之門安隱得出也立者如來在法身地常懷大悲欲救衆生不處第一義空之座故云立也聞有人言者上云見今云聞以聞代見聞必從他法是佛師謂三昧法也此法為師即他人也若入三昧即能見機三昧令佛見故云有人言也又云大悲是他人也二頌所見汝諸子等先因遊戲來入此宅稚小無知歡娛樂著問子本未出云何因遊戲來入答或在大通佛時曾發大心名出三界而復退還名之為入如人舉足欲出至門側而返亦名為出亦名還入也又理性本淨非三界法名出因無明故而起戲論便有生死名入故云先因遊戲來入也昔結緣淺大善未著名為稚小退大已後流轉三界無明所覆名為無知妙樂云約事解中即退大後以著五欲而為遊戲約理解中即以戲論而為遊戲言戲論者即三界見思見思即理故出理即見思故入三頌驚怖長者聞已驚入火宅二頌捨几用車譬二初頌捨几譬三初須擬宜方宜救濟令無燒害至此苦難處況復大火方宜者以大教擬宜也告喻者即是説衆患難誡教之義也妙樂云初一行正明擬宜次一行初句總立所燒即是見思次一句總明燒勢次兩句略明燒相也又次一行半廣明所燒文中雜列見思二類不復次第又次一行況結於中初二句舉所況次二句正況由無定慧是故飢渴已可怖畏況復更為濁火所燒如得上界有漏定時無無漏定已為小火所燒梵況墜下欲界大火所燒即指飢渴以為此苦也二頌不受諸子無知雖聞父誨猶故樂著頌上諸子不肯信受妙樂云不受即是無機亦是稚小無知故也文中略故但云無知猶故樂著者既無大志復不習小已無大小復著三界也三頌息化嬉戲不已頌上視父而已嬉戲即見思也妙樂云見思不已故息大化若見思不已尚有大機如來於時亦不吝大但緣大小俱失唯有見思故且令出濁先施小耳二頌用車譬三初頌擬宜三車是時長者而作是念至即便思惟設諸方便初一行明擬宜意次一行用小之由由著見思故唯施小次半行用小之意若不用小則大小並亡故云將為火害害故喪身喪身故失命次半行正思用小施三乘教也耽都含切樂之甚也湎彌兗切溺也二頌歎車希有四初頌勸轉告諸子等我有種種珍玩之具妙寶好車妙寶者仍屬方便即方便教中之妙寶也若妙寶是大何故皆詣父所索車二頌示轉羊車鹿車大牛之車今在門外在門外者如示四諦令知出世也三重勸轉汝等出來四頌證轉吾為汝等造作此車隨意所樂可以遊戲經文意者吾善造車以給一切驗知自必不乏於車引自無謬證賜不虗也三頌適子所願諸子聞説如此諸車至到於空地離諸苦難馳走頌上見諦空地頌上無學也三頌等賜大車譬四初頌免難歡喜二初頌免難道者見子得出火宅住於四衢坐師子座坐師子座有二釋一云是諸子坐座得出三界故無畏也二云是長者坐座長者見子免難即得無畏也妙樂云四衢者即四諦也初在門外子猶在內是故父立今子既出是故安坐又大機未會是故云立小化已周是故安坐故知立者冥利坐者顯益二頌歡喜而自慶言我今快樂至是故諸人我今快樂而自慶言等者得所化機是故慶快二萬億佛所教其大緣是故云生中間小熟是故云育經此多時數數成熟將養不易故云甚難大種微故愚小起五濁由無知由因招果故云入宅多諸下二句述其所起見思之火大火下二句述其被燒火勢而此下二句合其見思我已下二句明歡喜之由是故下二句結歡喜意二頌諸子索車爾時諸子知父安座至今正是時惟垂給與初二句明索車時驗知上文是父坐也皆詣下二行正索於正索中初一行正索次一行述許今正下二句結索三頌等賜大車四初頌釋大車長者大富庫藏衆多金銀琉璃硨磲碼瑙屋盛稱庫地盛曰藏行具一切法名藏眼等六根具一切法名庫妙樂云行具一切法名藏者但約含藏為義六根具一切名庫者藏寬庫狹故也但約盛貯諸庫不同如六根各異雖異各具故於諸根具一切行自非一家豈可聞此以根以行為庫為藏各具諸法二頌廣大車以衆寶物造諸大車至四面懸鈴金繩交絡因果所有之法總名衆寶約教修得義之如造行多子多故車非一是故所造諸而復大又須示方知起修名造以性泯修造還本有即車體也莊校下即具度如前釋真珠羅網張施其上至衆綵雜飾周匝圍繞真珠等者出幰蓋相慈門非一猶如網孔一一孔中皆一真珠如衆慈門並稱於實前文但云垂諸華纓秪是直令見者欣悅今云處處垂下乃明衆機遍悅也衆綵雜飾譬垂化之處設應不同周匝圍繞譬攝物之宜無所闕少柔軟繒纊以為茵褥至多諸儐從而侍衛之前直云重敷今加歎柔軟者以譬諸禪自在故云柔軟又以貴氎覆其上者以妙冠粗如細覆上茵者説文云車中重席具足事禪有異凡小故云鮮白淨潔三頌等車章門以是妙車四頌等心章門等賜諸子四頌得車歡喜諸子是時歡喜踊躍至嬉戲快樂自在無礙遊於四方者乘中道慧橫遊四種四門四種四諦竪遊四十一位究竟常樂我淨之德故言嬉戲自在二頌合譬二初頌合總譬四初頌合長者告舍利弗我亦如是衆聖中尊世間之父上二句合位號下二句合名行兼合歎德義如來是七種方便賢聖中尊九種世間之父妙樂云九種世間者秪是九界耳七望於九但除四趣離開三教菩薩以子義通故世間從九結緣義局故方便唯七二頌合五百人一切衆生皆是我子深著世樂無有慧心此合五道義兼三十子三十子是緣因子一切衆生是正因子無有慧心者通語無實也三頌合舍宅三界無安猶如火宅正頌合家宅兼得一門義四頌合火起衆苦充滿甚可怖畏至如是等火熾然不息初二句總標次二句釋次二句結合總譬竟二頌合別譬四初頌合長者見火譬三初頌合能見如來已離三界火宅寂然間居安處林野頌上如來能見正由寂然間居能見五濁諸子即合聞有人言妙樂云寂然等者在王三昧用智即是安處也二頌合所見今此三界皆是我有至而今此處多諸患難頌上所見衆生為生老病死之所燒煮合上所見火譬三頌合驚怖唯我一人能為救護頌上佛見此已便作是念合驚入火宅也二頌合捨几用車譬二初頌合捨几三初頌合擬宜雖復教詔二頌合無機而不信受三頌合息化於諸欲染貪著深故頌上未免生老病死憂悲苦惱等也二頌合用車三初頌合擬宜三車以是方便頌上但以智慧方便欲擬宜也二頌合歎車希有為説三乘令諸衆生知三界苦開示演説出世間道三頌合適子所願是諸子等若心決定至有得緣覺不退菩薩若心決定者從苦法忍已上是真決定此一句總頌三乘馳走之位後具足下一行各頌三乘爭出之位三明者輔行引婆沙論云宿命知過去苦生大厭離天眼知未來苦生大厭離漏盡能作正觀斷諸煩惱此三名明身通但工巧而已天耳但聞聲而已他心緣他別想而已故不名明不退菩薩者不退義通亦兼三藏三頌合等賜大車譬二初頌合等賜大車四初頌合大車章門汝舍利弗我為衆生以此譬喻説一佛乘頌上悉與諸佛禪定等二頌合等心章門汝等若能信受是語一切皆當成得佛道頌上是諸衆生脫三界者三頌合高廣大車是乘微妙清淨第一至所應稱讚供養禮拜頌上皆是一相一種等四頌合釋有車由無量億千諸力解脫禪定智慧及佛餘法頌上我有無量無邊智慧等二頌合得車歡喜二初明各得大車得如是乘令諸子等至乘此寶乘直至道場日夜者初得佛知見中道智光如日分無明在如夜自得中道智如日入生死如夜常行二法故言遊戲三乘之人同入佛智故云與諸菩薩及聲聞衆又此明自行化他自獲是乘故言日夜遊戲以此化他故言與諸菩薩及聲聞衆能化三乘同乘寶乘也直至道場者妙覺位也二結勸信以是因緣十方諦求更無餘乘除佛方便所説一乘無三因緣於十方土審實而求唯一無二除佛方便則不在言耳四正頌合無虗妄譬二初頌不虗章門三初先定父子明本欲與大告舍利弗汝諸人等皆是吾子我則是父既云皆是吾子理應平等與大也二明説三乘意為除障汝等纍劫衆苦所燒我皆濟拔令出三界三障除遂本心還與大法我雖先説汝等滅度至今所應作唯佛智慧初一行明障除但盡生死者但盡分段生死尚有變易生死故云而實不滅也次半行遂本心故云今所應作唯佛智慧也二頌合釋不虗三初釋同皆是子理應平等若有菩薩於是衆中至所化衆生皆是菩薩若有菩薩者方便三乘所化衆生皆是昔日結緣佛子亦皆同有真如佛性故云皆是菩薩也二釋不能受化乃説三乘若人小智深著愛欲至佛説苦諦真實無異此下正明有作四諦也小智障重不即信受為是方便開三接引小智為説苦諦者聲聞於三乘中最小復以苦諦為初門苦以逼惱為義諦即審實不虗總而言之不出六道生死是也衆生心喜者稱其本習則喜本厭生死自求涅槃今聞出離即會宿習是故心喜真實無異者遺教經云佛説苦諦實苦不可令樂故言真實無異衆生下二句明機佛説下二句明應也若有衆生不知苦本至諸苦所因貪欲為本初一行正明集諦集即招集之義集是苦因故言苦本衆生不知是故深著為是等二句顯道能治集諸苦等二句明集過患若滅貪欲無所依止滅盡諸苦名第三諦此明滅諦初二句明滅集功能若滅集因則苦無所依下二句明滅諦得名也為滅諦故修行於道此明道諦道即能通之義以能通至真空涅槃略則戒定慧廣則三十七道品也離諸苦縛名得解脫至但離虗妄名為解脫初二句重舉得脫集是能縛苦是所縛離此苦集名得解脫是人下二句徵也觀諦得脫為是何脫但離下二句釋也但離虗妄者無明已是不實見思附無明起故呼之為虗妄有作四諦但除此惑名為解脫脫於分段未脫變易故非自在三釋後若堪能還與其大其實未得一切解脫至安隱衆生故現於世一切解脫即無作滅諦無上道即無作道諦佛本欲與一切解脫今汝始斷分段生死所證真空非大涅槃以其未得一切解脫故終未稱佛本心故言我意不欲令至滅度此小乘解脫也今則還令得無上道入大涅槃乃是究竟稱佛本心無作道滅破無作苦集昔欲説此而衆生不堪障既已除還説此也佛為法王於權實法已得自在開三權顯一實豈當有虗虗也妙樂云初一行半以無上道法斥次一行半出佛本心二六十五行孤起頌勸信亦名通經方法二初標二初標可説不可説汝舍利弗我此法印為欲利益世間故説法印即前實相印也如來説此法印為利益世間故説也不説者四十餘年未是説時五千未去是故不説也二標可通不可通在所遊方勿妄宣傳惡者強説令其墮苦善者不説誤其失樂若大悲愍惡則不為通若大慈念善則應為通也二釋二初釋可説不可説若有聞者隨喜頂受至隨順此經非己智分此八行偈明如來利益世間之相也通論三世利益別論令二乘人入信初一行言阿惟越致是觀現在益為説也阿惟越致亦云阿跋致此云不退轉有三義釋見序品又智論云無生忍法即是阿跋致地若有信受下一行半言曾見者是觀過去善為説也若人有能下一行半言信汝見我者是觀未來善為説也如下文云若深信解者見佛常在靈鷲即其義也斯法華經下一行結上開下也如來觀知三世利益是故為説是結上也淺識聞之迷惑不解則不為説是開下也此即釋如來説不説章也二釋可通不可通二初明用大悲莫為惡人説又舍利弗憍慢懈怠計我見者莫説此經先列憍慢懈怠計我著欲等惡數必起惡誹謗獲惡果報是故大悲怋惡不可為説凡夫淺識深著五欲至則斷一切世間佛種斷世間佛種者淨名經以煩惱為如來種此取境界性為佛種善惡事異名境界性大品經以一切種智學般若為佛種此取了因性為佛種涅槃經用心性理不斷此取正因性為佛種今經明小善成佛此取緣因性為佛種若不信小善成佛即斷世間佛種也或復顰蹙而懷疑惑至斷佛種故受斯罪報妙樂云畜生中言斷佛種者正當破壞緣了二因不信即斷了因佛種不行小善即斷緣因佛種此經遍開六道佛種若謗此經義當斷也顰蹙謂眉顰頞蹙厭聞貌𩑔苦骨切禿也黮吐敢切黑也若作馲駝或生驢中至如斯罪人常生難處常生難處者八難也永不見佛即佛前佛後難永不聞法即世智辨聰難聾啞即盲聾瘖啞難常處地獄即地獄難在餘惡道即餓鬼難駝驢等即畜生難永不見佛聞法又是北洲難但缺長壽天一難既云難處義必兼之狂聾心亂永不聞法至無智人中莫説此經妙樂云問謗經生罪非經為罪緣答罪福由心經乃緣助然從佛元意唯為生福是迷者過非路咎也二釋用大慈為善人説二初正明可説五初過現一雙若有利根智慧明了至如是之人乃可為説利根是現在植善是過去強識是現在見百千億佛是過去二上下一雙若人精進常修慈心至如是之人乃可為説修慈是愍下恭敬是尊上三內外一雙又舍利弗若見有人至如是之人乃可為説捨惡親善是外求持戒如珠是內護四自他一雙若人無瞋質直柔軟至如是之人乃可為説質直敬佛是自行譬喻説法是化他五始終一雙若有比丘為一切智至如是之人乃可為説四方求法是請益之始頂受專修是歸憑之終二總結可説告舍利弗我説是相至汝當為説妙法華經此總結也相者即上五雙十隻善人之相也善相甚多略舉十相以示流通也妙法蓮華經信解品第四夫根有利鈍惑有厚薄説有法譬悟有前後二乘於法華已前但念空無相願於菩薩法都無一念好樂之心至法華會初聞略説上根雖悟中根未解動執生疑廣聞五佛蒙籠未曉今聞譬喻歡喜踊躍信發解生疑去理明故名信解品又中根之人聞説譬喻初破疑惑入大乘見道故名信進入大乘修道故名解文云我等今日真是聲聞以佛道聲令一切聞聞圓教入圓位故名信解品也二信解品明中根得解二初經家敘喜二初敘內心爾時慧命須菩提至發希有心歡喜踊躍善吉獨稱慧命三人稱摩訶者通論皆大皆慧別論善吉解空空慧為命諸慧人中佛慧第一佛於般若命其轉教其為慧人所命故云慧命從佛所聞等是得喜之由由遠聞方便品法説見舍利弗得記如此聞見昔所未有故歡喜也發希有心者敘近聞譬喻希有心發心發故名之為信以信故入入歡喜位即信解品意也二敘外敬即從座起整衣服至曲躬恭敬瞻仰尊顏例上身子亦應三業領解發希有心心領解也即後座起身領解也白佛言口領解也二白佛自陳二初長行二初略法説二初正法説二初明昔稟三故不求二初標三初居僧首故而白佛言我等居僧之首明三不求述昔失也初居僧首者我法臘既高晚學以我為軌忽改途易轍棄小求大為後來所嫌自固護彼所以不求也二俗年邁故年並朽邁若作菩薩當專任大道廣度衆生今既朽老無所堪任是故不求三已證得故自謂已得涅槃無所堪任至心不喜樂已得涅槃無為正位不能發大心故云無所堪任盡無生智已立無所依求故云不復進求阿耨菩提空無相無作名三解脫門觀諸法無我我所名空解脫門觀男女相一異相等實不可得名無相解脫門若知一切法無相都無所作名無作解脫門又於三界無所願求名無願解脫門二釋二初先釋得涅槃不求所以者何世尊令我等出於三界得涅槃證二釋年邁即兼僧首又今我等年已朽邁至不生一念好樂之心二明今會一故自得我等今於佛前至深自慶幸獲大善利此陳得解之由由遠聞上略廣二番開三顯一是故慶幸獲大善利者正陳得解是近聞上譬喻希有之法而獲開悟之善利也二略舉譬無量珍寶不求自得譬昔不求而今自得希有法寶也妙樂云昔般若領教謂為菩薩之法豈圖於今全蒙等賜二廣譬説二初開譬二初咨發世尊我等今者樂説譬喻以明斯義妙樂云應如世禮欲有所決須先咨發二開譬五初父子相失譬四初子背父而去二初背父而去譬若有人年既幼稚至或十二十至五十歲譬若有人領二十子譬二乘人菩薩位行難知且齊已領耳年既幼稚者無明厚重覆障解心解心無力故言幼稚捨父逃逝者退大為捨無明自覆曰逃趣向生死為逝問佛捨應後衆生起惑是父離子非是子捨父答由衆生不感佛則去世還成子捨父義久住他國者涅槃法界是佛自國生死五欲是為他國本求出離而退墮不返故云久住他國或十是天道二十是人道五十是五道約於一人備輪諸道故云或十等妙樂云解心無力者昔修觀行雖觀理即未入似解不能除濁故云無力義之如幼退大已後名字全迷義如厚重本結大緣寂光為土是自國退大已後輪回五道望本為他常住三界故云久住他國升沉不定故著或言二向本而還年既長大加復窮困至漸漸遊行遇向本國善根薰被稍稍欲著名為長大在三界中不見佛父不得出要之術故為窮八苦火燒故為困馳騁四方以求衣食者佛未出時諸凡夫人依身受心法起於四倒之見於中求正道如求食求助道如求衣以厭苦求理為可化之緣佛初出時諸外道等皆先得度即此意也漸漸遊行遇向本國者明外道厭苦希脫邪求涅槃雖非本意亦蒙值佛故云遇向也本國如上説妙樂云求正道等者以計常等而為正道種種苦行以為助道雖思惟邪理堪為正機然由久遠大種熏被故也二求子中止三初求子不得其父先來求子不得二乘退大已後佛常求機而機不會故名不得也二中止一城中止一城中止一城者不為一子而廢家業譬佛不以一處無機而廢餘方施化以方便有餘土為國在同居實報兩間為中有餘涅槃為城住此涅槃名止處此為家起勝劣兩應劣應應聲聞勝應應菩薩五人斷通惑者同生其土皆為菩薩佛以勝應應之純以大乘家業訓令修學中止於此伺覓同居子機妙樂云不為一子等者且以一方一類而為一子故次合云不為一處處必在人只是同居人類未孰且止方便不廢化儀若準餘方之言應指十方國土設十界化若思此同居得子便故且語有餘五人即是四果支佛或取三藏二乘及通三乘為斷通惑者此亦可爾通論方便人數則應云九藏二通三別三圓一不得云五今且對小故云五耳其家大富財寶無量實相境為家具足萬德為富五度福德名財般若智慧名寶導一切皆摩訶衍名無量妙樂云大富總稱財寶是別雖分財寶般若導五無不成寶況一切行皆成珍寶故云無量金銀琉璃珊瑚琥珀玻璃珠等其諸倉庫悉皆盈溢金銀珠等是大乘三十七道品即領上長者大富義也倉庫盈溢者在內為盈在外為溢盛米為倉盛物為庫倉譬禪定禪生百八三昧故庫譬實相能發十八空智慧故自資為盈化外為溢領上多有田宅義也妙樂云寶不出七故譬七科多有僮僕臣佐吏民多有僮僕者譬方便知見波羅蜜皆悉具足屈曲隨機稱事稱理領上又多僕從義也就位為語二乘及通教菩薩別教三十心悉如僮僕別教圓教十地如臣十向如佐十行如吏十住如民初入佛境界率土之濵無非王民雖得為民比吏佐等猶為疏遠十行修習諸法種種驅馳故如吏十回向事理稍深職近王邊故如佐十地輔佛行化降魔制敵故如臣也妙樂云上僮僕中已有別三十心今臣佐等是圓四十位也兼收別教十地者仍存教道故立別名以無兩重十地故也象馬車乘牛羊無數出入息利乃遍他國一心三觀如象運圓教大乘次第三觀如馬運別教大乘析空即空二觀如牛運藏通二教大乘析法觀自行如鹿羊等運二乘之法無數者權實諸教皆名車乘權實觀智名象馬牛羊非但教法甚多觀智亦復無數也出入者二而不二是入不二而二是出又無量還一是入一中無量是出又化他用為出自行用為入出法益衆生為息化功歸已為利乃遍他國者遍於三土行於非道通達佛道即其義也唯法性是己國法性之外者皆名他國耳妙樂云一心三觀至二乘之法者次明僮僕臣佐吏民所乘所乘不出諸觀故也隨教用觀即當所乘然此境智雖即隨教同為圓人所用無數等者臣佐吏民所用實也僮僕所用權也此亦一體權實並皆長者所有商估賈客亦甚衆多此土菩薩往他方聽法他方大士來此土聞經往還採利有如商賈又遍入實報方便同居以求法利故云衆多三子遇到父城二初到城之由時貧窮子遊諸聚落經歷國邑無大乘功德法財故名窮子此等退大已來備遭諸苦深起厭患欲求出離取理不中致成邪僻由邪慧歷心易可入正以求出世為感佛之由也以邪慧觀察五陰為聚落十二入為邑十八界為國歷此求理名求衣食妙樂云言觀察五陰等者還以邪觀觀陰斷常以此邪慧冥資於正成見佛之由也二遂到父城遂到其父所止之城由向邪慧助正成機感佛大悲名為到城城即涅槃涅槃通半滿衆生惑盡可有得涅槃之義故言到城妙樂云機熟若證證父所證名到父城此乃小機先扣大應義立窮子已到父城故使城名涅槃大小雙得四其父憂念意二初念失子苦父每念子與子離別至是以殷勤每憶其子如來自昔至今恆思子大機故言每念退大已來流浪五道故言與子離別五十餘年開鬼出修羅故言餘也未曾説者未曾向方便土中臣佐吏民説有此子機緣也又應世已來自昔華嚴方等般若諸座未曾向諸大士説此聲聞本是大乘之子既非佛子不解佛法或如聾啞或去華拜座或棄鉢茫然種種不逮也心懷悔恨者悔昔不勤教詔致令逃逝也恨子不思恩義疏我親他內合如來悔不殷勤令入內凡遂使退失本解恨其無心不能精進固志逃迷不返故言悔恨也自念老朽者化期將畢無傳大法之人如老朽而無子也妙樂云恨子下專斥於子非但悔應早息亦乃恨子機生致令疏我正法親他六塵內合等者為論免難須淨六根二念得子樂復作是念我若得子委付財物坦然快樂無復憂慮有可度之機名為得子與授佛記名付法財稱於本心復言快樂領上總譬竟二父子相見譬二初子見父四初見父之由世尊爾時窮子傭賃展轉遇到父舍由厭苦欣樂推求理味漸漸積習遂成出世善根故言傭賃展轉以此善根能扣佛慈悲故言遇到父舍父喻道後法身舍喻無緣慈悲大小二機雙扣此舍有大機故故言遙見其父有小機故故言住立門側若惟小無大則子不應見尊特之身父不應言我財物庫藏今有所付若唯大無小子不應住立門側又不應言非我傭力得物之處妙樂云傭賃之法以力易財本起邪見還希脫苦雖復邪求冥資正道故使世間厭苦遂成出世善機世易出世故云傭賃從一至一故云展轉不期而會故名為遇不意因於世法忽感出世慈悲又不意世間邪推而生正見感佛又不意小善之內冥入大乘圓門大小二機雙扣此舍者大機未熟正見而遙小感稍親門側而近二見父之處住立門側遙見其父門側者譬二觀為方便即門二邊圓中之機當門正見二乘偏真故言門側但空三昧偏真慧眼傍窺法身耳遙見其父者言大機始發扣召事遠是故言遙三見父之相踞師子牀寶几承足此言如來説華嚴時也踞師子牀者圓報法身安處空理無復通別二惑八魔等畏故云踞師子牀也寶几承足者定慧為足實諦為几無生定慧依真如境也妙樂云踞師子牀作所表釋者事師子座亦無師子之形但有所表故大論云佛為人中師子故佛所坐名師子座佛之所説名師子吼圓報身者部雖兼別從勝從本故曰圓報寶几等者一几承於二足定慧所依無殊即定慧力莊嚴法身從所名能故云無生定慧諸婆羅門剎利居士至手執白拂侍立左右婆羅門名淨行貴族高潔即等覺離垢菩薩也剎利是王種即九地已下初地已上菩薩也居士富而不貴即三十心也真珠瓔珞者即戒定慧陀羅尼三昧四瓔珞也價值千萬者即四十地功德以嚴法身也吏民僮僕者若異門明義者即是稟藏通二教斷通惑者名為民稟別教斷通惑者名為吏若同門明義者還是方便波羅蜜也內與實智同外與機緣同喻如吏民有內奉外役之義也白拂者即是權智之用也左右者右即入空智用拂四住塵左則入假智用拂塵沙塵此二為中道方便故言侍立妙樂云前以吏民對圓十住十行今以吏民對前三教斷通惑者復與僮僕共列故知立名隨義不可一定元譬事理何得守株故前以吏民在實今此吏民攝屬於權故在同異二門跨節為同當分為異異約施權同約開顯秖一吏民義當兩屬覆以寶帳垂諸華幡至種種嚴飾威德特尊覆以寶帳者真實慈悲也垂諸華幡者華即四攝幡即神通香水灑地者降注法水灑諸菩薩心地以淹惑塵亦是定水灑心地也散衆名華者布以七淨華謂戒定慧斷疑道非道知見淨斷知淨也戒者攝律儀等三種戒也定者首楞嚴等定也慧者實智慧也斷疑者已度二諦之疑也道非道淨者行於非道通達佛道也知見淨者智德圓滿了了見佛性也斷知淨者斷德成就無明永盡也羅列寶物者羅列諸地真實功德也出內與前出入義同自行為取化他為與威德特尊者光明無邊色像無邊相海巍巍此義須作舍那之佛豈得作餘釋耶出尺遂切凡物自出則入聲使之出則去聲內世俗多讀為儒稅切非也當為納納入也古納字通四生畏避心窮子見父有大力勢至非我傭力得物之處大力勢者智大故名大力神通大故名大勢如上身手有力義也恐怖者小機劣弱怯懼大道也悔來至此者佛本欲以大法擬之應不稱機但有退大之意故言悔來至此也竊作是念者機中潛密冥有此事非是顯對見勝應身故云竊念或是王王等者波旬是王徒輩為等小機灰斷無言説道絶於色像既見勝應之像非天人所及所説之法逈異二乘小智薄德未曾見聞便謂是魔是魔所説又法身如王報身如王等此乃大乘法報非是小乘得益之處故竊念或是王王等也非我傭力得物之處者小機不能受大化也不如往至貧里肆力有地至作是念已疾走而去不如往至貧里等者淨名經云能以貧所得法度斯下劣也但空之理不含萬德非如來藏故言貧里偏空稱於小智故言肆力有地肆放也依此小智能得有餘涅槃無漏衣食行行名衣慧行名食故言衣食易得若久住此等者行大乘道經無量劫故言久住我本厭怖生死若修大乘必入生死廣學萬行故言逼迫我本樂小而今令我發大乘心是為強使捨大取小故言疾走也二父見子四初父見子處時富長者於師子座師子座見子處也如來法身居第一義空無畏之境而照機也二見子便識見子便識見子便識者如來鑒機知是往日結緣衆生也三見子歡喜心大歡喜心大歡喜者佛恆伺子機今機來稱慈是故歡喜即是領上法説中而起大悲心譬喻中即大驚怖也彼明大悲拔苦故言驚怖此明大慈與樂故言歡喜四見子適願即作是念我財物庫藏至我雖年朽猶故貪惜昔見衆生退大取小貧里求食資生艱難常欲與財無機不得今日機來稱大慈心故言庫藏今有所付我常思念者明其非但貧無大財又流轉生死衆苦所逼為大悲所痛故常思念雖欲救拔無機叵濟故云無由見之今有可度機發故云而忽自來稱大悲心故云甚適我願我雖年朽猶故貪惜者釋於適願之由由一期化訖故言年朽未見大機法無委付將來之徒從誰得脫為可度者故言貪惜今機自來無此憂念故我願得適也三父命追誘譬二初遣傍人追三初領上勸門擬宜無機二初擬宜即遣傍人急追將還爾時使者疾走往捉此下領華嚴時今領上勸門擬宜也遣傍人者智是能遣教是所遣理為正教為傍從佛出十二部擬宜衆生無機不受於其如乳故言遣傍人也又傍人者傍即臣佐等也即是遣法身菩薩為説大乘如華嚴中令四菩薩説四十地即是遣傍人也急追將還者直説大教擬宜小機故云急追昔有大種故曰將還疾走往捉者大乘明義顯露正直用此赴機令其疾趣菩提故大車中云其疾如風若以菩薩為傍人者菩薩自有神力又被佛加亦能令彼疾入菩提也二無機窮子驚愕稱怨大喚我不相犯何為見捉領上勸門無機也小乘縱昔曾發大心廢久不憶卒聞大教乖心故驚不識故愕故云窮子驚愕小乘以煩惱為怨生死為苦若勸煩惱即菩提即大喚稱怨枉若聞生死即涅槃即大喚稱苦痛故云稱冤大喚我本不求大何意用大化我故云我不相犯何為見捉妙樂云稱怨大喚者經但云怨而不云苦疏文釋中即以大喚為苦痛所以具有二義者逢怨必苦故以大喚擬之二領上誡門擬宜無機二初擬宜使者執之逾急強牽將還領上誡門擬宜也執之逾急者前明勸善猶是容豫我當為説怖畏之事即是急切誡以苦言令其遠惡內既無機外逼大化即是強牽將還也二無機于時窮子自念無罪至轉更惶怖悶絶躃地領上誡門無機也自念無罪者罪者慈悲也衆生罪故入生死獄菩薩以慈悲故亦同罪入獄二乘人無慈悲名為無罪令入生死之獄即是被囚執也無大方便而入生死必當永失三乘慧命故言必死思此等事故言轉更惶怖強以大教小智不解故言悶絶即起誹謗必墮三途故言躃地三併領勸誡息大乘化四初思惟息化二初知大志弱父遙見之而語使言不須此人勿強將來父遙見者小機去大乘遠故名為遙是結緣子故名為見而語使言者若約教為使智本説教智知無機大教宜息若約人為使即語諸菩薩不須現汝尊妙之身令二乘見如淨名經中攝汝身香無令彼諸衆生而起惑著又普賢入此娑婆促身令小皆是其義也勿強將來者既無大機若現勝身説大乘法恐傷其善根故言勿強也二知小志強以冷水灑面令得醒悟莫復與語冷水灑面者知有小志宜以三藏灰斷理水除見思之熱面者厭生死名背向涅槃如面也醒悟者開小教逗小機令得離煩悶悟四真諦也莫復與語者決定應息大乘教也妙樂云面者以向釋之有背生死向涅槃機故名為面非謂灑彼涅槃名面莫復與語者語秖是教二釋息化意所以其何父知其子至不語他人云是我子二乘厭苦欣空親狎下劣無慈悲心即畏難大法且任其小志抑佛本懷所以息化也審知二萬億佛所曾發大心故云審知是子而以方便等者於昔小乘教中隨他意語方便覆護稱是聲聞不説隨自意語云是菩薩也妙樂云覆實護權故云覆護亦是覆陰將護不彰其實故法華前一實之外皆名隨他意語以昔方等般若猶有小教定無小乘作佛之語故乳及二酥並對小機云不説隨自意耳三正明息化使者語之我今放汝隨意所趣我今放汝即是知大機弱隨意所趣即是知小善強以此二緣故息大化也四息化得宜窮子歡喜得未曾有從地而起往至貧里以求衣食不為大教所逼是故歡喜無謗大罪得免三途故言從地有小善生故言而起又前擬宜大法迷悶不解臥無明地今逗以小可得醒悟故言從地而起於四諦中欲求道法故言往至貧里以求衣食妙樂云境攝法狹故言貧里欲趣小果還須正助故云衣食二遣二人誘二初齊教領四初領上擬宜三車爾時長者將欲誘引其子而設方便此下領鹿苑時也將欲誘引者既息大化不容孤棄欲設方便故言將欲密遣二人形色憔悴無威德者初擬大乘云即遣傍人表一實諦一大乘教一菩薩人今明方便隱實為密指偏真為遣約教隱滿字為密指半字為遣約人內祕菩薩行故言密外現是聲聞故言遣二人者四大弟子齊已分領不涉菩薩故言二人約法是因緣四諦約理是有作真俗約人是聲聞緣覺二乘教中不修相好但説苦無常不淨即是形色憔悴又內怖無常曰憔外遭八苦名悴無有十力無畏名無威德汝可詣彼徐語窮子汝可詣彼等者即以小教擬小機也大教明理直實故言疾走往捉小教明迂隱故云徐語此有作處倍與汝直此有作處者見道修道是斷見思之作處倍與汝直者五戒十善止出三途今四諦十二因緣能出三界是為一倍又外道六行但能伏惑今修四諦則能斷惑得至涅槃是為二倍也窮子若許將來使作至我等二人亦共汝作窮子若許者有機是許即設教無機是不許即不設教欲何所作者二乘唯欲除見思惑取證涅槃不論淨佛國土成就衆生所以言雇汝除糞我等二人亦共汝作者約理即智諦相資約人即權人共實人修行故言二人共汝作也二領上知子先心時二使人即求窮子既已得之審知有機故言已得三領上歎車希有具陳上事陳説雇作除糞之事也四領上適子所願爾時窮子先取其價尋與除糞其父見子愍而怪之二乘慕果行因所以先問價值故云先取取道滅之價除苦集之糞也其父見子愍而怪者愍其取阿羅漢怪其不求佛道所失者大所得者寡故言怪也齊此領法譬中意其文竟妙樂云問若愍而怪者何故密遣教其取果答旁追不來事須密遣雖教除糞非父本懷欲有彰言委付故先愍而怪之二取意領亦名探領四初先以權智久欲擬宜又以他日於窗牖中遙見子身又者鄭重辭也四大弟子將欲探領如來法身地上久知大小之機一三施化重述佛意故標章稱又也他日者二乘自謂方便為己非二乘法為他他者即是擬法身也日者時也亦智也依法身之時用智照機故言他日若齊教領者領化身用事為己日非化身用事為他日若探領者領法身中照機也法身之時用化他之權智照於權機若有若無照用權事若可若否皆是權智所照故言他日窗牖者偏見則小表權智照彼偏機也遙者小去大懸故名為遠見子者昔曾種大稱之為子以大擬之故名為見窗牖偏狹未宜大化故息大而施小也妙樂云窗牖者説文云在屋曰窗在墻曰牖非戶故偏明處仍狹今亦如是非中故偏不遍故狹故法身地觀無大機唯見偏狹先熟故也乃由子隔窗牖之外何關長者偏視之非況是長者欲取偏機於圓仍遠故名為遙二久知方便是其玩好羸瘦憔悴糞土塵坌汙穢不淨領如來先知二乘有小玩好也修因智力少為羸修因福力少為瘦四住為糞土無知為塵坌也三久知須歎三車希有即脫瓔珞細軟上服嚴飾之具至狀有所畏脫妙服譬隱報身無量功德四十二地戒定慧陀羅尼等瓔珞寂滅忍細軟上服大小相海嚴飾之具容服若盛子則驚畏二乘不宜見此相好是故脫之更著粗斃者現丈六形是粗生忍法忍是弊也塵土坌身者現有煩惱有為有漏也左手喻實右手喻權權用便易自以此權法斷結成佛又用此權法化人故云右手執持除糞之器狀有所畏者狀似也示同小乘怖畏生死又有寒風馬麥之報也妙樂云生忍法忍等者忍有情惱名為生忍謂蚊蚋等忍無情惱名為法忍謂寒熱風雨等左手等者小中權實也又有寒風等者大論第九佛有九惱謂六年苦行孫陀利謗金鏘馬麥琉璃殺釋乞食空鉢旃遮女謗調達推山寒風索衣加雙樹背痛為十四親教子作適願受行七初譬四念處語諸作人語諸作人者即是説三藏教示四念處是除糞之器斷結之境故遺教經云常依念處行道能破四倒此領火宅中適願勇鋭即是聞慧外凡位也二譬四正勤汝等勤作勿得懈息以方便故得近其子勿得懈息者即是令其勤修四念處也若起懈息不能滅二惡已生未生生二善已生未生以二勤故能發暖火對火宅互相推排入修慧暖位也以方便故得近其子者念處未得理火溫心猶為疏外不可附近今四正勤以初得暖方便則可附近也三譬如意足後復告言咄男子至亦有老弊使人須者相給咄是驚覺亦是責數上正勤中紛動即是智法如男子是陽性今如意足是定法如女人是陰性良以正勤䇿動不得與真空相應故驚覺責數令捨散入靜故言咄男子也汝常此作勿復餘去者念處正勤動不專一不名為常四如意中定不異緣思惟則定思惟則斷定斷專一故云汝常此作不紛動故故云勿復餘去此猶在互相推排中即是頂法之位也當加汝價者正勤觀中不能發真如意觀中能發無漏故言加價諸有所須者漏無漏善助道正道皆從如意觀中求之欲須即得也四禪體含枝林如盆器生空粗如米法空細如麵此即正道四諦下十六諦觀無常如鹽苦如醋此即助道如米麵難食須鹽醋和之正道難顯須助道助之莫自疑難者結上正助審在如意觀中故令勿疑決定可辦如己物想故言勿難若欲直取神通以代手足如使人驅役者如意觀中亦有此通但通劣弱事同老斃故云亦有老斃使人雖不丁壯亦堪運役故云須者用給四譬五根好自安意我如汝父勿復憂慮好自安意者得信等五根安固難壞也我如汝父者已得似解鄰於證真似像未實故言如父亦是如子勿復憂慮者令其安意破壞見思也五譬五力所以者何我年老大至自今已後如所生子我老汝少者佛居道終之位已具智斷故言老大汝居道始之位內凡未有智斷故為少壯此即忍法位也得此五力離五惡法謂得信力故不欺得精進力故不怠得念力故不瞋得定力故不恨得慧力故不怨言餘作人者遠指外道諸見求理名餘作人近指暖等四位未免五過亦名餘作人此文無五過即五力也自今已後如所生子者下忍十六剎那時節猶長中忍雖復縮觀亦未是一剎那若上忍世第一最後一剎那心鄰真逼聖故名此位為如所生子即世第一法位也妙樂云暖等四位應云念處等四世第一是五力位無五過也六譬八正道即時長者更與作字名之為兒世第一法與真不久故言即時阿含説五種佛子四果及辟支佛名佛真子菩薩不斷結子義未成今二乘得八正入見道中故名為兒妙樂云阿含至子義未成者既阿含中亦明不斷惑菩薩而大論斥權非謂全無論云迦旃延造者從所造論及所計者説豈以會二還歸阿含法華準舊十二年前一何可笑七譬七覺支爾時窮子雖欣此遇至於二十年中常令除糞二乘因斷見惑而得為子故云雖欣此遇思惑未盡猶居學位正須依教修行盡苦故云猶故自謂客作賤人若得初果厭小樂大大乘機發者即應授以大乘更不須進斷其餘殘結正由不捨小志大機不發以是且令依教盡漏故言由是之故二十年中常令除糞二十年者一無礙一解脫斷見九無礙九解脫斷思故云二十年也此文并下偈頌凡三番云二十年意各不同隨其文下釋之可見也四家業譬二初領家業二初相體信二初明其體信過是已後心相體信入出無難此下領方等時也過是已後者過鹿苑三藏之後即方等也心相體信者父子互相體悉信順謂於三藏教中得涅槃價此既不虗今為菩薩説此大乘亦復非虗此即子信父也佛知此等見思已斷聞大不謗無漏根利聞必生信此即父信子也入出無難者由此見尊特身聞大乘教名此為入復被訶斥猶見丈六説小乘法名此為出大小入出而無疑難也二猶居本位然其所止猶在本處二乘雖於大小入出無難然聞大乘之法謂是菩薩之事非己智分不肯回小向大猶居羅漢之位不言未來當得作佛故云所止猶在本處二命領業四初明其時節世尊爾時長者有疾自知將死不久此下領佛命轉教般若時也將死不久者有機則應為生機盡應謝為死今化機將畢應謝非久也二命知家業語窮子言我今多有至所應取與汝悉知之金即別教理銀即通教理大品所明真諦不出此二而云多有者理則非多約種種門亦得言多例如空非十八約破十八法名十八空也勸學品中明一切法門皆是珍寶倉是定門即百八三昧庫是慧門即十八空境也通別兩教定慧倉庫包藏一切禪定智慧無所闕少內充外溢故云盈溢其中多少者説於般若則有廣略二門略則為少廣則為多自行為取化他為與大品中云汝當為菩薩説故云汝悉知之妙樂云金即別教理等者問大品有圓何故但云不出通別答一者但語通別理已攝餘二論能詮教必須具四今且從理故云不出此二兼復二乘至此多成通別亦且言之通別倉庫準此可知三誡令體心我心如是當體此意所以者何今我與汝便為不異誡體我心者佛以般若為心汝今轉教當隨佛意説也今我與汝便為不異者釋此有三一被加令説與佛不異二就理以諸法皆如故得不異三就今時始悟父子天性本來不異而二乘人自謂被加異耳四敕無漏失宜加用心無令漏失無令漏失者一者汝為菩薩説般若教無令漏失二者就理此即汝法後時當用是故無令漏失也二受命領四初正受領知爾時窮子即受教敕領知衆物金銀珍寶及諸庫藏二心無希取而無希取一䬸之意善吉轉教雖説般若自謂是菩薩法我無其分也三未捨本處然其所止故在本處下劣之心亦未能捨故在本處者住羅漢位雖復慕大亦未定言欲作菩薩也未捨下劣心者雖復耻小亦未定言捨於小證也四鄙劣求大復經少時父知子意漸以通泰成就大志自鄙先心問何時名少時答一云説般若竟尋思所領大乘法門生心貪樂為失為不失如此等尋思即是大乘機發時也此時去法華不遠故言少時又當説無量義經時大乘機發何以知然無量義經中明七種方便無量漸頓從一法生既聞此説思惟昔之三藏三乘悉皆從一法生此之三乘亦應入一如是思時漸已通泰大心即發故言成就大志也妙樂云失不失者失則於己無分不失復未同菩薩踟蹰之際即大機欲發之時正發乃在三請時也次約無量義者去法華極近時極少也既聞從一出多義必收多歸一四味之終故云漸已機無隔異故云通泰漸以通泰以字合作已下偈文云漸已曠大其義是同可詳之二正付家業譬二初付業四初明付業時下去合第四第五共為一領付譬臨欲終時此下領般若之後説法華時也臨欲終者是明時節化緣將訖靈山八載説法華經唱入涅槃時也二命聚衆證而命其子并會親族國王大臣剎利居士皆悉已集二萬億佛所受化之徒名之為子十方法身菩薩影響者為親族影響之衆多是釋迦昔日同業並共如來於二萬億佛所共開化之於其悉是伯叔之行故用此為親族國王者一切漸頓諸經無不稱所詮之處為經王當機益物興廢有時部部不同名之為國皆言第一即是王今經會通諸教豈非聚集國王故無量義經中先已收集彼云初説四諦十二緣生次説方等十二部經次説摩訶般若此則普集諸經融通漸頓會入此典故名會國王也彌勒等諸大菩薩皆是等覺為大臣初地至九地為剎利法王種性中生十住十行十向為居士此等皆從釋迦受化者也妙樂云國王至是王者前約昔教諸部為諸王言興廢者華嚴二興二廢乃至法華一興三廢今乃廢諸小王唯立一主是故法華名王中王無量義中先已收集者雖云從一出多密擬多皆屬一故云收集彼云下引彼無量義經以示收集諸經之相彼經既云諸經無量皆從一出故指前經以為無量四諦因緣即鹿苑也方等般若次第宛然三結會父子即自宣言諸君當知至此實我子我實其父實從我受學實是我子從我起解是我所生我實曾於二萬億佛所常教大法故我實是父於某城中者此經西國文多度此甚少或可説昔名字國土如大通智勝因緣今簡略名字直言某城某甲耳是諸衆生背此大乘起無明暗遁入生死故言捨吾逃走備經六趣故云五十餘年昔在本城懷憂推覓者如來自昔於法身地中常以權實二智觀覓可化之機始於今日感應道交故云忽於今日遇會得之此實我子我實其父判天性定父子也四正付家業今我所有一切財物皆是子有先所出內是子所知一切大乘萬行萬德故云一切所有也先所出內是子所知者追指昔日大品領教所委有廣略般若共通不共別圖法是汝所知即是汝有故法華但明佛之知見不更廣説一切行相也妙樂云所付般若有共不共不出因果因為萬行果為萬德行即四諦十二因緣十八空等德謂十力四無所畏十八不共法等此我之德既云子有當知汝等並有如來因果之藏此即天性相關也故知知之與見並是所有所以法華但總説云佛之知見耳二歡喜世尊是時窮子聞父此言至今此寶藏自然而至領上各乘大車得未曾有自顧無心希望佛道而今忽聞得記作佛故云不求自得也三藏中本心不求方等中耻小望絶故不求般若中雖領非己分故不求昔雖不求而今自得也二合譬四初合父子相失譬世尊大富長者則是如來我等似佛子如來合父似則合子似有二義一取大機為子昔未逃逝既非真位猶居外凡故云似也二取小機為子者小機似像大乘根性故云似也子既背父而逃故貶之曰似妙樂云子既等者舉正因況若論正因不似亦子況復似耶既曾結緣誰非真子據曾逃走父且貶之由位淺迷深斥之云似二合父子相見譬如來常説我等為子合長者見子便識三合父命追誘譬二初合傍人追二初合誡勸兩門無機世尊我等以三苦故於生死中受諸熱惱迷惑無知三苦由三受生苦受生苦苦樂受生壞苦不苦不樂受生行苦妙樂云由三苦故五濁加重所以勸誡二門並無大機但堪小化五濁遍故即是三苦無明覆故即是無知二合息化中有小志樂著小法二合二誘譬二初齊教領二初合具陳上事今日世尊令我等思惟蠲除諸法戲論之糞戲論之糞謂見思也二合除糞取價我等於中勤加精進至勤精進故所得弘多我等於中勤加精進合上尋與除糞得至涅槃下合上先取其價也二合探領三初合先欲擬宜然世尊先知我等上言遙見今言先知二合方便所好心著弊欲樂於小法上言羸瘦憔悴今言心著斃欲三合先知歎車便見縱捨不為分別汝等當有如來知見寶藏之分上言即脫瓔珞更著粗斃今言便見棄捨不為分別寶藏之分四合領付家業譬二初合領家業二初合相體信二初合令體信世尊以方便力説如來智慧帶三乘方便説大乘實相故言以方便力於我等前説大乘法亦是合上出入無難以方便力出辨二乘以佛智力入明實相若不體信豈於我前明佛慧耶二合在本處我等從佛得涅槃一日之價至於此大乘無有志求二合命領業二初合受領業我等又因如來智慧為諸菩薩開示演説二合無希取二初正合而自於此無有志願合無希取也無志願者明佛加威力令如佛心而説故我不志願也二釋意所以者何佛知我等至而我等不知真是佛子佛以方便力隨我等説者帶方便力以實相法共二乘説我等不識不共之意所以不知真是佛子也二合付家業二初合付業二初明無吝今我等方知世尊於佛智慧無所吝惜二釋無吝所以者何我等昔來至然佛實以大乘教化於此經中下舉今證昔今理惟一故知昔三非實但為未堪故於大前毀訾小心欲令捨偽取真定知非吝然佛實以大乘而教化也二合歡喜是故我等説本無心至如佛子所應得者皆已得之二偈頌二初七十三行半頌長行二初頌法説爾時摩訶迦葉欲重宣此義而説偈言我等今日聞佛音教至無上寶聚不求自得不頌不求但頌自得二頌譬説二初頌開譬四初頌父子相失四初正頌子背父去譬如童子幼稚無識至周流諸國五十餘年火宅中明長者所王國邑聚落語寬此中明窮子輪回三界名諸國六道名五十餘年也二正頌求子不得二初頌求子不得其父憂念四方推求四方推求者不同於上上四方是約四諦推理今四方是觀四生中覓可度之機也二頌中止一城求之既疲頓止一城至豪富如是有大力勢造立舍宅者有餘國中有餘涅槃也起慈悲舍依性空宅也往來者衆諸土菩薩來往聽法也妙樂云頓止一城者頓謂頓乏示迹之相義同於乏又頓止即不行止於方便土中求覓子機也造立舍宅者有餘之土非寂光自然現勝應身非法身本有於彼更運依空慈悲故云造立五欲自娛者非粗斃五欲乃勝妙五欲也三超頌憂念轉深而年朽邁益憂念子至庫藏諸物當如之何此但頌先失子之苦無所委付是故憂耳妙樂云但頌子背父去即失子之苦而無得子之樂失苦得樂俱在父懷是故失時己懷於樂必知後時還來故也遠鑒機緣未若於佛夙夜者夙早也謂晨起夜暮也又夙即化初夜即化末大化始末準説可知四追頌子到父城二初頌近父之由爾時窮子求索衣食至飢餓羸瘦體生瘡癬從邑至邑者根塵相涉如邑十八界如國修三界有漏善如有所得修二乘無漏善如無所得不得大乘法食如飢餓無大力用為羸無大功德為瘦有無善上起見思如瘡癬也二頌遂到父城漸次經歷到父住城二頌父子相見二初頌子見父三初頌見父之由傭賃展轉遂至父舍二頌見父之相爾時長者於其門內至出內財産注記券疏上明見父之處處是門側今言長者於其門內者見相兼得處也施大寶帳等正見父相之處也注記券疏即是授記明修行也章安云以廣顯略為注授決為記四弘誓為券修行為疏妙樂云以廣顯略等者如華嚴中廣明身相國土行願本欲以此廣佛知見顯實相體故云以廣顯略授決者華嚴前文無授記語入法界品旁論授記亦得名為授記故也弘誓及行彼最委悉又誓為券者誓許利他如有券約隨修隨償如疏隨還訖至菩提償之方畢又華嚴中菩薩行願多明事數名算計也三頌生畏避心窮子見父豪貴尊嚴至借問貧里欲往傭作二頌父見子二初頌見子之處長者是時在師子座二頌見子便識遙見其子默而識之三頌父命追誘二初頌傍人追三初頌喚子不來即敕使者追捉將來窮子驚喚此頌勸門無機也二頌再喚不來迷悶躃地此頌誡門無機也三頌即便放捨是人執我必當見殺至不信我言不信是父此總頌勸誡二門無機以無機故方乃息化見殺與上必死義同也二頌二人誘二初頌顧作即齊教領二初頌設方便即上擬宜即以方便更遣餘人至除諸糞穢倍與汝價既息大化故以方便説小乘法而誘引之眇目譬偏空所見不正故矬者豎短陋者橫狹見偏空者竪不能窮實相之源故如矬橫無大乘衆善莊嚴故如陋非四無畏名無威異常樂我淨名無德也二取價除糞即上適願窮子聞之歡喜隨來為除糞穢淨諸房舍淨六根房五陰舍也二頌教作譬即探領四初頌牖中長者於牖常見其子二頌羸瘦念子愚劣樂為鄙事三頌更衣於是長者著斃垢衣執除糞器往到子所四正教作方便附近語令勤作至又以軟語若如我子上長者教作有七科法門今云語者即合四念處也令勤作者即四正勤也既益汝價下一行頌四如意足也油塗足能履深水譬神通又油能除風譬定飲食充足即上米麵也薦席厚暖即是觀練熏修四種禪定修此定故能除散動也如是苦言汝當勤作二句總頌上第四安慰即五根第五無過即五力根力既成乃堪苦言又以軟語若如我子二句總頌上第六作字即八正道第七令常作即七覺支並是子位也此三十七道品常途論之七覺在八正前今對位次故八正在七覺前也四頌領付家業二初頌領付業之由即上領家業二初頌心相體信長者有智漸令入出二頌委領家業三初頌領受命經二十年執作家事至諸物出入皆使令知或言二乘轉大乘教教諸菩薩斷別見別思名二十年或言説般若時長凡二十年二猶居本位猶處門外止宿草庵自念貧事我無此物未捨劣心故宿草庵三通達大志父知子心漸已曠大漸已曠大大乘機動也二頌付家業二初頌正付業三初頌集親族欲與財物即聚親族國王大臣剎利居士二頌定天性於此大衆説是我子至周行求索遂來至此此言從有二乘之機而來感佛故云自見子來已二十年妙樂云但立二名名二十年也三頌正付與凡我所有舍宅人民悉以付之恣其所用二頌得付喜子念昔貧志意下劣至甚大歡喜得未曾有二頌合譬四初頌合父子相失佛亦如是妙樂云若單以佛亦如是一句合父子相失意仍未顯次知我樂小一句合父子相見意亦未顯何者上句借下句成知樂小故義當相失次下句借上句成佛知樂小故得相見樂小由退大所以相失退大由樂小所以相見二頌合父子相見知我樂小三頌合父命追誘二初頌合傍人追未曾説言汝等作佛二頌合二人誘而説我等得諸無漏成就小乘聲聞弟子四頌合領付家業二初頌合領家業二初長頌命領知佛敕我等説最上道修習此者當得成佛最上道即是空慧般若更無過其上也二正頌受無希取二初合正受命我承佛教為大菩薩至而不為我説斯真要佛子聞法得記者明轉教益他也爾時但謂轉教教化菩薩不言為我二合無希取二初牒前譬帖合如彼窮子得近其父雖知諸物心不希取二正合無希取三初正頌無希取之意我等雖説佛法寶藏自無志願亦復如是二具智斷故無希取三初標二初標斷德具故無希取我等內滅自謂為足唯了此事更無餘事內滅者內即惑體三界見思惑盡故云內滅故科為標斷德也二標智德具故無希取我等若聞淨佛國土教化衆生都無欣樂既云若聞聞教屬智故科為標智德以小智具故不欣大智此與上標斷德並舉無樂大之失顯執小之過也二釋所以者何一切諸法至則為已得報佛之恩初所以者何至不生喜樂釋斷次我等長夜至謂是究竟釋智次我等長夜至有餘涅槃重釋斷次佛所教化至報佛之恩重釋智故知初二行明自住小斷次一行半明失大智次一行半重釋小斷次一行釋失大智言諸法空寂等者理性本空常住平等清淨無作也最後身者阿羅漢也有餘涅槃者子縛已盡果縛猶在也佛所教化等者以得顯失也以失大智故無志樂若有大智則生志樂修之得道則為報佛恩也三結我等雖為諸佛子等至而於是法永無願樂結釋自無希取意也三明佛見捨合無希取導師見捨觀我心故初不勸進説有實利二頌合付家業二初頌合正付業二初牒譬帖合如富長者知子志劣至然後乃付一切財物二正頌付業佛亦如是現希有事至調伏其心乃教大智二頌合得付喜我等今日得未曾有至普於其中應受供養得道者得實相道也得果者分得大乘習果也此明開佛知也於無漏法得清淨眼者此明開佛見見實相理也昔日見無漏不落凡夫今日見無漏不落二乘昔日慧眼見空今日淨眼見中持戒得報昔日持戒梵行共顯無漏灰身滅智無人受此果報者今日梵行能得無漏即了因取果義持戒即緣因義清淨眼所見理即正因義我等真是聲聞者即大乘真位也十信以一音遍滿三千界似道未真今入十住即是真也真阿羅漢有三義此中但舉應供一義堪為十法界福田方名應供又云無生若不生變易方名無生又云殺賊斷通別見思盡方名殺賊妙樂云分得大乘習果者得初住時破一品無明即生得故名為習果二一十三行歎佛恩深世尊大恩以希有事至於一乘道隨宜説三章安云世尊大恩者一佛始建慈悲發弘誓願拔六道苦與四聖樂普十法界入四弘中此如來室恩二如來行菩薩道教我大乘雖復中忘智願不失蓋如來室清涼溫暖大慈與樂恩三衆生退大遭苦佛於中間伺其機宜如犢逐母修行六度以利益之蓋如來室遮寒障熱大悲拔苦恩四佛成道已應受無為寂滅之樂而隱其神德用貧所樂法於鹿苑中先以五戒十善令離諸欲蓋是如來衣遮貪欲熱惱恩五示老比丘像方便附近為説三乘蓋是如來衣除見寒愛熱恩六於方等彈訶貶斥令耻小慕大蓋是如來衣遮醜陋恩七於般若命領家業金銀庫藏皆悉令知蓋是如來衣與我莊嚴恩八至法華會親族定父子無上寶聚不求自得蓋是如來座恩九十既坐座已身意泰然快得安隱以佛道聲令一切聞一切天人普於其中應受供養蓋是如來座令我具足自行化他恩世尊大恩兩肩荷負所不能報此之謂也妙樂云牛頭栴檀者華嚴經云出離垢山若用塗身火不能燒正法念經云北洲有山名曰高山多有牛頭栴檀以此山峯狀如牛頭於此峯中生栴檀樹故名牛頭或有説云牛頭山名也香出彼山故以名之栴檀如序品釋
