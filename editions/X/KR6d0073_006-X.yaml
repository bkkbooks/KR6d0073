body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯上天竺講寺住山比丘一如集註妙法蓮華經隨喜功德品第十八隨喜者隨順事理無二無別喜是慶己慶人聞深奧法順理有實功德順事有權功德慶己有智慧慶人有慈悲權實智斷合而說之故言隨喜功德品此約世界悉檀釋也又順理者聞佛本地深遠信順不逆而無一毫疑滯順事者聞佛三世益物橫竪該亘徧一切處亦無一毫疑滯即廣事而達深理即深理而達廣事不二而二不別而別雖二雖別無二無別如此信解名之為隨如來出世四十餘年不顯真實於七方便不語誠諦今經開顯慶我及人以凡夫心等佛所知用所生眼同如來見如此知見究竟法界更無過上是名為喜佛今說此我得聞此故名隨喜功德品此約對治悉檀釋也第五十人是五品位中初隨喜品之初心但有一念理解但有一念慶己慶他未有事行恩不及人所獲功德如來巧喻功葢無學況復最初於會中聞者況復二三四五品者如來說此深妙功德令人景慕故言隨喜功德品此約為人悉檀釋也上法師品及持品分別功德品中四信五品稱美持經功德時眾不測初心功德之大咸謂已入真因之位故今示彼行淺功深以顯經力輕疑釋然故名隨喜功德品此約第一義悉檀釋也妙樂云初釋隨中事理祗是權實異名了此權實即非權實故無二無別即隨順開權顯實之事理也權實智斷合說者權實結隨智斷結喜且以自他事理慶喜故屬世界悉檀也本地深遠者理深時遠也廣事達深理者即施迹近事見遠本理也佛今下結成品名除事理疑故屬對治悉檀也如來巧喻者即下文四百萬億等是也如來下結經勸意以立品名令進理入位能生理善故屬為人悉檀也聖言親讚使推功疑除故舉釋然以擬第一義悉檀也五品位中後之四人前分別功德品末節節自校量訖唯初隨喜品文於彼但標人相未有校量故使彌勒乘機扣佛廣校初品方知後四功大故有此品之來也二隨喜品格量初品功德二初問爾時彌勒菩薩摩訶薩至得幾所福而說偈言世尊滅度後其有聞是經若能隨喜者為得幾所福二答二初長行二初答內心隨喜人五初展轉教爾時佛告彌勒菩薩摩訶薩至如是展轉至第五十東北二家解五十人不會經旨今解為二一橫約諸教四眾二直約圓教數之橫約諸教者如三藏有四門一一門有比丘等四眾更開沙彌沙彌尼合六人四門則二十四人更約信行法行則四十八人最初最後合五十人通別二教四門亦如是直就圓門數者數法有小七大七大七有七七四十九皆是師弟展轉相教皆具自行化他之德唯最後一人但是自解無教他德故格下以顯上耳妙樂云以由古人作十地乃至十信五十位解之傷文失理故今助之暫寄教門以立人數所以二解者初約三教義當昔教有五十人至今聞圓二者至今復成五十皆被開顯全成圓人故圓舉數無可以辯且寄數法以一七而止七中從大故四十九并最後一人即成五十補註云皆是師弟等者受前人教為弟子復教後人即是師也圓數無可以辯者謂前之三教且可約人約門等辯五十人今經開後無復差異豈可如上以辯數耶故且寄大七成經數也二格量本阿逸多其第五十善男子至皆得自在具八解脫補註云六趣者六即六道趣即往趣謂眾生隨所作業趣往六道也四生即胎卵濕化俱舍論頌云人旁生具四地獄及諸天中有唯化生鬼通胎化二若有形等示四生體相及住止之處有形謂欲界色界無形謂無色界有想謂空處識處無想謂無所有處非有想非無想者非識處之有想非無所有處之無想即無色界第四天也爾雅云無足謂之豸有足謂之虫二足四足可知多足如蜈蚣等示教利喜註見前化城喻品八解脫見前及界次第三舉意問於汝意云何是大施主所得功德寧為多不四誠實答彌勒白佛言世尊至何況令得阿羅漢果五正格量佛告彌勒我今分明語汝至阿僧祇不可得比格量中先與世樂拔果苦後與涅槃拔生死苦此是略舉梵福而為校量若更廣說滿閻浮提人福不及西瞿耶尼一人福滿西瞿人福不及東弗婆提一人福滿三天下人福不及北單越一人福滿四天下人福不及一四天王四天王不及一帝釋乃至第六天不及一梵天福滿梵天福不及藏教三乘聖福藏不及通通不及別別不及圓教聞法華經初隨喜品福何以故彼前三教是三乘法非佛法故是權非實故是偏非圓故雖住後果不及我初心其義如是妙樂云今聞妙經隨喜初心尚過彼之後聖何況初聖自非吾佛大聖嚴旨安能信斯希奇若此者哉二直明外聽法人四初自往聽又阿逸多若人為是經故往詣僧坊至及乘天宮二分座坐若復有人於講法處坐至若轉輪聖王所坐之處三勸他聽阿逸多若復有人至見佛聞法信受教誨章安云此文亦有六根功德利根智慧是意功德不瘖啞是舌功德鼻修高直是鼻功德見佛是眼功德聞法是耳功德餘是身功德前是相似位功德今是相似位前功德耳妙樂云前是相似位功德等者指前分別功德品中云滅後五品大師有時依普賢觀經判五品位在六根內故云相似此中校量初品復是第五十人初法會聞容是初品第五十人必在隨喜品初人也然品題隨喜不的局初通該五十人胗章忍切咼口懷切區卑典切㔸湯奚切𮃹鳥瓜切四具聽修阿逸多汝且觀是至為人分別如說修行二偈頌二初頌內隨喜人三初頌五十人爾時世尊欲重宣此義而說偈言若人於法會至如是展轉教至於第五十二頌格量本最後人獲福今當分別之至三明八解脫六通中宿命等三獨得名明註見譬喻品三正頌格量最後第五十聞一偈隨喜至初聞隨喜者二頌外聽法人四初超頌勸聽若有勸一人將引聽法華至常從其口出二追頌自往若故詣僧坊欲聽法華經至及乘天宮殿三頌分座坐若於講法處勸人坐聽經是福因緣得釋梵轉輪座四正頌聽修行何況一心聽解說其義趣如說而修行其福不可限妙法蓮華經法師功德品第十九法師義如法師品中說功德者前品隨喜功德謂五品中初品之初功德在相似位前也今品法師功德謂五品之上六根清淨之功德即十信相似位也以此功德內外莊嚴五根清淨名外莊嚴意根清淨名內莊嚴又從地獄已上至佛一切色像悉於身中現者名內莊嚴從地獄至佛一切色像以普現三昧而外化者名外莊嚴身根既爾餘五根亦然讀誦獲六根清淨既爾受持解說書寫亦然五品中初品六根清淨既爾後之四品加然相似六根清淨既爾分真倍然此約世界悉檀釋也行者聞說此功德利喜不自勝勤求無厭信進倍增此約為人悉檀釋也明識大乘有大勢力決無疑網此約對治悉檀釋也似解之初初過二乘之極極百千萬倍指始顯終懸解究竟第一義諦不可思議此約第一義悉檀釋也此品所明備斯四意是法師之功德故言法師功德品也妙樂云法師之稱既通不隔四信五品故指彼文用申品目問書寫何以淨六根耶答同資正解故四品加然者明發不定始自初隨喜終至第五正行六度皆發六根清淨何必過五品方入相似言加然者以初望後初尚得入後四加前似解初初者依普賢觀經隨喜已當似解之首第五十人復在初隨喜品之初故云初初過二乘極極者羅漢已極無疑又極故云極極縱是無疑亦不能及初隨喜人百千萬倍如前校量指始顯終者以隨喜始顯妙覺終也三法師功德品明初品果功德勸流通二初總列六根功德盈縮爾時佛告常精進至莊嚴六根皆令清淨大品云色淨故般若淨般若淨故色淨色淨故五根淨般若淨故意根淨正法華整足具六千功德大經云如來一根則能見色聞聲齅香別味覺觸知法今經六根清淨與大品同以是功德莊嚴六根與正法華同鼻見色聞聲覺知與大經同疏中雖為破斥他師偏釋不當引同三經意且正明六根等有一千功德也若明六千功德數者按三業安樂行即有十善一善有十即百善百善中一一有十如即千善就自行化他為二千約如來室如來衣如來座即成六千五種法師悉具六根清淨一一根皆有一千功德也此約弘經方軌明等有一千也復次一心中具十法界一一界皆有十如即成一百一根通取六塵即有六百約定慧二莊嚴即成一千二百根根悉具定慧莊嚴等有千二百也此約理境等千二百若論六根清淨清淨則不言功德若多若少若言莊嚴能盈能縮復能平等平等莊嚴者根根六千若言千二百顯其能盈若言八百顯其能縮若言清淨無盈無縮無等六根互用根自在故不可思議妙樂云今依安樂行以明三業正當法師依於弘經方軌故令獲得六根清淨又云此中三業即是六根故不更對六根三業功成即六根淨若言千二百下次辯盈縮即在今經秖於向等而論盈縮若言清淨是牒前大品六根互用是牒前大經箋難據孤山明楞嚴經中流變三疊謂是發覺初心令知顛倒處所故示凡夫六根優劣之用意在阿難擇取耳根以為修證之地今以流通法華之力至十信相似之位獲得六根清淨互用無妨不可例同二別作六章當分解釋六初眼根二初長行是善男子善女人至果報生處悉見悉知二偈頌爾時世尊欲重宣此義而說偈言若於大眾中以無所畏心至肉眼力如是父母所生名肉眼能見大千世界內外則是所見過於天眼梵王報得天眼在己界徧見大千大千外有風輪與眼作障不能見外若在他界則不徧見大千非所統故小羅漢見小千大羅漢見大千辟支佛見百佛世界不以風輪為礙亦無己他界隔今經論眼能見大千內外應是天眼猶名肉眼者圓教相似位中因經之力有勝根用既未發真不得稱天眼雖稱肉眼具五眼用見大千內外天眼用見一切眾生及業因緣法眼用其目甚清淨慧眼用一時悉見大千內外見業見淨又圓伏障中道無明之惑佛眼用大經云雖有肉眼名為佛眼佛眼故名清淨具五眼故故言莊嚴能盈能縮名勝根用名根自在豈可秪作八百千二百解耶妙樂云初眼根中未論修發真天眼等直以肉眼能見大千故云父母所生若論其用已過天眼故今應云相似佛眼乃至相似五眼故亦應云見於二乘及菩薩佛等以準耳鼻經文必合有故見大千內外為天眼者且約見於麤細色邊見業見淨者業有差別淨無差別雙見二境即表中智又能圓伏故是佛眼翻譯名義云有人謂彌樓此云光明七金山也金色光明故若準第一義法勝經云須彌樓山則彌樓是須彌山舊譯俱舍須彌亦云彌樓是則梵音有異若據今經云內外彌樓山須彌及鐵圍則是兩山名體皆異也二耳根二初長行復次常精進至種種音聲而不壞耳根二偈頌爾時世尊欲重宣此義而說偈言父母所生耳清淨無濁穢至功德已如是耳根亦具五耳之用故能徧聞大千內外十法界音聲也聞六道聲即肉天二耳聞二乘聲即慧耳聞菩薩聲即法耳聞佛聲即佛耳又父母所生即肉耳能聞內外即天耳聽之不著即慧耳悉能分別即法耳一時互聞即佛耳以耳例眼眼亦如是見人天是肉天二眼見二乘是慧眼見菩薩是法眼見佛是佛眼補註云迦陵頻伽此翻好聲鳥此鳥在㲉聲勝諸鳥命命者寶藏經云雪山有鳥名為共命一身二頭神識各異報命則同故云命命小彌陀經云共命之鳥勝天王經云生生之鳥涅槃經云耆婆耆婆皆此鳥也光音二禪中第三天徧淨三禪中第三天也有頂即色界究竟天也三鼻根二初長行復次常精進至若欲分別為他人說憶念不謬二偈頌爾時世尊欲重宣此義而說偈言是人鼻清淨於此世界中至先得此鼻相鼻根亦具五鼻之用父母所生即肉鼻聞大千內外諸香即天鼻不染不著即慧鼻分別不謬即法鼻一時互用即佛鼻鼻根互用者鼻知好惡別貴賤覩天宮莊嚴等則鼻有眼用讀經說法聞香能知則鼻有耳用知諸華果實及蘇油香氣則鼻有舌用入禪出禪禪有八觸五欲嬉戲亦是觸法聞香能知則鼻有身用知染欲癡恚心亦知修善等則鼻有意用鼻根自在勝用若茲例五根亦如是妙樂云鼻根明互用經文最委悉準例餘根亦應如是但是文略八觸者動痒輕重冷煗澁滑止觀云入定一月不散即發八觸而來觸身須曼那見前闍提此云金錢華末利亦云摩利此云鬘華此華堪作鬘故波羅羅此云重生多摩羅䟦此云性無垢多伽羅此云根大論云木香樹也波利質多羅此云圓生樹其根莖枝葉逆風薰五十由旬順風百由旬拘陀羅此云大遊戲地勝殿妙法堂皆帝釋所居處也妙法亦云善法四齋日帝釋與諸天於此堂中集議人間如法不如法事四舌根二初長行復次常精進至又能出於深妙法音舌根亦具五舌之用能作六道語即肉天二舌能作二乘語即慧舌能作菩薩語即法舌一時互用即佛舌七寶者補註云若轉輪聖王出世七寶自然而現一論二珠三象四馬五主兵大臣六主藏大臣七玉女二偈頌爾時世尊欲重宣此義而說偈言是人舌根淨終不受惡味至或時為現身自在即他化自在天居欲界頂乃魔王也大自在即魔醯首羅色界頂天也此依觀音義疏所釋與前列眾中不同五身根二初長行復次常精進至皆於身中現其色像身根具五身之用世界所有皆於身中現肉身用也上至有頂於身中現天身用也二乘於身中現慧身用也菩薩於身中現法身用也佛於身中現佛身用也一時圓現一時互用一時無謬一時無著妙樂云無謬假也無著空也俱照名中二偈頌爾時世尊欲重宣此義而說偈言若持法華者其身甚清淨至一切於中現六意根二初長行復次常精進至亦是先佛經中所說意根亦具五意之用世間治生產業皆順正法即人意淨天心所行天所動作即天意淨四月即四諦一歲是十二月即十二因緣與實相不相違背即慧意淨一月即一乘即菩薩意淨有所籌量皆是先佛經中所說即佛意淨一時圓明一時圓互一時無染一時無謬根用自在能盈能縮能等能淨私謂佛戒不許習學外道經書手筆今何云若說俗間經書等耶答輔行四下云若外學者小乘教中為伏外道許十二時中一時習外若大乘中初心菩薩一向不許淨名云若好雜句文飾者多是新發意菩薩此斥不許習外且令進行至六根淨學應不難文今此正當六根清淨之位或說俗間經書故能皆順正法也二偈頌爾時世尊欲重宣此義而說偈言是人意清淨明利無濁穢至持法華經故上中下法見前安樂行品妙法蓮華經常不輕菩薩品第二十內懷不輕之解外敬不輕之境身立不輕之行口宣不輕之教人作不輕之目不輕之解者法華論云此菩薩知眾生有佛性不敢輕之佛性有五正因佛性通亘本當緣了佛性種子本有非適今也果性果果性定當得之決不虗也是名不輕之解將解以歷人彼亦如此是名敬不輕之境敬此境故名不輕之行宣此語故名不輕之教昔毀者以此目人今經家以此目品此品引人為證證五品功德深六根報重令知佛昔隨喜獲現生後報以募流通也妙樂云正因通亘等者性德通於迷悟因果故也緣了云種子本有者還約性德以明二因以對新熏成修德故此三為因轉因成果果中菩提及以涅槃名為果性果果性也若對性辯脩秪是脩德緣了至果名為菩提涅槃了秪是智智名菩提即是果性緣秪是斷斷名涅槃即是果果性若云眾生具有因果性者則五佛性皆在眾生但住因之日果性名因在果之時攬因名果名雖互得其法恒如獲現生後報者文云臨欲終時具聞威音王佛說法華經得六根淨更增壽命即現報也命終之後復值二千億佛同號日月燈明即生報也以是因緣復值二千億佛同號雲自在燈王復值千萬億佛即後報也於現報中獲六根淨是故弘經其功不淺說此三益意在流通昔時不輕三報宛爾今日豈得不流通耶三常不輕品引信毀罪福者證勸流通二初長行三初雙指前品罪福二初指罪爾時佛告得大勢菩薩至獲大罪報如前所說如前所說者前法師品云若有惡人以不善心常毀罵佛其罪尚輕若人以一惡言毀呰在家出家讀誦法華經者其罪甚重是也二指福其所得功德如向所說眼耳鼻舌身意清淨如向所說者向即上法師功德品中說六根清淨是也二雙開今品信毀二初明事本七初時節得大勢乃往古昔過無量無邊不可思議阿僧祇劫此下總科云事本者通舉往昔威音王佛為不輕事之本名為事本二名號有佛名威音王至調御丈夫天人師佛世尊三劫國劫名離衰國名大成四說法其威音王佛至說應六波羅蜜法究竟佛慧為求聲聞等註見前五壽命得大勢是威音王佛壽四十萬億那由他恒河沙劫六正像正法住世劫數如一閻浮提微塵至然後滅度七後佛正法像法滅盡之後至有二萬億佛皆同一號二明本事三初總指時節最初威音王如來既已滅度正法滅後此下通科為本事者上既通舉往昔威音王佛為不輕之事本今別以最初威音王佛時不輕之事為本事二雙標人名於像法中增上慢比丘有大勢力至名常不輕毀者因時名增上慢信者因時名常不輕三雙明得失二初就信者論得得大勢以何因緣名常不輕至汝等皆當作佛總科云雙明得失今初就信者論得得正說之宏宗得流通之妙益名常不輕是人一凡有所見是理一皆悉禮拜是行一而作是言是教一此是迹門開權顯實之四一也從乃至遠見下是本理一故往禮拜是本行一而作是言是本教一少人一其義可解此是本門開近顯遠之四一也不專讀誦經典但行禮拜者此是初隨喜人之位也隨喜一切法悉有安樂性皆一實相隨喜一切人皆有三佛性讀誦經典即了因性皆行菩薩道即緣因性不敢輕慢而復深敬者即正因性敬人敬法不起諍競即隨喜意也又不輕深敬是如來座也忍於打罵是如來衣也以慈悲心常行不替即如來室也又深敬是意業不輕之說是口業故往禮拜是身業此三與慈悲俱即誓願安樂也如此三四豈非流通之妙益耶妙樂云得正說宏宗者宏寬大也宗尊高也本迹二文四一三佛性正說大宗不過實相實相秪是常住佛性此指宗極之宗非宗體之宗一代雖說或兼或帶或純小教或雜助門或抑或覆文寬事廣教教不同味味意別不輕但宣我深敬汝等至當得作佛二十四字具述因果因既三性果即三德況以四一兼益自他直指三因以為不輕所宣之法故云宏宗二明毀者之失四眾之中有生瞋恚心不淨者至號之為常不輕此明毀者之失有生瞋恚心不淨者即不受四一也罵言無智智知於理既言無智即不受理一也比丘即不受人一也從何所來即不受行一也虗妄授記即不受教一也經歷多年常被罵詈結不受開權顯實迹中之四一也避走遠住高聲唱言亦復不受此不受開近顯遠本地之四一也常作是語故此結信者深信不休也四眾為作不輕名者此結毀者呰毀不止也問釋迦出世踟蹰不說常不輕一見造次而言何也答釋迦所化者昔曾下種本已有善故以小乘而將護之不即為說大也不輕所化者本未有善欲與下種故以大法而強毒之三雙勸後二逆順亦名雙明信毀果報三初明信者果報二初明得果報是比丘臨欲終時至功德成就當得作佛是比丘是菩薩皆指不輕也此文就信者論三報一現報謂得六根清淨二生報謂值燈明佛三後報謂值二千億佛等神通力是身業淨樂說辯力是口業淨善寂力是意業淨又神通即慈悲室說辯即法空座善寂即忍辱衣也二結會古今二初正結會古今得大勢於意云何至豈異人乎則我身是二舉信而勸順若我於宿世至疾得阿耨多羅三藐三菩提二明毀者果報二初明得果得大勢彼時四眾至教化阿耨多羅三藐三菩提此明毀者得善惡兩果報由謗罵故千劫受苦是惡果報由聞佛性名下大乘種復遇不輕教化菩提是善果報妙樂云由謗罵之辜墮於惡道聞順從之力還遇不輕乃至今日還令會入以是義故上慢尚成遠因聞信寧無現益問若因謗墮苦菩薩何故為作苦因答其無善因不謗亦墮因謗墮惡必由得益如人倒地還從地起故以正謗接於邪墮二結古今二初正結會得大勢於汝意云何至三藐三菩提不退轉者是䟦陀婆羅大論翻為善守思益經云若眾生聞名畢竟得三菩提故云善守或云賢首位居等覺為眾賢之首也補註云有人作五百比丘尼節句者大有所妨其意謂出家二眾但舉比丘在家二眾但舉優婆塞又謂千佛因緣經但云思佛等恐缺略尼字又據正法華云師子月等五百比丘比丘尼則師子月自是比丘不應稱之為尼故云大有所妨今考因緣經云思佛千優婆塞等得無生忍多羅母善賢比丘尼等五百比丘尼不受諸漏成阿羅漢且因緣經亦是什譯豈敢定謂缺略尼字又尼思佛之名未見他經所出故今且以尼字另逗為句但四眾缺優婆夷耳後若見尼思佛名有所出者則不必另逗為句也二舉逆勸得大勢當知是法華經至讀誦解說書寫是經此乃舉逆以顯順勸持以遮毀經有大力終感大果務當勤習五種之行妙樂云五種行者即五種法師行也二偈頌二初但頌信毀因果二初總頌事本爾時世尊欲重宣此義而說偈言過去有佛號威音王至天人龍神所共供養二別頌本事三初頌雙標二人是佛滅後法欲盡時至時諸四眾計著於法著法者是法不可示若定謂是有即是著法乃至定謂是非有非無亦名著法者佛藏經云刀輪害閻浮人其失猶少有所得心說大乘者其罪過彼也大論云執有與無諍乃至執非有非無與有無諍如牛皮龍繩俱不免患中論云諸佛說空法本為化於有若有著空者諸佛所不化若定言諸法非有非無者是名愚癡論若失四悉檀意自行化他皆名著法若得四悉檀意自他俱無著也妙樂云若定謂等者此乃不專判於邪外佛權實教執皆名著以著心著無著教如龍鬚縛身入水轉痛牛皮繫體向日彌堅亡失正法猶如損體故稟方便教者於外凡位並未免謗二頌雙明得失三初頌其得不輕菩薩往到其所至汝等行道皆當作佛二頌其失諸人聞已輕毀罵詈三重明得不輕菩薩能忍受之三舉信毀結會二初果報其罪畢已臨命終時至漸具功德疾成佛道此舉信毀果報及結會古今也補註云其罪畢已者此謂常不輕也以由四眾輕賤作不輕名又以瓦石打擲悉能忍之所有罪業因茲畢盡是故臨終具聞威音王佛說法華經即得六根清淨如金剛經云是人先世罪業應墮惡道以今世人輕賤故先世罪業即得消滅同也二結會彼時不輕則我身是至世世受持如是經典二頌勸受持果報億億萬劫至不可議至世世值佛疾成佛道妙法蓮華經如來神力品第二十一如來之義如上壽量品釋神力者神名不測力名幹用不測則天然之體深幹用則轉變之力大此中為付囑深法現十種大用故名神力品自此品下凡有八品皆是付囑流通今品明菩薩受命弘經次品是如來摩頂付囑妙樂云神力者神在於內即體宗也力名幹用即是用也佛說本迹口輪力用已竟於前今復身輪現此勝用令眾流通本迹之教故云體深力大二神力品下八品明付囑流通三初神力囑累二品明囑累流通二初神力品明菩薩受命弘經二初長行三初菩薩受命二初經家敘儀爾時千世界微塵等菩薩至一心合掌瞻仰尊顏二發誓弘經三初時節而白佛言世尊我等於佛滅後二處所世尊分身所在國土滅度之處三誓願當廣說此經所以者何至解說書寫而供養之非但奉命益他亦自願得此真淨大法自他兼濟俱美也二佛現神力二初所對之眾爾時世尊於文殊師利等至人非人等一切眾前於文殊等者迹中所化之眾也舊住者下方本化之眾也一切眾者即他方來者及從分身佛來者并此四眾八部皆是也二正現神力十初吐長舌相現大神力出廣長舌上至梵世此第一神力也吐舌相者今經所演開三顯一開近顯遠三世益物皆誠諦不虗福德人舌至鼻三藏佛舌至髮際今至梵天出過凡聖之外極於淨天之頂相既殊常說彌可信二通身放光一切毛孔放於無量無數色光至滿百千歲此第二神力也通身毛孔徧體放光周徧十方無處不明表二門理一智境究竟也上迹門白毫吐耀始在東方表七方便初見一理今本門既竟放一切光照一切土能令初心因位終於等覺究竟佛慧分身諸佛亦復如是妙樂云分身等者此相既同各於其土利益亦爾三謦欬之聲然後還攝舌相一時謦欬此第三神力也謦欬者將語之狀亦是通暢之相表二門教暢即是教一四十餘年隱秘真實今獲伸舒無有遺滯出世大事於今通暢是故謦欬又欲以此法付諸菩薩令於後世導利眾生將語斯事是故謦欬謦欬具二義一謦欬事了二謦欬付他也四彈指之聲俱共彈指此第四神力也彈指者隨喜也隨喜七方便同入圓道隨喜圓道增智損生隨喜諸菩薩持真淨大法隨喜後世獲無上寶此一彈指竪徹三世橫亘十方表二門入實即是教一五地六種動是二音聲徧至十方諸佛世界地皆六種震動此第五神力也二音聲者謦欬彈指也地六種動者表住行向地等妙六番動無明惑上已動竟今明復動者即是一切人六根令得清淨表二門破惑即是行一六普見大會其中眾生天龍夜叉至皆大歡喜得未曾有此第六神力也普見大會者表諸佛道同也而今而後亦復如是上五千退去三變被移既失本心不能現在得益宜以非滅現滅從諸菩薩弘經得道入於佛慧如今會無異亦表未來有機一也妙樂云既指起去被移失心三類人者如此三例即是滅後得益之人所言機一者機義當總總於未來四一故也即是得於四一之益七空中唱聲即時諸天於虗空中至亦當禮拜供養釋迦牟尼佛此第七神力也空中唱聲者表於未來有教一也八咸皆歸命彼諸眾生聞虗空中聲已至南無釋迦牟尼佛此第八神力也南無此云歸命為佛弟子表於未來有人一也九遙散諸物以種種華香瓔珞幡葢至徧覆此間諸佛之上此第九神力也遙散諸物雲聚而來者表於未來有行一也十同一佛土于時十方世界通達無礙如一佛土此第十神力也十方通同如一佛土者表理一也問何以知十相表現在四一復表將來四一答下文云若我以是神力於無量劫為囑累故說此經功德猶不能盡表現表將其義明矣妙樂云十神力者前五正明現在流通本迹後五總表未來不已又云下去四相別表未來四一四但云一不言本迹者在未來故尚未入實誰論其本若見實者亦見其本三結要勸持四初稱歎付囑爾時佛告上行等菩薩大眾至猶不能盡二結要付囑以要言之如來一切至皆於此經宣示顯說結要有四句一切法者一切皆佛法也此結一切皆妙名也一切力者通達無礙具八自在此結妙用也一切秘藏者徧一切處皆是實相此結妙體也甚深事者因果是深事此結妙宗也皆於此經宣示顯說者總結一經唯四而已撮其樞柄而授與之令流通也妙樂云結要有四句者本迹二門各有宗用宗謂迹因迹果本因本果用謂斷權疑生實信斷近疑生遠信二門之體兩處不殊名冠此三而總於三一部之要豈過於此故總攬之以成流通格言云開顯既畢故結要以付之言如來者舉果語極言一切者通悟通迷即不思議之妙法也且一切法結妙名者即眾生本有性德之法亦如來久遠脩極之法雖在纏出纏之異而其法體真淨融妙泯絕強云妙法即名也一切力結妙用者眾生具而尚迷如來證而不息以自在力三輪設化駭動物情將說此法故次名而說用也一切秘藏結妙體者此實相體如來已得今為說法亦令眾生同得此體故次用而示體也一切深事結妙宗者宗本因果之法佛既脩證眾生亦然故次體而結宗也此順如來起教次第故先名次用次體次宗故妙玄第一引今結要以證約教五章之次第也三勸㢡付囑是故汝等於如來滅後至是中皆應起塔供養四釋付囑意所以者何當知是處至諸佛於此而般涅槃上云經卷所在之處皆應起塔經中要說要在四事道場釋上甚深之事得菩提釋上秘藏轉法輪釋上一切法入涅槃釋上神力此之四要攝經文盡故皆應起塔也所言要者得菩提是法身轉法輪是般若入涅槃是解脫三法成秘密藏佛住其中即是塔義也阿含經云佛出世唯四處起塔生處得道處轉法輪處入涅槃處坐道場是法身生處餘悉如文妙樂云道場釋上甚深事者事是因果今道場是果果必有因以菩提釋藏者菩提是能契之智必有所照之境境即秘藏以能顯所也以轉法輪釋一切法者有所轉法法必有名以涅槃釋力用者滿理釋權疑唱滅釋近疑宗雖近遠同名因果不復別判引阿含者借小證大彼則從事今借證圓開小即大故可為證二偈頌二初頌現十神力爾時世尊欲重宣此義而說偈言諸佛救世者住於大神通至現無量神力妙樂云頌十神力中但有五者闕後五也前五現見逐要存之前後二五現未異耳舉現例未是故略之二頌結要囑累三初總頌四法囑累是經故讚美受持者至不可得邊際妙樂云總頌四法但云囑累至得邊際具含四義四義皆是無邊際故二別頌四法四初頌一切之法能持是經者則為已見我至教化諸菩薩持法即持佛身妙樂云一切法不出能化能證及所化故也二頌自在神力能持是經者令我及分身至亦令得歡喜妙樂云頌神力者既云歡喜即是自在用暢三頌秘要之藏諸佛坐道場所得秘要法能持是經者不久亦當得四頌甚深之事能持是經者於諸法之義至畢竟住一乘說法破暗入一乘是佛甚深之事也妙樂云頌深事者教化諸菩薩畢竟住一乘乘是因果因果屬事故也三總頌結意是故有智者聞此功德利至決定無有疑妙樂云此頌總結四法言若能持四法也妙法蓮華經囑累品第二十二昔慈恩基師安國涉師並令移此品於勸發品後若在於此有八相違十不可之說荊溪尊者於記文中一一敘破文繁不錄今正釋者囑是佛所付囑累是煩爾宣傳此從聖旨得名故言囑累又囑是頂受所囑累是甘而弗勞此從菩薩敬順得名故言囑累又囑是如來金口所囑累是菩薩丹心頂荷此從授受合論故言囑累又如來躬從座起申手摩頂授以難得之法大眾曲躬合掌如世尊勅當具奉行殷勤授受故言囑累品也妙樂云正釋品中亦具四悉初約得名以釋品得名事別即世界也又累者連及也煩爾者爾即汝也謂累汝後代如帶累也此是如來適時而化示有謙詞又令於三世傳法不絕三世不同亦世界也又菩薩敬順後世宣布生人之善即為人也又金口所囑菩薩頂荷令後世不失治其失惡即對治也又殷勤授受令後代人奉旨入住入住證真即第一義也二囑累品明如來摩頂付囑二初正明付囑二初如來付囑三初正付爾時釋迦牟尼佛至令一切眾生普得聞知以一手一時徧摩諸菩薩頂故名大神力佛以一權智善巧之手摩三千三百那由他國土畟塞虗空諸菩薩實智之頂如來授道化他故名權智手也菩薩自行受道故名實智頂也若申手摩頂即身付囑也權智臨實智即意付囑也而作是言即口付囑也文有四悉檀意我於無量劫修是難得之法者此從前佛受學今以付汝汝當授彼三世繼嗣即世界悉檀也一心流布即為人悉檀也廣令增者即對治悉檀也益者即第一義悉檀也妙樂云現大神力者如來向現十種神力已表當來現在四一益竟而今復云現神力者正表身口心三付囑也四明教行錄因日本國僧問云指何等國土名三千三百那由他耶有云指三變淨土八方各更變二百萬億那由他國若依此義可云三千三百此說是否答據理須指三變淨土也此中應非大千為一國土恐指一四天下為一國矣娑婆既是大千之名則可足成三千三百然大千亦似未及一百萬億那由他四天下恐約大數增至大千何者小數則十十成百大數則百百為千千千為萬等故初變娑婆為一百那由他二三兩變各二百那由他則一方有四百那由他八方共成三千二百并娑婆一百成三千三百二釋付所以者何如來有大慈悲至如來之法勿生慳吝有大慈悲者如來室也無慳吝者如來衣也亦無所畏者如來座也佛之智慧者一切智也如來智慧者道種智也自然智慧者一切種智也於如來室中能施眾生三種智慧乃至座中亦復如是此即衣座室三各具三智以此三事弘經益他令他各得果地三智之用故知室若無二弘誓不普衣若無二法身不滿座若無二惑破不周如是施主三法無缺自他不空汝等當學如來如此三法而流通之以此三三應施一切汝等即是眾生之大施主是名釋出佛意而付囑也妙樂云佛之智慧等者取覺照邊屬一切智見畢竟空如來智慧等者即取從因至果得道種名如是施主下結能施意是施主故有大慈悲自既入室令他入室無慳吝故自既著衣令他著衣無所畏故自既坐座令他坐座亦可云無慳吝故施此三法無所畏故說此三法若施若說具慈悲即入室三法也二誡付於未來世若有善男子至則為已報諸佛之恩若根深智利直說佛慧若不堪者於餘深法中示教利喜佛慧是深而非餘六方便是餘而非深別教次第是餘亦是深汝能以餘深之法助申佛慧者即善巧報佛之恩是名誡付囑也示教利喜者搜要記云指授曰示教詔為教令益為利歡悅名喜二菩薩領受時諸菩薩摩訶薩至唯然世尊願不有慮佛既三業付囑菩薩亦三業領受歡喜是意領受曲躬低頭是身領受俱發聲言是口領受如世尊勅者領受如來是大施主入如來室意也當具奉行者領受無諸慳吝著如來衣意也願不有慮者領受無所畏坐如來座意也佛既三付菩薩亦三受皆如文三事畢唱散爾時釋迦牟尼佛至多寶佛塔還可如故多寶為證經故來今迹本二門已訖故須微遣復閉如故分身為開塔故集開塔事了故令分身各還本土塔不可重開故分身去而不現塔猶聽法故閉而尚在問塔若聽法亦應不閉答證正已故閉聽流通故在二時眾歡喜說是語時十方無量至聞佛所說皆大歡喜諸佛為化他事遂故喜菩薩為自行得法故喜又能說之人清淨故喜佛是也又聞清淨法故喜妙經是也又聞法獲證故喜現在未來得益者是也三事具足大歡喜妙法蓮華經藥王菩薩本事品第二十三觀經曰昔名星光從尊者日藏聞說佛慧以雪山上藥供養眾僧願我未來能治眾生身心兩病舉世歡喜號曰藥王今此經文明一切眾生喜見頓捨一身復燒兩臂輕生重法命殞道存舉昔顯今故言本事品也此下五品皆是化他流通具列如向今明方便品開三顯一圓因已竟安樂行品明乘乘之法壽量明乘果已竟此品下明乘乘之人故十二門論云大乘者普賢文殊大人之所乘也藥王以苦行乘乘妙音觀音以三昧乘乘陀羅尼以總持乘乘妙莊嚴以誓願乘乘普賢以神通乘乘作此解者於化他流通義便也妙樂云藥王至流通義便者佛囑累已大事功畢隨物偏好故乘乘不同真如實相是所乘之體一乘因果是所乘之事苦行等是乘乘之緣隨物機宜故使弘者隨緣不同故所乘體皆妙法也以依一實立因果故乘於所乘以利物故故曰乘乘二藥王下五品約化他勸流通四初藥王菩薩品明勗化他之師唯願大法大得弘宣大願眾生獲大饒益所以竭其神力盡其形命殷殷䖍䖍志猶未已庶令弟子宗法如師我傳爾明爾復傳明明明無己師之志也故知此品勗弘法之師也次妙音觀音兩品明他方大士奉命弘經普現色身形無定準不可以牛羊眼看不可以凡愚識度於所聞處勿生輕想輕想則法不染心故知二品勗受法弟子也三陀羅尼品明惡世弘經喜多惱難以咒護之使道流通也四妙莊嚴王品明人護前品說咒護今品說人護人護尚爾咒護彌良普勸流通也今初文為四初菩薩請問三初通問遊化爾時宿王華菩薩白佛言至云何遊於娑婆世界妙樂云通問遊化者遊必具足十法界身並如妙音觀音但別舉苦行以逗所宜故請答之言意在苦行二別問苦行世尊是藥王菩薩有若干百千萬億至難行苦行三請佛答釋善哉世尊願少解說至及此聲聞眾聞皆歡喜二如來決答二初答苦行二初明事本三初明時節久遠爾時佛告宿王華菩薩乃往過去無量恒河沙劫二有佛聲聞等有佛號日月淨明德至菩薩壽命亦等妙樂云此文科為有佛聲聞者文略具如經列有菩薩有菩薩壽等三明國土莊嚴彼國無有女人地獄餓鬼至歌歎於佛以為供養今文云無阿脩羅下文何云阿脩羅等見其無臂等耶答今言無者無實報脩羅若論權現容亦有之一箭道者補註引嘉祥云二里也有人云取射垛一百二十步或云一百三十步或一百五十步二明本事三初佛說法爾時彼佛為一切眾生喜見菩薩至說法華經然佛普為一切眾生何故獨為喜見但喜見是對揚須付囑流通如今之身子寄一而言諸耳二脩供養二初現在二初脩行得法是一切眾生喜見菩薩至得現一切色身三昧補註云現一切色身三昧者即普現色身三昧也有三義一者內現如今經說身根清淨十界依正於身中現如淨明鏡現諸色像二者外現如妙音觀音隨機示現十界色身三內外現如大集經觀於己身眾生身諸佛身悉於己身中現又見己身眾生身現佛身中眾生身中亦如是現二作念報恩二初以三昧力得此三昧已心大歡喜至價值娑婆世界以供養佛妙樂云入是三昧者普現三昧理無出入表用三昧之力故云入耳海此岸者補註引正法念經云妙高山內海此岸此岸即南岸也六銖者二十四銖為兩言六銖者即一兩中四分之一也二正報身力三初自燒身作是供養已從三昧起至八十億恒河沙世界妙樂云以神通力願者明不以世火還依所得三昧起利他願以智觀火焚難思境故使光明起斯照彼補註云薰陸者出大秦國西域記云薰陸香樹葉似棠梨兜樓婆出鬼神國此云香草舊云白茅香畢力迦或云即丁香也膠香即白膠香也二佛稱歎其中諸佛同時讚言至作是語已而各默然真法供養者當是內運智觀觀煩惱因果皆用空慧蕩之故言真法也又觀若身若火能供所供皆是實相誰燒誰然能供所供皆不可得故名真法也妙樂云當是之言正顯真法所以燒身名真法者由內觀故所觀者何即此生身由惑因故感斯惑果皆用之言顯因果俱蕩又觀若身若火等者於中先明法空次誰燒下辯生空初法空者既即實相實相無燒身火能所安得有燒有能所耶次生空者非但身等皆是實相身等宰主一切皆無故名為誰燒者能燒火也然者所然身也身火並是能供之事佛法即是所供之福田也宰主即是能觀觀者身火能所即觀境也境智不二能所斯亡以不二觀觀不二境成不二行會不二空作是觀時苦為法界見聞者益故云乘乘若不爾者成無益苦行佛有誠誡實可先思所以投巖無招外行之論赴火不為內眾之譏良由內有理觀外曉期心故勝熱息善財之疑見華嚴叅勝熱事尼犍生嚴熾之解薩遮尼犍經云嚴熾玉問尼犍治國之法尼犍為說十善篤論其道行方有尅心正行正智邪事邪行不可廢智不可亡後學之徒無失法利有人問云律制燒身得偷蘭遮罪燒指得突吉羅罪此中讚燒其事如何今為答之大小開制教法不同小制結過大制令燒故梵網經云若不燒身臂指供養諸佛非出家菩薩故知順小行易不燒何難從大誠難燒乃不易今藥王久證並出開制之方重法忘懷起神通之願為軌下凡思之可知天台別傳云智者大師初見南岳思大禪師於光州大蘇山思授以普賢道場令脩法華三昧誦經至今品是真精進是名真法供養如來寂而入定見靈山一會儼然未散豁然大悟獲一旋陀羅尼自是已後照了法華如曦和臨於萬像達諸法相似清風遊於太虗矣云云三時節久其身火然千二百歲過是已後其身乃盡二未來五初化生王家一切眾生喜見菩薩至結加趺坐忽然化生二自說本事即為其父而說偈言大王今當知至勤行大精進捨所愛之身箋難云有本於此偈後更添供養於世尊以求無上慧二句乃後人擅加耳笈多所譯亦但六句法護所譯但只四句說是偈已而白父言至我今當還供養此佛補註引寶積經云復有三昧名解一切眾生語言得此三昧者善能宣說一切語言於一字中說一切字了一切字同於一字俱舍論云甄迦羅亦云矝羯羅五十二數中即第十六數也頻婆羅亦云頻䟦羅即第十八數也阿閦婆亦云阿芻婆即第二十數也或云那由他是百萬億甄迦羅是千千萬億頻婆羅是百千千萬億阿閦婆是萬千千萬億三往到佛所白已即坐七寶之臺至合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切眾生喜見菩薩至世尊猶故在世四如來付囑爾時日月淨明德佛至於夜後分入於涅槃五奉命任持四初起塔爾時一切眾生喜見菩薩至垂諸幡葢懸眾寶鈴妙樂云他人疑云何得旃檀而為𧂐子智切聚也又儲畜也耶答此土大愛道入涅槃後猶用旃檀闍維況彼淨土何足為難補註云高三世界者高三千世界也故小千至初禪中千至第二禪大千至第三禪云高三者即至第四禪也二燒臂爾時一切眾生喜見菩薩至七萬二千歲而以供養妙樂云問上燒身但經千二百歲今燒臂何故七萬二千歲耶答前為自行身盡入滅今為弘法令物會三歸一故下文云令無數等既言無數聲聞發菩提心故知喜見於佛滅後不令此等住於小果三利益令無數求聲聞眾至皆使得住現一切色身三昧四現報爾時諸菩薩天人阿脩羅等至一切人天得未曾有妙樂云金色之身者前已得普現色身三昧即八相成道金色之身故知此中須在極果金色之身也三總結會二初結會佛告宿王華菩薩至百千萬億那由他數二勸脩宿王華若有發心至諸珍寶物而供養者一指內身也妻子外身也國城等外財也外輕內重故功福有異補註云夫一指有三節云足一指者是三節俱燒也故知能然手指是燒一節也首楞嚴經云我滅度後其有比丘身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏二嘆經妙三初歎能持者若復有人以七寶滿三千大千世界至其福最多七寶奉四聖不如持一偈此以財況法也葢法是聖師能生能養能成能榮莫過於法故人輕法重也妙樂云能生等者如父母必以四護護子今發心由法為生始終隨法進修為養令滿極果為成能應法界眾機為榮雖四不同以法為本又此法即四悉檀次第對之亦應可見四句偈者凡長行之文名散華偈四言五言等偈名貫華偈故長行偈頌通得稱偈而云一四句者以少況多也二歎所持法二初歎法體宿王華譬如一切川流江河至所說經中最為深大無量義經云川流江河四水譬教藥草喻中一雲能雨譬說今別舉四者譬乳酪生酥熟酥四味教也此法華教譬醍醐海也說窮本地為深徧一切處為大純明佛法不說餘法譬如大海同一醎味最為深大其義如是又如土山黑山小鐵圍山至於諸經中最為其上土山者土石諸山也黑山者俱舍論云南洲從中向北各有三重黑山鐵圍山者繞小千界名小鐵圍繞中千界名大鐵圍十寶山者華嚴云一雪山二香山三軻梨羅山四仙聖山五由乾陀山六馬耳山七尼民陀山八斫迦羅山九宿慧山十須彌山土黑鐵圍故非是寶十山雖寶或一或二神與龍雜居譬餘教說能依之人即十地四十心或凡或賢或聖說所依之理或俗或真或中是為卑下須彌四寶所成純天所住譬此法華所說諦理常樂我淨如四寶所成開示悟入者之所依是故此義最為高上妙樂云或一或二者俱舍云前七金所成蘇迷盧四寶金或兼餘故云一二又如眾星之中至諸經法中最為照明星月同是陰精俱於夜現星無虧盈不及於月以譬諸教說於權智權不即實不得自在此經明權即實實即權如月有盈虧盈虧相指不二而二如此說權智即勝餘教也又如日天子能除諸闇至能破一切不善之闇日是陽精獨能破暗以譬諸經明實智破惑並是權外之實破疑不徧尚不及此經說施權之意是即實而權已破諸疑那得並此經即權而實有疑皆斷所以權實之語非獨今經相即之言出自於此又如諸小王中至及發菩菩心者之父輪王號令止在四域帝釋號令齊三十三天梵王號令統上冠下譬餘經說三諦三昧各不相收不得自在此經所說以實相入真决了聲聞法是諸經之王實相入俗一切治生產業不相違背實相入中一切諸法無非佛法文云一切學無學及發菩薩心者之父其義如是妙樂云指三教菩薩為發菩薩心者今經為彼之父能生彼故昔謂非子至此方知又如一切凡夫人中至諸經法中最為第一一切凡夫四果以支佛為第一者此明任運無功用意也餘經要因功用乃得入流如四果人因聞思脩方乃得悟此經明無作四諦不雜方便自然流入薩婆若海如辟支佛無師自悟不立分果斷結成聖也有能受持是經典者至於一切眾生中亦為第一以法妙故最為第一人弘妙法亦第一也一切聲聞辟支佛中至此經亦復如是諸經中王聲聞支佛中菩薩為第一者此明因第一也餘經明因是七方便今經明因出方便外故因第一也如佛為諸法王者此明果第一也餘經明果近在寂場此經明果遠指本地故最第一二歎法用三初歎拔苦用宿王華此經能救一切眾生者至離諸苦惱一切眾生須該十界離苦惱者須離分段變易二種生死之苦二歎與樂用此經能大饒益一切眾生至如賈客得海如炬除闇清涼池等總十二事皆歎經與樂之用也妙樂云初歎體次歎用者非宗體之體非宗用之用通指一部為體部內體宗用三共有如是拔與等用三總結與拔此法華經亦復如是至能解一切生死之縛總結拔苦與樂用也今經力用能拔一切眾生生死之苦而與究竟涅槃之樂能解一切眾生惑業之縛而與究竟解脫之樂也三持經福深二初舉全聞經福若人得聞此法華經至所得功德亦復無量婆斯迦此云夏生華又云雨華得雨方生故也那婆此云雜華摩利此云鬘華餘如前已釋二舉別聞品福二初格量宿王華若有人聞至生蓮華中寶座之上妙樂一云後五百歲者若準毗尼母論直列五百第一百年解脫堅固第二百年禪定堅固第三百年持戒堅固第四百年多聞堅固第五百年布施堅固言後五百最後百耳有人云準大集經有五五百第一乃至第四同前唯第五五百云鬪諍堅固言後五百者最後五百也若單論五百猶在正法雖出論文其理稍壅然五五百且從一往末法之初冥利不無且據大教可流行時故云五百若有女人等者此中秪云得聞是經如說脩行即淨土因不須更指觀經等也問如何脩行答既云如說脩行即依經立行具如分別功德品中深心信解直觀此土四土具足故此佛身即三身也故此大眾即一切眾故不離同居穢見同居淨問同居淨土十方亦有何必極樂答教說多故由物機故是攝生故令專注故不復為貪欲所惱至所得功德如上所說補註引育王經云阿育王請僧入宮供養有一比丘名優鉢羅口中乃作優鉢羅華之香王疑比丘年少何以口中含香即勅以水洗口洗已倍香王乃問云久近含此香耶答曰非含香也過去迦葉佛時人壽三萬歲我於爾時為高座法師讚歎佛法故四十九億歲生人天中口中出此之香聞已益加恭敬今經言隨喜讚善者現世口中常出此香乃是現報信不誣矣二囑累是故宿王華至應當如是生恭敬心不老不死此須觀解不老是樂不死是常以聞於此經得常樂之解坦然在懷無所畏忌私謂取草者以草為座坐之以成佛也吹法螺擊法鼓既成佛已即說法警悟一切眾生也三明得利益說是藥王菩薩本事品時至語言陀羅尼此結聞品之益四多寶稱善多寶如來於寶塔中至利益無量一切眾生
