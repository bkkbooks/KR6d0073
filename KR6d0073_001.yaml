body:
  text: 上天竺講寺住山比丘一如集注妙法蓮華經者本地甚深之奧藏也乃一化之根源五時之極唱如來出世意欲即説此經開示衆生本源覺藏究竟直指見性成佛故經曰諸佛惟為一大事因緣故出現於世所謂開示悟入佛之知見是也其奈小機未堪此聞聞則生謗墮苦故經曰若但讚佛乘衆生沒在苦謗法不信故墜於三惡道如來不得已而為實施權先以華嚴大教擬宜小乘之人既不能信受是以不動寂場遊化鹿苑為其説三藏教而又保證真空故須方等彈斥令其耻小慕大雖復慕大而執真之情未忘乃寄空生身子為之轉教廣談空慧之法而淘汰之執情破已然猶以實覆權權掩於實未開二乘根敗作佛未顯如來成佛久本於是高會鷲峯劇談祕要開方便之權門示真實之妙理發衆聖之權巧顯本地之幽微故經曰正直捨方便但説無上道其為教也三乘咸會一乘九界同歸佛界長遠壽量至此方彰出世本懷於今始暢夫是之謂妙法蓮華經也此經凡二十八品所談妙法不出權實本迹權謂九界三乘實謂佛界圓乘本謂久遠成佛迹謂果後施化前十四品是迹門開權顯實後十四品是本門開迹顯本然迹本二門開顯由機分利鈍故有三周七喻不同三周者初法説周為上根人作三乘一乘説舍利弗一人得悟即方便品中所談是也二譬説周為中根人作三車一車説迦葉等四大弟子領解即譬諭品中所説是也三因緣周為下根人作宿世因緣説千二百聲聞得記即化城喻品中所明是也迹門施化終於三周周者終也終必對始故上根始於鹿苑稟小終於法華得記中根例知下根始於大通下種終於因緣開會故云三周也七喻者一火宅喻喻三界不安隱如譬喻品中所明是也二窮子喻喻小乘無大乘功德法財如信解品中所明是也三藥草喻喻有漏諸善皆能除惡而無漏之善為最如藥草喻品中所明是也四化城喻喻二乘真空涅槃能防見思之非禦生死之敵如化城喻品中所明是也五衣珠喻喻王子結緣下一乘智寶之種即了因種如五百弟子受記品中所明是也六髻珠喻喻中道實相極果所宗如安樂行品中所明是也已上六喻皆喻迹門開權顯實也七醫子喻喻佛如大醫王遍療一切衆生之病如壽量品中所明此一喻喻本門開迹顯本也初釋首題明五重玄義一法喻為名二實相為體三一乘因果為宗四斷疑生信為用五無上醍醐為教相法喻為名者法即妙法喻謂蓮華所言妙者妙名不可思議乃褒美之辭也所言法者十界十如權實本迹之法也良以妙法難解假喻易彰蓮華則華果同時妙法則權實一體故有迹門三喻本門三喻迹門三喻者一為蓮故華喻為實施權二華開蓮現喻開權顯實三華落蓮成喻廢權立實本門三喻者一為蓮故華喻從本垂迹二華開蓮現喻開迹顯本三華落蓮成喻廢迹立本此首題中蓮華一喻乃總喻也若經文中火宅等七喻是別喻也故妙玄云七譬是別蓮華是總舉總攝別故冠篇首總別雖殊莫非為顯權實本迹之法耳經者法也常也十界同軌之為法三世不易謂之常故以法喻為此經之名也實相為體者謂十界十如之法一一離虗妄相名為實相故龍樹云除諸法實相餘皆魔事然此妙體在迹門謂之諸法實相在本門謂之非如非異本迹雖殊妙體是一故以實相為此經之體也一乘因果為宗者宗即要義所謂佛自行因果為宗也云何為要無量衆善言因則攝無量證得言果則攝故以一乘因果為此經之宗也斷疑生信為用者用即力用也迹門開顯斷權疑生實信本門開顯斷近疑生遠信故以斷疑生信為此經之用也無上醍醐為教相者教者聖人被下之言也相者分別同異也此經純圓異乎偏少之教喻如醍醐上味不同乳酪生熟酥味故以無上醍醐為此經之教相也然此五重玄義皆是經中所詮之旨祖師預取解釋首題者欲令受持讀誦之人即於首題能了一經之大旨故也妙法蓮華經弘傳序經題五字如前釋弘傳序者弘廣也大也傳轉也亦流傳也序即次序爾雅云東西墻謂之序注云所以別內外也謂見墻別宅舍之內外觀序知一經之由致也律師序述此經之大猷蓋欲廣傳後代展轉流通而不絶也終南山釋道宣述終南山名距長安八十里在扶風武功縣東接驪山太華西連太白隴山其山北來勢終於南故云終南關中記云終南一名中南在天之中居都之南故曰中南釋者梵語具云釋迦此云能仁佛之姓也故凡投佛出家者皆以釋為姓阿含經云四河入海同一鹹味四姓出家皆名為釋是也律師諱道宣生京兆錢氏父吏部尚書母夢月輪貫懷而孕又夢梵僧語之曰所孕者梁之祐律師也及長師日嚴頵於倫切公出家落髮年二十依首師進具又從學律唐高祖武德七年甲申徙居終南紵麻蘭若製行事鈔嘗行般舟三昧前後總二十會常感天人送饌侍衛後在西明寺行道中夜臨砌足蹶且仆有少年介胄擁衛之律師問汝為誰曰弟子博叉天王子張瓊也以師戒德故來給衛耳因以佛牙授師夜捧行道晝藏地穴唯弟子文綱知之又授以餌藥修合之方即今天王補心丸是也師問以世尊在世及滅後時事瓊一一為言隨問隨録集為感天侍應傳一卷高宗乾封二年丁卯冬十月三日入滅衆聞天人同聲請師歸彌勒內院穆宗讚曰代有覺人為如來使龍鬼歸降天人奉侍聲飛五天辭驚萬里金烏西墜佛日東舉稽首皈依肇律宗主懿宗朝諡澄照述者著述也述者之謂賢作者之謂聖儒典云述而不作律師自謙故云述也妙法蓮華經者統諸佛降靈之本致也統他綜切總也降靈猶降神也致趣也諸佛皆從兜率降神出現於世其本懷之致趣莫不為令衆生開示悟入佛之知見授記作佛而後已今經開顯既開衆生佛之知見授記作佛則總紀諸佛出世之意故云統諸佛降靈之本致也蘊結大夏出彼千齡東傳震旦三百餘載蘊積也蘊結即結集也大夏即竺國之美稱如來生於周昭王二十四年甲寅入滅於周穆王五十二年壬申二月十五日既入滅弟子阿難輩於是始結集大小經律論藏至東漢明帝永平七年計一千餘年故曰出彼千齡齡即年也是年帝夢金人長大項有日光飛至殿庭旦問羣臣太學聞人傅毅奏曰周昭王時西域有佛出世其形長一丈六尺而黃金色陛下所夢將非是乎博士王遵推周書異記佐之帝遂遣中郎將蔡愔博士秦景等一十八人使西域求佛法蔡愔等至天竺鄰境月氏國遇梵僧摩騰法蘭二人奉佛經像來震旦遂同東還永平十年入闕獻經像帝大悅帝於雍門外立寺騰蘭居之以白馬馱經而來遂名白馬寺永平十四年五嶽道士費叔才褚善信等忌之斥言虗偽騰蘭白於帝曰吾佛出世法水火不能壞請與方士驗之帝敕叔才等盡出所有奇經祕訣與騰蘭所持來經像就焚之正月十五日火作而騰蘭諸經完然不燼方士稽首欽服帝益異之由是騰蘭習漢言久之譯四十二章經十地斷結佛本生法海藏佛本行等五經佛法自此始流東土故曰東傳震旦震旦或曰真丹琳法師云東方屬震是日出之方故云震旦華嚴音義翻為漢地樓炭經云蔥河以東名為震旦以初日出耀於東隅故得名也據此則震旦非梵語矣自漢永平七年至獻帝合一百五十五年歸魏魏五主合四十五年歸西晉西晉四主合五十二年至東晉安帝義熙二年羅什譯此經時合八十九年總計三百四十一年故曰三百餘載載年也爾雅云唐虞曰載取物終更始也西晉惠帝永康年中長安青門燉煌菩薩竺法護者初翻此經名正法華西晉武皇帝司馬氏諱炎字安世文帝昭之子也受魏禪即帝位乙酉改元泰始國號晉都洛陽故曰西晉始自武帝次惠帝次懷帝終於愍帝惠帝諱衷字正度武帝第二子庚戌四月即位改元永熙繼改元康庚申又改永康止一年長安古稱咸陽漢高祖改名長安青門在長安城東即邵平種瓜處也燉煌即今甘肅沙州路古流沙地禹貢雍州之域也漢為燉煌郡陽關玉門關窪水在焉竺曇摩羅剎此云法護月氏國人究三十六國道術兼通其語泰始二年丙戌自天竺達於玉門因居燉煌世號燉煌菩薩後入長安居青門大周目録云太康七年譯正法華今謂太康乃武帝年號序既云惠帝當以永康為正也東晉安帝隆安年中後秦弘始丘慈沙門鳩摩羅什次翻此經名妙法蓮華東晉司馬氏都建康始於元帝終於恭帝禪於宋凡十一主合一百三年元帝諱睿琅琊王覲之子宣帝曾孫也年十五嗣封琅琊王後為安東將軍鎮建康西晉愍帝建興四年丙子詔王攝萬幾明年即王位改元建武又明年戊寅始即帝位改元大興鳩摩羅什譯經於後秦境內序必先書東晉者存正統也第十主安帝諱德宗孝武太子丙申繼孝武即帝位次年丁酉改元隆安凡五年又改元興凡三年又改義熙凡十四年後秦姓姚名萇字景茂赤亭羌人當晉孝武皇帝太元八年癸未前秦符堅攻晉以兗州刺史姚萇為龍驤將軍後又以為司馬討慕容泓等萇軍大敗懼奔時渭北馬牧等紏扇羌豪率其戶口歸萇者五萬餘家推萇為盟主晉太元丙戌四月萇自陝西等路入長安即帝位改年建初國號大秦史以後秦別之萇遣將吳忠執堅於五將堅子丕立為馮該所害南安王符登立晉太元十八年癸巳十二月萇卒子興立率衆伐前秦秦主登大敗次年甲午興即帝位改年皇初凡五年又改弘始當晉隆安三年己亥也丘慈與龜茲同國名在焉耆西南沙門此云勤息謂勤修衆善止息諸惡也鳩摩羅什此云童壽龜茲國人前秦符堅遣驍騎將軍呂光等率兵七萬伐龜茲國取什當晉太元七年壬午歲光與什俱還至涼州聞堅已歿光遂據涼州即三河王位國號大涼改年太安當晉太元十一年也及光卒子紹立為太原公呂纂所害纂立又為呂超所廢立呂隆後秦姚興弘始三年遣師伐隆隆上表隆興遂迎什至長安當晉隆安五年辛丑也弘始八年什於草堂寺譯出今經為七卷當晉義熙二年丙午也序文律師言隆安年中者乃是什始至長安之年非什譯此經之年也法華文句云鳩摩羅什以偽秦弘始五年四月二十三日於長安逍遙園譯大品經竟至八年夏於草堂寺譯此妙法蓮華經什少時日誦三萬二千言隨母出家遍遊西域淹貫羣籍尤善大乘在龜茲日諸王會同每請師説法必跪伏而聽後居秦國大闡經論所譯出者三百八十卷秦主以師禮事之優寵特甚弘始十五年四月十三日入滅壽七十歲當晉義熙九年癸丑也隋氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法隋高祖文皇帝姓楊名堅弘農華陰人漢太尉震十四代孫初宇文秦仕魏封周公至子覺受魏禪國號周堅父忠嘗事周有功官至太傅隋國公堅襲封焉陳大建十三年辛丑堅受周禪都長安國號隋自文帝至恭帝三主合三十七年今以國稱故云隋氏仁壽文帝年號也名義云天竺之稱異議紏紛舊云身毒或曰賢豆今從正音宜云印度此云月蓋以其土賢聖繼軌導凡御物如月照臨故也五印度之境周九萬餘里今云北天竺者即五天竺國之一也闍那笈多二法師名闍那具云闍那崛多此云志德北天竺人剎帝利種遊涉行化來達此境笈多具云達摩笈多此云法密南天竺人序不云者缺也按添品經序云大隋仁壽元年辛酉普曜寺沙門上行請闍那崛多達摩笈多二法師於大興善寺重譯此經為八卷名曰添品妙法蓮華故知闍那笈多是二人也升師目録云言添品者謂於晉秦兩譯經內添合改移有五一於晉秦譯本添普門品後偈頌二於秦譯藥王品後補日光喻之全文三合天授品於寶塔品內四移囑纍品於普賢品後五回陀羅尼品於神力品後又唐不空譯法華軌儀全與添品法華改易是同甚違什師按品次第三經重沓文旨互陳時所宗尚皆弘秦本一經三譯故云重沓文詞旨趣交互陳述如十如是晉譯則無秦譯則有又藥草喻後半品之文晉隋兩譯則有秦譯則無又囑纍品秦譯置二十二隋譯則置之卷末故云文旨互陳也宗尊也尚高也此經雖更三譯然古今所尊尚者唯傳弘什師所譯之本自餘支品別偈不無其流具如序曆故所非述三譯之外如名義云達摩摩提於齊武永平年中譯出提婆達多品經一卷又東晉祗密帝譯出普門品經一卷此師名義不載支分各異故曰支品又闍那崛多於西川益州龍淵寺譯出普門品重頌偈一卷故曰別偈如是品偈雖支別不同莫不各有源流具如彼經本序紀其所自故今所不述也又流即流類如云品類相從目之為品是也曆象也又通作歷又一解餘饒也饒即多之義也蓋言秦本之內自多支品別偈其品偈之源流流類備如各品各偈之中已自序曆可見故今所以不陳述也私謂前解獨指普門品重頌為別偈者固是若細詳之文意似不特言別譯達多普門二品為支品蓋言一經之內諸品為支品也且律師作序正為序於秦本安得濫及別譯之品哉讀者審之夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心靈嶽降靈者此借用儒典維嶽降靈生申及甫之意蓋言靈山所化之機皆蘊英靈之秀而降生者自非吾佛大聖神通駭動智辨宣揚則何由開導而化度之此言應稱於機也適化所及者適當也亦稱適也謂佛雖大聖不能化無緣之人如靈山所化之機昔皆於大通佛世聽王子覆講法華之時已下一乘之種中間退大漸次調停以至於今方得妙悟自非宿昔有緣種者則無因開導其心此言機稱於應也所以仙苑告成機分大小之別金河顧命道殊半滿之科豈非教被乘時無足核其高會梵語婆羅痆女𭶑切斯舊曰波羅奈或翻江繞城或以羣鹿所居亦名鹿苑以古仙所居亦名仙苑告成者如來六年苦行之後於菩提樹下而成正覺也佛既成道必説法被機機有利鈍則大小不同如初華嚴大隔於小鹿苑小隔於大方等大小同聞是也此二句言應必被機也梵語㕧剌拏伐底河此云有金河是産閻浮金處河畔有娑羅林在拘尸城外顧命者儒典尚書有顧命篇鄭玄注云臨終出命故謂之顧顧將去意也佛將入滅而垂言教説涅槃之經如成王將終作顧命之書也涅槃追説四教事同方等藏為半字教通別圓為滿字教故曰道殊半滿之科科等也此二句言機必稟教也初言仙苑後言金河者蓋舉一化之初後以攝中間方等般若之二時故總結云教被乘時等如華嚴被大機乘時為説圓滿修多羅教鹿苑被小機乘時為説藏教方等被大小機乘時為説藏通別圓之四教乃至涅槃亦復如是上之四時設教雖則被機乘時約部言之皆屬於權並不足以考核其實如法華之高會唯談一實也法華功高一化理冠羣經已今當説最為第一律師之言足可徵矣是知五千退席為進增慢之儔五百授記俱崇密化之迹方便品初如來既歎諸佛權實二智甚深無量難解難入舍利弗即騰疑致請及如來誡許為説五千人等便乃越席而去如來即斥言此輩罪根深重及增上慢又云退亦佳矣雖曰斥他意在䇿進在座有增上慢者不生退席之心也富樓那等五百弟子本是深位菩薩今內祕外現迹示聲聞至法華會上復授與成佛之記者蓋崇其密示輔佛行化之迹也崇高也猶迹高本下之義也所以放光現瑞開發請之教源序品中言如來説無量義經已入定放白毫光具現六瑞故使彌勒懷疑以請文殊決答是知放光現瑞乃開發起啓請説教之本源也出定揚德暢佛慧之宏略方便品如來從三昧安詳而起讚揚諸佛權實二智之德意令衆生開示悟入佛之知見則佛慧之宏遠方略方乃通暢也二智佛之知見皆佛慧之異名耳朽宅通入大之文軌譬喻品初以三車誘引諸子及出火宅後乃等賜大車以喻鹿苑初為聲聞等權説諦緣度三乘之法令其修習出於三界逗至法華開權顯實唯談一乘圓實之法咸令開示悟入佛之知見故經云如來初以三乘引導衆生然後但以大乘而度脫之譬天下大治之時書同文車同軌約法則同圓教一實之文約喻則同大車一乘之軌豈非朽故火宅之喻乃是引小向大之説故云通入大之文軌化城引昔緣之不墜化城者無而倐有名化防非禦敵曰城以喻小乘真空涅槃防見思之非禦生死之歒也化城喻品初為疲極之衆化作一城以為止息然後令至寶所以譬如來昔為王子之時為其下大乘之種中間退大向小如止化城今至法華復為説大授記作佛豈非化城之喻是導引宿昔之緣之不墜失也繫珠明理性之常在五百弟子授記品陳如等得記之後悔過自責乃以繫珠為喻以陳領解珠譬實相之理乃大乘緣種也蓋佛昔於大通佛世嘗以大法教令發心為下一乘之種多劫廢忘不知不覺今得授記方知緣種不失理性常在譬人至親友家親友以珠繫其衣內其人醉臥不覺及後親友復為示之即知衣內之珠不失以喻理性之常在也鑿井顯示悟之多方法師品佛説譬如有人渴乏須水穿鑿高原猶見乾土知水尚遠施功不已轉見濕土其心決定知水必近以喻在家出家之人若未聞解思惟修習此經是人去阿耨菩提尚遠若得聞解思惟修習此經必知是人得近阿耨菩提佛以種種方便教化方乃悟入故云示悟之多方詞義宛然喻陳惟遠文詞義理宛然符合加以如上種種比喻敷陳則一經之旨獨惟幽遠也自非大哀曠濟拔滯溺之沉流一極悲心拯昏迷之失性衆生滯著諸有沒溺愛河此等之流自非如來興大哀憐廣為津濟安能拔其生死之苦令得涅槃之樂又衆生為無明所覆昏惑迷倒自非如來等一至極悲愍之心安能拯其昏迷之暗令復本性之明也自漢至唐六百餘載總歷羣籍四千餘軸受持盛者無出此經自漢永平十年佛教始流東土至東晉合三百五十二年又宋五十九年又齊二十三年又梁五十五年又陳三十三年又隋三十七年又唐高祖至高宗乾封二年律師入滅合五十年總計六百九年故云六百餘載但莫考律師於唐代何年作此序耳六百餘載之內總經譯出諸經卷目雖有四千餘軸之多今昔受持之盛者莫出什師所譯之法華也將非機教相扣並智勝之遺塵聞而深敬俱威王之餘績機教相扣者機即所化之機教即能被之教扣擊也謂機必稟教教必被機機教互相擊動也且稟教之機並昔從大通智勝佛所同下一乘種子其上根利智者於初中間已得道竟其鈍根者中間退大以來佛為節節調停至今王城亦得道竟後之受持此經者將非昔同下種最鈍之人乎望前之多比今之少有若遺塵故云智勝之遺塵又若聞此經信敬不疑謗者乃是威音王佛所不輕為下大乘緣種之餘功故也輒於經首序而綜之輒專也綜即機縷之持絲制經者律師專於此經之首述為序文綜括一經之大旨庶使誦持者知義意之有歸法喻之相顯譬若機縷之持絲制經令其條然有緒而不紊亂也庶得早淨六根仰慈尊之嘉會速成四德趣樂土之玄猷此謂誦持之人苟知一經之大旨念念從聞思修依解立行自然獲得六根清淨則能見佛常在耆山如隋智者大師行法華三昧誦經至藥王品是真精進是名真法供養如來即豁然大悟見靈山一會儼然未散故經云若有深心信解則為見佛常在耆山等或云慈尊指彌勒也普賢勸發品云若有受持讀誦解其義趣乃至云即往兜率天上彌勒菩薩所二説俱通速成四德者謂常樂我淨也不遷不變謂之常離二死苦謂之樂八大自在謂之我三惑淨盡謂之淨既成就四德必得往生極樂國土故經云如説修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處趣向也猷道也道即能通之義謂因此玄妙之道即能通至淨也弘贊莫窮永貽諸後云爾贊助也貽遺也律師作序之意蓋欲贊助此經永遺後代冀展轉流通無窮無盡也或問法華本迹二門律師何但序迹而不言本今為答曰若知從本垂迹即知因迹顯本故荊溪尊者云若解迹妙本妙非遙本迹雖殊不思議一妙法蓮華經弘傳序終妙法蓮華經卷第一姚秦三藏法師鳩摩羅什奉詔譯妙法蓮華經序品第一序義有三謂次也由也述也如是等五事冠於經首次序也放光六瑞起發之端由序也問答釋疑正説弄引序述也具此三義故稱為序品者梵語跋渠此翻為品義類同者聚在一段故名品也唯藥王菩薩本事品是佛親唱餘或結集者所置或譯人添足諸品之始故言第一然有通序別序從如是去至却坐一面是通序以諸經初同有如是等五事故從爾時世尊去至品盡是別序以別序一經故次釋經文二初迹次本法華文句章安祖師云天台智者大師分文為三初品為序方便品訖分別功德十九行偈凡十五品半名正從偈後盡經凡十一品半名流通又一時分為二從序至安樂行十四品約迹開權顯實從涌出訖經十四品約本開權顯實本迹各序正流通初品為序方便訖授學無學人記品為正法師訖安樂行為流通涌出訖彌勒已問斯事佛今答之半品名序從佛告阿逸多下訖分別功德品十九行偈名正此後盡經為流通今記從前三消文也初迹門三初一品序分二初通序六初所聞法體如是如是者舉所聞之法體也不異名如無非曰是如於三諦之是故曰如是若約教釋者諸經不同如是亦異若佛明俗諦有文字真諦無文字阿難傳佛俗諦文字與佛説不異故名如因此俗文會真諦理故名是此則三藏經初如是也佛明即色是空空即是色色空空色無二無別空色不異為如即事而真為是阿難傳佛能詮之文不異為如能詮即所詮為是此則通教經初如是也佛明生死是有涅槃是無出生死有入涅槃無出涅槃無入於中道阿難傳此出有入無出無入中與佛説不異為如從淺至深無非曰是此則別教經初如是也佛明生死即涅槃亦即中道真如法界實性實際遍一切處無非佛法阿難傳此與佛説無異故名如如如不動故名是文如理是究竟成就此則圓教經初如是即今經之如是也大論云佛將涅槃阿難問佛一切經首當作何語佛言應云如是我聞一時佛在某方某國與某大衆俱此即通序亦名破邪序對破外道阿漚故亦名證信序為令聞者不疑故二能持之人我聞我聞者謂如是之法阿難從佛而聞也大論云阿難與聽衆述佛遺旨親承不謬故曰我聞三聞持和合一時一時者聞持和合非異時也又感應因緣合一之時也四時從佛聞佛梵語佛陀此云知者知過去現在未來衆生非衆生數常無常等一切諸法故名佛陀又云覺者覺有三義一者自覺悟性真常了惑虗妄二者覺他運無緣慈度有情界三者覺行圓滿即名妙覺故華嚴經云一切諸法性無生亦無滅奇哉大導師自覺能覺他若約教釋者於道場樹下知覺世間出世間覺世即苦集覺出世即道滅亦能覺他三十四心正習俱盡現丈六身為三乘人説諦緣度法即三藏教佛也現帶劣勝應身樹下一念相應斷餘殘習者即通教佛也單現尊特相坐蓮華臺受佛職者即別教佛也隱前三相惟示不可思議如虗空相即圓教佛也今經正彰開顯開前三教果頭之佛即是圓教法身之佛如云垢衣內身實是瓔珞長者故三十二相相相無邊即是尊特亦即法身所以龍女讚云微妙淨法身具相三十二淨名疏云四處現尊特唯法華最勝五聞持之所住王舍城耆闍崛山中住者能住住所住能住即是首楞嚴三昧所住即是忍土王城王舍城者駁足王與千王共立舍城都五山中為大國故云王舍城因緣出大論耆闍崛此云靈鷲亦云鷲頭山峯似鷲故名亦云狼迹前佛今佛皆居此山若佛滅後羅漢住法滅後支佛鬼神住既是聖靈所居因呼為靈鷲山佛説此經凡三會中會在多寶塔內前後二會皆在此山中者佛居中道今處山中説中道也六聞持之伴二初列衆三初聲聞衆二初比丘衆二初多知識六初舉類與大比丘衆與者共義大者器量尊重為天王等大人所敬有大道故有大用故有大知故故言大比丘者淨名疏云或言有翻或言無翻有翻者翻云除饉衆生薄福在因無法自資得報多所饉乏出家戒行是良福田能生物善除因果之饉乏故言除饉言無翻者名含三義一破惡二怖魔三乞士戒防形非定除心亂慧悟想虗能破見思之惡故名破惡既能破惡摩羅念言其既出界復化餘人俱出三界乖於魔意魔乃愁懼故名怖魔夫在家人三種如法一田二商三仕用養身命出家之人佛不許此惟乞食自濟身安道存福利檀越故名乞士衆者梵語僧伽此云和合衆事和無別衆法和無別理也二明數萬二千人俱三明位皆是阿羅漢梵語阿羅漢舊翻無著不生應供或言無翻名含三義無明粳脫後世田中不受生死果報故云不生斷九十八使煩惱盡故名殺賊具智斷功德堪為人天福田故云應供四歎德諸漏已盡無復煩惱逮得己利盡諸有結心得自在諸漏已盡無復煩惱此兩句歎上殺賊漏者三漏也一欲漏謂欲界一切煩惱除無明二有漏謂上二界一切煩惱除無明三無明漏謂三界無明無明即癡也成論云失道故名漏律云癡人造業開諸漏門毗曇云漏落生死成論義通因果律專在因毗曇唯果由惑造業致生死苦亡法身失慧命喪重寶皆是賊義煩惱者昏煩之法惱亂心神即九十八使也煩惱是能潤漏業是所潤能所既盡是殺賊義逮得己利一句是歎應供三界因果皆名為他智斷功德皆名己利己利具足故成應供盡諸有結心得自在此兩句是歎不生諸有即二十五有生處也結即二十五有生因也因果不亡故名為有因盡果亡即是不生心得自在者定具足名心自在慧具足名慧自在慧自在未必心自在心自在必慧自在今言心自在即是定慧具足也五列名其名曰阿若憍陳如阿若者名也此翻無知無知者非無所知乃知無耳若依二諦即是知真以無生智為名也憍陳如姓也此翻火器婆羅門種其先事火從此命族火有二義照也燒也照則暗不生燒則物不生故以不生為姓也或稱之為釋摩男者以其聞法得道最在一切人天羅漢之前如云佛最長子即陳如也摩訶迦葉此翻大龜氏其先代學道靈龜負仙圖而應從德命族故名大龜氏時人多以姓召之其名畢鉢羅父母禱樹神而生故亦云飲光以其身光能映餘光使不現故亦云光波以其身光炎涌故佛弟子中多名迦葉如十力三迦葉等於同姓中最長故曰摩訶迦葉梵語摩訶含大多勝三義即五種不翻中多含不翻也如來滅後以法付之令法久住乃傳金縷大僧伽黎住雞足山至未來彌勒出世付法授衣竟然後入滅優樓頻螺迦葉伽耶迦葉那提迦葉迦葉如前釋優樓頻羅此云木瓜林伽耶此云城那提此云河此三人昔於毗婆尸佛時共樹剎柱以是因緣報為兄弟兄為瓶沙王師有五百弟子兩弟亦各有二百五十皆行兄法不肯歸佛佛因作十種神變謂龍毒不中龍火不燒恆水不溺等兄及二弟師徒皆伏投佛出家具出瑞應經舍利弗舍利此云鶖七由切鷺水鳥也弗此云子大論云婆陀羅王婦生一女眼似舍利鳥眼即名此女為舍利以其是舍利所生故名舍利弗又翻身子此女好形身身之所生故言身子增一阿含經云我佛法中智慧無窮決了諸疑者舍利弗第一大目犍連目犍連婆羅門姓也此云讚誦名拘律陀拘律陀樹名禱此樹神而生故文殊問經翻萊茯根真諦云勿伽羅翻胡豆二物皆古仙嗜食因以命族正云摩訶沒特伽羅此云采菽氏菽亦豆也增一阿含經云我弟子中神通輕舉飛到十方者大目連第一摩訶迦旃延迦旃延婆羅門姓也此云文飾善論義故阿含經云善分別義敷演道教者迦旃延第一阿䨲樓馱或云阿那律陀此云無貧或云阿泥盧豆此云如意即名也昔於飢世以稗飯施辟支佛獲九十一劫天人之中受如意樂故名如意爾來無所乏少故名無貧及稟佛出家由精進故七日七夜眼睫不交遂喪精失肉眼已佛令求天眼繫念在緣四大淨色半頭而發內外通徹明暗悉睹見大千世界如觀掌果增一阿含經云我佛法中天眼徹視者阿那律比丘第一劫賓那此云房宿以因父母禱房星而生故以名之又初出家時因往見佛夜值雨寄宿淘師房以草為座後一比丘亦來寄宿劫賓那即推草與之至中夜後來比丘問何所往答曰我欲見佛後比丘遂為説法豁然得道後比丘即佛也以共佛宿淘師房從得道處為名故言房宿又善占星宿明識圖像從解得名阿含經云我佛法中善知星宿日月者劫賓那比丘第一憍梵波提此云牛呞亦曰牛迹昔五百世曾為牛王牛若食後恆事虗哨餘報未除唼唼常嚼故時人稱為牛呞避人笑故恆居天上不知佛滅迦葉集千羅漢遣下座僧使追憍梵憍梵問佛使答云佛已入滅即言佛出我出佛住我住佛滅我滅遂入滅阿含經云樂在天上不樂人間牛迹比丘第一離婆多亦云離越此翻星宿父母從星辰乞子因星作名雖得出家猶隨本字阿含經云坐禪入定心不倒亂離越比丘第一畢陵伽婆蹉七何切此云餘習五百世為婆羅門餘氣猶貢高過恆水叱河神云小婢駐流河神分為兩派其神被叱遂往訴佛佛令懺謝即合掌言小婢莫嗔大衆笑之河神云懺而更罵佛言本習如此實無高心薄拘羅此云善容容貌端正故年一百六十歲無病無夭由昔持不殺戒故九十一劫命不中夭昔施僧一訶梨勒果故身常無病增一阿含曰壽命極長終不中夭常樂間居不處衆中薄拘羅第一摩訶拘絺羅此云大膝膝骨粗大故乃舍利弗舅與姊舍利論議不如拘絺羅思惟念言非姊力也必懷智人寄言母口未生乃爾及生長大當如之何即棄家往南天竺讀十八經時人笑之纍世難通一生非冀乃歎曰在家為姊所勝在外為他所輕誓讀不休無暇剪爪時人呼為長爪梵志後投佛出家得法眼淨難陀亦云放牛難陀此云善歡喜妙樂云從初慕道為名歡喜中勝故云善也孫陀羅難陀孫陀羅此名好愛妻名也難陀此云歡喜己號也揀異放牛難陀故標妻名也富樓那彌多羅尼子富樓那翻滿願是父名彌多羅翻慈是母名尼者天竺女人通名也從父母得名故名滿慈子阿含經云我父名滿我母名慈諸梵行人遂呼我為滿慈子須菩提此云空生亦云善吉亦云善業其生之日家中庫藏一切皆空故字空生庫藏空故父母驚異以問占者占者言吉因名善吉及其出家見空得道兼修慈心得無諍三昧是以常能將護物心故名善業佛從忉利天下率土輻湊爭先頂禮惟須菩提端坐石室念諸法空豁然悟道故為解空第一阿難此云歡喜或云慶喜或云無染佛成道日生舉國欣慶故名歡喜亦名慶喜阿難隨佛入天人龍宮見天人龍女心無染著故名無染佛滅度後迦葉大衆讚曰面如淨滿月目若青蓮華佛法大海水流入阿難心其入滅時於恆河中入風奮迅三昧分身為四分一與天上一與龍宮一毗舍離國一阿闍世王增一阿含經云知時明物所至無疑所憶不忘多聞廣達堪任奉持阿難第一羅睺羅此云覆障是佛親子往昔因塞鼠穴又不看婆羅門六日故處胎六年因名覆障初佛為太子時求出家父王不許乃曰汝若有子聽汝出家太子即以指指妃腹曰却後六年汝當生男太子既出家已耶輸有娠諸釋咸瞋疑其非正耶輸遂設火坑誓曰我若為非子母俱滅若真遺體天當為證因抱子投坑坑變為池蓮華捧體王及國人始復不疑於是父王喜曰雖失其子而獲其孫孫為金輪吾亦何恨後佛索令出家父王不許耶輸將上高樓目連飛空取之佛度出家為舍利弗弟子密行第一六結句如是衆所知識大阿羅漢等此結多知識衆也言知識者聞名為知見形為識或見形為知見心為識知識者多故曰衆所知識二少知識復有學無學二千人學無學者前之三果研真斷惑名為學第四阿羅漢果真窮惑盡名曰無學此但舉位明數而不歎德故名為少知識衆耳聖與凡絶交亦不分別多識少識特以希高慕遠者以多識引之藏名隱德退讓者以少識引之然不可以多少之迹失其本也二比丘尼摩訶波闍波提比丘尼與眷屬六千人俱摩訶波闍波提此云大愛道亦云憍曇彌此云衆主以有智故方能愛道故名大愛道為尼衆之主故名衆主乃佛之姨母也會正記云佛成道後十四年姨母求出家佛不許阿難為陳三請佛令阿難傳八敬法若能行者聽汝出家彼云能行遂度出家八敬者一百歲比丘尼見初受戒比丘當迎拜請坐二不得罵謗比丘三不得舉比丘過失比丘得説尼過四於僧中求受大戒五若犯僧殘罪應半月向僧中行摩那埵六當於僧中求教授人七不應在無比丘處夏安居八夏訖詣僧中求自恣人羅睺羅母耶輸陀羅比丘尼亦與眷屬俱耶輸陀羅此云華色亦曰名聞然在家為菩薩之妻天人知識出家為尼衆之主位居無學即名聞也十二遊經出三夫人一瞿夷二耶輸三鹿野未曾有及瑞應經皆云羅睺是瞿夷子涅槃及法華皆云是耶輸子二義云何通或可彼經舉大母此經舉所生釋論云瞿毗陀是寶女不孕即是瞿夷翻明女故知是耶輸子也二菩薩衆六初氣類菩薩摩訶薩具足應云菩提薩埵摩訶薩埵今略提埵二字菩提此云道薩埵此云心大論釋菩提名佛道薩埵名成衆生用諸佛道成就衆生故名菩提薩埵又菩提是自行薩埵是化他自修佛道又化他故二大數八萬人餘經集衆菩薩甚多此經何少或是語其大數或譬王論密事不可率土同謀且言八萬耳三階位皆於阿耨多羅三藐三菩提不退轉阿耨多羅三藐三菩提此云無上正遍知道莫之大無上也其道真正無法不知正遍知也苑師云阿翻無耨多羅翻上三藐翻正也等也遍也菩提翻覺梵語阿跋致地此云不退轉不退有三一位不退二行不退三念不退華嚴明初住得如來一身無量身具三不退若以不次寄次第説者則七信名位不退八信已去名行不退初住已去名念不退又入空名位不退入假名行不退入中名念不退今言初住分具三德名三不退般若是位不退離二死故解脫是行不退諸行具故法身是念不退證實境故此不退轉一句即具兩意成上即是明位起後即是歎德今以不退轉至下能度百千衆生凡十三句作橫竪消文一竪約十地義便二橫約初住義便不退轉者竪論即是歎初歡喜地喜其不退墮二邊入於中道獲三不退故知歎初地也橫論即是歎初發心住一發一切發出過二邊革凡超聖住於中道其心念念寂滅故言得不退轉四歎德皆得陀羅尼陀羅尼此云總持又云遮持竪論即是歎第二地此地名離垢亦名離達離遮諸惡達持衆善即陀羅義故知歡第二地也橫論即是歎初住遮離取相無知無明等障持達般若解脫法身等德故言得陀羅尼樂説辨才樂説辨才即四無礙辨之一也竪論即是歎第三發光地亦名明地內智明外説辨欲知智在説故説有種種樂説最勝故知歎第三地也橫論即是歎初住十信似解尚能以一妙音遍滿三千界何況初住真解口密功德故言樂説辨才轉不退轉法輪不退轉如向釋輪有轉義摧碾義蓋轉法輪即能摧破衆生惑業故也竪論即是歎第四𦦨慧地𦦨能破暗又能焦炷轉法輪自害己惑如焦炷破他迷如除暗故知歎第四地也橫論即是歎初住能分身百世界作佛以能説法教化故言能轉不退法輪供養無量百千諸佛竪論即是歎第五難勝地此地得深禪定用神通力難勝難及於一念頃遍至十方供養諸佛故知歎第五地也橫論即是歎初住得不思議神力遍能承事法界諸佛故言供養無量百千諸佛也於諸佛所植衆德本竪論即是歎第六現前地由得禪定能供養諸佛福資種智種智現前智是德本如種植於地故知歎第六地也橫論即是歎初住得實相本能植衆德也常為諸佛之所稱歎竪論即是歎第七遠行地二智方便出過一切廣修利益稱會佛心故知歎第七地也橫論即是歎初住開佛知見知見己法與諸佛同故為諸佛之所稱歎以慈修身竪論即是歎第八不動地正智不動不出三界但以慈熏身應入五道熏口為説法熏心為設方便正法華具熏三業故知歎第八地也橫論即是歎初住以無緣慈普現色身遍應法界故言以慈修身善入佛慧竪論即是歎第九善慧地深入實際妙徹本源此名義最合故知歎第九地也橫論即是歎初住入祕密藏故言善入佛慧通達大智竪論即是歎第十法雲地法身如虗空禪定如大雲智慧如大雨善入佛法名慧巧用佛法名智故知歎第十地也橫論即是歎初住一心三智無能障礙故云通達大智到於彼岸竪論即是歎第十地內德到三諦之彼岸因中説果又到在不久也橫論即是歎初住事理分究竟故言到於彼岸名稱普聞無量世界竪論即是歎第十地外德由內德深廣致令聲名普聞內外相稱也十地後若開等覺位者以上到於彼岸及今名稱普聞無量世界二句擬之橫論即是歎初住圓德真實與名相稱故言名稱普聞無量世界能度無數百千衆生竪論即是歎第十地餘地度人或一界至九界不名能度此第十地勝前故稱能度須知諸地悉具如上功德而今出沒釋者為人情好異故依十地名便又竪義易解故作此一途消文橫論即是歎初住能為十法界而作依止安立救護故言能度百千衆生圓歎初住何德不攝略言十三句耳初住尚爾況後位耶衆生者劫初男女衆共生世又五陰衆共而生又處處受生故名衆生五列名其名曰文殊師利菩薩文殊師利此云妙德大經云了了見佛性猶如妙德等思益經云雖説諸法而不起法相不起非法相故名妙德西域記云曼殊室利此云妙吉祥首楞嚴經云過去無量阿僧祇劫作佛號龍種上尊王佛央掘經云現在北方歡喜世界作佛號歡喜藏牟尼寶積佛慈恩上生經云未來成佛名曰普現觀世音菩薩梵語婆婁吉低稅此云觀世音能所圓融有無兼暢照窮正性察其本末故稱觀也世音者是所觀之境也萬像流動隔別不同類音殊唱俱蒙離苦菩薩弘慈一時普救皆令解脫故曰觀世音悲華經云若有衆生受苦稱我名念我者為我天耳天眼所見聞不得免苦不取正覺爾時寶藏佛云汝觀一切衆生生大悲心今當字汝為觀世音至本品詳釋得大勢菩薩梵語摩訶那鉢此云大勢至思益經云我投足之處震動三千大千世界及魔宮殿故名大勢至寶藏佛言由汝願取大千世界今當字汝為大勢至常精進菩薩寶積經云是菩薩為一衆生經無量劫隨逐不捨猶不受化無一念棄捨以身心精進故名常精進不休息菩薩思益經云恆河沙劫為一日夜三十日為月十二月為歲過百千萬億劫得值一佛如是值恆河沙佛行諸梵行修習功德然後受記心不休息故名不休息寶掌菩薩寶積經云以何義故名為寶掌謂彼菩薩於諸佛土化衆生時欲以右手遍捫若干諸佛世界即隨所欲而能成辦從其手出佛法僧聲乃至慈悲喜捨之聲又大論云寶掌菩薩七寶從其手出給施一切衆生又令歡喜得至涅槃故名寶掌藥王菩薩觀經云昔名星光從尊者日藏聞説佛慧以雪山上藥供養衆僧願於未來能治衆生身心二病舉世歡喜號為藥王後當作佛名曰樓至如來勇施菩薩至越三界菩薩此七菩薩疏文欠釋補注略出其義云出世法寶遍施衆生而無疲厭故名勇施所證三諦可尊如寶能證三智圓照如月故名寶月圓妙三智能除昏煩熱惱猶如月光清涼破暗故名月光三智圓明無有缺減猶如滿月故名滿月境智冥合有大力用故名大力以大力用遍應衆緣遍拔衆苦故名無量力超越分段變易二種生死故名越三界也跋陀婆羅菩薩跋陀婆羅此云善守思益經云若衆生聞名者畢定得三菩提故名善守或云賢首以位居等覺為衆賢之首故也彌勒菩薩西域記云梅哩麗耶此云慈氏姓也過去為王名曇摩流支慈育國人自爾至今常名慈氏思益經云若衆生見者即得慈心三昧故名慈氏又名阿逸多此云無能勝寶積菩薩什師注淨名經云積聚智慧寶故名寶積也導師菩薩思益經云於墮邪道衆生生大悲心令入正道不求恩報故名導師六結句如是等菩薩摩訶薩八萬人俱三八部衆八初欲界天衆爾時釋提桓因與其眷屬二萬天子俱釋提桓因因陀羅此云能作能作忉利天主故也瓔珞經云過賢劫二千二十四劫作佛號無著世尊復有名月天子普香天子寶光天子此三天子是帝釋內臣如卿相即三光天子也名月是寶吉祥月天子普香是明星天子寶光是寶意日天子四大天王與其眷屬萬天子俱四大天王是帝釋外臣如武將居須彌山腹四面東提頭賴吒此云持國護持國土故亦云安民居黃金埵領乾闥婆富單那南毗留勒叉此云增長令他善根增長故居琉璃埵領薜荔多鳩槃茶西毗留博叉此云廣目亦云雜語能作種種語言故居白銀埵領毒龍毗舍闍北毗沙門此云多聞福德之名聞四方故居水精埵領羅剎夜叉此四天王各領二鬼不令惱人故稱護世次此上有忉利夜摩兜率三天而不列者文略耳自在天子大自在天子與其眷屬三萬天子俱自在即第五化樂天於五欲境變化自娛樂故大自在即第六他化自在天欲得五欲境時餘天為化假他所作以成己樂故即魔王也二色界天衆娑婆世界主梵天王至與其眷屬萬二千天子俱娑婆正云索訶此翻忍其土衆生安於十惡不肯出離從人名土故稱為忍悲華經云云何名娑婆是諸衆生忍受三毒及諸煩惱故名忍土淨名疏云梵是西音此翻離欲除下地繫上升色界故名離欲尸棄此翻頂髻經標梵王後舉尸棄似如兩人依釋論正以尸棄為王梵王是舉位尸棄是顯名恐目一人耳此天居於初禪中間內有覺觀外有言説故得主領為王毗曇論云二禪已上無言語法不得為王若涅槃疏言摩醯首羅居色界頂主大千者乃取尊極為王若曰有言語號令能統上冠下只是尸棄為王光明即二禪天等即等於三禪四禪天也三龍王等衆有八龍王難陀龍王跋難陀龍王難陀此云歡喜跋此云善此兄弟二龍常護摩竭提國雨澤以時國無飢年瓶沙王年為一會以報百姓聞皆歡喜從此得名即目連所降者也娑伽羅龍王娑伽羅此云醎海從居海受名和修吉龍王和修吉此云多頭亦云寶稱德叉迦龍王德叉迦此云現毒亦云多舌阿那婆達多龍王亦云阿耨達此翻無惱阿含經云雪山有池名阿耨達池中有五柱堂龍常處此從池得名摩那斯龍王摩那斯此云大身亦云大力修羅排海水淹善見城此龍縈身以遏海水優鉢羅龍王亦云漚鉢羅此翻黛色蓮華龍依此住從池得名等各與若干百千眷屬俱四緊那羅衆有四緊那羅王至各與若干百千眷屬俱緊那羅此云疑神似人而有一角故號人非人乃天帝法樂之神也居十寶山若身有異相即上奏樂佛説法時諸天弦歌而頌法門即此神也舊云法緊奏四諦妙緊奏十二因緣大緊奏六度持緊總奏前三今言奏四教法門也本住不可思議迹寄弦管歌詠十力也五乾闥婆衆有四乾闥婆王至各與若干百千眷屬俱乾闥婆此云嗅香以香為食亦云香陰其身出香乃天帝俗樂之神也樂者緣幢倒擲之伎也樂音者鼓節弦管也美者幢倒中之勝者也美音者絃管中之勝者也六阿修羅衆有四阿修羅王至各與若干百千眷屬俱正云阿素洛此云無端正男醜女端正故又云非天淨名疏云此神果報鄰次諸天而非天故又云無酒四天下採華醞於大海魚龍業力其味不變瞋妬誓斷故言無酒有二種鬼道攝者居大海邊畜生道攝者居大海底婆稚正云跋稚迦此翻團圓與天帝戰時被縛因誓得脫故以名焉佉羅騫馱此云廣肩胛亦云惡陰即湧海水者毗摩質多羅此云淨心亦名種種疑即舍脂父也羅睺羅此云障持障持日月者也以日光照眼不能見遂舉手障日世人因言日蝕月亦如是七迦樓羅衆有四迦樓羅王至各與若干百千眷屬俱迦樓羅此云金翅其翅金色兩翅相去三百三十六萬里頸有如意珠以龍為食大威德者威勝羣輩又威攝諸龍故大身者身大羣輩故大滿者所噉之龍恆充足己意故如意者頸有此珠故八人王民衆韋提希子阿闍世王與若干百千眷屬俱韋提希此云思惟闍王母也阿闍世此云未生怨十六觀經疏云未生之日相師占之此兒生已定當害父故名未生怨妙樂云母懷之日已有惡心於瓶沙王未生已惡故名未生怨或呼婆羅留支此云無指妙樂云初生相者云凶王令升樓撲之不死但損一指故為名也內人將護呼為善見普超經云阿闍世從文殊懺悔得柔順忍命終入賓叱羅地獄即入即出生上方佛土得無生忍彌勒出時復來此界名不動菩薩後當作佛號淨界如來二總結各禮佛足退坐一面二別序五初衆集序二初衆集威儀爾時世尊四衆圍繞爾時者欲現六瑞之時也梵語路迦那他此翻世尊成論云具上九號為物欽重天上人間所共尊仰故曰世尊四衆者舊謂出家在家各二合為四衆此名局意狹今約一衆更開為四謂發起當機影響結緣發起者權謀智鑑知機知時擊揚發動成辦利益名發起衆當機者宿植德本緣合時熟聞即得道名當機衆影響者古往諸佛法身菩薩隱其圓極匡輔法王如形之有影谷之有響雖無為作而有巨益名影響衆結緣者結謂結搆立機之始緣即緣助能成其終既無擊動之能亦無鎮嚴之用而過去根淺三慧不生現世雖見佛聞法無四悉檀益但作未來得度因緣名結緣衆比丘衆既爾餘三衆亦然合十六衆圍繞者行旋威儀也二衆集供養供養恭敬尊重讚歎供養者通論三業皆是供養別論施其依報名供養卑謹虔禮名恭敬至念專注名尊重發言稱美名讚歎二現瑞序二初此土六瑞六初説法為諸菩薩説大乘經名無量義教菩薩法佛所護念説大乘經者善戒經有七大一法大謂十二部毗佛略也二心大謂求菩提三解大謂解菩薩藏四淨大謂見道淨心五莊嚴大謂福德智慧六時大謂三僧祇行行七具足大謂以相好自嚴得菩提也前六是因大第七是果大大因大果合為大乘經乘以運載為義運歸三德祕藏故也無量義者從一法生其一法者所謂無相無相不相名為實相從此實相生無量法所謂二法三道四果此等諸法名為無量實相為義處從一義處出無量法得為無量法入一義處作序譬如算師從一算下諸算除諸算歸一算由下故除下為除本從一派諸收諸歸一開為合序亦復如是故無量義經謂之從一出多今經謂之收多歸一是以無量義經為法華之序也教菩薩法者無量義處用教菩薩義處即諦理也佛所護念者無量義處是佛自所證得是故如來之所護念經云佛自住大乘是也妙樂云無生死相故言無相涅槃亦無故言不相二法即頓漸三道即三乘四果即羅漢支佛菩薩佛二入定佛説此經已至身心不動結加趺坐者禪門云若半加以左壓右若全加更䟤右以壓左如龍蟠結古往諸佛及弟子衆盡行此法又加趺起惡覺尚生他敬心況入深境界而不適悅天人耶又非世受用法不與外道共能破魔軍煩惱故三昧此云調直定又云正定亦云正受佛説無量義經已復入無量義處三昧者慧定相成非禪不智須先入定非智不禪故先説法説此無量義經竟而更入者是為法華作序耳身心不動者三昧之法持於身心故不動也三雨華是時天雨曼陀羅華至而散佛上及諸大衆曼陀羅此云適意又云白華曼殊沙此云柔軟又云赤華雨此四華者表其當獲佛因佛因者住行向地圓因也小白表習種性十住開佛知見也大白表性種性十行示佛知見也小赤表道種性十回向悟佛知見也大赤表聖種性十地入佛知見也因有趣果之義故云而散佛上四地動普佛世界六種震動光明記云六種者動起踊三種是形震吼擊三種是聲妙樂云此六種者若約事釋新舊不同新云動涌震擊吼𪹼今且用舊搖揚不安名動自下升高名起𡑝壠凹凸名涌隱隱有聲名震砰披耕切磕克合切發響名吼令物覺悟名覺經論略標多云震動即於形聲各標一也於六種中又各有三謂動遍動等遍動直動為動四天下動為遍動大千動為等遍動餘五亦如是合十八種動若約法者表淨十八界也今經言六種動即表住行向地等妙六番破無明無明盤未曾侵毀方將破壞故動地以表之無明若轉即變為明故普佛世界六種震動也六種中光記云擊今疏云覺擊打搏也爆火聲也五衆喜爾時會中比丘至歡喜合掌一心觀佛比丘比丘尼出家二衆也優婆塞優婆夷在家二衆也優婆塞正云塢婆索迦此翻近事男優婆夷正云塢婆斯迦此翻近事女言近事者親承近事諸佛法故梵語提婆此云天天然自然樂勝身勝故名天即欲界等諸天也梵語那伽此云龍龍有四種一守天宮殿持令不落者二興雲致雨益人間者三地龍決江開瀆者四伏藏守轉輪王大福人藏者夜叉正音藥叉此云捷疾亦云勇揵亦云暴惡乾闥婆等如前釋摩睺羅伽亦云摩呼羅伽此云大腹行什曰是地龍而腹行也人非人者八部中有人鬼畜故以人非人等總結也龍鬼等得預法會者以其乘急戒緩故由乘急得聞法由戒緩墮龍鬼也輪王者阿含經云人壽增至二萬歲時鐵輪王出獨治南洲增至四萬歲時銅輪王出治東南二洲增至六萬歲時銀輪王出治東西南三洲增至八萬歲時金輪王出治四天下有金輪寶忽現在前王曰可向東方如法而轉輪即東轉王將四兵隨其後往巡行諸國南西北方亦復如是故曰轉輪聖王衆見雨華地動瑞相非常知甘露將降欣躍內充表大機當發感於勝應是故歡喜合掌一心觀佛也六放光爾時佛放眉間白毫相光至靡不周遍白毫者觀佛海三昧經云佛初生時牽長五尺苦行時長一丈四尺得佛時長一丈五尺其毫中表俱空如白琉璃筒內外清淨從初疑心中間行行種種相貌乃至入涅槃一切功德皆現毫中毫在二眉之間即表中道常德也其相柔軟表樂德卷舒自在表我德白表淨德光照此土他土表自覺覺他照東方者東是四方之初表十住是諸位之始也萬八千者約十八界論百法界千性相即有一萬八千此等境界佛慧未開今應當開故以數表之耳迹門説法生身菩薩朗然見理入於十住乃至十地本門説法法身菩薩增道損生亦四位增長故云靡不周遍二他土六瑞六初見六趣衆生下至阿鼻地獄至盡見彼土六趣衆生阿鼻此云無間成論明趣果受苦時命及形五皆無間也地獄者輔行云從義立名謂地下之獄名為地獄故婆沙論云贍部洲下過五百踰繕那乃有其獄阿迦尼吒此云質礙究竟即色究竟天也六趣者天人修羅地獄鬼畜也趣是向義謂隨所作業向六道受生也二見彼土諸佛又見彼土現在諸佛是現彼佛為五濁故出現於世與此土佛出世意同也三聞諸佛説法及聞諸佛所説經法是現彼佛初從無相一法非頓而頓與此土佛初説華嚴意同也四見四衆得道并見彼諸比丘比丘尼至諸修行得道者是現彼佛非漸而漸與此土佛次説三藏意同也諸修行者三乘修諦緣度之行也得道者得見道修道也五見菩薩行行復見諸菩薩摩訶薩至種種相貌行菩薩道是現彼佛説方等般若衆經與此土佛三藏之後所説意同也種種因緣者昔種善為因今稟教為緣菩薩通乎四教故云種種因緣四教各有四門即種種相貌故知因緣相貌種別無量皆是彼與此同妙樂云因緣謂感應差別信解謂能感不同相貌謂信後行異有此不同故云種種雖復殊途不逾二味六見諸佛涅槃復見諸佛般涅槃者至以佛舍利起七寶塔是現彼佛般若之後開權顯實收無量法還入一法唱入涅槃息化起塔與此土佛説法華涅槃意同也般涅槃者梵音略也具足應云摩訶般涅槃那此云大滅度大即法身滅即解脫度即般若即三德祕藏也舍利或云室利羅亦云設利羅他翻靈骨或翻骨身梵語塔婆或云窣堵波此翻方墳或翻圓冢亦翻高顯謂安置身骨處也起塔之相雖表二經法華之相仍隱若於所見中亦見授記聲聞及説壽長遠已泄正宗之意則不成序今雖見涅槃一相乃含於法華故疏云開權等也三疑念序二初彌勒疑念三初正念六瑞爾時彌勒菩薩作是念至以何因緣而有此瑞神變者神名天心即是天然內慧變名變動即是六瑞外彰法王法力超益一切彌勒不測外變亦不知內慧故興疑念又彌勒值佛植善既多何容不髣佛知應須隱明示暗權言不知耳二念問誰答今佛世尊入於三昧至當以問誰誰能答者三念問文殊復作此念至必應見此希有之相我今當問二大衆疑念二初念六瑞爾時比丘比丘尼至是佛光明神通之相神名天心通名慧性天然之慧徹照無礙故曰神通二念問誰答今當問誰四發問序二初長行二初經家述二初述自疑爾時彌勒菩薩欲自決疑二述他疑又觀四衆比丘比丘尼至衆會之心二正發問二初問此土而問文殊師利言至放大光明二問他土照於東方萬八千土悉見彼佛國界莊嚴二偈頌二初頌上問二初頌問此土六瑞於是彌勒菩薩欲重宣此義以偈問曰西域記云舊曰偈梵本略也或曰偈他梵音訛也今從正音宜云伽陀此翻頌長行之後復有偈頌者龍樹毗婆沙云一隨國土天竺有散華貫華之説如此土序後銘也二隨樂欲不同有樂散説或樂章句三隨生解不同或於散説得解或於章句得解四隨利鈍不同利者一聞即悟鈍者再説方悟又表佛殷勤重説又為衆集前後故有偈也文殊師利導師何故至身意快然得未曾有初一行頌放光瑞導師謂佛也良以説法入定能導於人故稱導師次一行半頌雨華瑞梵語旃檀或曰此方無故不翻或云義翻與藥能除病故旃檀香風者風本無香而香為奇特香本屬華華香如檀故曰旃檀香風夫天華至妙豈有色而無香此表因運至果如華之有香風華既集地地則嚴淨此表因若趣果果則嚴淨也次半行頌地動瑞次一行頌衆喜瑞也二頌問他土六瑞六初問六趣衆生眉間光明照於東方至受報好醜於此悉見衆生是能趣之人生死是所趣之處善惡業緣是能趣之因受報或好或醜是所趣之果也二頌彼佛説法又覩諸佛聖主師子至照明佛法開悟衆生此四行偈謂彼佛説頓教逗大根性也聖主者聖即是主主謂主伴是諸菩薩伴中之主故云聖主梵語塢波僧訶此云師子又云狻猊大經云師子發聲震吼為壞詐師子為欲試自力等喻佛能摧伏魔軍示衆十力等故云聖主師子又師子吼者名決定説前兩教主非師子吼説非決定不談真實第一義故演説經法微妙第一者即如此土先照高山説華嚴教也雖云兼別最初純大故云第一前之兩教猶雜煩惱故非清淨赴機未遍不名柔軟以彼説別圓二教故名清淨柔軟也教諸菩薩者即如此土七處等會無聲聞也別圓並詮中道故云梵音深妙稱理當機故云令人樂聞各於世界者一者以萬八千為各二者主伴不同為各別圓二教各有四門名為種種等照明佛法開悟衆生者即如此土始見我身入如來慧也妙樂云無三乘事故言佛法三問他土四衆三初開聲聞小乘若人遭苦厭老病死為説涅槃盡諸苦際此頌具明四諦若人遭苦苦含因果即苦集二諦厭老病死即道諦為説涅槃即滅諦若人遭苦而造惡業苦不得盡若人遭苦而造善業苦亦不盡若人遭苦於外道法中而求解脫但增見長非苦亦不盡若人遭苦厭苦復厭集感佛説涅槃者此人則能盡諸苦際也涅槃者肇法師涅槃論曰此云滅度言其大患永滅超度四流斯乃小乘真空涅槃也二開緣覺中乘若人有福曾供養佛志求勝法為説緣覺若人有福者聲聞三生種福支佛百劫種福形彼聲聞故言有福此是修福多也曾供養佛是供佛多也志求勝法者謂深求緣起勝妙之理是聞法多也梵語辟支迦羅此云緣覺因觀十二因緣覺真諦理故言緣覺別行記云支佛修行不立分果深觀緣起久種三多福慧既隆預侵二習故居聲聞上三開六度大乘若有佛子修種種行求無上慧為説淨道以真慈悲能紹佛種故言佛子修於六度故言種種行志求佛道故言無上慧六度中無六蔽如藥中無病故言淨道非畢竟淨也妙樂云修種種行及無上慧諸教共有今形凡小亦得種種及無上名非畢竟者且約三藏六度言之藥中無病名為淨耳四結前并開後文殊師利我住於此至如是衆多今當略説見聞若斯者又見佛子等即見也演説經典及為説等即聞也大綱略足故云若斯此是結前也及千億事等即是開後也開後者續後而説故云今當略説五問修菩薩行三初總略問我見彼土恆沙菩薩種種因緣而求佛道妙樂云恆沙者恆即恆河亦云殑伽河阿耨達池四面各出一河東銀牛口出殑伽河南金象口出信度河西琉璃馬口出縛芻河北頗胝迦師子口出徙多河各繞池一匝流入四海惟殑伽沙細而多外人所計以為福河入洗滅罪佛亦順俗故常指之又佛説法多近此河故以為喻二次第問六初問檀那三初問捨財或有行施金銀珊瑚至欄楯華蓋軒飾布施軒大夫以上車也以物飾軒故曰軒飾二問捨身復見菩薩身肉手足及妻子施求無上道身肉等是內身妻子等是外身三問捨命又見菩薩頭目身體欣樂施與求佛智慧捨頭目即捨命而不言法者讓後般若也二問尸羅文殊師利我見諸王至剃除鬚髮而被法服諸王剃除鬚髮而科云問戒者正約比丘論持戒也在家施易戒難出家施難戒易故約比丘明戒也妙樂云往詣等者表往非餘故指佛所所問尊極云無上道所棄不輕故云樂土身心俱離故云剃除法服者即袈裟也瓔珞經云若天龍八部鬬諍念此袈裟生慈悲心意令比丘安可不忍又龍得一縷金翅不吞具明如僧祇律三問忍辱或見菩薩而作比丘獨處間靜樂誦經典忍有三種間林邃谷惡人惡獸忍耐無瞋即生忍自節守志即苦行忍為求佛道即第一義忍又而作比丘即苦行忍獨處間靜即生忍樂誦經典即第一義忍也四問精進又見菩薩勇猛精進入於深山思惟佛道夫深山可畏非窳怯者所居唯勇進者能安之傍若無物思修實相念念不休進求佛道也五問禪定二初問根本禪又見離欲常處空間深修禪定得五神通離欲者藏通二教修根本背捨亦修不淨等觀離欲界欲別教兼離二乘欲圓教又離順道法愛欲深修禪定者發初禪一品此定未深乃至九品傳傳為深此定轉變自在能發諸通凡夫但五通二乘具六別教菩薩讓佛分有無漏亦但稱五通也圓教約理初後皆具六通若從實説初住已去亦但分得無漏通耳六通者一天眼二天耳三他心四宿命五身如意六漏盡今言得五神通者未得究竟漏盡通也二乘斷見思盡雖云具六若望菩薩亦但五也別圓無明未盡分證無漏故亦但稱五也二問出世禪又見菩薩安禪合掌以千萬偈讚諸法王此是別圓之禪靜散不相妨不起滅定現諸威儀如修羅琴不拊而韻無緣無念有感則形故能安禪讚佛也六問般若二初問自行復見菩薩智深志固能問諸佛聞悉受持智深者慧窮理本也志固者誓願廣大也此即二種莊嚴能問能持也二問化他又見佛子定慧具足至破魔兵衆而擊法鼓定慧具足者別圓地住方乃具足無量喻者即是種種方便諸教之中引無量譬類助顯第一義也破魔兵衆者空觀破四魔假觀次第破八魔中觀圓破八魔梵語魔羅此云能奪命死魔實能奪命餘煩惱魔五陰魔天主魔能作奪命因緣又能奪智慧命故四魔皆云能奪命也又翻為障能為修道者作障礙故前三魔可知天主魔者垂裕記云第六天上別有魔羅所居他化天攝既破魔已應轉法輪而云擊法鼓者初發心住便成正覺百佛世界作佛以真妙梵音警悟衆生即是圓擊梵輪法鼓輔行云八魔者謂陰等四及無常等四古譯經論魔字從石自梁武來謂魔能惱人字宜從鬼三不次問七初問禪定二初問入捨禪又見菩薩寂然宴默天龍恭敬不以為喜不以為喜即捨禪妙樂云捨禪者第四禪也亦可別圓忘懷之捨忘彼禪故名之為捨二問入悲禪又見菩薩處林放光濟地獄苦令入佛道婆沙論云初禪修悲易二禪修喜易三禪修慈易四禪修捨易此中悲禪既云化他豈獨初禪故知一一禪皆應云慈乃至喜捨三問精進又見佛子未嘗睡眠經行林中勤求佛道未嘗睡眠即是般舟念佛等法門也睡眠者止觀云心神昏昏為睡六識暗塞四大倚放為眠三問尸羅又見具戒威儀無缺淨如寶珠以求佛道威儀無缺即是初不缺戒淨如寶珠即是第十究竟戒但舉初後中間可解大論明十戒一不缺二不破三不穿四不雜五隨道六無著七智所讚八自在九隨定十具足即究竟也今十始終悉是菩薩故皆求佛道四問忍辱又見佛子住忍辱力至皆悉能忍以求佛道忍辱者法界次第云內心能安忍外所辱故名忍辱有二種一者生忍二者法忍生忍有二一於恭敬供養中能忍不著則不生憍逸二於瞋罵打害及蚊蚋等能忍則不生瞋惱是為生忍法忍亦二一者非心法謂寒熱風雨飢渴老病等二者心法謂瞋憂欲慢諸邪見等於此二法能忍不動是名法忍力者阿含經云力有六種小兒啼為力女人瞋為力國王憍為力羅漢進為力諸佛悲為力比丘忍為力遺教經云若不能忍受惡罵之毒如飲甘露者不名入道智慧人也妙樂云初半行能忍人次半行所忍境下半行用忍意五更問禪又見菩薩離諸戲笑至億千萬歲以求佛道離戲笑是却掉悔蓋離癡眷屬是除瞋蓋親近智者是除疑蓋一心除亂是却貪蓋攝念山林是除睡蓋妙樂云初一行半明所離次半行明離意以諸教禪皆離五蓋意在佛道如寶積經中迦葉云有四法急走捨離百由旬外一利養二惡友三惡衆四同住多戲笑或瞋鬬等六問檀那二初四事施或見菩薩肴膳飲食至流泉浴池施佛及僧妙樂云初一行二事謂飲食湯藥次一行衣服次二行臥具房舍等肴𦵔也膳美食也二結成施如是等施種種微妙歡喜無厭求無上道七問般若三初不可説而説般若或有菩薩説寂滅法種種教詔無數衆生至理寂滅本不可説有因緣故亦可得説詔爾雅訓導二不可觀而觀般若或見菩薩觀諸法性無有二相猶如虗空諸法性空本不可觀順性而修故可觀也三而説而觀論般若又見佛子心無所著以此妙慧求無上道心無所著即是心行處滅心不著故必離言説即是言語道斷言語道斷泯前初行不可説而説心行處滅泯前次行不可觀而觀雖復雙泯而説而照六問佛般涅槃六初標佛滅起塔文殊師利又有菩薩佛滅度後供養舍利二問塔數多少又見佛子造諸塔廟無數恆沙嚴飾國界三明塔量縱廣寶塔高妙五千由旬縱廣正等二千由旬四明塔相莊嚴一一塔廟各千幢幡珠交露幔寶鈴和鳴幔莫羊切幕也交謂交結露謂顯露五明供養衆具諸天龍神人及非人香華伎樂常以供養六結供養塔廟文殊師利諸佛子等至如天樹王其華開敷天樹王者即忉利天波利質多羅樹此云圓生大經云樹高百由旬根深五由旬枝葉布五十由旬其華香遍五十由旬光照八十由旬二頌請答二初舉疑述請三初舉見此土事佛放一光我及衆會見此國界種種殊妙二舉見他土事諸佛神力智慧希有放一淨光照無量國初二句歎光本本即神力智慧言諸佛者舉諸顯一正指釋迦希有者正歎爾前不然故云希有第三句歎光體由二事故其光乃淨第四句歎光用即所照國也過萬八千方云無量故前立數且從所表三請答決衆疑我等見此得未曾有佛子文殊願決衆疑見此者見二土瑞也與一化異故云未曾諸佛子等疑事不輕故重啓之非專為己故云衆也二釋四伏難二初正釋四衆欣仰瞻仁及我至及見諸佛此非小緣此四行偈釋伏難也言伏難者文殊內心搆難不肯時答其意有三一此瑞希奇不可倉卒輕爾有判二智衆如海謙光推高三靳固前却生衆渴仰故以伏難潛而拒之彌勒彰灼釋難意亦有三一瑞大疑大若不為釋憂兕在懷妨聞正説二衆海乃多機在仁者三闔衆瞻仁故知注誠殷重所以彰言釋難請令時答初伏難者因正請生請云佛子文殊願決衆疑文殊仍此起初伏難汝云衆疑衆未曾疑若疑應問衆既不疑我何所決彌勒即以第一偈釋云四衆欣仰瞻仁及我及我欲令我問瞻仁欲得仁答文殊因此起第二難衆同有疑不易可答待佛出定然後決疑彌勒即用第二偈釋若有疑在懷憂兕不泰應以時答復知如來何時定起故言佛子時答決疑令喜文殊因此起第三難我與仁者同居學地欲測佛意微共籌量獨令我答於理不可彌勒即以第三偈釋我亦微心下思踟蹰兩楹為説妙法為當授記故言佛坐道場所得妙法為欲説此為當授記文殊因此起第四難若如汝説即是釋疑何煩我答彌勒即以第四偈釋安得以我猶豫之心而判大事故言示諸佛土此非小緣文殊伏難既窮謙光亦止此發問序中文殊伏乎四難則是潛也彌勒釋之四偈則是顯也文殊為賓彌勒為主此四伏難光宅受於次師次師受於江北釗師既是先賢文外巧思天台承用若下答問序中彌勒伏乎四疑則是潛也文殊釋之四偈則是顯也彌勒為賓文殊為主此亦文外巧思出自天台非傳他疏也二結請文殊當知四衆龍神瞻察仁者為説何等五答問序二初長行四初自惟忖答二初標章爾時文殊師利語彌勒菩薩摩訶薩至如我惟忖惟者思惟忖者籌量惟今如昔忖昔如今然文殊古佛豈應不知迹示思惟也二正惟忖今佛世尊欲説大法至擊大法鼓演大法義欲説大法者惟昔諸佛説無量義經後則開權顯實收無量以歸一忖於今佛既説無量義已亦應開權顯實會無量以歸一一者即大法也雨大法雨者惟昔諸佛天雨四華之後一雨所潤普入圓因住行向地忖於今佛雨華之後亦應一雨所潤皆成佛因住行向地故言雨大法雨也吹大法螺者吹螺改號惟昔四衆見瑞歡喜障除機動即改人教行理皆一忖今衆喜亦應障除機動改人教行理皆一所改既深故言吹大法螺也擊大法鼓者嚴鼓誡兵譬破無明惟昔地動已後即有六番破無明賊忖於今佛地動已後亦應六番破無明賊聲教極妙故言擊大法鼓也演大法義者惟昔諸佛放白毫光後即説法華忖於今佛放光已後亦應即説法華故言演大法義也如是五句悉是惟昔判今忖今類昔也二略曾見答諸善男子我於過去諸佛至故現斯瑞初以己智惟忖今以略曾見答欲令衆生咸得聞知者聞即聞慧知即思慧收無量歸一改三乘教理六番破無明等開示悟入佛之知見故言一切世間難信之法也三廣曾見答三初引最初一佛同三初時節諸善男子如過去無量無邊不可思議阿僧祇劫梵語阿僧祇劫此云無數時二標名爾時有佛號日月燈明至天人師佛世尊日月燈明是別號如來等是通號佛佛應身皆具此十故名通號此十號義若總略釋者無虗妄名如來良福田名應供知法界名正遍知具三明名明行足不還來名善逝知衆生國土名世間解無與等名無上士調他心名調御丈夫為衆生眼名天人師知三聚名佛具茲十德名世間尊此十號名經論開合不同大經釋為十一句大論第三合無上士調御丈夫為一句世尊為第十句瓔珞經云一者如來乃至十者佛陀具足十號名世中尊三説法三初明初説頓教同演説正法初善中善後善至具足清白梵行之相初中後三善者即是頓教序正流通三段名為時節善其義深遠即是頓教了義之理二乘不測其邊底故言深遠名為義善其語巧妙即是頓教之文八音所吐會理直説悅菩薩心名為語善純一無雜不與二乘共即是頓教獨一善具足者具明界內界外滿字之法即是頓教圓滿善清白無二邊瑕穢即是頓教調柔善梵行之相者即是頓教無緣慈善此文殊引古佛頓教七善與今佛頓説七善同也二頓後開漸教同為求聲聞者至為諸菩薩説應六波羅蜜聞佛聲教故曰聲聞苦集滅道四皆審實不虗故名四諦止觀云苦則三相遷移生異滅集則四心流動貪嗔癡等分道則對治易奪菩提煩惱更互相傾滅則滅有還無滅二十五有還無餘涅槃涅槃者即小乘真空涅槃也上問若人遭苦為説涅槃今文殊引古佛次頓之後亦開此聲聞乘以答斯問也梵語辟支迦羅此云緣覺因觀十二因緣覺真諦理故名緣覺十二因緣者一無明無所明了故曰無明即過去一切煩惱二行造作名行即過去業也三識既有惑業意識妄念投托母胎名之為識四名色名是心色是質五六入六根成此胎中根有入塵之義故名為入六觸出胎已後由根對塵是名為觸七受因六塵觸六根即領納前境名之為受八愛貪于五欲名之為愛九取於五塵境生取著心名之為取十有體即是業如過去行由善惡業當生三有故名為有十一生從有還受後世五衆之身是名為生十二老死從生五衆之身熟壞是名為死無明行等展轉感果為因互相由藉為緣故名十二因緣也上問若人有福志求勝法今文殊引古佛次頓之後亦開此中乘以答斯問也六波羅蜜者布施持戒忍辱精進禪定智慧是為六波羅蜜此云到彼岸生死為此岸涅槃為彼岸由修此六度能到涅槃故也亦云事究竟菩薩為衆生遍修一切事行滿足故也上問佛子修種種行今文殊引古佛次頓之後亦開六度菩薩乘以答斯問也如上三乘皆明古佛頓後説漸與今佛説漸同也三頓漸後顯實同令得阿耨多羅三藐三菩提成一切種智一切種智者觀音玄義云能於一種智知一切道知一切種一相寂滅相種種行類能知能解名一切種智即佛智也二引中二萬佛同次復有佛亦名日月燈明至所可説法初中後善初引一佛備舉頓漸説法與今佛同中引二萬佛但舉説頓與今佛同故言所可説法初中後善後引一佛但舉開漸與今佛同故言説大乘經名無量義等所以然者文殊見時皆具五味但文殊巧説為避繁文指初一佛可知故中後引同但互舉耳頗羅墮此云捷疾亦云利根三引最後一佛同三初曾見事與今已同其最後佛未出家時至已於千萬佛所植諸善本昔佛八子今佛一子數雖不等並出同居之土俱示有子一八赴緣別有所表生一子表一道清淨生八子表八正道其數雖異今取有子事同也言發大乘意者秪是四弘誓也梵行者慈悲喜捨因中化他之行也二曾見事與今今同二初現相同二初明此土六瑞是時日月燈明佛至照東方萬八千佛土靡不周遍此明昔佛自土六瑞悉與今同初至佛所護念是説法同二從説是經已至身心不動是入定同三從是時至及諸大衆是雨華同四普佛世界六種震動是地動同五從爾時會中至一心觀佛是衆喜同六從爾時如來至靡不周遍是放光同二明他土六瑞如今所見是諸佛土總云如今所見則知昔佛他土六瑞亦與今同二疑念同彌勒當知爾時會中至欲知此光所為因緣昔佛會中疑念與今彌勒疑念是同也二曾見事與今當同六初因人同時有菩薩名曰妙光有八百弟子昔佛定起因妙光説經今佛定起因身子説經正是所因人同昔佛八子師於妙光如來定起對告妙光又付託妙光今佛子羅雲亦師身子佛定起亦對告身子迹門竟又付託身子是故同也疑者云妙光是菩薩身子是聲聞云何是同昔事已彰稱為菩薩今事未發且言聲聞比及發迹身子是大菩薩非同何謂昔妙光垂迹何必不作聲聞特是文殊巧説方便隱顯耳弟子者淨名疏云夫師有匠成之能學者有資稟之德資則捨父從師敬師如父師之謙讓處之如弟二説法同是時日月燈明佛至教菩薩法佛所護念三時節同六十小劫不起于座至若身若心而生懈倦昔佛説經六十小劫不起于座今佛説經五十小劫謂如半日即是時節同也妙樂云六十與五十食頃與半日數似小異皆即長而短故云同也須信六十小劫經文非虗聞法之志加以佛威一坐經時忘其久耳梵語劫簸此云分別時節以劫初人壽十歲時子年倍父年如是增至八萬四千歲後百年減一歲如是減至十歲此一增一減為一小劫如是二十番增減為一中劫成住壞空各二十番增減為一大劫空劫亦言二十番增減者且約住劫數量言之今釋迦出現於世正當二十小劫中第九減劫也三唱滅同日月燈明佛於六十小劫至當入無餘涅槃昔佛説法華即唱入滅亦如迦葉佛以土淨故於法華唱滅即入滅也今佛説寶塔品中明如來不久當入涅槃化道已足唱滅事齊也梵魔等者梵即色界主亦三界主魔為欲界主沙門此云勤息勤行衆善止息諸惡故婆羅門者此云淨行外道中出家云淨行種也五授記同時有菩薩名曰德藏至阿羅訶三藐三佛陀授記者聖言説與曰授果與心期曰記昔佛授德藏菩薩記今經授聲聞記豈得是同昔化事已成故言授菩薩記正是會三歸一聲聞得記也若説昔授聲聞記者佛從定起更何所論文殊巧談故不説授聲聞記耳多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知十號中略舉三號也六滅後通經同五初明時節佛授記已便於中夜入無餘涅槃同緣出世薪盡火滅乃究竟涅槃也二出其人佛滅度後妙光菩薩持妙法蓮華經三明久遠滿八十小劫為人演説四明所化二初正明八子行成久已得佛日月燈明佛八子至其最後成佛者名曰然燈所以引此八子八百者近則釋疑密開壽量釋疑者或謂彌勒補處為大文殊非補處為小小不應答大不應問故舉彌勒是昔八百之一八百既是妙光弟子宜應有問妙光昔親對佛先復為師故應釋今彌勒六瑞之疑密開壽量者妙光是釋迦九世祖師孫今成佛祖師為弟子師弟無定將密顯生非生滅非滅之意也妙樂云若論八子皆師妙光則八子皆以妙光而為父師既云八子展轉授記雖同師妙光應先記長子餘者次第展轉為師故得妙光居八代之首八子最後名曰然燈然燈既為釋迦之師是故妙光為釋迦九代祖也生非生等者既師弟更互當知師弟生實非生爾前曾滅滅亦非滅然燈者大論云太子生時一切身邊光如燈故故云然燈以至成佛亦名然燈釋尊修行名儒童時二僧祇滿遇然燈佛得受記莂二八百之一方成今住補處八百弟子中有一人至供養恭敬尊重讚歎五會古今彌勒當知爾時妙光至求名菩薩汝身是也四分明判答今見此瑞與本無異至教菩薩法佛所護念二偈頌三初頌廣曾見等同爾時文殊師利於大衆中欲重宣此義而説偈言我念過去世無量無數劫至令入佛智慧二頌最後佛三同三初頌曾與己同佛未出家時所生八王子見大聖出家亦隨修梵行二頌曾與今同二初頌此彼六瑞同二初頌此土六瑞時佛説大乘經名無量義至現諸希有事初一行頌説法次一行頌入定次二句頌雨華長出天鼓自鳴表無問自説也次半行頌衆喜次半行頌地動次一句頌放光現諸希有事者即總頌諸瑞也二頌他土六瑞五初頌見六趣衆生同此光照東方萬八千佛土至各供養其佛初半行重明總瑞次一句正舉六趣故云一切次一句中總明生死因果及處生死兩字總標也業明生死之因報明生死之果處即二十五有次一行明所依土前長行文及問答中皆不云光色至此方云者前豈應無玻璃或云塞頗胝迦此云水玉琉璃具云吠琉璃此云青色寶亦翻不遠謂西域有山去波羅奈城不遠山出此寶因以名焉次一行明諸趣供養雖云供養意表機成當知前亦非無也二頌見彼土諸佛同又見諸如來自然成佛道至內現真金像自然成佛道者方便道則加心修習發真道即是自然任運與理合也自然成佛道是報身琉璃是法身本淨金像是應物現形三頌聞佛説頓教同世尊在大衆敷演深法義此則將法約人法既深玄當知必逗大機開頓教也此頌上純一無雜七善之文妙樂云言將法約人者但云深法不語菩薩約法須之四頌見聲聞等三乘即是昔佛開漸教法同一一諸佛土聲聞衆無數至斯由佛光照此即將人約法人既二乘必知開三藏説也初一行頌上為聲聞人説應四諦等也雖不頌出緣覺兼攝在中次二行頌上六度大乘也行施忍辱等等餘禪慧二度耳而以比丘為六度菩薩者前發問偈中既云又見菩薩而作比丘於此名比丘為菩薩義亦無妨妙樂云言將人約法者但云聲聞不云四諦約人須之亦可從或有諸比丘去至説法求佛道四行總頌菩薩即六度義足以第三行是禪第四行是智五頌見菩薩種種因緣即是開方等般若教同又見諸菩薩深入諸禪定至説法求佛道二頌四衆疑念同爾時四部衆見日月燈佛至是事何因緣三頌曾與當同六初頌因人同天人所奉尊適從三昧起至令妙光歡喜世間者隔別名世間差名間世間眼者言菩薩為世間出世間之眼目化導於人也二頌説法同説是法華經三頌時節同滿六十小劫不起於此座至悉皆能受持妙光奉持昔佛之法亦如身子受今佛付囑也四頌唱滅同佛説是法華令衆歡喜已至當入於涅槃此是昔佛唱滅與今佛同尋繼也汝一心精進當離於放逸諸佛甚難值億劫時一遇此是昔佛囑纍亦與今佛同如遺教經云汝等比丘我滅度後當珍敬波羅提木叉如暗遇明如貧得寶等世尊諸子等聞佛入涅槃各各懷悲惱佛滅一何速此時衆聞佛入滅而生悲泣亦與今佛同如大經云涕泣盈目遍體血現如波羅奢華此即重法慕人之志也聖主法之王安慰無量衆我若滅度時汝等勿憂怖此昔佛慰諭時衆亦與今佛同如遺教經云汝等比丘勿懷悲惱若我住世一劫二劫會亦應滅會而不離終不可得自利利人法皆具足若我久住更無所益五頌授記同是德藏菩薩於無漏實相至亦度無量衆無漏實相謂圓妙三諦之法也無漏者收攝三諦無漏失也實相者離虗妄分別之相名為實相即無相之相也六頌滅後通經同五初頌滅後時節衆益佛此夜滅度如薪盡火滅至以求無上道如薪盡火滅者小乘佛以果報身為薪智慧為火慧依報身身滅智亡故云薪盡火滅大乘以機為薪逗應為火衆生機盡應形亦滅故云薪盡火滅二頌能弘經人名號是妙光法師奉持佛法藏三頌行經時節久近八十小劫中廣宣法華經四頌所益弟子果滿二初頌已成弟子是諸八王子妙光所開化至度脫無量衆天中天者涅槃經明四種天一者世間天如諸國王二者生天從四天王至非非想天三者淨天謂四果支佛四者義天謂十住菩薩以見一切法是空義故今佛超出四天名天中天二頌當成弟子是妙光法師時有一弟子至其數無有量釋師子者華嚴經云譬如大師子吼小師子聞悉皆勇健一切禽獸遠避竄伏佛師子吼諸菩薩等若聞讚歎菩提心聲長養法身妄見衆生慚伏退散今以師子喻釋迦佛故云釋師子也五結會古今彼佛滅度後懈怠者汝是妙光法師者今則我身是三頌分明判答三初頌説大乘經我見燈明佛本光瑞如此以是知今佛欲説法華經二頌教菩薩法今相如本瑞是諸佛方便至充足求道者上之六句但明欲説之由誡衆令生渴慕耳下二句正頌上教菩薩法三頌佛所護念諸求三乘人若有疑悔者佛當為除斷令盡無有餘是佛所護故為斷疑故此一行是頌佛所護念又從我見燈明佛至此凡四行即是約行五章但缺教相初一偈是妙法為名第二偈是實相為體第三偈是一乘因果為宗第四偈是斷疑生信為用天台大師約五義申釋首題蓋本於此前彌勒釋四伏難令文殊必定有答此中是文殊斷四伏疑使彌勒莫復更問初第一疑因文殊廣引先佛曾説法華故彌勒潛疑欲問諸佛赴緣人時各異古佛雖名法華今佛何必如此文殊即以第一偈斷云我見燈明佛本光瑞如此以是知今佛欲説法華經此斷其疑名之問也彌勒因此又疑自有名同義同自有名同義異此名何所顯召文殊即以第二偈斷云今相如本瑞是諸佛方便今佛放光明助發實相義此斷其疑體之問也彌勒因此又疑實相無相何人會之文殊即以第三偈斷云諸人今當知合掌一心待佛當雨法雨充足求道者此斷其疑宗之問也彌勒因此又疑佛雨法雨止洽菩薩亦潤二乘文殊即以第四偈斷云諸求三乘人若有疑悔者佛當為除斷令盡無有餘此即斷其疑用之問也彌勒聯翩構疑文殊頻煩為斷既事窮理盡即得之於懷可謂善於問答具二莊嚴光宅但知述於釗師釋四種伏難使文殊必答顯彌勒之美不見文殊釋四伏疑令彌勒不問抑妙德之能此義出自天台非傳他疏妙法蓮華經方便品第二方便有三一方者法也便者用也善用偏法逗會衆生即前三教方便也此義可釋他經非今品意二方便者門也門名能通通於所通方便權略皆為真實作門真實得顯功由方便從能顯得名故以門釋方便如經云開方便門示真實相此義可釋他經非今品意三方者祕也便者妙也妙達於方即是真祕點內衣裏無價之珠與王頂上唯有一珠無二無別指客作人是長者子亦無二無別如斯之言是祕是妙如經云惟我知是相十方佛亦然止止不須説我法妙難思故以祕釋方以妙釋便正是今品之意故言方便品也二八品正説文句云從此品訖分別功德品十九行偈或至偈後現在四信弟子文盡名為正説分若作兩正説從此下訖授學無學人記品是迹門正説今且逐近就迹門正説更為兩初方便品初略開三顯一二初開三顯一二初長行并十七行半偈歎二智二初長行二初寄言歎二智二初明諸佛權實三初雙歎二初經家提起爾時世尊從三昧安詳而起告舍利弗爾時者即指文殊答問竟時也佛常在定何故言起此有所示往古諸佛説此經時必前入無量義定今佛亦爾入定緣理安心實相出定令他亦安心實相內安實相方起化他故言安詳而起也告舍利弗者其小乘中智慧第一將欲因其破小智顯大智故先告之以動羣輩耳二歎智二初歎實智諸佛智慧甚深無量非三教化他權實故言諸佛顯自行之實故言智慧此智慧體即一心三智甚深無量者即稱歎之辭也明佛實智竪徹如理之底故言甚深橫窮法界之邊故言無量無量甚深竪高橫廣譬如根深則條茂源遠則流長實智既然權智例爾二歎權智其智慧門難解難入一切聲聞辟支佛所不能知道前方便有進趣之力故名為門從門入到道中道中稱實道前為權也難解難入者歎權智之辭也不謀而了無方大用七種方便不能測度十住始解解即開也十地為入舉初與後中間難示難悟可知而別舉聲聞緣覺所不能知者執重故別破之耳華嚴頓照聾啞瞽聵故云不知方等彈斥保住草菴故言不知般若轉教無心希取一餐之意故言不知今大機啓發放光動地彼此今古諸佛道同由懷疑惑故言不知利根菩薩節節能知鈍同二乘是亦不知也又智慧門者自有方便智慧為門得入佛智慧如瓔珞經云二觀為方便道得入中道第一義諦是也自有佛智慧為門得入佛智慧即是今經所歎其智慧門是也妙樂云此中須以十地為道前妙覺為道中證後為道後故知文意在因之位除真如外凡有修入皆屬於權惟以果位真如究滿為清涼池此約自行因果相望以釋若通約事理等釋之此則不然豈以道前而無實豈以道後而無權耶故難解難入略歎道前因位始末耳二雙釋二初釋實智所以者何佛曾親近至盡行諸佛無量道法所以者何者雙冠二智何故實智甚深良由外值佛多稟承至要故實智甚深復由內行純厚盡行道法故實智無量無量則釋橫廣甚深則釋竪高二釋權智勇猛精進名稱普聞其智慧門難解難入良由勇猛精進能入難入之門既入門已澤被無疆物欽勝德故名稱普聞亦可勇猛精進能入法門即釋權智深名稱普聞即釋權智廣觀上歎權智文無深廣之語例實智此義則成三雙結二初結實智成就甚深未曾有法稱理究竟故言成就到彼岸底故言甚深昔所未説故未曾有此結成實智也二結權智隨宜所説意趣難解稱機適會故言隨宜非七方便所知故言難解此結成權智也二明釋迦權實三初雙歎二初歎實智舍利弗吾從成佛以來若實智不圓佛道不成既云成佛一成一切成此歎實智也二歎權智種種因緣種種譬喻至引導衆生令離諸著四十餘年以三種化他權實逗會衆生故言種種因緣也譬喻者小乘中以芭蕉水沫為譬大乘中以乾城鏡幻等為譬廣演者能於一法出無量義也無數方便者即七種方便也引導衆生令離諸著者説散十善離三途著説靜十善離欲界著説三藏離見思著説菩薩法離涅槃著説佛法離順道法愛著二雙釋所以者何如來方便知見波羅蜜皆已具足如來即是釋實智從真如實相中來而得成佛道故名如來方便即是釋權智由於方便善巧故能種種因緣説也知見波羅蜜者即是雙舉權實知見也一切種智名實知佛眼名實見道種智名權知法眼名權見悉到事理邊底故悉名波羅蜜言皆已具足者權實悉究竟也三雙結二初結實智舍利弗如來知見廣大深遠如來知見如前説廣大明橫深遠明竪如此實智非橫非竪寄言往歎論其橫竪照無限極如函大蓋大也妙樂云無限故非橫無極故非竪如函大等者用不二智稱不二理也二結權智無量無礙力無所畏至成就一切未曾有法無量即佛地四無量心也無礙即佛地四無礙辨也力即十力十力者一是處非處力佛知一切因緣果報定相從是因緣生如是果報從是因緣不生如是果報如是種種是處不是處佛悉遍知無能壞無能勝故名力也二業智力佛知一切衆生過去未來現在諸業諸受三定力佛知一切諸禪三昧四根力佛知他衆生諸根上下五欲力佛知他衆生種種欲樂六性力佛知世間種種無數性七至處道力佛知一切道至處相八宿命力佛知種種宿命一世二世乃至百千世中如是姓名苦樂壽命長短等九天眼力佛見衆生死時生時端正醜陋若墮惡道若生善道十漏盡力佛諸漏盡故自知我生已盡不作後有無所畏即四無所畏也一一切智無所畏二漏盡無所畏三説障道無所畏四説盡苦道無所畏此四通名無所畏者於八衆中廣説自他智斷既決無失則無微致恐懼之相故稱無所畏禪即實相之禪定即首楞嚴定解脫者亦窮八脫之源三昧者禪定解脫至初住時破二十五有即王三昧也深入無際者結成竪深成就一切未曾有法者結成橫廣也妙樂云問實相之禪與楞嚴定何別答不同何者於根本禪達即實相名為達禪首楞嚴定本性健相故二絶言歎二智二初舉絶歎由二初舉絶歎之由舍利弗如來能種種分別至悅可衆心種種分別巧説諸法者舉權智也言辭柔軟悅可衆心者舉實智也前寄言歎從實舒權故前實後權今絶言歎卷權歸實故前權後實妙樂云既言悅可衆心赴物應是舉權那云舉實等衆心乃以得實為悅故也二指絶言之境舍利弗取要言之無量無邊未曾有法佛悉成就取要言之是指實境無量無邊未曾有法是指權境又舉要是創指之端無量無邊是指權未曾有法是指實言此二法佛悉成就修道得故此那可説二正絶言歎二初正絶言歎止舍利弗不須復説此法深寂言語道斷體不可説故止而歎之設慈悲為説聞不能解傷其善根是故止之也二釋止歎意二初佛最上人成就修得最上法故不可説二初明最上人權實橫滿不可説所以者何佛所成就第一希有難解之法成就對不成就第一對不第一希有對不希有難解對不難解即是橫明成就等修道得故故不可説妙樂云成就對不成就者以果對因因即因人自他相對即是橫也第一對不第一希有對不希有者圓中極果方云第一希有降此之外皆非第一希有難解不難解可知二明最上人權實竪深不可説唯佛與佛乃能究盡惟釋迦與十方諸佛究竟實相邊底如十五日之月體無不圓光無不遍如此竪深修道得故故不可説妙樂云前句既以成就等言對他為橫今有究盡之言故對因明竪二明權實法甚深境不可思議故不可説二初略標權實章諸法實相諸法權也實相實也即實而權權外無實即權而實實外無權斯謂同體妙權妙實法華開顯如點鐵成金妙在此也妙樂云此是法華之理本諸教之端首釋義之關鍵衆生之依止發心之憑杖權謀之用體迷悟之根源果德之理本一化之周窮五時之終卒得此十義以消諸異坦然無誤所以先歎能依之智即五佛之權實權實何依所謂妙境二廣釋權實相所謂諸法如是相至如是本末究竟等相以據外覽而可別名為相性以據內自分不改名為性主質名為體功能為力搆造為作習因為因助因為緣習果為果報果為報初相為本後報為末所歸趣為究竟等南嶽大師讀此文皆云如故呼為十如也天台云依義讀文凡有三轉一云是相如是性如乃至是報如二云如是相如是性乃至如是報三云相如是性如是乃至報如是若皆稱為如者如名不異即空義也若作如是相等點空相性名字施設即假義也若作相如是等如於中道實相之是即中義也分別令易解故明空假中得意為言空即假中約如明空一空一切空點如明相一假一切假就是論中一中一切中非一二三而一二三不縱不橫名為實相此之十如乃十界上因果之法一法界具十如是十法界具百如是又一法界具九法界則有百法界千如是九界為權佛界為實細論各具權實然此權實不可思議乃是三世諸佛二智之境以此為境何法不收此境發智何智不發故荊溪云指的妙境出自法華正指此也二十七行半偈頌長行二初頌寄言歎二智二初合頌歎二佛二智二初頌歎諸佛二智爾時世尊欲重宣此義而説偈言世雄不可量諸天及世人一切衆生類無能知佛者世即三世世必有方言三世十方諸佛智慧雄猛故云世雄頌上諸佛智慧也不可量者頌上甚深無量此頌諸佛實智也次三句頌上諸佛權智二頌歎釋迦二智佛力無所畏解脫諸三昧及佛諸餘法無能測量者佛者頌吾成佛也正頌實智力無畏等頌諸功德是頌權智餘法者即指化他之權是實智之餘助耳正頌上種種因緣等也妙樂云前行但云世雄世必有方故知是頌諸佛今直云佛力以前文中釋迦權智具有力無畏等知是頌釋迦也二合頌二佛釋歎結歎本從無數佛具足行諸道至我已悉知見本從無數佛具足行諸道頌上佛曾親近百千諸佛盡行道法也甚深微妙法頌上成就甚深未曾有法也難見難可了頌上意趣難解也於無量億劫行此諸道已頌上知見波羅蜜皆已具足此二句舉因具足道場得成果舉果具足我已悉知見一句頌上如來知見廣大深遠也二頌絶言歎二智五初頌不思議境如是大果報種種性相義頌上十如是大即妙也十界不同故云種種但舉初後中間可知義字兼頌究竟等也義謂義理一究竟之言有空假中義理故也二追頌絶言境我及十方佛乃能知是事頌上取要言之佛悉成就也三追頌絶言歎是法不可示言辭相寂滅頌上止止不須説也實相非方所故不可示非言語道故言辭相寂滅四頌舉不知人八初總揀不入者諸餘衆生類無有能得解即七方便人也二揀能入者除諸菩薩衆信力堅固者即圓教十信故言信力堅固者也長行明究竟佛知今頌中明初信知互舉耳三揀二乘不知諸佛弟子衆曾供養諸佛至其力所不堪一切漏三界見思也最後身二乘極果也四舉身子不知假使滿世間皆如舍利弗盡思共度量不能測佛智五舉諸弟子不知正使滿十方皆如舍利弗至亦復不能知六舉支佛不知辟支佛利智無漏最後身至莫能知少分七舉發心菩薩不知新發意菩薩供養無數佛至不能知佛智新發意者發心語通或可六度菩薩三僧祇未斷惑名為發心或可指上諸天及世人等自攝得六度而發心之語別擬通別二教初心之人皆名新發意菩薩也八揀不退菩薩不知不退諸菩薩其數如恆沙一心共思求亦復不能知通教三八人地至第七已辦地斷界內惑名位不退別教初住至七住亦斷界內惑亦名位不退八住至十向名行不退等亦所不知也五頌唯佛能知實相境又告舍利弗無漏不思議至十方佛亦然無漏不思議者頌上結要舉權實二智所止之境也無漏名同應思義別收三諦無漏失權實智無漏失故名無漏即權而實即實而權故不可思議也甚深微妙法一句頌上第一希有難解之法我今已具得等三句頌上唯佛與佛乃能究竟也明諸佛道同同皆究竟故云唯我知是相十方佛亦然二三行半正略開顯動執生疑二初諸佛顯實三初諸佛道同舍利弗當知諸佛語無異二勸令生信於佛所説法當生大信力三正顯真實世尊法久後要當説真實二釋迦開三三初正明開三告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者上明諸佛顯實今明釋迦開三顯實必開三開三必顯實互明一邊以顯佛佛道同也將明二乘之非故言逮得涅槃者又解我令解苦縛逮得涅槃即擬六度菩薩乘謂六度行前度他故故言我令脫苦縛後取無漏故言逮得涅槃此義推之知是六度乘也二正斥三乘佛以方便力示以三乘教三出立三之意衆生處處著引之令得出立三之意意是權引離諸苦故非為真實但是方便門耳二騰疑致請二初敘疑二初經家敘二初敘千二百疑爾時大衆中至阿若憍陳如等千二百人二敘四衆等疑及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷上斥三乘皆是方便故執動疑生今敘疑但言二乘者以其執重疑深故偏舉耳若至下陳疑中即云求佛諸菩薩大數有八萬亦皆有疑故知三乘僉疑偏舉二乘耳二正生疑二初疑佛二智二初總疑二智各作是念今者世尊何故殷勤稱歎方便二別疑二智二初疑實智而作是言佛所得法甚深難解二疑權智有所言説意趣難知一切聲聞辟支佛所不能及因聞諸佛語無異要當説真實從此生疑何者佛昔説三乘智慧同證不差但餘習有盡不盡耳今忽稱歎如來二智非我所及是故疑佛二智也二疑己所得佛説一解脫義至而今不知是義所趣一解脫者藏教三人同一解脫也此是自疑所得三乘聖道是真出要我修此理亦到涅槃而今忽言皆是方便未知何者真實故言不知是義所趣此從上斥三為偽而生是疑二正請決文有三請二止第一請二初長行二初陳疑爾時舍利弗知四衆心疑至甚深微妙難解之法此下有三請二止就前為三止蓋佛預知三周得益前後不俱故三抑俟其三請也今先陳二疑第一下疑權智甚深下疑實智也二陳請我自昔來至殷勤稱歎甚深微妙難解之法我自昔下陳已請今者四衆下陳衆請也二偈頌六初頌疑實智爾時舍利弗欲重宣此義而説偈言慧日大聖尊久乃説是法三智圓明能破癡暗故云慧日二頌疑權智自説得如是力無畏三昧至諸佛之所得三明三乘疑無漏諸羅漢及求涅槃者至願佛為解説初句明聲聞次句明六度菩薩何以得知止云逮得涅槃者此中稱及及者此菩薩自求涅槃又以及他故異二乘知是菩薩也後二行明緣覺兩足尊者謂福慧二種莊嚴悉皆滿足為世間尊也四明身子疑於諸聲聞衆佛説我第一至為是所行道身子智慧第一不了佛之權實二智定是果上究竟之法定是因中所行之道五明佛子疑佛口所生子合掌瞻仰待願出微妙音時為如實説聞佛説法法身得生故言佛口所生子六總明同疑請諸天龍神等其數如恆沙至欲聞具足道第二止第一止指上文止舍利弗不須復説爾時佛告舍利弗至皆當驚疑第二請舍利弗重白佛言至聞佛所説則能敬信爾時舍利弗欲重宣此義而説偈言法王無上尊惟説願勿慮是會無量衆有能敬信者第三止佛復止舍利弗若説是事至將墮於大坑爾時世尊重説偈言止止不須説我法妙難思諸增上慢者聞必不敬信第三請爾時舍利弗重白佛言至多所饒益爾時舍利弗欲重宣此義而説偈言無上兩足尊願説第一法至則生大歡喜願説第一法者融師云由前斥三乘是偽又聞諸佛法久後要當説真實在二乘邊未知法華是實但據斥三非真三外必更有法故云願説第一法二后七品半廣明開三顯一三初兩品半為上根人法説五初正明法説二初長行三初許説三初順許爾時世尊告舍利弗汝已殷勤三請豈得不説初是順豈得下許也二誡許汝今諦聽善思念之吾當為汝分別解説初是誡吾當下許也諦聽是聞慧善思是思慧念之是修慧三揀許説此語時會中有比丘至即從座起禮佛而退初是揀汝今下許也初五千在座故如來三止今將許説威神遣去故禮佛而退所以者何此輩罪根深重至有如此失是以不住五濁障多名罪重執小翳大名根深未得三果謂得三果未證無學謂證無學名增上慢有如此失者謂障執慢三種之失也世尊默然而不制止上聞開三顯一言略義隱猶未生謗足作繫珠因緣去則有益若聞廣開三顯一乖情起謗住則有損是故不制止也爾時佛告舍利弗我今此衆無復枝葉純有貞實無復枝葉者枝葉細末不任器用此等執方便者於大非器大品云攀附枝葉棄於根本是人為不黠即是此義也舍利弗如是增上慢人至汝今善聽當為汝説應知上慢不全無法但以淺位自謂增上而慢他人名增上慢退亦佳矣者既以小自翳復妨他大光今退無謗法之𠍴復無障他之過故云佳矣上枝葉未去故如來三止貞實願聞故身子四請師弟鑑機非徒靳固也汝今善聽即結許也二受旨舍利弗言唯然世尊願樂欲聞唯愈水切諾也又應聲唯之聲速而質諾之辭緩而文三正説二初明四佛章廣上諸佛權實二初總明諸佛章四初歎法希有佛告舍利弗如是妙法至如優曇鉢華時一現耳時乃説之者諸佛同出五濁必前開三如今世尊四十餘年始顯真實久久稀疏故云時乃説之久不説者為人不堪故時未至故五千未遣故今人已堪時已至五千已去決定説大乘故云時乃説之優曇華者此云靈瑞亦云瑞應三千年一現現則金輪王出表三乘調熟已後方説妙法授法王記般泥洹經云閻浮提內有尊樹王名優曇鉢有實無華若金華生者世乃有佛施設論云繞贍部洲有輪王路廣一踰繕那無輪王時海水所覆無能見者若輪王出海水減少金輪路現此華乃生作金輪王之先兆也二説無虗妄舍利弗汝等當信佛之所説言不虗妄汝等當信者勸信無虗妄也此理至深理與昔異此言至妙言與昔反此行至普行與昔乖此人至勝勝於昔劣還指客作四種之粗而今皆妙恐物生謗故勸信也妙樂云理教行人皆云至者實之極也若至今經無過上故故皆云至三開其方便三初開舍利弗諸佛隨宜説法意趣難解佛隨三種機宜説方便教故言諸佛隨宜説法而佛意在實物莫能解故云意趣難解二釋所以者何我以無數方便至演説諸法舉今佛之權能釋諸佛之方便巧慧同故借此釋彼如我以無數方便者諸佛開權亦如我也三結四示其真實五初標勝人法是法非思量分別之所能解唯有諸佛乃能知之是法非思量等者此有兩義或作結開權或正作顯實結開權者佛意難知唯佛與佛能了稟教者謂三諸佛知一耳作顯實者即屬後文初標人法舉無分別法惟是佛所知佛以無分別智解知無分別法即是顯實義也二標出世意所以者何諸佛世尊唯以一大事因緣故出現於世初總釋次分字釋總釋者諸佛覺知如實之相乘此實道出應於世秪令衆生得此實相唯為此事曾無他事次分字釋者一則一實相也非五非三非七非九故言一也其性廣博博五三七九故名為大諸佛出世之儀式故名為事衆生有此機感佛故名為因佛乘機而應故名為緣是為出世之本意而今開三者為一弄引耳雖説種種道其實為一乘即此義也妙樂云非五七九等者以三五等皆是方便故皆云非三藏三乘加人天五也加通教二乘七也加通別菩薩九也三重示出意舍利弗云何名諸佛世尊至出現於世將欲分別更重提起為解釋之端耳四正釋真實四初理一二初正釋諸佛世尊欲令衆生開佛知見至出現於世此釋理一復為四意一約四位二約四智三約四門四約觀心一約四位釋者諦境不可知見唯佛智佛眼乃能知見若二智四眼則不能知見今取圓教住行向地分得佛眼佛智則能知見故寄此四位以釋理一即約位顯理也開者即是十住初破無明開如來藏見實相理如日出暗滅眼目有用故名為開緣修破惑故云使得清淨示者即是十行惑障既除知見體顯法界衆德顯示分明故名為示悟者即是十向障除體顯法界行明事理融通更無二趣故名為悟入者即是十地事理既融自在無礙任運從阿到茶入薩婆若海故名為入二約四智釋者一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種別解惑之相一一皆示佛知見也三一切智知一切法一相寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類相貌皆識即入佛知見也三約圓教四門釋者空門一空一切空即開佛知見也有門一有一切有即示佛知見也亦空亦有門一切亦空亦有即悟佛知見也非空非有門一切非空非有即入佛知見也能通則四所通則一開示悟入是能通之門所知所見是所通之理也四約觀心釋者觀於心性三諦之理不可思議此觀明淨名為開雖不可思議而能分別空假中心宛然無濫名為示空假中心即三而一即一而三名為悟空假中心非空假中而齊照空假中名為入是為一心三觀而分開示悟入之殊也所以約四種釋者見理由位位立由智智發由門門通由觀觀故則門通門通故智成智成故位立位立故見理見理故名為理一也二結成舍利弗是為諸佛以一大事因緣故出現於世結成理一也昔方便教亦得義論開示悟入而非佛知見故是權今明佛知見故是實實即理一也二人一佛告舍利弗諸佛如來但教化菩薩就昔方便謂教化三乘理實而言但化菩薩如彼窮子自謂客作賤人長者所觀實為己子即是人一也三行一諸有所作常為一事唯以佛之知見示悟衆生三乘衆行名之為諸為圓故諸即是一事此行何所至到唯趣佛之知見即是行一意也四教一舍利弗如來但以一佛乘故至無有餘乘若二若三圓頓之教名一佛乘自別教已去皆名有餘之説即不了義非佛一乘今言但以一佛乘者純説佛法圓教乘也無餘乘者無別教帶方便有餘之説無二者無般若中所帶之義無三者無方等中所對之三也五總結法同舍利弗一切十方諸佛法亦如是二列三世佛章三初過去佛二初開權舍利弗過去諸佛至而為衆生演説諸法二顯實是法皆為一佛乘故至究竟皆得一切種智一佛乘是教一是諸衆生下即行一妙樂云是法及釋迦章如此兩字並指權是實故名顯實故知述其施權意在開也二未來佛二初開權舍利弗未來諸佛當出於世至而為衆生演説諸法二顯實是法皆為一佛乘故至究竟皆得一切種智三現在佛三初標出世意舍利弗現在十方無量百千至多所饒益安樂衆生如諸佛章中唯以大事因緣出現於世此亦如是唯以饒益安樂衆生而出於世也二開權是諸佛亦以無量無數方便至而為衆生演説諸法三顯實二初別明現在教一行一是法皆為一佛乘故至究竟皆得一切種智二總明三世人一理一舍利弗是諸佛至欲令衆生入佛之知見故但教化菩薩是人一欲以下是理一二釋迦章廣明上釋迦權實五初開方便權舍利弗我今亦復如是至而為説法我即現在釋迦佛也先三後一如四佛不異故言亦復如是知諸衆生有種種欲者即是五乘根性欲也過去名根現在名欲未來名性深心所著者即是根也方便者即是隨宜開三乘權法也妙樂云知諸衆生去感也種種因緣去應也二顯四真實舍利弗如此皆為得一佛乘一切種智故如此等者指權是實也佛乘是教一一切種智所知即理一能知即行一能得佛乘能得種智即兼人一也三舉濁釋權二初標其意舍利弗十方世界中尚無二乘何況有三將舉五濁先標其意上已説諸佛開權顯實未明隱實施權其法清淨湛如一空尚無帶二般若帶三方等之權況有單三三乘單五加人天之權秪為五濁障重實不得宣須施單三單五之權亦施帶三帶二之權故言於一佛乘分別説三分別説於若帶二帶三之三若單五單三之三也二舉五濁四初唱數舍利弗諸佛出於五濁惡世二列名所謂劫濁煩惱濁衆生濁見濁命濁劫濁無別體劫是長時剎那是短時但約四濁立此假名名為劫濁衆生濁亦無別體攬見慢果報三濁立此假名名衆生濁煩惱濁指五鈍使為體見濁指五利使為體命濁指連持色心為體若論五濁相者四濁增劇聚在此時劫濁也瞋恚增劇刀兵起貪欲增劇飢饉起愚癡增劇疾疫起三災起故煩惱倍隆煩惱濁也諸見轉熾見濁也粗斃色心惡名穢稱衆生濁也摧年減壽命濁也妙樂云空成壞三而無劫濁於住劫中準悲華經八萬至三萬亦未有濁至二萬歲為五濁始四濁增聚故小劫名濁三體相如是如是者明五濁體相也濁體及相不可具説但略云如是也四結釋舍利弗劫濁亂時至於一佛乘分別説三劫濁亂時即劫濁衆生垢重即衆生濁慳貪是煩惱濁嫉妬是見濁成就不善根不善之言通於煩惱濁見濁諸根成就即連持為命即命濁秖由此土衆生五濁障重能障大乘故如來於一佛乘分別説三四揀偽敦信二初正揀真偽二初若不聞不知非真弟子舍利弗若我弟子至非阿羅漢非辟支佛如世弟子隨順師法繼嗣傳燈若不聞不知則無法可順何謂弟子如來昔説五濁開三汝隨順得涅槃得聞得知名為弟子今五濁既除為汝説一何意不聞不知不聞者即不聞教一不知者即不知行一非真即非理一非弟子即非人一二聞不信受成增上慢人又舍利弗是諸比丘至若不信此法無有是處此敦其使信也何者汝自謂再不受身是最後身汝雖出分段尚有變易土生身尚無量實非後身汝自謂究竟應變易土生死盡若未盡者實非究竟未得謂得豈非增上慢耶若實得者不起上慢知非究竟信於究竟故云若不信此法無有是處二開除釋疑二初開除二初揀除佛滅度後者則不成增上慢人除佛滅度後現前無佛若佛在世正説此經不信不受非真羅漢成增上慢若佛滅後方得羅漢者偏執權經不信圓法聽許非增上慢二好人難得深經難解亦不成增上慢所以者何佛滅度後至是人難得佛雖入滅此經尚在不信不受應是上慢耶即得開除佛滅度後雖有此經解其文義者此人難遇致令羅漢不信不解亦聽許非增上慢二釋疑若遇餘佛於此法中便得決了恐疑云若佛滅後解經人難遇得羅漢者即永入涅槃耶即釋云是人雖生滅度之想捨命已後便生界外有餘之國值遇餘佛得聞此經即便決了妙樂云方便有餘土佛名為餘佛南嶽云餘佛者四依也羅漢遇之聞經決了又羅漢修念佛定見十方佛為説此經便得決了又凡夫行人苦到懺悔見十方佛為説亦得決了五明無虗妄三初勸信釋迦實説舍利弗汝等當一心信解受持佛語二勸信諸佛無虗諸佛如來言無虗妄諸佛道同彌加信受二結成不虗之意無有餘乘唯一佛乘二偈頌二初頌上許答二初頌揀許二初頌五千退席爾斷世尊欲重宣此義而説偈言比丘比丘尼有懷增上慢至不堪受是法上慢我慢不信四衆通有但出家二衆多修道得禪謬謂聖果偏起上慢在俗矜高多起我慢女人智淺多邪辟不信不自見其過者三失覆心藏玼揚德不能自省是無慚人也若自見過是有羞僧也於戒有缺漏者律儀有失名缺定共道共有失名漏無道定等故內起惡覺如玉含瑕無律儀故外動身口如玉露玼覆罪自得故名護惜小智者不得學無學智而有世間小智妄謂有漏以為無漏故言小智也糟粳者是五千等但有世間禪無無漏禪定潤故如糟但有文字解無理慧之實故如粳又糟粳無酒米譬其無大機下文枝葉譬其非好器悉不任用故須遣之妙樂云糟粳者若依世禪以得無漏如糟出酒從文入理如粳出米既無無漏反計世禪如棄酒存糟不得真理反封文字如棄米存粳二頌衆已清淨此衆無枝葉惟有諸貞實二頌誡許舍利弗善聽二頌上正答二初頌四佛章四初總頌諸佛章五初頌施權二初頌正施權法諸佛所得法無量方便力至優波提舍經諸佛所得法者修道得於諸權法也正當自行體內之權即此法體亦不可説以方便故為衆生説成化他權故云無量方便力而為衆生説衆生心念等者頌上隨宜説法也現起希望名念法門不同名種種隨宜之相即是照九法界機説七方便法總言九七不可定判故言若干過去所習名性現在欣樂名欲善惡業者七方便傳傳迭論善惡佛悉知是己等者佛以權智照諸方便性欲然後以諸因緣譬喻隨其所宜説九部經修多羅此云契經有通有別通則聖教之都名別則為十二部中直説法相者名修多羅伽陀此云孤起不重頌者是也本事者説本昔世界事也本生説本昔受生事也未曾有者佛現種種神力衆生怪未曾有也因緣者一切佛語緣起事皆名因緣也譬喻者如云月隱重山舉扇喻之風息太虗動樹訓之祗夜此云重頌重頌上直説修多羅也優波提舍此云論議已上九部言昔施權為七方便人説也若十二部更有方廣無問自説授記二頌結施權意鈍根樂小法貪著於生死至為是説涅槃前世根鈍今世無機不堪聞大故言不行深妙道前世貪著障重今世衆苦所惱唯可聞小故言為是説涅槃也二頌顯實四初頌理一我設是方便令得入佛慧至以故説是經令得入佛慧頌上一大事因緣也決定説大乘總頌上開示悟佛知見也入大乘為本頌上入佛知見也二頌人一有佛子心淨柔軟亦利根至皆成佛無疑頌上諸佛如來但教化菩薩也上直云教化菩薩頌中廣出諸方便人皆成實人有佛子心淨即別教之人為此佛子説大乘經得記心喜即成圓教真實之人聲聞若菩薩者聲聞兼得緣覺若菩薩兼得六度通教等諸菩薩皆成佛無疑者即是七種方便無非佛子也三頌教一十方佛土中唯有一乘法至説佛智慧故頌上如來但以一佛乘為衆生説法無有餘乘若二若三也無二者無通教中半滿相對之二也無三者無三藏中之三乘也如此等二三皆是假名引導衆生即方便教也今但一佛圓乘故云説佛智慧也四頌行一諸佛出於世唯此一事實至此事為不可頌上諸有所作常為一事也終不以小乘濟度於衆生頌上常為一事之意也佛自住大乘以此度衆生頌上唯以佛之知見示悟衆生也後一行釋不以小乘度之意三頌勸信二初舉果勸信二初舉內心若人信歸佛如來不欺誑至而獨無所畏如來不欺誑者明佛心清淨無明慳垢衆惡已斷淨心中説故是可信二明外色我已相嚴身光明照世間無量衆所尊為説實相印身相炳著光色端嚴內無暗惑外有光明則口無欺誑為衆所尊説大乘印則可信受釋論云諸小乘經若有無常無我涅槃三印印之即是佛説修之得道無三法印即是魔説大乘經但有一法印謂諸法實相名了義經能得大道若無實相印是魔所説故身子云世尊説實道波旬無此事二舉因勸信二初舉昔誓舍利弗當知我本立誓願欲令一切衆如我等無異我昔誓願非但自誓菩提亦誓衆生同入佛慧今酬誓故説是亦可信二明願滿如我昔所願今者已滿足化一切衆生皆令入佛道今菩提既滿衆生亦入汝既自證佛慧亦驗我誓不虗妙樂云問佛初立誓誓度一切今衆生尚多願云何滿答且從一期總而言之但令衆生得入佛乘即名願滿是故經云如我無異四舉五濁四初總明五濁障重令大不生若我遇衆生盡教以佛道無智者錯亂迷惑不受教衆生受苦諸佛興悲悲苦相對故云相遇遇則盡令入於佛道故五濁不能障大無智不受故云障大也二別廣明五濁障過患之相五初衆生濁我知此衆生未曾修善本至備受諸苦毒善本者真如實相也不依此種善根故不感大也五欲者謂色聲香味觸並能生於行者須欲之心故名五欲即諸惡之本也癡即無明愛即貪愛從癡有愛故現生苦惱後墮地獄餓鬼畜生也止觀明五欲過患者色如熱金丸執之則燒聲如塗毒鼓聞之必死香如憋龍氣嗅之則病味如沸蜜湯舌則爛如蜜塗刀舐之則傷觸如臥獅子近之必囓二命濁相受胎之微形世世常增長薄德少福人衆苦所逼迫形即五陰陰亦名世壽命連持諸陰入世初從薄酪已至老死故名世世增長下二句明命濁相也翻譯名義明胎中五位初七日名歌羅邏此云凝滑狀如凝酥二七日名頞部曇此云疱狀如瘡疱三七日名蔽尸此云凝結狀如就血四七日名健男此云凝厚漸堅硬故五七日名鉢羅奢佉此云形位具諸形故三見濁相入邪見稠林若有若無等依止此諸見具足六十二五見交加如稠林密茂若有是常見若無是斷見因此二見生六十二如外道計我有四句色即是我離色是我色大我小我住色中我大色小色住我中四陰亦爾是為二十三世為六十并根本斷常二見為六十二四頌惱濁深著虗妄法堅受不可捨我慢自矜高諂曲心不實五劫濁相於千萬億劫不聞佛名字亦不聞正法如是人難度長時無佛法即是劫濁又上來四濁集在時中故名劫濁如是人難度者五濁障故不信一乘則不可度也三明為治五濁障故先説小是故舍利弗我為設方便説諸盡苦道示之以涅槃此説三藏四諦也苦即苦諦苦必有因即集諦道即道諦涅槃即滅諦四明為大説小小治濁大興我雖説涅槃是亦非真滅至來世得作佛析三界妄盡滅色取空則非真滅若體達無明本無常寂即是真滅雖本無常寂若不修道無由契會故言佛子行道已來世得作佛也五頌不虗三初明釋迦先開三我有方便力開示三乘法二明諸佛後顯實一切諸世尊皆説一乘道三正明不虗除疑今此諸大衆皆應除疑惑諸佛語無異唯一無二乘前權後實誠言不虗勿生疑也二頌過去佛章二初頌開三過去無數劫無量滅度佛至演説諸法相二頌顯一二初略頌上三一是諸世尊等皆説一乘法化無量衆生令入於佛道皆説一乘法是頌教一化無量衆生是頌人一令入於佛道是頌理一兼得行一也二約五乘廣頌顯一二初總約五乘顯一實又諸大聖主知一切世間至助顯第一義天人羣生類是舉諸乘以明人一更以異方便是舉諸行以顯行一兼得教一第一義即是理一若用圓妙正觀此即實相方便不名為異若用七方便觀助顯第一義者名異方便二別約五乘以顯一三初開菩薩乘若有衆生類值諸過去佛至皆已成佛道若作五乘釋者但是六度菩薩乘若作七方便釋者兼得通別菩薩乘何者三教大乘皆行六度而運心有異相心行六度即三藏菩薩無相即通教菩薩非相無相次第行六度即別教菩薩今但列六度未知定判屬誰尋上文云更以異方便者非獨六度菩薩即三教菩薩方便也六度中前五是福後一是慧故云種種福慧昔聞法皆已成教一昔六度行皆已成行一如是諸人等皆已成人一皆已成佛道皆已成理一二開二乘乘諸佛滅度後若人善軟心如是諸衆生皆已成佛道此開聲聞緣覺皆入一乘何以得知大品歎阿羅漢心調柔軟又淨名云住調伏心是賢聖行是以知之昔善軟心皆成行一諸衆生是人一成佛道是理一妙樂云二乘文中有人理行不云兼教者秪是文略三開天人乘二初約天人小善成緣因種子以顯實十初捨財造塔明天乘諸佛滅度已至若於曠野中積土成佛廟因時至心傾財捨寶果時任運自然受樂故是天乘也木樒者長安有木名樒亦任造像金光明云以佛舍利如芥粟許置小塔中三十三天已有自然果報即其義也二戲沙作塔明人業乃至童子戲聚沙為佛塔如是諸人等皆已成佛道因時泛泛悠然作善果時作意勤求得樂故是人業也三志心建像明天業若人為佛故建立諸形像至皆已成佛道優婆塞戒經不許用膠得失意罪而此經用者古師云外國用樹膠耳妙樂云造像功德經有十一種功德一者世世眼目清潔二者生處無惡三者常生貴家四者身如紫磨金色五者豐饒珍玩六者生賢善家七者生得為王八者作金輪王九者生梵天壽命一劫十者不墮惡道十一者後生還能敬重三寶又云若人臨終發言造像乃至如麥能除三世八十億劫生死之罪四戲畫作佛明人業乃至童子戲若草木及筆或以指爪甲而畫作佛像五結成建像者顯實如是諸人等漸漸積功德至度脫無量衆諸人皆成人一漸漸積功德具足大悲心即成行一佛道即成理一既已成佛復能化他但化菩薩即是教一六諸塵供養明天業若人於塔廟寶像及畫像至皆已成佛道唄者或云唄匿此云讚頌貝大螺也七散心塵供明人業若人散亂心乃至以一華供養於畫像漸見無數佛八身業供養明天人業或有人禮拜或復但合掌乃至舉一手或復小低頭五體著地是上禮即天業合掌低頭是中禮即人業九結成供養者顯實以此供養像漸見無量佛至如薪盡火滅非但自入佛道亦能化度衆生入於涅槃子果縛盡名曰無餘機薪既盡應火云亡故云薪盡火滅也十口業供養明人業若人散亂心入於塔廟中一稱南無佛皆已成佛道南無或云那謨或云南摩此翻歸命或翻度我大品云佛言若有一人稱南無佛乃至畢苦其福不盡二約聞法則成了因種子以明顯實於諸過去佛在世或滅後若有聞是法皆已成佛道例上皆具相無相非相無相至心散心等五乘種子今皆開入一實至心聞一句是天業散心聞一句是人業三頌未來佛章二初頌開三未來諸世尊其數無有量至以無量方便二頌顯一四初頌人一度脫諸衆生入佛無漏智若有聞法者無一不成佛二頌行一諸佛本誓願我所行佛道普欲令衆生亦同得此道三頌教一未來世諸佛雖説百千億至是故説一乘知法常無性者實相常住無自性乃至無無因性無性亦無性是名無性佛種從緣起者中道無性即是佛種迷此理者由無明為緣則有衆生起解此理者由教行為緣則有正覺起欲起佛種須一乘教是為頌教一也四頌理一是法住法位世間相常住於道場知已導師方便説是法住法位者衆生正覺一如無二悉不出如故皆以如法為位也分局定限故名為位世間相常住者十界依正生住異滅之相名世間相以即理故皆常住也故法智尊者云生法即性故常住異滅即性故常即性之常非常無常言偏意圓斯之謂歟又世間相常住者出世正覺以如為位亦以如為相位相常住世間衆生亦以如為位亦以如為相豈不常住世間相既常住豈非理一於道場知已者此舉果釋成開權顯實道場朗然斯理久暢物情障重方便施三故云導師方便説妙樂云染淨之法皆名是法染謂衆生淨即正覺一一皆住真如法位故云是法住法位四頌現在佛章三初頌化意天人所供養現在十方佛至亦説如是法二頌顯實知第一寂滅以方便力故雖示種種道其實為佛乘知第一寂滅即頌理一其實為佛乘或頌教一或頌行一三頌開權知衆生諸行深心之所念至隨應方便説二頌釋迦章二初略頌上權實為下總譬作本二初頌顯實今我亦如是安隱衆生故以種種法門宣示於佛道今我亦如是者我即釋迦一化之主同以一實教化衆生故言如是為下有大長者譬作本也安隱者即大涅槃常樂住處此處寂靜無五濁障故名安隱安隱即對不安隱謂三界有五濁障名不安隱即為下火宅譬作本衆生即是五道受化之徒為下五百人譬作本種種法門即對不種種為下唯有一門譬作本妙樂云如來本以一門利物事不獲已施種種門施權之意本在顯實故云宣示於佛道二頌開權我以智慧力知衆生性欲方便説諸法皆令得歡喜智慧力者即權智力也知衆生性欲者即是五道根性有三乘差別為下三十子譬作本諸法即三乘法也又云知衆生性欲者鑑小機也方便説諸法者正施權也皆令得歡喜者隨宜稱機也二偈雖略收佛一化開權顯實原始要終罄無不盡故稱略頌為下總譬本也二廣頌上六義為下別譬作本六初頌上五濁三初明佛有能見之眼舍利弗當知我以佛眼觀佛眼觀見為下長者能見譬作本明佛在法身地上以常寂佛眼圓照羣機若根利濁輕則以盧舍那像説一乘法若根鈍濁重則脫瓔珞以老比丘像驚入火宅方便開三秪是于時鑑機故言我以佛眼觀見也若觀色法應用天眼若分別根機應用法眼云何言以佛眼見耶佛眼圓通舉勝兼劣又四眼入佛眼皆名為佛眼故也二頌上明所見五濁五初衆生濁見六道衆生貧窮無福慧妙樂云貧窮等為衆生濁者貧故由無福癡故由無慧癡貧衆生聚在一處故名衆生濁也二頌命濁入生死險道相續苦不斷妙樂云入生死為命濁者於生死中又加險道險道之中命易斷故即短壽處而猶相續為命濁也三頌煩惱濁深著於五欲如𤛆牛愛尾以貪愛自蔽盲瞑無所見𤛆牛者獸如牛而尾長説文云西南夷長髦牛也牛愛其尾就身護尾人愛其尾故殺其身譬人貪五欲而害其身亦若是也四頌劫濁不求大勢佛及與斷苦法妙樂云劫中無佛故名為濁四濁生此亦無所求劫若有佛雖濁能破故經云唯我一人能為救護五頌見濁深入諸邪見以苦欲捨苦或云外道五熱炙身欲望捨苦反得苦報或云諸見即是受受即是苦行此苦因望欲捨苦豈可得耶妙樂云六十二多故名為諸由此見故則有三受見家之受故云見即是受三受皆苦以此苦受欲捨苦者無有是處三明起大悲應赴機為是衆生故而起大悲心為五濁衆生故大悲熏心應入三界施設方便引趣佛慧三頌施化宜不得三初明用大擬宜我始坐道場觀樹亦經行至微妙最第一始坐道場者至理無時假時化物為化之初故言始也事釋者道場在摩竭提國西南去尼連河不遠佛初在此處修治得道故言道場坐此樹下得三菩提故名道樹感樹恩故觀察念地德故經行道成賽澤之時欲以大法擬宜衆生也樹地無有分別豈須報恩未曾有經云秪以通化傳法名報耳三七日者過去因果經云佛成道初一七日思惟我法妙無能受者二七日思惟衆生上中下根三七日思惟誰應先聞法即至波羅奈為五人説四諦等且以三乘而為三根此就小乘釋也今明佛在法身之地寂而常照恆以佛眼洞覽無遺豈始至道場淹留三七方思此事言三七者明有所表也表佛初欲三周説法故假言三七耳初七思法説次七思譬説後七思因緣説皆無機不得是故息大施小也此偏就圓教大乘為釋耳若通途約大乘釋者初七思惟欲説圓教次七思惟欲説別教後七思惟欲説通教皆無機不得是故息大説三藏三乘為方便之化也二明衆生無機三初明障重故衆生諸根鈍著樂癡所盲二明不堪聞如斯之等類云何而可度三明諸梵請爾時諸梵王及諸天帝釋至請我轉法輪諸梵雖請説大佛知無機所以不説妙樂云問如何得知梵王請大答據佛酬云若但讚佛乘等故知是請大也若據一四天下只一梵王為三界天主今云諸梵王者如來統御大千世界有百億四天下則有百億梵王又禪禪各一梵王故云諸也若論請法正在初禪三界天主也三明念欲息化二初無機我即自思惟若但讚佛乘至墜於三惡道明無機強説聞則有損二息化我寧不説法疾入於涅槃説則有損滅但無益故此思惟為下施權之張本也寧平聲願詞也如人言寧可如此是願如此也二念同諸佛用權稱宜二初明化得四初三乘疑宜尋念過去佛所行方便力我今所得道亦應説三乘尋念者仍念彼雖無大機不容永捨要以方便而誘濟之非都不知開三欲引同諸佛故云尋念也二明有小機二初明諸佛稱歎五初釋迦自敘諸佛現作是思惟時十方佛皆現梵音慰喻我佛現者由念佛方便力故現現由擬法會機二義故佛現也二佛歎釋迦隱實設權善哉釋迦文第一之導師至而用方便力上欲大化於彼無機故諸佛不歎今欲説小曲會根緣則始終得度所以佛歎善哉也為一施三引入佛慧即是第一導師得是無上法者即是得實智微妙第一也而用方便力者隨諸一切佛隱實用權也釋迦是姓此云能仁淨名疏云天竺語釋迦為能文文為儒義即名能儒大論亦云釋迦文佛二明諸佛亦隱實用權我等亦皆得最妙第一法為諸衆生類分別説三乘四雙釋隱實設權二義少智樂小法不自信作佛是故以方便分別説諸果為衆生少智不堪聞大所以隱實而復樂小所以施權五雙結隱實設權二義雖復説三乘但為教菩薩雖復説三終為顯實也二明釋迦酬順二初發言酬順舍利弗當知我聞聖師子深淨微妙音稱南無諸佛既聞諸佛稱歎即對曰南無諸佛南無此云敬從若翻度我等非此意也妙樂云今釋迦因聞十方諸佛慰喻乃稱南無答於諸佛故知釋迦不請諸佛度也二念順物機復作如是念我出濁惡世如諸佛所説我亦隨順行三明施化小思惟是事已即趣波羅奈至為五比丘説波羅奈正音婆羅痆女熙切中印度境婆沙云有河名波羅奈去其不遠造立王城或翻江繞城亦云鹿苑諸法寂滅相不可以言宣下即是前説中道無性佛種之理此理非數又不可説今以方便作三乘説又非生非滅而以方便作生滅説又偏真之理亦不可説以方便故作四門説初為五人説無常有門也佛念五人當往先度故至波羅奈一夏調根初為陳如説四諦得道次為頞跋提説布施生天福樂二人同時證果三為迦葉拘利二人亦如前説皆得聖果是為三番度五比丘也四受行悟入是名轉法輪便有涅槃音及以阿羅漢法僧差別名轉佛心中化他之法度入他心名轉法輪陳如初得初果即斷見惑分證滅諦亦是分得有餘涅槃涅槃之音起自於此由此得成無學便有羅漢之名能説三乘者名佛所説三乘即法初果與羅漢名僧三寶於是現世間也妙樂云涅槃音者由弟子受行煩惱斷處涅槃名生故名為音衆教之始故言起自於此三寶現世間者亦約漸始且在小乘未論一體二釋疑念從久遠劫來讚示涅槃法生死苦永盡我常如是説恐疑師云佛初未能鑑機尋念諸佛始知根性即釋云非我不知用於方便特欲引同故念諸佛非始念方知從久遠劫來見其樂小已為讚示令盡衆苦所以聞小即得解脫也恐疑弟子云云何衆生一世暫聞即證羅漢即釋云從久遠劫來為其讚示稱於本習故速得道故以一偈釋二疑也三頌顯真實四初頌人一舍利弗當知至曾從諸佛聞方便所説法此二行頌人一三乘行人皆是佛子故也又此二行亦名大乘機發亦云索果明由機發故索果索果由於機發此應有四句自有障除機未發如諸羅漢在三藏時以樂小故濁障雖除大根鈍故妙機未發自有大機發障未除如法華中諸凡夫人等雖未斷結以大根利故機發自有障即除機即發如説無量義經時證二乘果即於此座大機即發自有障未除機未發即五千等是也志求佛道者即是索大非求小果也咸以恭敬心皆來至佛所者一云耻小慕大大機感佛故云至佛所今明非但機至佛所亦乃身到如無量義中四衆圍繞合掌敬心欲聞具足道也曾從諸佛聞方便所説法者此中初味調伏受行三藏六度通別等三教方便由此調熱故使障除機發而求大也二頌理一我即作是念如來所以出為説佛慧故今正是其時此一行頌理一故云為説佛慧即上種智佛知見也又從此至下今我喜無畏二行一句亦名佛歡喜佛為佛慧故出昔障重無機不得即説佛慧中間雖障除又未得説今機發正是説時故云今正是其時又昔衆生機鈍智小恐其謗法墮惡故未是説時今機利智大聞必信解故佛歡喜無畏者不畏執小謗大起罪墮惡故言無畏也三頌教一舍利弗當知鈍根小智人至但説無上道此二行頌教一故云但説無上道又從於諸菩薩衆至但説無上道三句亦名正顯實也五乘是曲而非直通別偏傍而非正今皆捨彼偏曲但説正直一道也四頌行一菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛此一行頌行一故云悉亦當作佛又此一行亦名信行悟入六度通教二菩薩初聞略説動舊執致新疑今悉已除非獨菩薩二乘亦爾而云聲聞皆當作佛者昔教不説二乘作佛今與授記授記豈獨二乘除疑豈獨菩薩互存則兩備舍利弗當知下亦名大乘機動我即作是念下亦名佛歡喜於諸菩薩中下亦名正顯實菩薩聞是法下亦名受行悟入四歎法希有二初頌上如是妙法如三世諸佛説法之儀式我今亦如是説無分別法如三世者引同諸佛用權權是引物之儀式也説無分別法引同諸佛顯實實則言語道斷豈存儀式又權實無分別為鈍根小智分別權實今還悟入一三不二即知佛説三一無分別也諸佛皆爾何獨我耶二頌上時乃説之五初舉人難遇諸佛興出世懸遠值遇難久久懸遠時有佛出此舉人難二舉法難説正使出于世説是法復難如今佛出世四十餘年始顯真實三舉聞法難無量無數劫聞是法亦難如五千之流梵音盈耳越席而去聞豈不難乎四舉信受難能聽是法者斯人亦復難衆中唯身子前達中下之機雖聽猶未能了五舉華譬四難譬如優曇華至是人甚希有過於優曇華此華非其時不現現則維其時故云時時乃一出但合聞者難餘例可解五頌上不虗二初勿於可信人生疑汝等勿有疑我為諸法王至無聲聞弟子法王者夫為人王言則不二佛為法王豈容虗説夫方便可是權假真實寧應是妄聞法王説法勿生疑也二勿於可信法起疑汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要四十餘年蘊在佛心他無知者名為祕一乘直道總攝萬途故言要也六揀衆敦信二初頌揀衆三初頌揀增上慢非佛弟子以五濁惡世但樂著諸欲如是等衆生終不求佛道若樂諸欲是行魔業故須揀之上文著涅槃尚非佛弟子此文著生死那是佛弟子互揀非耳終不求佛道者頌上揀增上慢上慢者未得上法謂得上法是故其人不求佛道也二頌佛滅後解義者難得當來世惡人聞佛説一乘迷惑不信受破法墮惡道此明不善人勿為説也三頌若遇餘佛便得決了有慚愧清淨志求佛道者當為如是等廣讚一乘道此明善人當為説也二頌敦信二初敦信於權舍利弗當知諸佛法如是至不能曉了此初一行結祕要明此法如是先以萬億方便然後乃示真實其不習學不能曉了此正結不善者勿為説也兼對習學者則能曉了此乃可為説也二敦信於實汝等既已知諸佛世之師至自知當作佛方便施權正為於實權實無疑自知作佛
