front:
  text: 妙法蓮華經新注敘法華之王諸經也孩提之童亦能言之至於說其所以為王則雖大才宏智亦弗能也其故何也蓋法華者佛乘也佛乘者佛知見也佛知見者佛境界也以凡智說佛境界宜乎弗能也震旦諸師釋之者數十家惟天台大師為得其說大師者靈山同聞衆而所謂降德為如來所使者也夫得其說不亦宜乎大師之後採摘其疏者亦多惟若一如新注則略而取之引而伸之於其折中頗得宜當矣一如號一庵明永樂中為僧録司住上天竺嘗奉敕探討大藏撰三藏法數我應永之間奉使來于本朝時與津絶海遊和應制三山詩其人品可知耳余嘗得新注一本把玩不已自惜不與人俱遂弗顧固陋竊訓其傍授剞劂氏夫一心之妙散而為語言結而為文字語言及文字祗是一心之妙焉耳矣上機乃神而解之下根乃信而入之但如中智與愚者則覺知而分別之若夫神解與信入者不取語言文字之相直聞經文亦可領焉至乎覺知分別者非疏愈惑非訓難導倘或尋之文義偶發一句解生一念信而染其神則其利益不可量是吾流通之志也時寬文丁未季秋之穀僧不可思議書於霞谷蘭若之西庵重刻法華經科注序夫鉛錐鑿井井在高原非唯理水而艱得現前即至濕泥而尚復懸遠何如利钁斫地直透金剛磐石無前而法泉溢湧昔在耆闍說經八載結集西竺八里連綿傳來震旦而譯為七卷則真實理味隱在重山而六朝諸師竟為注疏屈指可數七十餘家求其理詣辭長則光宅為最豈高原鑿井乎鉛錐弗銛乎逮乎智者一出玄義敷𫾻先破光宅雲公餘者望風而退其利钁斫地乎法泉溢湧乎然而世人徒知乎流長末茂而未原乎源遠根深蓋我智者昔在靈山預會親聞思大同聽的承印記大蘇道場圓證三昧縱無礙辨稱性宣𫾻矧復章安結集非撰述之足擬荊溪記釋有文獻之可徵然則先賢既爾服從後學何煩措意不猶爝火之爭光二曜蹄涔之擬酌四溟多見其不知量也須知智者法華之妙在於玄義文句次之若夫今之科注又其次也學者或先科注而後文句文句而後玄義其猶觀水於河於江於海不免望洋向若而歎若先玄義而後文句文句而後科注其猶伐木于根于莖于枝可謂拔茅連茹而征上天竺一庵如法師國朝洪武時人也是板刻於留都年久板廢余先得梵夾印本于四明復廉覔之得翻刻之板于閩之壽寧後因學者求之不便乃命四明會首寶峯高公而募刻之今存武林龍樹庵者是也邇日東甌玄孫靈操榮慮梵夾賫持不便細書老眼難觀改為方冊稍大書之募資剞劂以廣流通為法䖍虔可謂勤矣復命刻余所述玄義輯略于前庶令學者雖未能廣目義海亦先使其染指知味事竣問言于余故不辭蕪穢勉為之序云時皇明天啓七年歲在疆圉單閼坐夏之七旬五日傳天台教觀七十四老僧傳燈書於楞嚴壇之東方不瞬堂法華經科注疏序如來說法四十九年雖五時四教而意極於圓故華嚴屬兼般若猶帶惟至法華直捨方便單說無上是以殷勤稱嘆為經中王良以此也教流東夏弘華嚴若賢首弘般若如禪宗者猶如恆沙而弘法華者止天台十餘代耳此其故何哉蓋偏權易受圓實難肩彼無情之旨性惡之談雖迦葉尊者猶疑魔說況金容掩色欲舉當時天人所驚疑者而直領之豈不如鳳毛麟趾之希遘哉余於是益信弘法華難也諸佛出世不值大根有不說法華而入涅槃者則機器之難遇也光宅首唱河北繼者數十家權實本迹之義至智者始定則四依之難逢也自台嶺集成至五季四百餘年耳中國已無有能舉其義者求於高句麗而始得之則傳習之難繼也宋朝迄明妙旨再絶隆萬間妙峯法師振起之一傳無盡燈公再傳幻由路公圓乘獨總彼狹小偏祕之流怨嫉載道則特立之難堅也由此觀之則手把虗空足躡須彌猶為易事而單提圓上不墮通別而其難為更陪也路公之孫操師榮師者慨佛種之難純於是舉科注而更定之與同志明宇王君葵赤張君振揚陳君知默鄧君季黃馬君禎甫姜君迎華陳君仰峯林君道如蓋君國進龔君應華高君汝化葉君等謀壽諸梓夫法華以文句為入門玄義為堂宇摩訶止觀為奧室科注者文句之略也不知科注而弘法華即溫陵要解猶然兼帶而況妄解經文單伸臆說其為法華也猶北轍矣師精玄義止觀豈不能創為新異而謹守妄傳者正以自智者之外皆雜通別但攬轡白牛於羊鹿交馳之世已自橫絶何必強作解事而蒙不知之誚哉此又雪竹師之難也余於是風告諸方因科注而玄義因玄義而止觀至法華藏深固幽遠者可以徑造慎毋墮落通別而夾雜圓種也則如來為其厚幸矣是為敘賜進士第欽差行人司行人永嘉邵建䇿薰沐合十書新注法華經序經云法華經藏深固幽遠無人能到若然豈言說可能跂及者哉此即釋迦世尊於三七日中所說華嚴法界無二無別雖智如鶖子未免驚疑況餘衆乎此實難信難解不可思議大解脫法門也陳隋間天台智者大師顗公靈山親承大蘇妙悟證法華三昧獲旋陀羅尼既而居江陵為章安等弟子開玄義十卷惟釋經題所謂九旬談妙者也後居瓦官寺復為章安等以權實本迹開顯之旨別釋經文名曰文句亦十卷先是光宅所注其中不免訛謬大師悉去之以正其說至唐荊溪尊者又推廣大師之說撰釋籤十卷釋玄義妙樂十卷釋文句則一經之妙大備而無餘蘊矣然而文辭浩博義理深玄自非老於座主之學者弗能入也於是元之慧愚谷者一以大師成言注於句下以使初學啓發蒙昧惜乎歲久板刻不存前住上天竺一菴如法師乃前高僧具菴法師之弟子也得其正傳博通教義講說熟間於今兩測一人而已間居南京大報恩寺念祖道之荒涼大教之將墜於是亦一以大師成言注述斯經不敢妄加己見混肴其說疑誤後學比慧愚谷者加詳編為七卷吳中顧道珍繕寫極為嚴整道珍與同學佛人管叔純馮覺成顧道升顧禧然姜孟圭等共募衆緣為之刊梓流通一日叔純等懷香過豫徵豫序引豫時年八十四歲抱病在家焉能措筆然覩茲盛德之事亦當為之助喜若以法華經藏深固幽遠無人能到豈可以言說跂及者哉姑托一二為序以辨其端當知此經不可思議果報亦不可思議上足以答君親之厚恩下足以濟飛潛之幽趣如太虗空豈有量哉故為序後之覽者當求言外之意云永樂十六年正月十五日資善大夫太子少師吳郡姚廣孝序
