body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯上天竺講寺住山比丘一如集注妙法蓮華經五百弟子受記品第八此品具記千二百聲聞而品題但標五百者蓋五百得記名同五百口陳領解故以標品耳妙樂云先標五百故須作受字謂受如來之記也二後兩品授記二初五百弟子受記品授千二百記二初授滿願記二初敘默領解二初敘得解歡喜二初敘得解之由四初聞法譬開三顯一爾時富樓那彌多羅尼子至隨宜説法聞是智慧即領方便火宅中兩處顯實方便隨宜説法即領兩處開權也二聞授五大弟子記又聞授諸大弟子阿耨多羅三藐三菩提記諸大弟子指身子及四大弟子領開權授菩提記即領顯實也三聞宿世因緣之事復聞宿世因緣之事聞化城品宿世因緣即領顯實也四聞佛力觀久若今復聞諸佛有大自在神通之力如來三達無礙觀彼久遠猶若今日即是大自在神通之力斥異二乘止齊八萬即領開權也二敘得解歡喜二初明內解歡喜得未曾有心淨踊躍由昔未聞開權顯實而今得聞故言得未曾有除保證涅槃之愛斷破塵沙無明別惑故言心淨開佛知見是故踊躍二明外形恭敬即從座起到於佛前至瞻仰尊顏目不暫捨得解由佛故起恭敬也二敘默念領解二初正明默念領解而作是念世尊甚奇特至於佛功德言不能宣上二周身子等得悟皆發言領解此何默念蓋身子等為下根未悟事須彰言勸動今下根已悟無所勸動故默念不言世尊甚奇特所為希有者即是領實智隨順七種方便根性而為説法即是領權智乃領方便品中開權顯實也拔出衆生處處貪著乃領火宅中開權顯實也我等於佛功德言不能宣乃領藥草喻中如來有無量功德迦葉等四大弟子説不能盡即是領所不及今富樓那意謂四大弟子聞火宅譬具領如來五時施化及法身地鑑機等事如來猶斥其領所不及我今聞此雖欲領會豈能逾於四大弟子當知所領之外不及處多是故亦云言不能宣既云言不能宣亦是念所不及也二默求發迹請記唯佛世尊能知我等深心本願我等者通念請發諸人迹也深心是本今現作是迹本願者大慈誓願也大慈下化故我為誓下求作佛故我有願請上求即是求記請説下化即求發迹又從深心故明其三世助佛宣化從本願故即與授記二如來述記二初長行二初述本迹三初就釋迦世行因發迹三初舉示其人爾時佛告諸比丘汝等見是富樓那彌多羅尼子不汝等見否有二意一見其迹為小否二見其本功德否衆人但見迹為聲聞而不能知本是菩薩故云見否二總標本迹二初標其迹我常稱其於説法人中最為第一標其迹為説法人中最為第一若非法身妙本無以垂於第一勝迹昔來但言於迹中説法第一今則不爾於無上法久得第一此舉迹以顯本也二標其本亦常歎其種種功德標其本地福慧萬行法門故云種種本地既有種種法門迹中何但為二乘耶此舉本以明迹也三別釋本迹二初迹中助宣半滿之法精勤護持助宣我法至而大饒益同梵行者助宣我法者即是迹中助宣半滿之法也在鹿苑迹為下根聲聞即是護持助宣三藏半滿之法迹在方等示受彈呵即是護持助宣對半明滿之法迹在般若即是護持助宣帶半明滿之法迹在法華得悟即是護持助宣廢半明滿之法上文云我常稱歎種種功德者即此意也本具權實功德而迹於五味助佛調熟實行衆生豈非精勤助宣之意也能於四衆示教利喜者分別半字教也具足解釋者助宣滿字教也而大饒益者助佛饒益半滿之衆生也同梵行者是迹中所化半滿之弟子也二別述本地功德莫測自捨如來無能盡其言論之辨降佛已還七方便人不能知其本地之辨二約過去世顯其本行汝等勿謂富樓那至常作佛事教化衆生言富樓那非直止於我所助宣半滿之法而於久遠佛所亦復助宣半滿之法取今日助宣為發迹取過去助宣為顯本顯本有二一遠本二近本遠本冥邈為信良難故今但舉九十億近本言之有宿命智能知近本故舉近以證遠令其生信護持助宣即擬助宣半字之法佛之正法即擬助宣對半明滿之法又於空法明了通達即擬助宣滯半明滿之法四無礙智即四無礙辨以智在説故一義無礙智知諸法義了了通達無滯二法無礙智為知一切義故智慧通達諸法名字分別無滯三辭無礙智所謂一切衆生殊方異語若一語二語多語略語廣語女語男語過去未來現在語如是等語言能令各各得解辨説無礙一切聞者悉解其言説四樂説無礙智菩薩於一字中能説一切字一語中能説一切語一法中能説一切法於所説法皆是真實皆隨可度者而有所益所謂十二部經八萬四千法藏隨一切衆生根性所樂聞法而為説之聞者無厭由具神通之力故能隨佛壽命修清淨行於彼佛世既未發迹人皆謂之實是聲聞不言是大菩薩也化無量衆生令立三菩提者即是助宣廢半明滿之法如是助宣佛法者蓋與物結淨土緣耳若不與物結緣則菩薩成佛時土穢無機可化故也三約三世佛所修因行諸比丘富樓那亦於七佛至常勤精進教化衆生此亦例前助宣半滿之法利益大小機也七佛者若依諸文所出一毗婆尸佛二尸棄佛三毗舍浮佛四俱留孫佛五拘那含牟尼佛六迦葉佛七釋迦牟尼佛此則以莊嚴劫千佛中後之三佛賢劫千佛中初之四佛為七佛也若據今經釋迦自云今於我所説法人中亦為第一則是以七佛為過去釋迦為現在彌勒等佛為當來應指莊嚴劫中後之四佛賢劫中初之三佛為過去七佛而諸文中或以釋迦共前六佛為過去七佛者意恐劫章經在釋迦滅後結集亦以釋迦為過去佛耳二與授記七初明因圓漸漸具足菩薩之道二明果滿過無量阿僧祇劫當於此土至天人師佛世尊三明國淨五初明國大嚴淨其佛以恆河沙等至人天交接兩得相見地平如掌者經直云如掌不言手掌手掌不平則非所引海底有石名掌此石無有一微塵許不平當是類如海掌耳又賢劫經正明如佛手掌非引同人掌也二明純是善道無諸惡道亦無女人一切衆生皆以化生無有淫欲無諸惡道者於中亦有差別不同若無女人必無惡道或有女人亦無惡道者如阿閦佛國雖有女人而無女事無量壽佛國二種俱無三明福慧具足得大神通身出光明至一者法喜食二者禪悅食月藏經第九明法食喜食禪食經文總言法喜禪悅別分應有三種差別妙樂云法食聞法也如安養界下品生人在蓮華中常聞彌陀觀音説法喜食者聞法歡喜正聞屬法食聞已為喜食禪食者謂以禪法自資不須段食或可法即是喜四明弟子衆多有無量阿僧祇千萬億至六通三明及八解脫五結功德成就其佛國土有如是等無量功德莊嚴成就月藏經第五明十善各十功德一不殺得十功德者一於一切衆生得無所畏二於衆生得大慈心三斷惡習業四少病五長命六非人所護七無惡夢八無怨九不畏惡道十命終生善道後作佛時國無害仗之具國人長壽乃至第十不邪見得十功德一心性柔善乃至第十死生善道作佛時國人正信是為無量功德莊嚴也四國劫名劫名寶明國名善淨五佛壽量其佛壽命無量阿僧祇劫六法住久法住甚久七供舍利佛滅度後起七寶塔遍滿其國二偈頌二初頌發迹二初總發諸聲聞迹五初標難思之法爾時世尊欲重宣此義而説偈言諸比丘諦聽佛子所行道善學方便故不可得思議此標弟子為行難思已得垂迹之法二明垂迹之由知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺三明垂迹利益以無數方便化諸衆生類至漸當令作佛小欲者示求小乘也懈怠者示退大乘也以權行引實行化諸衆生漸令作佛也四明內祕外現內祕菩薩行外現是聲聞至方便度衆生非但示為聲聞亦示作外道及三毒凡夫如身子示瞋難陀示貪調達示癡皆其類也五明指略抑廣若我具足説種種現化事衆生聞是者心則懷疑惑二別發滿願迹本二初頌顯過去本今此富樓那於昔千億佛至而自淨佛土二頌三世行因未來亦供養無量無數佛至成就一切智二頌授記四初頌因圓供養諸如來護持法寶藏二頌果滿其後得成佛號名曰法明三劫國名其國名善淨七寶所合成劫名為寶明四頌國淨菩薩衆甚多其數無量億至我今但略説二授千二百記三初念請爾時千二百阿羅漢至如餘大弟子者不亦快乎千二百人皆已得小乘果不為見思所惱故心自在既聞三周説法又見記富樓那是故歡喜念欲請記二與記二初長行三初總記千二百佛知此等心之所念至三藐三菩提記二別授憍陳如於此衆中我大弟子至天人師佛世尊陳如最初悟道居上座首故別與記妙樂云問若其居首別記何不初周記耶答若約實行大小緣別兩初各異身子最初結大緣故初周先悟陳如先結小緣故初鹿苑先悟若約權行引物希向二意各異垂迹之法不可一準三別授五百人其五百阿羅漢至盡同一號名曰普明迦留陀夷此云黑光亦云粗黑顏色黑而光故周陀或云周利此云大路邊生佛本行經云其母隨夫往他國久而有孕垂産思歸行至中路即誕其子如是二度凡生二子乃以大小別之大即周陀小即莎伽陀亦云槃陀伽亦云槃特此云小路邊生問佛許千二百次第與記今何但記五百不見千二百得記答此五百即千二百數頌中末後迦葉汝已知等一行半總授七百故是千二百也二偈頌二初記陳如及與五百爾時世尊欲重宣此義而説偈言憍陳如比丘至壽命劫多少皆如上所説二總授一切聲聞記迦葉汝已知五百自在者至汝當為宣説上二句結前五百已得記者次二句即頌七百故云餘諸聲聞衆亦當復如是又次二句為不在此會者令迦葉代為宣説故云其不在此會汝當為宣説後持品中云我先總説一切聲聞皆已授記正指今一行半偈非是止授七百聲聞也三領解二初長行二初經家敘喜二初慶今得解故歡喜二初明內心慶喜爾時五百阿羅漢於佛前得受記已歡喜踊躍二明外形恭敬即從座起到於佛前頭面禮足二愧昔不解故自責悔過自責二自陳領解二初法説二初悔得小為足世尊我等常作是念自謂已得究竟滅度此是悔責昔迷得小為足不知求大二責根鈍難悟今乃知之此責根鈍始悟不早知之今知小非究竟大為真實也二譬説二初略譬二初略舉譬況如無智者二釋無智意所以者何我等應得如來智慧而便自以小智為足二正譬二初開譬二初貧人醉酒譬三初親友繫珠譬世尊譬如有人至繫其衣裏與之而去繫珠譬領上王子結緣也譬如有人者即二乘之機也親友者昔日第十六王子也家即大乘教為家也醉酒而臥者當時大機暫發無明暫伏以得聞經內心微解如至親友家以無明重故還復迷失如醉酒而臥醉有二義一重醉都不覺知二輕醉微覺尋忘亦名不覺雖有二義終成繫珠如毒鼓耳官事當行者明王子餘處機興逗緣往應故云當行弘法化他此非私務故云官事無價寶珠者一乘實相真如智寶也繫其衣裏者慚醜忍辱能遮醜恚及防外惡即是外衣信樂之心內裏善根即是內衣于時聞法微信樂欲即了因智願種子也妙樂云真如智寶者此是約教乃以了因而為繫珠教中詮理故云真如教是智用故云智寶也二醉臥不覺譬其人醉臥都不覺知此領中間懈退不受大法也醉臥不覺知者無明心重尋復不憶也三起已遊行譬起已遊行到於他國至若少有所得便以為足此領上中間接之以小受三乘化也善根欲發厭苦求樂故云起已遊行無明覆解不知向本求大乘衣食故言向他國求於小乘衣食若魔佛相望生死魔界為他國佛法大小皆為本國就大小相望小乘未免生死猶是他國大乘永免生死乃為本國究竟還源也明背大乘國往小乘土不知從珠取給而傭作自資獲一日價得少為足二親友覺悟譬三初呵責於後親友會遇見之至何為衣食乃至如是此呵責譬上動執生疑也二示珠我昔欲令汝得安樂至以求自活甚為癡也此示珠譬宿世因緣也某年日月者指大通佛所也三勸貿汝今可以此寶貿易所須常可如意無所乏短此勸貿譬得記作佛也妙樂云珠雖價直無數必須貿易方有濟用了因內解雖復究竟必以宿種易於現行以昔解一解一切解貿今現行一行一切行珠體不竭貿易無窮故須更聽更修方顯寶之功用如華嚴中得摩尼珠十種瑩治方能雨寶解行相稱方堪佛記從是已後則具有寂滅忍衣首楞嚴食自行化他無量衆寶無功用位彼此不窮二合譬二初合貧人醉酒譬三初合親友繫珠譬佛亦如是為菩薩時教化我等令發一切智心二合醉不覺知譬而尋廢忘不知不覺三合起已遊行譬既得阿羅漢道自謂滅度資生艱難得少為足二合親友覺悟譬三初合呵責一切智願猶在不失至汝等所得非究竟滅二合示珠我久令汝等種佛善根至而汝謂為實得滅度三合勸貿世尊我今乃知實是菩薩至甚大歡喜得未曾有二偈頌二初頌內心得解二初頌慶喜爾時阿若憍陳如等欲重宣此義而説偈言我等聞無上安隱授記聲歡喜未曾有禮無量智佛二頌悔責今於世尊前自悔諸過咎二頌自陳領解二初頌法説於無量佛寶得少涅槃分頌上得少為足二頌譬説二初頌略舉譬二初頌略舉譬況如無智愚人二頌釋無智意便自以為足二頌正舉譬二初頌開譬二初頌捨寶不知譬如貧窮人往至親友家至有無價寶珠𮌞膳譬大通佛所先聞方便繫珠譬王子覆講後結大緣妙樂云當知貧人本來先醉加蒙𮌞膳受已而臥三教助道猶如𮌞膳更以異方便助顯第一義也𮌞膳食已便消如方便教非究竟益往在大通佛所未結大緣已前歷諸味中並聞三教及至王子覆講法華雖聞圓頓但成結緣如繫珠也二頌親友覺悟與珠之親友後見此貧人至五欲而自恣二頌合譬我等亦如是世尊於長夜至身心遍歡喜初一行頌上合譬中初繫珠譬我等無智下二句頌上合譬中第二醉不覺知得少涅槃下二句頌上合譬中第三起已遊行今佛覺悟下二句頌上合譬中初呵責得佛無上下二句頌上合譬中示珠我今從佛下一行頌上合譬中勸貿得記作佛是故歡喜妙法蓮華經授學無學人記品第九研真斷惑名為學真窮惑盡名無學三果四向研修真理募求勝見故名為學阿羅漢果研理已窮勝見已極無所復學故名無學此二千人或是學人或是無學人同是一流一時受記同一名號故別為一品也二授學無學人記品授二千人記二初請記二初二人請二初默念得記爾時阿難羅睺羅而作是念至設得授記不亦快乎二發言請記二初引例即從座起到於佛前至唯有如來我等所歸二引望又我等為一切世間至我願既滿衆望亦足二人於佛最親時衆所望羅雲是佛子俗中親重阿難持佛法藏道中親勝勝重兩人不蒙別記則衆望不足也問若重若勝應同上流又如列衆二人在多知識上數中獲記何意居下答總與千二百記二人已同上流今更索別記耳二二千請爾時學無學聲聞弟子二千人至住立一面二千請記但有默念引例二意同於二人故言如阿難等願耳不發言請者非如二人親重親勝故也二授記二初記二人二初記阿難五初長行明修因得果爾時佛告阿難汝於來世至所共讚歎稱其功德阿難為今佛侍者護持法藏於六十二億佛所亦護法藏如今不異爾後方得菩提此自行修因得果也教化二十千萬億菩薩等即果後化他令他修因得果也二偈頌明修因得果爾時世尊欲重宣此義而説偈言我今僧中説至於此佛法中種佛道因緣三八千菩薩等生疑爾時會中新發意菩薩至而諸聲聞得如是決八千菩薩疑者通疑聲聞今日發心即蒙佛記國淨若此何故昔於方等記諸菩薩無量劫行乃得佛記四如來為發迹釋疑爾時世尊知諸菩薩至其本願如是故獲斯記佛因衆疑即為發迹釋疑阿難昔日與我同發大心即是同學由我精進前超得佛由彼多聞猶故持經迹為侍者本地如此今授妙記何足可疑五明阿難顯本述歎阿難面於佛前自聞授記至爾時阿難而説偈言世尊甚希有至方便為侍者護持諸佛法二記羅雲二初長行爾時佛告羅睺羅至當得阿耨多羅三藐三菩提二偈煩爾時世尊欲重宣此義而説偈言我為太子時至安住於佛法以求無上道本是菩薩迹為小乘以迹覆本名為密行二授二千三初長行爾時世尊見學無學二千人至正法像法皆悉同等二偈頌爾時世尊欲重宣此義而説偈言是二千聲聞至名聞普周遍漸入於涅槃三記喜爾時學無學二千人聞佛授記歡喜踊躍而説偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌中道種智之慧照徹三諦源底復能破諸衆生煩惱惑暗故云慧燈明也妙法蓮華經法師品第十此品明五種法師一受持二讀三誦四解説五書寫大論明六種法師一信力故受二念力故持三看文為讀四不忘為誦五宣傳為説聖人經書難解須解釋今經合受持為一合解説為一開讀誦為二足書寫為五別論受持書寫是自行解説是化他通論若自軌五法則五種皆自行若教他五法則五種皆化他自軌故通稱弟子化他故通稱法師今從通義故稱法師品法者軌則也師者訓匠也法雖可軌體不自弘通之在人故五種通經皆得稱師舉法成其自行皆以妙法為師師於妙法妙行成就故言法師又五種人能以妙法訓匠於他舉法目師故稱法師凡多種解皆約圓教法門而釋品也前三周是迹門正説領解受記竟此下五品是迹門流通非止蔭益當時復欲津洽來世故有五品流通法師寶塔兩品明弘經功深福重流通未聞利益巨大達多一品引往弘經彼我兼益以證功德深重持品八萬大士忍力成者此土弘經新得記者他土弘經安樂行品外凡初心欣斯勝福見聲聞畏憚經云若聲聞人聞是經驚疑怖畏等聞菩薩擯辱持品云濁世惡比丘數數見擯出等顧己力弱無益自他便生退沒佛為此人説安樂行依之法弘不慮危苦三五品迹門流通四初法師寶塔兩品明弘經功深福重流通未聞益大二初法師品二初長行偈頌歎美五種法師能持法人二初稟道弟子門功深福重二初佛世弟子二初揀出其人類爾時世尊因藥王菩薩至求辟支佛者求佛道者初因藥王告八萬者因者憑寄也欲以妙法憑寄藥王使其領受告語八萬皆流通也汝見是大衆等者的示持經得福之人也妙樂云本託藥王因茲告餘此流通初先告八萬大士者大論云法華是祕密付諸菩薩如下涌出品召於下方尚待本眷屬驗餘人未堪也二揀出得記緣如是等類咸於佛前至當得阿耨多羅三藐三菩提若於佛前當機妙悟者是多聞深解五百及二千是也此等皆已現前與總別記竟今所揀者乃是八部四衆三乘之類故言如是等類咸於佛前者明其時節值佛在座也一句一偈者聞法極少也乃至一念者時節最促也隨喜者自未有行但隨喜其法及隨喜其人也皆與記當得菩提者明其聞極少時極促隨喜之功遂得佛果何況具足得聞盡形受持五種流通三業供養聞少解淺者尚記況復多深以少況多普廣若此下周既爾中上亦然可以意知不俟更説二滅後弟子二初出弟子類佛告藥王至乃至一偈一句一念隨喜者二亦與授記我亦與授阿耨多羅三藐三菩提記聞極少法亦與授記功報如前解也二明授道師門功深福重二初長行二初別二初明現世二初明下品師二初明師相若復有人受持讀誦解説書寫至乃至合掌恭敬上明稟道弟子此下明授道師門師論下上時談現未無論上下現未逆之得罪順之得福今明現在下品師相即是五種法師十種供養也妙樂云上下品師者但約凡位以判十供養者一華二香三瓔珞四末香五塗香六燒香七幡蓋八衣服九技樂十合掌也二明功報藥王當知是諸人等至廣演分別妙法華經曾供養者明先世因深也愍衆生故生此人間明現世功大也若有人問下明未來報重也何以故下釋出報重之相也二明上品師二初況出上品相何況盡能受持種種供養者二明上品功報藥王當知是人自捨至生於惡世廣演此經是人自捨清淨報者大悲願牽捨於清淨之土而生濁惡世中仍是業生未有通應願兼於業故生也如妙玄眷屬妙中明業生願生眷屬是也二明來世二初明下品師二初明師相若是善男子善女人至説法華經乃至一句竊為一人説一句者雖得一句之解既不廣聞多學異義不可衆中而説一切問難有所不通便令正理不得宣弘若欲申此一句正言且當竊説耳如釋論明有慧無聞譬如小雨無雷妙樂云故知下品師亦許為弘法故於內教中廣習異義以助正教世有習俗典而云助正者反淪正理釋論云有慧無多聞亦不知實相譬如大暗中有目無所見多聞無智慧亦不知實相譬如大明中有燈而無照無聞無智慧譬如人身牛有聞有智慧是所説應受二明功報當知是人則如來使如來所遣行如來事經是如智所説説於如理今日行人乘此如教宣於如理即是如來使也行如來事者如來以如智照如理為事今日行人依如教行如理即是行如來事也約自行釋又如來以一如智一如理化衆生為事今日行人能有大悲以此經中真如之理為衆生説令得利益亦名行如來事也約化他釋二明上品師何況於大衆中廣為人説略不格量上品功報者以前下品望今上品此意可知也二總二初明逆者得罪藥王若有惡人以不善心至其罪甚重此中罪福不論福田濃瘠但約初後心明其輕重初心學人讀誦經者既具煩惱若加毀訾障礙則能令其所學事廢故獲罪多佛既惑盡冤親平等惡不干逼豈能障礙故言罪輕供養亦爾此人有待若得供養所修事成故施之福勝佛則無待衆事滿足雖復供獻於佛無益故言報劣妙樂云佛則平等惡不干逼等者若爾供佛無福何須供佛毀佛無罪何須制罪答實爾但為成校量故向云不論福田濃瘠若從田論凡瘠聖濃故應毀供重於凡也二明順者得福藥王其有讀誦法華經者至以佛莊嚴而自莊嚴佛以定慧莊嚴而説此經若人讀誦此經者則是能修佛之定慧故云以佛莊嚴而自莊嚴也則為如來肩所荷擔在背為荷在肩為擔若人讀誦是經則能得佛非權非實法身之體即是為如來背之所荷亦能得佛能權能實二智之用則是為如來兩肩所擔妙樂云佛得權實及非權實我亦得之乃稱佛得是則義當在佛肩背亦是用佛權實等法名在佛肩背亦是衆生常在肩背日用不知其所至方應隨向禮至三藐三菩提故隨所向方應向禮者上明以法為師今明堪為物師此人有所趣向悉與實相相應皆可敬順順即是向敬即是禮敬而順之及興供養等所以者何下釋上應供之意也妙樂云應持天寶等者先舉人中上供次以天寶況之尚以天寶奉獻故云應持而況人中上供乎二偈頌三初勸自行利他爾時世尊欲重宣此義而説偈言若欲住佛道至當受持是經并供養持者二頌師門別總二初頌別二初頌現世二初頌下品師二初明師相若有能受持妙法華經者二明功報當知佛所使愍念諸衆生二頌上品師二初明師相諸有能受持妙法華經者二明功報捨於清淨土愍衆故生此至供養説法者二頌來世二初超頌上品師二初頌師相吾滅後惡世能持是經者二頌功報當合掌禮敬如供養世尊至冀得須臾聞二追頌下品師二初頌出人若能於後世受持是經者二頌功報我遣在人中行於如來事二頌總二初頌逆者得罪若於一劫中常懷不善心至其罪復過彼二頌順者得福有人求佛道而於一劫中至我今獲大利三頌歎經尊妙藥王今告汝我所説諸經而於此經中法華最第一二長行偈頌歎美所持法示弘經方軌二初長行二初歎經法五初約法歎爾時佛復告藥王菩薩至此法華經最為難信難解已今當説此經為最此約法歎也已者大品已上漸頓諸説也今者同一座常謂無量義經也當者謂涅槃也大品等漸頓諸説皆帶方便取信為易無量義一生無量無量未還一是亦易信今法華論法則一切差別融通歸一論人則師弟本迹俱皆久遠人法悉與昔異故難信解當鋒難事法華已説涅槃在後則可信也妙樂云當鋒者法華在前如大陳難破涅槃在後如餘黨不難初當先鋒斯為不易藥王此經是諸佛祕要之藏不可分布妄授與人祕要之藏者隱而不説為祕總一切法為要真如實相包蘊為藏不可分布者法妙難信深智可授無智不信謗乃獲罪故不可妄説也諸佛世尊之所守護從昔已來未曾顯説從昔已來未曾顯説者於三藏中不説二乘作佛亦不明師弟本迹方等般若雖説實相之藏亦未説五乘作佛亦未發迹顯本頓漸諸經皆未融會故名為祕此法華經具説昔所祕法即是開祕密藏亦即是祕密藏如此祕藏從昔守護今方顯説也而此經者如來現在猶多怨嫉況滅度後如來在世猶多怨嫉者四十餘年不得即説今雖欲説而五千尋即退座佛世尚爾何況未來理在難化也妙樂云如來至怨嫉者思宿惡為怨忌現善曰嫉故障未除者為怨不喜聞者名嫉今通論者迹門以二乘鈍根菩薩為怨嫉五千起去未足可嫌本門以菩薩中樂近成者而為怨嫉闔衆不識何得為怪今仍在迹意則可見理在難化者明此理者意在令知衆生難化也二約人歎藥王當知如來滅後至則為如來手摩其頭此約人歎也此法在人則人尊貴如來衣覆者言若能持説此經即是修學大忍是為如來衣覆即上文云如來莊嚴也佛護念者實相為佛實智為子尊崇實相發生實智即為諸佛所護念也四信為信力三寶及戒四弘為願力大智為善根力信則信理理即法身志願是立行行即解脫善根根固難動此即般若當知三力即是三德祕密之藏初心栖此與佛不殊故名與如來共宿也手摩頭者此人以願力善力自行權實以為機感機感名頭如來以化他權實二智名手開發前人自行權實之頭感應道交故言摩頭摩頭即授記也妙樂云初心栖此等者此用所表如前荷負若不爾者色身共宿乃至摩不淨頭於理何益三約處歎藥王在在處處至皆近阿耨多羅三藐三菩提此約處歎也此法在處即處貴夫佛生處得道轉法輪入涅槃等處法王所遊皆應起塔此經是法身生處得道之場法輪正體大涅槃窟此經所在須塔供養不須復安舍利者釋論云碎骨是生身舍利經卷是法身舍利此經是法身舍利不須更安生身舍利生法二身各有全碎皆可解妙樂云生身碎者如釋迦八斛四斗生身全者如多寶全身在寶塔中法身碎者諸方便教也法身全者法華一實也四教五時委簡可見四約因藥王多有人在家出家至乃能善行菩薩之道此約因歎也若未善行菩薩道者稟前三教未能巧度若聞是經即入圓教名為巧度巧度為善行也妙樂云巧度者如止觀第六記引大論作巧拙二醫譬云如用針藥名為拙度用呪術者名為巧度聲聞化人苦行頭陀等名拙度菩薩化人觀諸法實名巧度彼大論文通以衍門為巧今別以一實為巧五約果歎五初明近其有衆生求佛道者至得近阿耨多羅三藐三菩提當知必得近三菩提果者安樂行中名為近處此菩提果佛眼佛智知見處為體則有二種一者初心菩提即初住二者後心菩提即妙覺今言近者正近初住菩提也二開譬藥王譬如有人渴乏須水至其心決定知水必近此有二釋一約觀門二約教門觀門者衆生之心具諸煩惱名高原修習觀智名穿掘方證理味如得清水若依通觀乾慧地如乾土性地為濕土泥知水必近見諦為得清水若依別觀初從假入空但見空不見不空斷四住惑如鑿乾土去水尚遠次從空出假先知非假今知非空因茲二觀得入中道能伏無明轉見濕土去水則近初地為得清水也若依圓觀中道非空非假而照空假如漸至濕泥四住已盡無明已伏已得中道相似圓解故言如泥若入初住發真中解即破無明如泥澄清得見中道如見清水次約教門者土譬經教水喻中道教詮中道如土含水三藏教未詮中道猶如乾土方等般若帶於方便説中道義如見濕土法華教正直顯露説無上道如見泥因法華教生聞思修即悟中道如獲清水妙樂云譬中必須教觀二重方盡其理教觀相修共顯其妙教觀若偏二俱無力初約觀中初總明觀言雖通諸意且在圓依通觀下歷教明觀析體理同故略三藏三合譬菩薩亦復如是至必知得近阿耨多羅三藐三菩提於法華中獲聞思修即是圓觀三慧方能近果非三藏方等般若教中聞思修也四釋近所以者何至今佛教化成就菩薩而為開示此釋得近之意一切菩薩者明諸教中權因也三菩提者明一切菩薩所得權果也此權因權果皆攝屬此經如乾濕等土悉依於水故言攝屬也開方便門者在昔為實施權不知權是方便故方便門閉今皆開之即是實相故方便門開昔説一切世間治生産業何曾是於方便今皆開之即是實相不相違背昔説小乘方便及小乘果尚非實相門況小乘方便而當是門今皆開之即是實相汝等所行是菩薩道決了聲聞法是諸經之王咸令衆生開示悟入佛之知見一色一香無非佛法若不開者則深固幽遠無人能到而今開之即得見水無乾土也五揀非藥王若有菩薩聞是法華經至當知是為增上慢者若菩薩聲聞聞此説而驚疑者悉是乾土尚非濕土況見水耶二示方軌二初示方法三初標章藥王若有善男子至爾乃應為四衆廣説斯經室衣座三名為三軌末世弘經必藉此三自軌軌他方獲大利修無緣慈是入如來室修寂滅忍是著如來衣修於中空是坐如來座也二解釋如來室者一切衆生中至如來座者一切法空是慈悲心是如來室者慈悲覆物惠利歸己名之為室謂悲拔一切苦即四趣三界二乘菩薩等苦慈與一切樂即人天涅槃常住等樂故慈悲是如來室也柔忍心是如來衣者遮彼惡障己醜名之為衣謂遮四住無知無明等醜故柔忍是如來衣也法空是如來座者安心於空方能安他安他安己名之為座蓋空能亡一切相謂亡三界有相二乘無相菩薩非有相非無相故法空是如來座也是故利物以慈悲為首涉有以忍辱為基説法以亡我為本能行三法大教宣弘即世間依止故名法師問何故約三法名法師答約事論之必須登堂整服坐座乃可敷弘故約三耳又慈悲生一切善柔和遮一切惡法空蕩一切相三勸修安住是中然後以不懈怠心至廣説是法華經五種法師用此三法自軌故云安住是中用此化他故云然後以不懈怠心等此勸修也修如來室是大慈悲若就同體即法身也若被衆生即是解脫能令衆生會於同體即是般若修如來衣者若就所覆即法身也若就能覆嚴身即寂滅忍是般若也若就和光利物即解脫也修如來座者若就能坐即般若也若就所坐即法身也身座冥稱即解脫也妙樂云三法相望各各具三雖復各具秪是一三三尚非三豈離為九是則菩薩常觀涅槃故勸弘經者觀而弘之不觀能弘之心焉曉所弘之理故佛令入我室著我衣坐我座若無三法何謂弘經二明利益五初遣化人藥王我於餘國遣化人為其集聽法衆若初心未淳止可遣化人未可遣化四衆八部也若見天龍倚此自高妨損其道故不可令見也若心無倚著則尚堪見佛況復天龍況得總持自證利益耶二遣四衆亦遣化比丘比丘尼至聞法信受隨順不逆三遣八部若説法者在空間處至聽其説法四見佛身我雖在異國時時令説法者得見我身五與總持若於此經忘失句逗我還為説令得具足二偈頌三初總勸爾時世尊欲重宣此義而説偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難二正頌二初頌歎經法二初頌開譬如人渴須水穿鑿於高原至決定知近水此頌歎經法中約果歎也二頌合譬藥王汝當知如是諸人等至近於佛智慧二頌示方軌二初頌方軌三初頌標章若人説此經應入如來室至廣為分別説二頌解釋大慈悲為室柔和忍辱衣諸法空為座處此為説法三頌勸修若説此經時有人惡口罵加刀杖瓦石念佛故應忍二頌利益六初明五益意我千萬億土現淨堅固身於無量億劫為衆生説法此總明如來以五事利益之意也正由應身遍滿十方能為五事守護行人五事者如前第一遣化人乃至第五與總持是也二頌遣四衆若我滅度後能説此經者至供養於法師三頌遣化人引導諸衆生集之令聽法至為之作衛護四頌與總持若説法之人獨在空閉處至為説令通利五頌見佛身若人具是德或為四衆説空處讀誦經皆得見我身六頌遣八部若人在空間我遣天龍王至能令大衆喜三結勸若親近法師速得菩薩道隨順是師學得見恆沙佛妙法蓮華經見寶塔品第十一梵語塔婆或云窣堵波此翻方墳亦翻圓冢義翻靈廟阿含明四處起塔謂佛生處得道處轉法輪處入滅處今之寶塔是先佛入滅塔也先佛已居今佛並坐當佛亦然此塔從地涌出者正為證前起後證前者證前三周説法皆是真實起後者若欲開塔須集分身明玄付囑聲徹下方召本弟子論於壽量四衆皆覩故言見寶塔品二寶塔品二初長行三初明多寶涌現六初塔現之相爾時佛前有七寶塔至種種寶物而莊校之七寶為塔者用表七覺支七聖財為塔塔者實相之境法身所依之處也高五百由旬者是二萬里蓋用竪表因中萬行果中萬德以因望果即高義也廣二百五十由旬者即是一萬里橫表萬善莊嚴即廣義也地者無明心地也以無所破破於無明以無所住住第一義空種種寶物者衆多定慧而莊校也妙樂云定慧無多對暗散説又定慧遍攝故亦云多七覺等者既是佛塔又證實經並用無作七覺七財也五千欄楯龕室千萬至高至四天王宮爛楯是總持龕室千萬者無量慈悲之室亦是無量空舍幢幡是神通勝相垂寶瓔珞者四十地功德上嚴法身下被衆生也寶鈴萬億即八音四辨四面出香者四諦道風吹四德香也高至四天王宮者窮四諦理也妙樂云垂寶等者從因至果果德皆藉因中萬行由莊嚴故即能下化如嚴復垂也二諸天供養三十三天雨天曼陀羅華恭敬尊重讚歎諸天供養事解可知更復約理釋之住行向三十心為三十十地為一等覺為一妙覺為一合為三十三同依一實相境如三十三天同居忉利也雨天曼陀羅者必雨四華表初心具四十二地功德後心亦爾皆以四十地所有因華歸向法身如三十三天雨華供養寶塔也餘諸天龍等供養寶塔即是內凡外凡等亦依實相向果行因也三多寶稱歎爾既寶塔中出大音聲至如所説者皆是真實此多寶稱歎釋迦正是證前開權顯實不虗也平等大慧即是諸佛智慧也平等有二一法平等即大慧所觀中道理也二衆生平等謂一切衆生皆用因理以至於果同得佛慧也若所觀理與衆生異不名大慧大者如前高廣義約觀心者空觀竪等假觀橫等中觀橫竪平等平等雙照即是平等大慧也如是如是者一如法相是歎佛所説稱於實故二如根性是歎佛至第五時方説法華不差機故皆是真實者如法相説故言真實也四時衆驚疑二初得法喜爾時四衆見大寶塔住在空中至皆得法喜二衆疑怪怪未曾有從座而起恭敬合掌却住一面五大樂説問三初問何因有此寶塔爾時有菩薩摩訶薩至以何因緣有此寶塔二問何故塔從地出從地涌出三問何故發是音聲又於其中發是音聲六如來答釋三初答第二問爾時佛告大樂説菩薩至為作證明讚言善哉上問何故從地涌出佛今答云此佛有願為證法華故從地涌出也二追答第一問彼佛成道已臨滅度時至應起一大塔上問以何因緣有此寶塔今答云由彼臨滅有命令造此塔也三答第三問其佛以神通願力至從地涌出讚言善哉善哉上問何故發是音聲佛今答云彼佛為作證明故發是音聲也釋論明多寶佛不得説法而取滅度何謂不説當是多寶亦得開三但不得至法華顯實故釋論云不説法耳以是義故雖復滅度在在處處凡有説法華經便隨喜作證也二明分身遠集七初請見多寶是時大樂説菩薩至我等願欲見此佛身承佛神力者欲開塔須集分身佛佛集即付囑付囑即召下方下方弟子涌出即應開近顯遠此是大事之由豈非佛神力令問也二應集分身佛告大樂説菩薩摩訶薩至今應當集三樂説請集大樂説白佛言至欲見世尊分身諸佛禮拜供養四放光遠召爾時佛放白毫一光至所照之處亦復如是五諸佛同來爾時十方諸佛至并供養多寶如來寶塔六嚴淨國界三初變娑婆時娑婆世界即變清淨至一方所分之身猶故未盡此以八背捨三昧之力能變娑婆之穢土而成清淨之土表淨除見思惑也八背捨釋見化城喻品中二變八方時釋迦牟尼佛欲容受至諸天寶華遍布其地此以八勝處三昧轉變自在之力第二變二百萬億那由他國皆令清淨表淨除塵沙惑也八勝處者一內有色相外觀色少觀道未增故須觀少二內有色相外觀色多觀心既調觀多無妨故言多三內無色相外觀色少四內無色相外觀色多五青勝處若觀青色轉變自在少能多多能少勝於背捨所見名青勝處六黃勝處七赤勝處八白勝處俱類青勝處中分別今用四色為勝處依大智論也若瓔珞經則以四大為四勝處三重更變釋迦牟尼佛為諸佛當來坐故至遍滿其中此以十一切處三昧於境無間所觀普遍之力第三變二百萬億那由他國皆令清淨表淨除無明惑也十一切處者一青一切處還取前背捨勝處中少青色使遍一切處皆青也二黃一切處三赤一切處四白一切處五地一切處還取前背捨勝處中少地色使一切處皆地也六水一切處七火一切處八風一切處九空一切處還入前空背捨定使一切處皆空也十識一切處還入前識處背捨使一切處皆有識也妙樂云如上三變淨土由背捨等者問佛有首楞嚴三味之力何以仍用小乘背捨等事禪又表破三惑復非所治答是如來定聖行中攬因成果果地事用無爽於理即首楞嚴中具諸三味非昔因時見禪法界此背捨等豈能變過三千若論所表不妨三變表破三惑七與欲開塔五初諸佛問訊説欲是時諸佛各在寶樹下至諸佛遣使亦復如是諸佛同與欲開塔如僧中作法與欲意也大集經明若干佛與欲華嚴經亦説十方若干佛同説華嚴大品經亦云千佛同説般若皆不云是釋迦分身準今經者應是分身彼大集等猶帶方便故時中不顯説是分身耳今經非但數多亦且直説是我分身咸來與欲開塔也妙樂云如僧中與欲者但是引例而已不必全同僧中法事故云如耳多寶願力須諸佛集復令時會知分身多故此諸佛為開塔而集集又不至但遣侍者傳問訊等狀如與欲故諸侍者但申問訊無説欲辭大集若干諸佛與欲者於欲色二界大空亭中廣集十方一切諸佛南方有佛名曰金藏彼諸菩薩見光明已問於彼佛彼佛答云北方世界有佛名釋迦牟尼欲為大衆説法破大憍慢遣使從我索欲我今與之餘方亦爾補注云作法與欲者四分律鈔云凡言欲者希須為義欲明僧作法事意決同集但由緣差不遂情願令送心達僧知無違背法事如布薩説戒等其欲辭曰大德一心念某甲比丘如法僧事與欲清淨二釋迦指開塔戶爾時釋迦牟尼佛至如却關鑰開大城門開塔表開權見佛表顯實亦是證前復將開後也如却關鑰者却猶除也關是橫木持其門者鑰即鎖也表執迹之障除顯本之機動也三四衆皆同見聞即時一切衆會至散多寶佛及釋迦牟尼佛上四二佛分座而坐爾時多寶佛於寶塔中至坐其半座結加趺坐古佛塔現示滅而不滅釋迦入塔示生而不生不生不滅故並坐表之又多寶久滅今出證經生不生也往昔滅度猶現全身滅非滅也既非生滅常住不移可表法身釋迦入塔二身相稱如智稱境可表應身五四衆念請加被爾時大衆見二如來至接諸大衆皆在虗空三明釋迦唱募三初明大聲唱募以大音聲普告四衆至廣説妙法華經今正是時二明付囑時至如來不久當入涅槃三明付囑有在佛欲以此妙法華經付囑有在有在者若佛在世隨機利物自説正法無待他人今佛化緣既盡欲令此法利益無窮故須付囑流通也付囑有在者此有二意一近令有在付八萬二萬舊住菩薩此土弘宣二遠令有在付本弟子下方千界微塵數菩薩令觸處流通妙樂云八萬二萬者八萬在法師品初二萬在持品之首二偈頌三初頌多寶滅度爾時世尊欲重宣此義而説偈言聖主世尊雖久滅度至在在所往常為聽法二頌分身遠集又我分身無量諸佛至以是方便令法久住此八行半頌分身佛集上文有七今文甚略仍不次第初三行頌第二應集義兼大樂説欲見及以請集次一行頌土淨次四行半頌諸佛同來三頌釋迦付囑二初舉三佛以勸流通三初募覓其人告諸大衆我滅度後至今於佛前自説誓言二舉勸流通其多寶佛雖久滅度至當發大願令得久住此正舉三佛以勸持經也三釋勸之意其有能護此經法者至多寶如來及諸化佛能持此經即是供養三佛及見三佛以釋勸意也二舉難持法勸流通二初正舉勸三初誡勸發願諸善男子各諦思惟此為難事宜發大願二舉難持勸諸餘經典數如恆沙至如斯經典是則為難妙樂云八萬四千及十二部皆通大小若通於小但令聽者得小乘神通亦未為難若立有頂此約不得通者為況故知圓經暫讀暫説誠為不易三釋難持意我為佛道於無量土至若有能持則持佛身若有能持即持佛身此意豈易妙樂云若有能持則持佛身者經有體宗用三衣座室三即三身故體室即法身宗座即報身用衣即應身也二釋勸意三初重募持經之人諸善男子於我滅後至今於佛前自説誓言二能持難持佛喜此經難持若暫持者至如是之人諸佛所歎三能持即成勝行是則勇猛是則精進至一切天人皆應供養此明能持此經則成勝行也勇猛至住淳善地自行之勝行也佛滅度後至皆應供養化他之勝行也妙法蓮華經提婆達多品第十二提婆達多亦云提婆達兜此云天熱以其生時人天等衆心皆驚熱故亦云天授謂從天乞得故是斛飯王子阿難親兄入大乘論問彼提婆達多世世為佛怨云何而言是大菩薩答若是怨者云何而得世世相值如二人行東西各去步步轉遠豈得為伴報恩經云若有人言提婆達多實是惡人入阿鼻獄者無有是處大雲經云提婆達多不可思議所修行業同於如來若夫自造三逆及教闍王害父害母如此等事皆是大士善權現化行於非道通達佛道衆生根性不同入道有異一逆一順弘道益物故知現逆為懼惡人令不起惡耳鳩摩羅什譯此經竟命僧睿講之睿開為九轍又有二十八品生起則元有二十八品後因長安宮人請此品入內江東所傳止得二十七品梁有滿法師講經一百遍於長沙郡燒身仍以此品安持品之前陳有南嶽大師次此品在寶塔之後及以正法華勘之甚相應故知二師安次深得經意此品來意引古弘經傳益非謬明今宣化事驗不虗舉往勸今使流通也二提婆達多品引往弘經彼我兼益以證功德深重二初明昔日達多通經釋迦成道三初昔持經相二初長行四初求法時節爾時佛告諸菩薩至求法華經無有懈倦二正明求法二初明發願於多劫中常作國王發願求於無上菩提心不退轉二明修行二初明欲滿檀那勤行布施為欲滿足六波羅蜜至身肉手足不惜軀命六波羅蜜釋見序品今更約教分別者大論云捨依正名檀防七支名戒打罵不報名忍為事始終名精進四禪八定名禪分地息諍名般若此三藏教明六度相也若施者受者及以財物三事皆空名檀不見持犯名戒能忍所忍不可得名忍身心不動名精進不亂不味名禪非智非愚名般若此通教明六度相也若六度修之皆有十利具如疏文此別教明六度相也若以第一義熏修若行若坐捨攀緣是檀捨攀緣不犯是戒於境界不生瘡疣是忍不捨離著之行是精進於事中不放逸是禪於諸法體性無生是般若復次於陰捨是檀不計念陰是戒於陰無我想是忍於陰起怨想是進於陰不熾然是禪於陰畢竟棄是般若又於界捨是檀於界不擾濁是戒於界捨因緣是忍於界數數捨是進於界不起發是禪於界如幻想是般若如是等是名第一義善巧方便甚深法要能滿六波羅蜜此圓教六度相也妙樂云依第一義以成波羅蜜者謂但取初心一念具足則一色一香無非十度二明為滿般若推求妙法時世人民壽命無量至吾當終身供給走使三求得法師時有仙人來白王言至若不違我當為宣説四受法奉行王聞仙言歡喜踊躍至精勤給侍令無所乏二偈頌五初頌求法時節爾世尊欲重宣此義而説偈言我念過去劫為求大法故二頌正明求法雖作世國王不貪五欲樂至身當為奴僕三頌得説法師時有阿私仙來白於大王至吾當為汝説阿私此云無比即達多往世名也四頌受法奉行時王聞仙言心生大喜悅至勤求於大法木實曰果草實曰蓏五頌結證勸信亦不為己身及以五欲樂至今故為汝説二結會古今二初正結會古今佛告諸比丘爾時王者至今提婆達多是二明師弟功滿二初明弟子因報已滿三初明因滿由提婆達多善知識故至慈悲喜捨善知識有三一外護二同行三教授止觀云夫外護者不揀黑白但能營理所須如母養兒如虎銜子調理得所舊行道人乃能為耳是名外護善知識二同行者更相䇿發不昏不散日有其新切磋琢磨同心齊志如乘一船互相敬重如視世尊是名同行善知識三教授者內外方便通塞妨障皆能決了善巧説法示教利喜轉破人心是名教授善知識輔行云言外護者自己身心為內望他身心為外為外所護故名外護言同行者己他遞相䇿發人異行同故名同行言教授者宣傳聖言名之為教訓誨於我名之為授增一阿含經云莫與惡知識與愚共從事當與善知識智者而交通若人本無惡親近於惡人後必成惡人惡名遍天下善知識反此是故應親近慈悲喜捨名四無量心者從境以得名以所緣衆生無量故能緣之心亦隨境無量故悉受無量心名一慈無量心者能與他樂之心名之為慈心無瞋恨怨惱廣大無量遍滿十方名慈無量心二悲無量心者能拔他苦之心名之為悲心無瞋恨怨惱廣大無量遍滿十方名悲無量心三喜無量心者慶他得樂生歡悅心名之為喜也無瞋恨怨惱廣大無量遍滿十方名喜無量心四捨無量心者若緣於他無憎無愛之心名之為捨心無瞋恨怨惱廣大無量遍滿十方名捨無量心此四亦名四無量定二明果圓三十二相八十種好至成等正覺廣度衆生三十二相八十種好十八不共釋見譬喻品十力四無所畏釋見方便品四攝法者一布施攝菩薩以無所捨心行於財法二種布施若為樂財衆生即以財施而攝取之若為樂法衆生即以法施而攝取之二愛語攝菩薩若以善軟之言隨順一切衆生安慰開喻則一切衆生之所樂聞因是生親愛心依附受道三利行攝菩薩隨起身口意行能令一切衆生各沾利益四同事攝菩薩用法眼明見衆生根緣隨有同欣之者即分形散影普和其光同彼事業各使沾益此四通稱攝者衆生情所愛者即是此之四法若用此四法同情接引則衆生方乃依附然後導以大乘正道而度脫之故云先以欲鈎牽後令入佛道正覺者離邪曰正背妄曰覺三結由益皆因提婆達多善知識故二明法師妙果當成三初明果成告諸四衆提婆達多至世界名天道二明化度時天王佛住世二十中劫至得無生忍至不退轉三滅後益時天王佛般涅槃後至發菩提心至不退轉三斷疑勸信佛告諸比丘未來世中至若在佛前蓮華化生蓮華化生者胎經云蓮華生者非胎卵濕化之化生也非化而言化耳請觀音經云蓮華化生為父母無量壽佛經云華臺久者為胎生實非胎也例蓮華生者亦稱濕卵而非濕卵妙樂云非胎卵濕化之化生者不同界內四生中之化生如諸天化生仍在父膝等生況同四趣中耶今言化生者忽然而有如藥王中云於淨德王家忽然化生亦稱濕卵等者但以蓮華生濕未剖如濕如卵含在華內義之如胎也二明今日文殊通經龍女成佛二初明文殊通經五初智積請退於時下方多寶世尊所從菩薩至當還本土智積謂多寶為證經故出勸物流通既訖是故請還二釋尊止之釋迦牟尼佛告智積曰至論説妙法可還本土釋尊止之者雖迹門事訖本門未彰故託在文殊以留多寶佛之密意非菩薩所知三文殊尋來爾時文殊師利坐千葉蓮華至共想慰問却坐一面妙樂云有人問云文殊序中在座今云何自海而來今為答之豈以凡情而度聖境不起此會於海化物義亦何辜亦可在序一期益訖去時豈要白知來時大利方生與衆自海而至或當彼有廣文具有出會之語而傳至此者略耳問三千世界之外各四百萬億無復大海文殊何故仍云從海涌出答事釋未爽況不思議今以三義通之一者既移天人及變大海若從所移處來處無遠斃二者海衆縱移而龍宮不動龍謂不動而所居已變從變而不變處來有何不可三者無緣者被移有緣者今來此不思議山海宛然令衆不見但是變見非謂改體文殊既不起而往其土亦即穢而淨故淨名云移置他土都不使人有往來想此中乃使有往來想而本不移所以理雖無動化事成規故使所見不同來往時異菩薩化儀尚爾豈佛設變同凡四智積問化智積菩薩問文殊師利至所化衆生其數幾何五文殊決答七初答利益甚衆文殊師利言其數無量至且待須臾自當證知二蒙益者集證所言未竟無數菩薩坐寶蓮華至住在虗空三皆是文殊化此諸菩薩皆是文殊師利至皆共論説六波羅蜜四聲聞先稟小本聲聞人在虗空中説聲聞行先稟權教住二乘道但説斷生死五今聞實住大今皆修行大乘空義今聞實教悉住大乘法也六文殊結利益文殊師利謂智積曰於海教化其事如是七智積偈讚歎爾時智積菩薩以偈讚曰大智德勇健至廣導諸衆生令速成菩提二明龍女利益九初明文殊自敘文殊師利言我於海中唯常宣説妙法華經二明智積致問智積問文殊師利言至修行此經速得佛不三明文殊實答文殊師利言有至志意和雅能至菩提妙樂云文殊所歎龍女不出弘誓定慧諸行智慧下是慧深入等是定慈念等是誓功德下行也下去諸文有此流例準此應知得不退轉即初住念不退也四智積執別疑智積菩薩言至不信此女於須臾頃便成正覺無量劫行行是別教法智積難今龍女須臾成佛乃是執別疑圓是故不信五龍女以圓釋二初經家敘現申敬言論未訖時龍王女忽現於前至以偈讚曰二偈頌讚三初明持經得解深達罪福相遍照於十方罪福相者約七方便迭論罪福今既開權無罪無福唯一實相名為深達十方即十法界同以實慧明之故言遍照二明成就二身微妙淨法身具相三十二至無不宗奉者具三十二相者深得法身之理即備相好如大品明欲得一切法當學般若如得如意珠也二乘但得空空無相好也四明尊者解謗書云龍女欲彰開權妙相故云法身具三十二相此一一相全理顯現法身遍處三十二相相相周遍法具萬德相亦須具此之妙身不名尊特更指何身為尊特耶釋迦既入多寶塔內驗非現起巍巍堂堂方名尊特秪就中道感應於丈六身便為相海此就開權即劣顯勝而明尊特乃即劣之尊特也三明引佛為證又聞成菩提唯佛當證知我闡大乘教度脫苦衆生六身子挾藏難二初總難信時舍利弗語龍女言至具修諸度然後乃成二出五礙又女人身猶有五障至云何女身速得成佛身子挾三藏權教之意而難也七龍女以實釋二初獻珠表得圓解爾時龍女有一寶珠至觀我成佛復速於此圓珠表其修得圓因奉佛是將因尅果佛受疾者表龍女獲果速也此即一念坐道場成佛不虗也二正示因圓果滿當時衆會至普為十方一切衆生演説妙法胎經云魔梵釋女皆不捨身不受身悉於現身得成佛故偈言法性如大海不説有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌妙樂云問龍女作佛者為不捨分段即成佛耶若不即身成佛此龍女成佛及胎經之文云何通耶答文殊入海通經龍女已得不捨不受之實證今於靈山捨女變男往彼成佛乃由實證起於權用以證圓經成佛速疾若實行不疾權行徒引是則權實義等理不徒然故胎經從實得説若實得者從六根淨得無生忍豈不能如龍女應物所好容起神變現身成佛及證圓經既證無生豈不能知本無捨受何妨捨此往彼補注云魔王梵王帝釋三人并女是四人皆不捨分段生身不受實報法性身悉於現身得成佛所言女者過去佛世彼時人民悉受女身一日一時即成佛道不捨身不受身也八時衆聞見得益二初正明見聞爾時娑婆世界菩薩聲聞至普為時會人天説法二人天歡喜心大歡喜悉遙敬禮至發菩提心而得受記無量衆生等彼土蒙益也娑婆世界等此土蒙益也南方緣熟宜以八相成道此土緣薄秖以龍女教化此是權巧之力得一身一切身普現色身三昧也不退義釋見序品九智積身子默受智積菩薩及舍利弗一切衆會默然信受智積初未信受執別教為疑身子亦未信受挾三藏教為難今方知龍女依圓修行速疾成佛故與一切默然信受也妙法蓮華經持品第十三二萬菩薩奉命弘經故名持品重勸八十萬億那由他菩薩弘經故名勸持品問何故爾二萬是法師品初別命之數故奉旨受持八十萬億那由他等前無別命止是通覓故今以佛眼視令其發誓此土通經通經證驗深重佛意殷勤是故蒙勸而弘故有二意也三持品明忍力成者此土弘經新得記者他土弘經二初明受持三初二萬菩薩奉命此土弘經爾時藥王菩薩摩訶薩至種種供養不惜身命衆生善少衆生濁也多增上慢見濁也貪利供養煩惱濁也增不善根命濁也遠離解脫劫濁也若非深位菩薩忍力成就安能於此五濁惡世弘通此經耶二諸大聲聞發誓他國流通爾時衆中五百阿羅漢至瞋濁諂曲心不實故問此諸聲聞既得授記已登初住破無明惑得無生忍成大菩薩何故不能於此惡世通經答為引初心始行菩薩未能惡世苦行通經復欲發起如來開於安樂行品也妙樂云為引始行及開安樂行者始行見諸大德尚不能此土弘經況我等耶是故須下安樂行品為始行弘經之軌故文殊問云菩薩於後惡世云何能説是經三諸比丘尼請菩提記四初姨母請記二初請爾時佛姨母至瞻仰尊顏目不暫捨波闍波提亦云憍曇彌此云衆主二記於時世尊告憍曇彌至得阿耨多羅三藐三菩提我先總説一切聲聞皆已授記者即指五百弟子品偈云迦葉汝已知等一行半偈也二耶輸請記二初請爾時羅睺羅母至世尊於授記中獨不説我名二記佛告耶輸陀羅至佛壽無量阿僧祇劫三諸尼領解爾時摩訶波闍波提至即於佛前而説偈言世尊導師安隱天人我等聞記心安具足四諸尼發願諸比丘尼説是偈已至於他方國廣宣此經二明勸持二初長行五初明佛眼視爾時世尊視八十萬億那由他諸菩薩摩訶薩眼視默勸而不告言者上來雖不別命諸菩薩而如來已舉持經功德深厚引證分明又多寶分身遠來勸發此之殷勤事義已足有欲應命宜即發誓無煩復言又將護聲聞他方弘經之願故不稱揚此土弘經之事也二菩薩請告是諸菩薩皆是阿惟越致至當如佛教廣宣斯法阿惟越致釋見譬喻品三明佛默然復作是念佛今默然不見告敕我當云何四菩薩知意時諸菩薩敬順佛意并欲自滿本願五發誓通經便於佛前作師子吼至在於他方遙見守護二偈頌四初披衣弘經三初總論時節以明著衣即時諸菩薩俱同發聲而説偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣説妙樂云諸菩薩等請護弘經即是自述弘經方軌以由佛於法師品中説方軌竟寶塔品募覓用方軌人達多品引往用方軌者釋迦即是稟方軌衆故云以身為牀座等持品即是惡世方軌安樂行是始行方軌故云住忍辱地等若不爾者則弘經無軌無軌弘經斯無是處如赤身入陳自損不虗披鎧之言應不徒設二別明所忍之境三初通明邪見之人有諸無智人惡口罵詈等及加刀杖者我等皆當忍此下九行別明所忍之境今一行通明邪見之人即俗衆也二道門增上慢者惡世中比丘邪智心諂曲未得謂為得我慢心充滿三僭聖增上慢者或有阿練若衲衣在空間至説外道論義阿練若或曰阿蘭若大論翻遠離處薩婆多論翻間靜處或翻無諍坐禪三昧經云無諍者將護衆生不令起諍也羅什注淨名經云無諍有二一以三昧力將護衆生令不起諍心二隨順法性無違無諍妙樂引寶雲經云阿蘭若者不與世諍不近不遠便於乞食有樹陰多華果足淨水無難事不險阻易登陟獨無侶誦所聞凡居蘭若為調煩惱自舉蔑他非無諍行假名阿練若此舉其身業不善也好出我等過此舉其意業不善也而作如是言等此舉其口業不善也三總明著衣之意我等敬佛故悉忍是諸惡至皆當忍受之敬佛忍惡此與常不輕意同箋難云為斯所輕言汝等皆是佛者罵法有二謂善惡也罵人為佛輕之甚矣濁劫惡世中多有諸恐怖至皆當忍是事忍辱鎧者鎧甲也中阿含第五云黑齒比丘訴佛云舍利弗罵我説我佛疾喚舍利弗實罵説否舍利弗言心不定者或説罵我心已定云何説罵如折角牛不觸嬈人如殘童子耻不惱彼截其兩手不能害物我心如地淨與不淨大小便利涕唾受而不罵心如掃淨不淨俱掃云何罵説於他佛問舍利弗如是惡人汝云何觀答人有五種一身善口意不善但念其善不念不善如納衣比丘見糞聚弊帛左捉右舒截棄不淨而取於淨念用其身淨以規身我棄其口意以誡我口意二口行淨身意不淨亦念用其口淨以規我口棄其身意以誡我身意三意行淨身口不淨亦念其意淨以規我意棄其身口以誡我身口四三業皆不淨者雖無可用當痛念之使得值善知識治其三業勿令墮苦五三業皆淨者常念是人以自訓況念齊願齊以去我惡此是三藏教中用苦無常不淨無我空為鎧也毗婆沙論云罵是一字一字不成罵二字成罵無有一時稱二字者若稱後字前字已滅又能罵所罵皆空於我何為此用通教空為鎧也又云凡聖俱有三受云何差別凡夫於若受則嗔於樂受則喜於不苦不樂受則癡聖人於苦受不瞋於樂受不愛於不苦不樂受不癡三使不能使於使得解脫故有凡聖之異如此等有無差降者此用別教為鎧也今經明鎧者以念佛為鎧是念法佛以第一義佛即是法故文云念佛告敕即法也佛即是僧僧即事理俱和毗盧遮那遍一切處如此之鎧一鎧一切鎧即圓教鎧也妙樂云念佛為鎧者觀受為法界故云是念法佛等也由能觀別得諸教名所觀三受其相不別故持經者應觀三受故云能忍諸惡行等輔行七上云一切行中瞋害尤甚故忍最難大論云如天帝問佛若行忍者唯有一事最不可耐小人輕慢謂為怖畏故不應忍佛言若以小人輕慢謂為怖畏欲不忍者不忍之罪甚於此也何以故不忍之人賢聖善人之所輕慢忍辱之人而為小人之所輕慢二輕之中寧取何輕故知寧為小人之所輕不為賢聖之所賤何以故無智之人輕於不可輕賢聖之人賤於所可賤為是義故彌須行忍二入室弘經諸聚落城邑其有求法者我皆到其所説佛所囑法三坐座弘經我是世尊使處衆無所畏我當善説法願佛安隱住四總結請知我於世尊前諸來十方佛發如是誓言佛自知我心
