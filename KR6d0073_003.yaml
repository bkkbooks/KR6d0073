body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯上天竺講寺住山比丘一如集注妙法蓮華經藥草喻品第五此品具山川雲雨獨以藥草標名者土地是能生雲雨是能潤草木是所生所潤所生所潤通皆有用而藥草用強有漏諸善悉能除惡而無漏之善為最無漏衆中四大弟子以長者窮子之譬領佛火宅之喻深會聖心今如來述其得解以喻其人故稱藥草喻品妙樂云問若從佛述應云草木及以地雨今品既是述成之文如何但指聲聞中草云四大弟子等耶答實如所問言通意別故云藥草言別意通且指聲聞三藥草品如來述成二初略述成二初雙述善哉爾時世尊至善說如來真實功德誠如所言兩稱善哉者雙述也一善哉述其兩處領實一善哉述其兩處領權善說如來真實功德者辭致曲巧故言善說皆是佛法故言真實真實是述其領實功德是述其領權誠如所言者印定之旨也妙樂云兩處者謂方便火宅即法譬二周也二領所不及如來復有無量無邊阿僧祇功德至說不能盡二乘齊教止領二乘得益不道人天及藏通別菩薩得益是為領所不及也妙樂云領所不及者舉迦葉之不及顯餘類之有分又說不能盡之言寄之以明不盡佛說不盡況迦葉耶二廣述成二初長行二初法說二初舉法王不虗迦葉當知如來是諸法之王若有所說皆不虗也佛法雖多不出權實權實之外更無別法而向言無量者此意難信故舉法王發言誠諦以勸信也二述開三顯一二初約教明開權顯實二初約教述開權於一切法以智方便而演說之一切法者謂七方便法也此法雖多以方便波羅密隨其類音說之無不逗會為人天說戒善為二乘說諦緣為三藏菩薩說事度為通教說無生為別教說次第開如來藏是名述其領開三也二約教述顯實其所說法皆悉到於一切智地地者實相也究竟非二故名為一其性廣博故名為切寂而常照故名為智無住之本立一切法故名為地妙樂云究竟等者此明諸權皆歸實相是故三教教智未會不名為一寂而常照者智所依地能生諸智故名智地地即無住本也二約智明開權顯實二初約智述開權如來觀知一切諸法之所歸趣至通達無礙觀一切所歸趣是權實能照權也知一切所歸趣是權智能識藥也知深心所行是權智能知病也藥病俱是權法權法各有歸趣戒善等近趣人天若作遠緣低頭舉手遠趣佛果念處道品等近趣涅槃若作福德莊嚴汝等所行是菩薩道遠趣寶所乃至六度通別等法近遠歸趣途轍不同可解深心所行有二種若深心著於依正者起深重十惡障人天乘若深心著於所執法者起四倒三道六蔽四住五住障四聖乘當知深心病相不同如來以權智照之通達無礙也二約智述顯實又於諸法究盡明了示諸衆生一切智慧又於諸法究盡明了者是實智能照實也一切權法無不入實故言究盡佛眼所見故言明實智所知故言了若此智照此藥此病不照彼藥彼病彼智照彼不能照此種別不同者權智照也一智遍照一切藥一切病實智照也能示衆生如此圓融境智故言一切智慧也又上權智文中言通達無礙者是約權論實今實智文中言又於諸法者是約實論權二文互現者正明實是權實權是實權當知究竟非權非實非差別非不差別以智方便權有差別悉到智地則無差別二譬說二初正明二初開譬二初有差別譬述權教智六初土地譬迦葉譬如三千大千世界山川溪谷土地大千世界譬衆生世間山川溪谷譬五陰世間世界無別法為山川溪谷土地所成衆生無別法為五陰所成土地既通譬識陰則山川溪谷譬餘四陰又別譬者山譬菩薩五陰川譬支佛五陰溪譬聲聞五陰土地譬天五陰谷下譬人五陰一一五陰皆有習因習果所依猶山川等為草木種子質幹所依也川者穿也水大能通穿者曰川凡通水之處俱名川也谷者水注于溪又泉之通川曰谷谷穀欲二音並通二卉木譬所生卉木藂林及諸藥草種類若干名色各異卉是草之都名木是樹之總稱衆草成藂衆樹成林治病力用勝者稱為藥如善法皆能治惡而無漏善治惑義勝故譬藥草五乘七方便因果種子不一故言種類若干如是種類各有稱謂即是名各有體相即是色故言名色各異三密雲譬密雲彌布遍覆三千大千世界密雲者譬佛三密也雲有形色譬佛應世即身密雲能覆蔭譬佛慈悲即意密下文雷聲遠震譬佛說教即口密以慈悲薰應身說法遍十法界故言彌布也妙樂云凡言三密必約應化若自受用報及平等法身何所論密四注雨譬一時等澍譬佛用口密八音四辨宣注法雨利潤衆生也五受潤譬其澤普洽卉木藂林至大根大莖大枝大葉法雨普潤七種衆生心地所有習因種子即生名為普洽根莖枝葉者信為根戒為莖定為枝慧為葉次第相資故譬此四也小根莖等即人天信戒中根莖等即二乘信戒定慧大根莖等即菩薩信戒定慧也妙樂云五乘皆藉此之四法唯有人乘缺於定慧以心所當之六增長譬諸樹大小隨上中下至而得生長華果敷實此明草木隨分受潤也七種衆生習報兩因善法既蒙法雨所潤則習報兩果各得增長也稱其種性者明施權稱機小者不過分大者不減少即是七種習報兩因也華果敷實者即是七種習報二果也妙樂云華果敷實者華如習果果如報果此隔字為對應言華敷果實二無差別譬述實教智三初一地所生譬雖一地所生道前心地所生終因道後智地方能生也妙樂云道前心地至智地能生者此道前道後之名名有通別道後定在果後道前通至凡夫故方便品中亦以等覺已前為道前此中須以博地凡夫無戒善者為道前以五乘為道中所以道前道後真如之理等皆是地地體無別然皆能生故知衆生道前心地奚嘗不有能生性耶而不能生不能成者必假道後極果智地令生令成發心已後究竟已前皆假智地而成熟之二一雲所雨譬一雨所潤一音所宣一乘法門開發道中五種善根終是一音平等之教也妙樂云五種善根即五乘也並約如來化意邊說故云終是一音言終是者終無定五故云也被物雖五化意唯一從權宜邊須名四味三三草二木譬而諸草木各有差別小草喻人天中草喻二乘上草喻藏教菩薩小樹喻通教菩薩大樹喻別教菩薩三草二木稟益不自覺知五種善根蒙佛法雨隨分增長亦不自知五種之因皆依一佛性亦不自知五乘之教皆是大乘亦不自知同歸佛慧唯有如來乃能知之也二合譬二初合差別譬二初正合六初合密雲迦葉當知至如彼大雲遍覆三千大千國土前是開譬此下合譬也如來亦復如是出現於世者即是正合應身出世也如大雲起即舉譬帖合明如來大慈現身覆育一切也以大音聲者即是舉佛口密合雲有聲也天人阿修羅者別舉三善道稟口密之益即是三乘根性三十子別稟聲益也如彼大雲即是舉譬帖合雲有聲也遍覆大千者通舉一切皆是佛子俱蒙口密之益也二合注雨二初標章門六初首唱十號於大衆中而唱是言至天人師佛世尊二唱四弘誓未度者令度至未涅槃者令得涅槃別行玄下云弘誓本成慈悲慈悲既緣苦樂弘誓亦約四諦若見苦諦逼迫楚毒辛酸緣此起誓故云未度令度若見集諦顛倒流轉迷惑繫縛生死浩然而無涯畔甚可哀傷約此起誓故云未解令解清淨之道衆生不識行此道者能出生死至安樂地欲示衆生立於此道故云未安令安滅煩惱處名為涅槃子果縛斷獲二涅槃約此起誓故云未得令得三唱三達知今世後世如實知之箋難云宿命達過去天眼達未來漏盡達現在此即三達亦曰三明四一心三智我是一切知者一切知者即具足三智也五唱具五眼一切見者一切見者具足五眼也六三業智俱知道者開道者說道者知道謂意不護開道謂身不護說道謂口不護良以如來三業常與智俱則無有失故不須護名三不護二勸聽受汝等天人阿修羅衆皆應到此為聽法故勸三善道宜往聽法也三合土地爾時無數千萬億種衆生來至佛所而聽法百千萬億者即是十法界衆生也今正語七方便衆生差別耳妙樂云百千等雖通十界四趣無增長義也四合卉木如來于時觀是衆生諸根利鈍精進懈怠上譬中有卉木差別大小不同今合中明根有利鈍行有進怠正是習因淺深與卉木義同也于時者若論漸初即是鹿苑初說三乘時若論中間處處得論于時利鈍者若總判者三途因惡果苦不能受道名為鈍七種方便聞教得益名為利若別判者人天但受果報不肯受道名為鈍三乘根性斷惑出界名為利又聲聞觀生滅名為鈍菩薩觀不生滅名為利通別圓三教迭論利鈍可知精進懈怠者三途放逸名為怠人天持五戒十善名為進人天不厭苦為怠二乘怖畏無常為進二乘貪證不求作佛為怠菩薩志求佛道為進妙樂云于時者觀機時也言若論者且置華嚴故利鈍之言通三四味十界故也五合受潤隨其所堪而為說法種種無量皆令歡喜快得善利隨其所堪即是稱會機宜無增減之失歡喜得善利即是各蒙法潤受益也妙樂云無增減之失者稱五乘機故無增減如人機授以十善為增天機授以五戒為減如是乃至菩薩展轉相望亦然六合增長是諸衆生聞是法已至任力所能漸得入道聞是法已合上增長之由現世安隱正合增長後生善處者是合增長之相佛如大雲普覆一切三途亦得沾潤增長如說般若方等亦明地獄得益若火滅湯冷即是現世安隱或生天上人中即是後生善處於天人中修道即是以道受樂若人天聞法持戒福德扶身鬼龍不犯即是現世安隱或天還生天人還生人或天人互生即是後生善處生能悟解即是以道受樂二乘聞法得有餘涅槃是現世安隱生方便土是後生善處於彼聞經是以道受樂若生身菩薩聞盧舍那佛說法得無生忍即是現世安隱生實報土是後生善處以道受樂離諸障礙者即是現世安隱任力所能漸得入道即後世以道受樂妙樂云經中但云善處今取惡道者一者為欲攝十界故二者三惡有七善機故二帖合如彼大雲雨於一切至具足蒙潤各得生長大雲帖合第一形聲兩益雨於一切帖合第二六章法門卉木藂林帖合第四受化衆生利鈍怠進習因深淺如其種性具足蒙潤帖合第五受潤得益各得生長帖合第六現世安隱增長也二合無差譬二初無差意合上一地一雨如來說法一相一味至究竟至於一切種智一相者衆生之心同一真如相是一地也一味者一乘之法同詮一理是一雨也昔於一實相方便開為七相於一乘法分別說有七教佛知究竟終歸一相一味也所謂下雙釋一相一味衆生心性即是性德解脫遠離寂滅三種之相所謂解脫相者無生死相離相者無涅槃相滅相者無相亦無相唯有實相故名一相此一相中三相也如來一音說此三相即是三味所謂解脫相者無分段變易二邊業縛之相故名解脫相離相者得中道智慧此慧能遠離二邊無所取著故名離相滅相者二邊因滅得有餘涅槃二邊果滅得無餘涅槃故名滅相此一味中三相也此三相則以為境界緣生中道之行終則得為一切智果故言究竟至於一切種智也妙樂云一相至一地也者真如秪是一實相耳七相秪是七方便相即行相也七教秪是七方便教也此三相下重指性三以為修境緣生下重舉修相故名為行行即因也終則下舉果地三三智滿故從智為名即是智三初釋相中性德秪是本有三道解脫相者即於業道是解脫德離相者即於煩惱是般若德寂滅相者即於苦道是法身德無生死等寄修以釋唯有下結故云實相如來一音下釋味中三相上相但云無生死相今約教乃云無二死者教在分別故也前相但云離相無涅槃相今約教乃云得中道智慧乃至離於二邊著也前相但云無相亦無相今約教乃云二邊因果滅者應云通別二惑內外二死滅也今對中道中道從理故此因果名離二邊此二涅槃永殊小典小典二滅必不同時此中二滅更無前後二差別意合上草木差別五初衆生不如其有衆生聞如來法至所得功德不自覺知其有衆生者舉不知之人法謂聞一音之法若持說者是正明不知蓋持說不同修行亦異人天作戒善之解三乘作諦緣度解解既不同即是差別所得功德不自覺知者明五人雖各稟教不知佛是一味無差別教是不識實亦不知七種方便差別之教而各執己解為實是不知權故云不自覺知也二如來能知四初約四法知所以者何唯有如來知此衆生種相體性種者三道是三德種淨名經云一切煩惱之儔為如來種此明由煩惱道即有般若也又云五無間皆生解脫相此由不善即有善法解脫也一切衆生即涅槃相不可復滅此即生死為法身也此就相對論種若就類論種一切低頭舉手悉是解脫種一切世智三乘解心即般若種夫有心者皆當作佛即法身種諸種差別如來能知一切種秪是一種即是無差別如來亦能知差別即無差別無差別即差別如來亦能知相體性約十法界十如中釋若論差別即十法界相若論無差別即一佛界相差別無差別如來能知差即無差無差即差如來亦能知體性例然可解二約三法知三初明三慧境念何事思何事修何事聞思修謂之三慧念即聞慧事是三慧之境即所聞所思所修如向教下所詮種相體性之法也皆言何者指所取境隨教則有思修不同對界則藏通以六界為境別圓以十界為境論觀則藏通以偏真為觀別圓以中道為觀也二明三慧體云何念云何思云何修云何念者念是記録所聞之法正是念慧之體也妙樂云所言體者即當體也今先言云何者指能念體思修亦然故知即是三慧當體此體即是能聞能思能修故云記録所聞等法三三慧因緣以何法念以何法思以何法修此是三慧取境聞法是其因緣如此三乘三慧昔謂境體因緣有異即是差別若入圓妙三慧即無差別此有差別無差別如來能知又差即無差無差即差如來亦能知妙樂云言取境聞法為因緣者所取之境能取之慧體即是智並名為因聞法為緣以此因緣能生三慧即是所生法也應知三慧境體及以因緣雖三而二即境智也三約二法知以何法得何法以何法即是因得何法即是果五乘之因各得其果即是差別衆生諸佛一如無二即無差別四約一法知衆生住於種種之地唯有如來如實見之明了無礙七方便住於七位故言種種之地此即差別如來用如實佛眼見之如衆流入海失於本味則無差別隨他意語以智方便而演說之則如來能知差別其所說法皆悉到於一切智地則如來能知無差別三帖合不知如彼卉木藂林諸藥草等而不自知上中下性四牒前釋能知如來知是一相一味之法至常寂滅相終歸於空一相一味如前釋相味解脫離滅等為緣分別即是一中無量究竟涅槃終歸於空即是無量中一此是牒前重釋無差別也何者一相一味解脫離滅若是二乘法體猶是差別言宣今作大乘究竟涅槃終歸於空即無差別究竟涅槃結上諸句皆非二乘有餘無餘乃是究竟涅槃也常寂滅相結上諸句非是小乘寂滅乃是常住寂滅上文云諸法從本來常自寂滅相即此義也終歸於空者非是灰斷之空方是中道第一義空也五釋其衆疑佛知是已觀衆生心欲至不即為說一切種智此釋疑也恐疑云佛昔既知始末皆一何不鹿苑即為說實釋云觀衆生心欲隨三悉檀而將護之恐其誹謗故不即說也二稱歎二初述歎汝等迦葉甚為希有能知如來隨宜說法能信能受二乘既能捨其所證入於真實甚為希有故先歎也能知隨宜說法述其能領開三能信能受述其能領顯一二釋歎所以者何諸佛世尊隨宜說法難解難知佛於一道說三深玄難解而汝能信受故歎希有也二偈頌二初頌法說三初頌法王不虗爾時世尊欲重宣此義而說偈言破有法王出現世間有者因果不亡為有二十五王三昧破二十五有如來已破此有為法中之王故云破有法王也二頌開三顯一二初頌二教二初頌權教隨衆生欲種種說法隨其樂欲方便說三也二頌實教如來尊重智慧深遠久默斯要不務速說不輕所說故云尊重深鑑小機知其未堪是故四十餘年默而不說今大機既發方為說也二頌二智二初頌釋權智有智若聞則能信解無智疑悔則為永失妙樂云問既云有智若聞此必屬機云何屬佛權智答若非有智人說云何能令有智人信故屬佛也從上隨衆生欲至此是頌上以智方便而演說之二頌釋實智是故迦葉隨力為說以種種緣令得正見頌上到一切智地也隨種種緣說種種教悉為令得大乘正見自此之前皆名邪見也妙樂云自此之前皆名邪見者迦葉等四大弟子未聞譬說已前義當邪見見未正故故引大經迦葉童子自述為例彼亦未聞涅槃已前自稱邪見也二頌譬說二初頌開譬二初頌差別譬六初頌密雲迦葉當知譬如大雲至靉靆垂布如可承攬雲譬應身應身隨智慧行故云慧雲能具十二部經之法故言含潤若應身不說法如須扇多多寶者此雲不含潤也身放大光如電耀口震四辨如雷聲聞法歡喜故言悅豫九十五種邪光不現故言掩蔽除九十八種見思熱惱如地上清涼也應身降世似同三有有心往取實不可得故云如可承攬大論云須扇多佛全不說法二頌注雨其雨普等四方俱下流澍無量率土充洽八音四辨宣注法雨一時俱聞故曰四方俱下凡有心者皆蒙利潤故言率土充洽也三頌土地山川險谷頌上土地即是七方便衆生五陰今蒙法雨身口柔軟如土地得澤也四頌卉木幽邃所生卉木藥草幽邃所生者頌上衆生習因差別譬衆生久遠所植習因隱在陰界入內故言幽邃今蒙法雨悉得開發故言所生也五頌受潤大小諸樹百苗稼至草木藂林隨分受潤百穀語通取五穀譬五乘能生百善也甘蔗蒲桃譬定慧乾地普洽譬未信者令信也餘譬如文妙樂云言能生者從果以說若從因說乃是百善生於五乘大小乘因豈過十善故以十善更互莊嚴乃成萬善若不能修互嚴因者今所不論若爾人乘是五戒那言百善答酒防意地通說非無甘蔗等者既舉二物應有屬對今試對之甘蔗質一可以譬定蒲桃形多可以譬慧慧約所破定約所緣且分多一耳六頌增長一切諸樹上中下等至一雨所及皆得鮮澤二頌無差別二初正頌無差別如其體相性分大小所潤是一初二句頌所生所潤次一句頌能潤則是頌無差別也二頌差別不知而各滋茂二頌合譬二初頌合差別六初頌合密雲二初正合佛亦如是出現於世二帖合譬如大雲普覆一切二頌合注雨二初標章門二初頌十號既出於世為諸衆生至出於世間猶如大雲妙樂云此頌十號文略義含出世即無上士及佛為說即正遍知明行足世尊即第十號於天人中即調御丈夫及天人師如來即第一號來善去善兼於善逝出於世間即世間解二頌四弘充潤一切枯稿衆生至世間之樂及涅槃樂充潤一切即衆生無邊誓願度皆令離苦者皆令離於因果苦故即煩惱無盡誓願斷得安隱樂即法門無量誓願學及涅槃樂即佛道無上誓願成五乘咸有世間之樂皆令得涅槃第一之樂也二勸聽受諸天人衆一心善聽至常為大乘而作因緣妙樂云勸聽受中又更為二初二行先歎佛次為大衆下能說人尊故所說法妙甘露是不死之藥今聞妙法慧命不夭故云甘露淨法其法一味者七善無不皆歸一乘故勸聽受此舉無差以釋於差也三頌合山川我觀一切普皆平等至恆為一切平等說法佛為七種衆生說法如雨注不擇溪谷佛平等說故無彼此有機為此無機為彼植善為愛憎逆為憎若有愛憎則有彼此不於佛機者愛餘機者憎故無貪著限礙也如為一人衆多亦然至充足世間如雨普潤佛事為自魔事為他應初為來應後為去入實為坐出權為立佛觀衆生平等即是等雨山川之意此頌上無數億種衆生來至佛所而聽法也四頌合卉木貴賤上下持戒毀戒至等雨法雨而無懈倦貴賤上下約位持戒毀戒約行利根鈍根約習貴賤至利鈍亦須具歷五乘七善展轉說之五頌合受潤三初總明受潤一切衆生聞我法者隨力所受住於諸地二別明受潤五初小草人天受潤或處人天轉輪聖王釋梵諸王是小藥草人天俱未斷惑合為小草二中草二乘受潤知無漏法能得涅槃至得緣覺證是中藥草二乘俱有智斷合為中草六神通三明釋見譬喻品三上草三藏菩薩求世尊處我當作佛行精進定是上藥草六度菩薩志求作佛化他勝二乘獨為上草妙樂云上草為六度者既云行精進定於六度中精進為最故大論云施戒忍乃世間常法欲修定慧必須精進況復五度皆須精進故舉精進則攝於六也四小樹通教菩薩又諸佛子專心佛道至決定無疑是名小樹通教菩薩已斷通惑誓扶餘習涉有化他望下為優比上為劣故名小樹五大樹別教菩薩安住神通轉不退輪至如是菩薩名為大樹別教菩薩自行化他高廣為勝故名大樹妙樂云大樹中既云轉不退輪別人初地能轉法輪是念不退也三結所潤能潤二初帖釋所潤佛平等說如一味雨至如彼草木所稟各異二明能潤佛以此喻方便開示至於佛智慧如海一滴能潤佛智多故如海如上所潤七種衆生為少如海一滴也六頌合增長二初總頌增長二初正頌增長我雨法雨充滿世間一味之法隨力修行世間者十法界三十種世間也法本一味修之不同故云隨力修行二舉譬帖釋如彼藂林藥草諸樹隨其大小漸增茂好二別頌增長四初明人天增長諸佛之法常以一味至漸次修行皆得道果普得具足是頌理世安隱漸次修行是頌後世以道受樂也二明二乘增長聲聞緣覺處於山林至是名藥草各得增長住最後身有二解一云二乘此身若不值佛此身未必無後由見佛故成最後身即是增長義二云二乘得有餘涅槃住最後身蒙佛五味調熟乃至法華聞大乘教得入一實方名增長之義妙樂云二乘增長二解不同前釋得小乘盡生死名為最後次釋大乘中方名後身無後之言且任小教權名為無非永無也若得法身等覺一轉當入妙覺乃云最後三明通教菩薩若諸菩薩智慧堅固至是名小樹而得增長堅固是體法之智了達三界是斷惑盡四明別教菩薩復有住禪得神通力至是名大樹而得增長聞諸法空十住修空也放光度生十行修假也二頌合無差二初頌無差別之差別如是迦葉佛所說法至潤於人華各得成實譬如大雲以一味雨頌上無差別也潤於人華各得成實頌上差別也以華喻人故云人華二頌差別之無差別迦葉當知以諸因緣至漸漸修學悉當成佛以諸因緣下即是明權權即差別合上所生也今為汝等說最實事即是顯實實即無差別合上一地也非滅度者未度變易生死也獨言二乘者為其保證真空執小之心強也人天不計果為涅槃菩薩不於中間取證故但言二乘耳汝等所行是菩薩道者菩薩行道亦須斷通惑今二乘已斷此惑盡即是菩薩道道即因也蓋言二乘智斷既是菩薩之因二乘豈宜執此智斷為果故斥言是菩薩道更令修習破無明惑方得成佛故云漸漸修學悉當成佛妙樂云隋朝笈多所譯名添品法華者自餘諸文全依妙本彼見正本偈後更有一長行偈頌乃重譯之添此文後又移囑纍品安勸發品後自餘先譯並無所改重譯言辭多似正本其所添者如長行中先以日月譬用歎佛智又明五趣中有三乘等因與前文已重故什公不譯妙法蓮華經授記品第六梵語和伽羅此云授記聖言說與曰授果與心期曰記然記有多種若通記如法師品初云聞法華經一句一偈乃至一念隨喜者我皆與授記當得阿耨菩提若別記如三周中法說後記舍利弗譬說後記四大弟子因緣後記五百弟子等若正因記如常不輕云我不敢輕於汝等汝等皆當作佛若緣因記如法師品以華香等十種供養當知此人是大菩薩成就阿耨菩提若了因記如三周授三根人若正因記則廣若緣了記則狹或遲記如聲聞或速記如龍女或佛記如此文或菩薩記如不輕品雖無劫國之定亦得是記又懸記如化城品為現在弟子則曰是諸人等應以是法漸入佛道為未來弟子則曰而於彼土求佛智慧等他經但記菩薩不記二乘但記善不記惡但記男不記女但記人天不記畜今經皆記也授記亦云受記受決受莂授是與義受是得義記是記事決是決定莂是了莂四大弟子聞法譬二周開三顯一具足領解如來述成雖自知作佛而時事未審若蒙佛誠言授其當果劫國決定近遠了莂則大歡喜今從佛授與得名故言授記品四授記品授記與決二初正與中根授記二初授迦葉記二初長行六初行因爾時世尊說是偈已至廣宣諸佛無量大法二得果於最後身得成為佛至天人師佛世尊增治云最後身者遠即等覺後心方名最後近則且據今記相似位後入初住時也三劫國國名光德劫名大莊嚴四壽命佛壽十二小劫五正像正法住世二十小劫像法亦住二十小劫六國淨國界嚴飾無諸穢惡至雖有魔及魔民皆護佛法魔及魔民護佛法者寶積經云阿閦佛剎波旬魔王不能障礙菩薩聲聞而皆信樂不動佛法咸自悔責為魔波旬今迦葉成佛亦例彼佛國土也二偈頌六初頌行因爾時世尊欲重宣此義而說偈言告諸比丘我以佛眼至修習一切無上之慧二頌得果於最後身得成為佛三頌國淨其土清淨琉璃為地至乃以天眼不能數知四頌壽命其佛當壽十二小劫五頌正像正法住世二十小劫像法亦住二十小劫六總結成光明世尊其事如是二授三人記二初請四初正請爾時大目犍連須菩提至即共同聲而說偈言大雄猛世尊諸釋之法王哀愍我等故而賜佛音聲三人記中各有行因得果劫國壽命法住數量悉如文妙樂云如文者但旃延中無劫國名餘文並同二開譬若知我深心見為授記者至然後乃敢食三合譬我等亦如是每惟小乘過至爾乃快安樂四結成大雄猛世尊常欲安世間願賜我等記如饑須教食二與記二初與須菩提記二初長行五初行因爾時世尊知諸大弟子至常修梵行具菩薩道二得果於最後身得成為佛至天人師佛世尊三劫國劫名有寶國名寶生至無數千萬億那由他四壽命佛壽十二小劫五正像正法住世二十小劫至度脫無量菩薩及聲聞衆二偈頌六初誡誠聽爾時世尊欲重宣此義而說偈言諸比丘衆今告汝等皆常一心聽我所說二頌行因我大弟子須菩提者至隨佛所行漸具大道三頌得果最後身得三十二相端正姝妙猶如寶山四頌國淨其佛國土嚴淨第一至皆共合掌聽受佛語八解脫即八背捨大智度論云背是淨潔五欲捨是著心故名背捨若發真無漏斷三界結業盡即名解脫也言八背捨者一內有色相外觀色內有色相者不壞內色不滅內色相也此初背捨位在初禪能捨自地及下地故名背捨二內無色相外觀色內無色相者壞內色滅內色相也外觀色者不壞外色不滅外色相也所以然者行者為入二禪內淨故壞滅內骨人欲界結使難斷故猶觀外不淨之相也三淨背捨身作證行者除外不淨相但於定中練八色光明清淨皎潔猶如妙寶之色故名淨身作證者以無受著心而受三禪中遍身樂故名身作證四虗空處背捨若滅根本四禪色一心緣無邊虗空入定而不受著也五識處背捨若捨虗空一心緣識入定而不受著也六無所有處背捨若捨識一心緣無所有入定而不受著也七非有想非無想背捨若捨無所有處一心緣非有想非無想入定而不受著也八滅受想背捨背滅受想諸心心數法是為滅受想背捨五頌壽命其佛當壽十二小劫六頌正像正法住世二十小劫像法亦住二十小劫二與迦旃延記二初長行五初行因爾時世尊復告諸比丘衆至具菩薩道由旬亦曰踰繕那此云限量大論云由旬有三別大者八十里中者六十里下者四十里也二得果當得作佛號曰閻浮那提金光至天人師佛世尊三國淨其土平正玻瓈為地至無量萬億莊嚴其國四壽命佛壽十二小劫五正像正法住世二十小劫像法亦住二十小劫二偈頌四初誡誠聽爾時世尊欲重宣此義而說偈言諸比丘衆皆一心聽如我所說真實無異二頌行因是迦旃延當以種種至亦以華香供養舍利三頌得果其最後身得佛智慧成等正覺四頌國淨國土清淨度脫無量至無量無數莊嚴其國一切有即二十五有也三與目犍連記二初長行五初行因爾時世尊復告大衆至二百萬億諸佛亦復如是二得果當得成佛號曰多摩羅跋栴檀香至天人師佛世尊三劫國劫名喜滿國名意樂至菩薩聲聞其數無量四壽命佛壽二十四小劫五正像正法住世四十小劫像法亦住四十小劫二偈頌五初頌行因爾時世尊欲重宣此義而說偈言我此弟子大目犍連至而以供養諸佛塔廟金剎者法苑云阿育王取金幡金華懸諸剎上故曰金剎具云剎摩此云土田此乃通取國土名剎又復伽藍號梵剎者西域以柱表剎示所居處也二頌得果漸漸具足菩薩道已至號多摩羅栴檀之香三頌壽命其佛壽命二十四劫四頌國淨常為天人演說佛道至於佛智慧皆不退轉五頌正像佛滅度後正法當住四十小劫像法亦爾二許與下根說緣二初許與總記我諸弟子威德具足至於未來世咸得成佛二更說宿緣我及汝等宿世因緣吾今當說汝等善聽下根之人已聞法譬二周開三顯一復見上中二根授記而猶疑不了深生愧耻今欲增進其道先許總記更說宿緣也妙法蓮華經化城喻品第七化者神力所為也以神力故無而歘有名之為化防非禦敵稱之為城若合法者二乘涅槃權智所為也以權智力無而說有用教為化防思禦見名為涅槃喻如化城若約教釋者三藏二乘於涅槃生安隱滅度之想通教二乘亦然菩薩不爾誓願扶餘習入生死而不以空為證也別教不道城如化用城作方便斷見思惑從城門徑過不道此為極也圓教知無賊病亦不須城故言化城也今是圓教意故題為化城喻品也問此品說因緣事下根得悟應名宿世品答品初廣說因緣末則結譬化城若從前應稱宿世今從末故言化城問化城是權寶所是實何意棄實從權答由知城是化則知寶所是實故標化不失實也妙樂云三藏菩薩全未發足是故不論通教菩薩雖同至城入而能出別教十住至涅槃而不入故名徑過不極之言對小以說也三三品為下根人因緣說二初化城品正說二初先明知見久遠二初長行三初明出所見事佛告諸比丘乃往過去至彼佛滅度已來甚大久遠欲說宿世因緣故先舉過去佛以為結緣之所也二舉譬明久遠譬如三千大千世界至百千萬億阿僧祇劫地種者補注云地大種也婆沙論問云何名大種答曰大而是種能減能增能損能益是為種義三結見昔如今我以如來知見力故觀彼久遠猶若今日二偈頌三初頌出所見事爾時世尊欲重宣此義而說偈言我念過去世無量無邊劫有佛兩足尊名大通智勝二頌舉譬明久如人以力磨三千大千土至如是無量劫三頌見昔如今如來無礙智知彼佛滅度至通達無量劫無漏者於三諦法無漏失也二正明宿世因緣二初長行二初結緣由二初遠由二初大通佛成道五初佛壽長遠佛告諸比丘至五百四十萬億那由他劫那由他或阿庾多此云萬億二成道前事二初成道經時其佛本坐道場破魔軍已至而諸佛法猶不在前魔軍者因果經云魔更廣集軍衆是也垂者將及也諸佛道同為緣事異釋迦苦行六年草生攢䏶至肘不覺諸天哭喚動地不聞移座得道彌勒即出家日得道彼佛十劫猶不現前者非根有利鈍道有難易緣宜賖促應示長短耳二諸天供養爾時忉利諸天先為彼佛至至于滅度亦復如是面百由旬者四面各百由旬也三正明成道諸比丘大通智勝佛至成阿耨多羅三藐三菩提四眷屬供養其佛未出家時有十六子至瞻仰世尊以偈頌曰大威德世尊至是故咸稽首歸命無上尊智積成佛即今東方阿閦佛也盲瞑者悲昔不見佛不聞佛名義同盲瞑喜今得見得聞是故稽首歸命憺怕者安靜也五請轉法輪爾時十六王子偈讚佛已至重說偈言世雄無等倫百福自莊嚴至當轉無上輪既云無上輪即十六子請轉滿字教如今佛說華嚴也二十方梵請法二初威光照動佛告諸比丘大通智勝佛至遍滿世界勝諸天光過去因果經云薩婆悉達處胎時三千國土朗然大光日月所不照處而皆大明其中衆生各得相見初成道時亦如是朝為色天中為欲天晡為鬼神三時說法夜亦如是引今證昔其相同也二十方梵請二初九方四初東方七初覩其瑞相爾時東方五百萬億諸國土中至倍於常明二各各驚駭諸梵天王各作是念至以何因緣而現此相三遞相問決是時諸梵天王至為諸梵衆而說偈言我等諸宮殿至而此大光明遍照於十方四尋光見佛爾時五百萬億國土諸梵天王至請佛轉法輪衣裓釋見譬喻品五三業供養即時諸梵天王頭面禮佛至一心同聲以偈頌曰世尊甚希有難可得值遇至惟願哀納受頭面是身業而作是言及說偈讚歎是口業一心即意業妙樂云雨華如山樹座猶下其相如何答不思議事彼此無礙納處處字留也六請佛說法爾時諸梵天王偈讚佛已至一心同聲而說偈言世雄兩足尊惟願演說法以大慈悲力度苦惱衆生兩足尊者具足定慧二嚴也既云度苦惱衆生即是請轉半字教如今佛於鹿苑中說三藏教度五濁八苦衆生也七佛默然許爾時大通智勝如來默然許之二東南七初覩其瑞相又諸比丘東南方至各自見宮殿光明照曜二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事至為諸梵衆而說偈言是事何因緣至多是佛出世度脫苦衆生四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五三業供養時諸梵天王頭面禮佛至一心同聲以偈頌曰聖主天中王至我等宿福慶今得值世尊天中王者佛是極果聖人統王十界今是諸天所讚故云天中王也迦陵頻伽此云妙聲鳥大論云如迦陵頻伽鳥在㲉中未出發聲微妙勝於餘鳥正法念經云山名曠野其中多有迦陵頻伽出妙音聲如是美音若天若人緊那羅等無能及者唯除如來音聲故云迦陵頻伽聲也衆生盲瞑失於正見不知出要佛為指示引之令出故云為衆生作眼也六請佛說法爾時諸梵天王偈讚佛已至一心同聲而說偈言大聖轉法論顯示諸法相至忍善者增益既云顯示法相度苦衆生即與上東方請轉半字同七佛默然許爾時大通智勝如來默然許之三南方七初覩其瑞相又諸比丘南方至各自見宮殿光明照曜二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事至為諸梵衆而說偈言我等諸宮殿至為大德天生為佛出世間四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五三業供養時諸梵天王頭面禮佛至一心同聲以偈頌曰世尊甚難見至世尊大慈愍惟願垂納受六請佛說法爾時諸梵天王偈讚佛已至一心同聲以偈頌曰惟願天人尊轉無上法輪至當演深遠音既云轉無上輪即諸梵請轉對半明滿如今佛說方等也七佛默然許爾時大通智勝如來默然許之四總明六方西南方乃至下方亦復如是此西南方并西方西北方北方東北方下方總六方既云亦復如是則與上南方請轉對半明滿是同二上方六初覩其瑞相爾時上方五百萬億國土至光明威曜二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事至為諸梵衆而說偈言今以何因緣至為大德天生為佛出世間四尋光見佛爾時五百萬億諸梵天王至請佛轉法輪五三業供養時諸梵天王頭面禮佛至一心同聲以偈頌曰善哉見諸佛救世之聖尊至皆共成佛道六請佛說法爾時五百萬億諸梵天王至而說偈言世尊轉法輪擊甘露法鼓至無量劫習法既云擊甘露法鼓復云度苦惱衆生即諸梵請轉帶半明滿如今佛說般若也二近由二初轉半字法輪三初佛即受請爾時大通智勝如來至及十六王子請此結緣近由也由佛受請說法故十六王子後得覆講正作緣二正轉法輪即時三轉十二行法輪此下先轉半字法輪也三轉者謂示勸證示轉者謂此是苦乃至此是道勸轉者謂苦應知集應斷滅應證道應修證轉者謂苦我已知不復更知乃至道我已修不復更修示謂示其相狀勸謂勸其令修證謂引己證彼聲聞根鈍為其三轉緣覺次之為其再轉菩薩根利為其一轉此且一往說耳通方例皆三轉十二行者一約教謂四諦各有示勸證即十二教法輪也二約行謂四諦三轉皆生眼智明覺即十二行法輪也或通三人或約一人今就見諦道三人利根聞示轉其次者聞勸轉其次者聞證轉各生眼智明覺三人合舉故言十二行也教行相循共能摧惑名之為輪若沙門婆羅門若天魔梵及餘世間所不能轉所不能轉者沙門不聞尚不能知何況能轉支佛雖悟口不能說婆羅門雖聞其名不解其理魔王梵王亦爾夫轉者轉此法度入他心令彼得悟破六十二見乃名轉法輪為無此義魔梵等所以不能轉也妙樂云沙門謂佛法出家者不因佛說尚不知名豈能轉耶沙門尚爾況餘衆耶有云外道中出家者名沙門若爾何故云尚不能知當知以正況邪謂是苦是苦集是苦滅是苦滅道此為聲聞人先轉生滅四諦法輪也謂是苦者法界次第云苦以逼惱為義一切有為心行常為無常患纍之所逼惱故名為苦謂三苦八苦略而言之即三界內六道生死是其苦也集者招集為義即見思惑惑與業俱能招生死故名為集集為因苦為果果必有因故云是苦集此世間因果也滅者滅以滅無為義惑業既盡則無生死之纍故云是苦滅也滅諦之體是二涅槃若子縛已盡名有餘涅槃若灰身滅智名無餘涅槃道者道以能通為義正道及助道是二相扶能通至涅槃故名為道道能滅苦故云是苦滅道略則戒定慧廣則三十七道品道為因滅為果此出世因果也止觀云法性自天而然集不能染苦不能惱道不能通滅不能淨如雲籠月不能妨害却煩惱已乃見法性輔行云當知苦集但是能覆不能惱染道滅能顯而法性之理本淨法性如月苦集如雲道如却除滅如却已及廣說十二因緣法至生緣老死憂悲苦惱此為支佛轉十二因緣法輪也展轉感果為因互相由藉為緣無明者過去一切煩惱皆是無明體即是癡迷暗為性無所明了故曰無明即是惑也行者於過去世造作諸業名之為行由惑造業故云無明緣行此二屬過去因也識者有了別義名之為識以業成故牽生三界意識妄念投托母胎故云行緣識既托母胎即有暖息識三事七日一轉而成心色名是心色是質故云識緣名色六入者六根成此胎中以根有入塵之義名之為入既有心色即成就六根故云名色緣六入觸者出胎已後至三四歲由根對塵而未能了知是名為觸故云六入緣觸受者領納名受從五六歲至十二三因六塵觸六根即領納前境好惡等事雖能了別然未能起貪愛之心故云觸緣受此五屬現在果也愛者從十四五歲至十八九貪於種種勝妙資具及色欲等境然猶未能廣遍追求由領納故即起貪愛故云受緣愛取者從二十歲後凡見一切境皆生取著心由愛生著故云愛緣取此之愛取又為未來生死之因屬煩惱與過去無明同有者既著諸境起善惡業積集牽引當生三有故云取緣有亦為未來生死之因屬業與過去行同生者謂六道中受生也從有還受後世之生故云有緣生老死者受生之身熟壞名老死故云生緣老死此二屬未來果也文末而云憂悲苦惱者如妙玄云老死必憂悲也無明滅則行滅至生滅則老死憂悲苦惱滅十二因緣還是別相細觀四諦耳約苦集即有無明乃至老死約道滅即有無明滅乃至老死滅也逆順觀察並由無明為本故無明滅則行滅乃至生滅則老死滅也三聞法得道佛於天人大衆之中至無量無邊不可稱數不受一切法者不受諸見悟初果也得解脫者脫子果兩縛得無學也深妙定者即俱解脫也三明等如前釋初說四諦十二因緣時六百萬億那由他人得道第二三四說法時得悟之人轉多於前故不可稱數妙樂云俱解脫人具足觀練熏修事定名深妙耳二轉滿字法輪七初王子出家爾時十六王子至求阿耨多羅三藐三菩提沙彌此云息慈謂息惡行慈也諸根者六根也六根清淨故言通利又六根互用故言通入佛境界故言利智慧明了者開示悟入也二請修學法俱白佛言世尊是諸無量至深心所念佛自證知十六子再請廢半明滿如今佛說法華也彼佛初說圓頓諸子大乘功德悉皆具足復愍諸方便未為究竟故重請佛開權顯實也聲聞皆已成就者明其障除大乘機動是故為請我等志願如來知見者此法華經但明佛之知見唯志於此即正請滿字廢半之文明顯為若此也三所將出家爾時轉輪聖王所將衆中至亦求出家王即聽許四受請說法爾時彼佛受沙彌請至皆共受持諷誦通利過二萬劫者上既為三乘說諦緣等教後受諸子請又說法華故知不容中間默然無說二萬劫中必說方等般若故下偈文云說六波羅蜜及諸神通事般若是行神通是事如今諸方等經多明不思議諸神通事故知是彼佛說方等也又偈云分別真實法即是大品明實相般若意故知是彼佛說般若也五衆解不解說是經時十六菩薩沙彌至千萬億衆皆生疑惑十六沙彌及二乘即信解衆其餘千萬皆生疑惑是不解衆此不解衆即於十六子聽覆講結法華之緣者也六說經時節佛說是經於八千劫未曾休廢七說已入定說此經已即入靜室住於禪定八萬四千劫彼佛說法華後入定正是結緣之近由由佛入定不出千萬億種諸疑惑者無所咨問故十六沙彌為其覆講說法華經也妙樂云八萬四千劫者須得具明時節之意諸佛奚嘗不與定俱但由物機在十六子結緣齊限故爾許時正法華云入定經三十萬劫不知法護何以所譯其數頓乖二正結緣二初法說結緣二初明昔共結緣四初知佛入定是時十六菩薩沙彌知佛入室寂然禪定二王子覆講各升法座亦於八萬四千劫至廣說分別妙法華經由佛入定所以得說佛知一化將畢不復熟此段之人故令王子共其結緣又知此等必由王子究竟得度所以入定久而不出也三衆得利益一一皆度六百萬億那由他至三藐三菩提心皆發菩提心故云度若初發心時誓願當作佛已過於世間即是度七方便彼岸義也那由他衆生即上不解之衆也示教利喜者指示為示教詔為教令彼得益為利喜他得利為喜四佛定起歎二初稱歎菩薩大通智勝佛過八萬四千劫至開示衆生令入其中二勸物親近二初勸親近汝等皆當數數親近而供養之二釋勸意所以者何若聲聞辟支佛至三藐三菩提如來之慧二明中間值遇佛告諸比丘至得值四萬億諸佛世尊于今不盡此明中間常逢值逢值有三種若相逢遇常受大乘此輩中間皆已成就不至於今若相逢遇遇其退大仍接以小此輩中間猶故未盡今得還聞大乘之教三但論遇小不論遇大則中間未度于今亦不盡今方始受大乃至滅後得道者是也問如上塵數多許時節今始得羅漢如此則無生法忍何易可階答大聖善巧依四悉檀作如是說或為厭佛道長遠者說短於佛道生輕易想者說長此對治悉檀也或為發生宿善作長短說此為人悉檀也或隨世間所欲作長短說此世界悉檀也或為聞說長短即得入理此第一義悉檀也當知言如許劫方今得羅漢者此是權行引諸實行令入道耳妙樂云逢值有三種者前二可知第三既云但論遇小中間之言自望元初結小緣者耳第三類人未曾聞大便即流轉此人即以初聞小時為初結緣復於中間唯習於小今遇王子初且聞小人見釋迦一代教中一分聲聞未發心者便即判云永滅無發是則不知如來長遠之化問此經何文赴其樂短答如龍女成佛及法師品隨聞一句一偈乃至一念隨喜者當得阿耨菩提雖無時節計應非遠小乘教中多分說長大乘教中多分說短三明今說法華二初結會古今二初結師古今諸比丘我今語汝至成阿耨多羅三藐三菩提阿閦淨名經云有國名妙喜佛號無動疏云阿之言無閦之言動阿彌陀清淨平等覺經翻無量清淨無量壽經翻無量壽稱讚淨土經云其中世尊名無量壽及無量光釋迦翻能仁是姓牟尼翻寂默是字能仁則慈悲利物寂默則智慧冥理以利物故不住涅槃以冥理故不住生死餘佛名未見所出不敢妄解娑婆亦曰索訶此云堪忍乃三千大千世界為一佛之化境也悲華經云何名娑婆是諸衆生忍受三毒及諸煩惱能忍斯惡故名忍土二會徒古今二初會現在徒四初不退住大諸比丘我等為沙彌時至三藐三菩提此言下大種之後中間不退住無上道二退住聲聞此諸衆生于今有住至應以是法漸入佛道此言下種之後中間退大向小住聲聞位佛以大乘教化于今漸入佛道三釋退住意所以者何如來智慧難信難解此釋退住之意雖下大種蓋緣佛之智慧難以信解所以退大向小四正結古今爾時所化無量恆河沙等衆生者汝等諸比丘爾時者指大通佛所為其下種時也二會未來徒二初正會及我滅度後未來世中聲聞弟子是也二釋疑我滅度後復有弟子至除諸如來方便說法疑者云現在者得聞佛說法華得入一道可是結緣之流若未來者不聞法華而入滅度此等豈能捨小得入一乘釋云雖滅度之我於餘國作佛終當得聞是經餘國者即方便有餘土也除諸如來方便說者斷疑也三乘是方便說其實無三也二明說法華三初時衆清淨諸比丘若如來自知至了達空法深入禪定涅槃時到者諸佛出世化道將畢之時即說法華如迦葉佛日月燈明佛等出於淨土說法華竟即入涅槃釋迦出於穢土說法華竟仍唱當滅更說涅槃衆又清淨者既得三藏教益免於五濁八苦之難也信解堅固者於方等教心相體信也了達空法者聞般若說法於空法中心得了達即是轉教意也二正說法華便集諸菩薩及聲聞衆至唯一佛乘得滅度耳集諸菩薩是聚會親族及聲聞衆是命其子上釋親族法身大士為影響衆以此文驗之其義明也世間無有二乘等者準理世無一人合永入滅會必歸大三釋前開意比丘當知如來方便至是人若聞則便信受此承上文意也若世無二乘得滅度者如來何故施三釋云比丘當知如來以方便權智深知衆生有小性欲著於五塵弊於五濁故先說三乘涅槃令破蔽免難後說一也二譬說結緣二初開譬二初導師譬五初五百由旬譬譬如五百由旬五百由旬譬上未度之衆樂著諸有輪回處所即擬火宅中其家廣大三界無安方便品安隱對不安隱之意也約土言之三界同居土為三百方便有餘土為四百實報土為五百約惑言之見惑為一百五下分惑為二百五上分惑為三百塵沙惑為四百無明惑為五百約觀言之入空觀能過三百入假觀能過四百入中觀能過五百由旬如前釋二險難惡道譬險難惡道曠絶無人怖畏之處險難惡道譬上未度之衆煩惱垢重即擬火宅中火起方便品安隱對不安隱之法也分段變易二種生死此即果險難也見思塵沙無明此即因險難也由此因果故言惡道也道有二種一曠絶有人可依二曠絶無人可依有人可依者譬生死中有涅槃煩惱中有菩提雖復曠絶則有人可依此通指衍門三教也若生死煩惱無涅槃菩提如藥中無病病中無藥此則曠絶無人可依多是三藏二乘據理通於通教二乘也三若有多衆譬若有多衆譬上王子所化百千萬億種皆生疑惑不解之衆生也即擬火宅中三十子五百人方便品中知衆生性欲意四欲至寶處譬欲過此道至珍寶處二乘斷見思出三界故言欲過此道更斷塵沙無明求至無上種覺故言至珍寶處五有一導師譬有一導師聰慧明達善知險道通塞之相有一導師者即第十六王子也眼耳清淨曰聰意清淨曰達總而言之即六根清淨也慧即一心三智明即具足五眼又三明為明十力為達妙樂云六根清淨初住分得即十六子初結緣時今八方作佛唯在極果故釋慧明云三智五眼三明十力也通塞者謂苦集十二因緣六蔽塵沙無明為塞道滅滅因緣智六度一心三觀為通二將導譬三初所將人衆譬將導衆人欲過此難譬本結緣未得度者本緣不失而為導師所將二中路懈退譬二初退大三初中路懈退所將人衆中路懈退所將人衆者正譬中間相值退大取小之人也中路者非是半途名中路但以發心為始至佛為終此兩楹之間而起退大之意故名中路也二白導師言白導師言我等疲極而復怖畏言導師者自有通途慈悲導師如文云有一導師將導衆人者是也自有結緣導師如文云所將人衆白導師言是也自有權智導師如文云導師多諸方便者是也自有實智導師如文云導師知此人衆是也今言白導師者正白結緣之導師也以其退大則大滅接小則小生一生一滅感於法身呼此為白王子知其退大即是聞其所白善根微弱無明所翳故言疲極憚生死名為怖畏妙樂云此四導師第一通因果第二唯在因三四唯在果言通途者通他人故言結緣者局我師故言權智者取施小時言實智者取開權時四從時異人秪是一並是王子從始至今言感於法身者大機已滅小機當生故未見應佛冥感法身也三不能復進不能復進前路猶遠今欲退還不能復進前路猶遠者見思塵沙無明難可卒斷也然用小乘接之不令頓還本處亦有進義二接小四初多方便導師多諸方便此譬擬宜即以小接也二傷失寶而作是念此等可愍云何捨大珍寶而欲退還傷其失寶譬知有小無大也三化作城二初作化作是念已以方便力至過三百由旬化作一城此正用方便之教教化二乘斷見思惑出三界苦故云過三百由旬令其權證真空涅槃故云化作一城二說化告衆人言汝等勿怖至若能前至寶所亦可得去此譬擬上勸示證三轉也汝等勿怖莫得退還是勸轉勸令進入城也今此大城可於中止隨意所作是示轉示城可住也若入是城快得安隱是證轉證城安隱也前至寶所亦可得去者三藏教中未論前進義在衍門約共菩薩寶所有二義若用究竟則以極果為寶所故上文云唯佛與佛乃能究盡諸法實相若分入即以初發心住為寶所故上文云無上寶聚不求目得又云得佛法分佛子所應得者皆已得之四入城譬是時疲極之衆心大歡喜至生已度想生安隱想大歡喜即聞慧未曾有即暖位免惡道即頂位快安隱即忍位前入城即見諦位已度想即無學位此與火宅適子願故勇鋭推排出宅同也生已度想如得盡智安隱想如得無生智又具智德如已度證斷德如安隱也三引至寶所譬二初知息已爾時導師知此人衆既得止息無復疲倦既得止息無復疲倦者譬上涅槃時到衆又清淨而得免難大機當發也二向寶所即滅化城至向者大城我所化作為止息耳即滅化城引向寶所譬上正說法華示真實相寶處在近向者大城我所化作即舉廢權譬以帖顯實譬也問凡五處開三顯一為有何異答通論無異別論有差方便品約教開三顯一文云如來但以一佛乘故為衆生說法無二亦無三也火宅約行開三顯一車是運義運則譬行文云各乘大車遊於四方嬉戲快樂也信解品中約人開三顯一結會傭作之人即是長者之兒文云我等昔來真是佛子也藥草喻中約差別無差別明權實不的去取但明衆生不知佛令其知若七種差別即知權同依一理無差別即知實差別無差別無差別而差別令知此意耳終不說言無一有一此約自行權實二智隨自意語故佛能知而衆生不知也今化城正約理開三顯一寶所化城皆是大小兩理破除二乘化理顯於寶所真實一理也妙樂云五處明開權中雖各於教行人理及知不知且隨文相一往而說故一一文皆須並具四一明如來知不知等也二合譬二初正合二初合導師譬五初正合上導師諸比丘如來亦復如是二合多諸人衆今為汝等作大導師妙樂云今為汝等作大導師為合多諸人衆者此以能將顯於所將三合險難惡道知諸生死煩惱惡道險難四合五百由旬長遠五合聰慧明達亦合至珍寶處應去應度合上聰慧明達善知險道通塞之相亦是合上欲過險道至珍寶處也二合將導譬三初合所將人衆若衆生二合退大接小二初合退大三初合中路懈退但聞一佛乘者合上中路懈退無大機意也二合白導師言則不欲見佛不欲親近合上白導師不受勸誡也三合不能前進便作是念佛道長遠久受勤苦乃可得成合上不能前進息化意也二合接小三初合導師方便佛知是心合上中間退大復以小接之意譬本有四合但有三今正合上導師多方便擬宜之意也二合此等可愍怯弱下劣以方便力合上此等可愍知有小機也三合現作化城而於中道為止息故說二涅槃合上衆人入城譬也而於中道說二涅槃者三界惑盡塵沙無明未破於此兩楹判有餘無餘涅槃亦是聲聞緣覺涅槃又分段已盡變易未除二死之間判為有餘無餘故言中道妙樂云此中三釋初約惑次約二乘是約智也三約生死二死中間名為中道三合將至寶所二初合知息已若衆生住於二地二地即二涅槃也二合向寶所如來爾時即便為說至於一佛乘分別說三二帖合二初牒接退譬來合施三如彼導師為止息故化作大城二牒滅化譬來合顯一既知息已而告之言寶處在近此城非實我化作耳二偈頌二初頌結緣由二初頌遠由二初頌大通成道三初頌成道前事爾時世尊欲重宣此義而說偈言大通智勝佛至香風吹萎華更雨新好者二頌正成道果過十小劫已乃得成佛道諸天及世人心皆懷踊躍三請法兼供養彼佛十六子皆與其眷屬至充我及一切頌上請轉法輪兼頌成道已眷屬申供養二頌十方梵請二初頌威光動曜世尊甚難值久遠時一現為覺悟羣生震動於一切二頌尋光而來二初別頌東方東方諸世界五百萬億國至受請默然坐二總頌九方三方及四維上下亦復爾至轉無上法輪二頌近由二初頌轉小乘法輪三初頌佛受請無量慧世尊受彼衆人請二頌轉法輪為宣種種法四諦十二緣至汝等應當知三聞法得道宣暢是法時六百萬億姟至不能得其邊十萬為億十億為兆百億為京千億為秭萬億為姟諸法不受者謂能伏斷見思也二頌轉大乘法輪五初頌王子出家時十六王子出家作沙彌二頌請轉法輪皆共請彼佛演說大乘法至慧眼第一淨三頌方等般若佛知童子心宿世之所行至菩薩所行道六波羅蜜釋見序品四頌說法華經說是法華經如恆河沙偈五頌說已入定彼佛說經已靜室入禪定一心一處坐八萬四千劫二頌正結緣二初頌法說三初頌昔結因緣三初頌佛入定是諸沙彌等知佛禪未出二頌正覆講為無量億衆說佛無上慧至宣揚助法化三頌聞法益一一沙彌等所度諸衆生有六百萬億恆河沙等衆二頌中間相值彼佛滅度後是諸聞法者在在諸佛土常與師俱生三頌今說法華二初頌結會現在師弟是十六沙彌具足行佛道至引汝趣佛慧二頌今還說法華經二初頌時衆清淨以是本因緣以本昔因緣所以今日時衆免難機發也二頌為說是經今說法華經令汝入佛道慎勿懷驚懼二頌譬說二初頌開譬二初頌導師譬五初頌險難惡道譬如險惡道逈絶多毒獸又復無水草人所怖畏處大經云無水草者喻不修習菩提之道補注云毒獸譬惑箋難云水澄渟表定草差別表慧二頌多諸人衆無數千萬衆欲過此險道三頌五百由旬其路甚曠遠經五百由旬四頌有一導師時有一導師五頌聰慧明達強識有智慧明了心決定在險濟衆難二頌將導譬三初正頌將導之意衆人皆疲倦而白導師言我等今頓乏二懈退權立化城二初頌懈退於此欲退還二頌接退四初傷失大導師作是念此輩甚可愍如何欲退還而失大珍寶二頌作念尋時思方便當設神通力三頌作化二初頌作化化作大城郭莊嚴諸舍宅至男女皆充滿諸舍宅者譬諸空觀境也園林者二乘總持無漏法林也九次第定為渠流八解脫為浴池重門是三空門又是重空三昧盡無生智為樓閣高出也男女是定慧也妙樂云重空三昧者大論云無相無相乃至無願無願是也二頌說化即作是化已慰衆言勿懼汝等入此城各可隨所樂四頌入城諸人既入城心皆大歡喜皆生安隱想自謂已得度三頌滅化向寶所二初頌知息已導師知息已二頌至寶所集衆而告言汝等當前進至當共至寶所二頌合譬二初頌正合二初合五百由旬我亦復如是為一切導師妙樂云經云為一切導師疏云合五百者即導師譬五百由旬從所行說二頌合將導譬二初頌合懈退權化二初頌合中路懈退見諸求道者中路而懈廢不能度生死煩惱諸險道二頌合接退作化故以方便力為息說涅槃言汝等苦滅所作皆已辦二合滅化至寶所二初正頌合知息已既知到涅槃皆得阿羅漢二合滅化至寶所爾乃集大衆為說真實法至乃是真實滅息處故說二者即上文云為止息故說二涅槃也此偈文即有三德祕密藏義汝證一切智即是般若具三十二相即是法身乃是真實滅即是解脫三法不縱不橫即是見佛性也十力三十二相釋見譬喻品中二頌帖合諸佛之導師為息說涅槃既知是息已引入於佛慧
