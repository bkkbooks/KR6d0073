body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯上天竺講寺住山比丘一如集注妙法蓮華經安樂行品第十四釋此品有三一依事二附文三法門依事釋者身無危險故安心無憂惱故樂身安心樂則能進行故云安樂行也附文釋者著如來衣則法身安入如來室則解脫心樂坐如來座則般若導行而進此附上法師品文釋耳若附當品文者住忍辱地故身安而不卒暴故心樂觀諸法實相故行進故云安樂行也法門釋者安名不動樂名無受行名無行安名不動者正住中道六道生死之有二乘涅槃之空二邊不能動故樂名無受者無受即不受也大品般若行相品云行亦不受行者行般若也般若性空故皆不受不行亦不受亦行亦不行亦不受非行非不行亦不受不受亦不受有受則有苦無受則無苦無苦無樂乃名大樂行名無行者若有所受即有所行無受則無所行不行凡夫行不行賢聖行故言無行而行中道是故名行此約法門釋安樂行也此品是迹門流通第四意若持品中二萬及八十億那由他菩薩受命弘經深識權實廣知漸頓又達機緣神通自在雖於濁世為人惱亂不障通經何俟更示方法若初依之人五品十信位也始心欲修圓行在於濁世弘經為濁所惱自行不立亦無化功為是人故須示方法明安樂行故有此品之説也有云四安樂行者謂止觀慈悲導三業及誓願身業有止故離身粗業有觀故不得身不得身業有慈悲故勤修身業廣利一切有止行故著忍辱衣有觀行故坐如來座有慈悲故入如來室止行離過即成斷德觀行無著即成智德慈悲利他即成恩德是名身安樂行餘口意誓願三安樂行亦如是妙樂云初依始心者始心即在五品初心雖非説法之位隨力弘經須此四行至第三品正當説法以資自行説即是弘理須此品以為方法四安樂行品為外凡力弱者説依之法弘不慮危苦二初問二初歎深行菩薩能如此弘經爾時文殊師利法王子至護持讀説是法華經此歎前品深行菩薩於濁惡世能奉命弘經也二問淺行菩薩云何説是經世尊菩薩摩訶薩於後惡世云何能説是經此問淺行菩薩云何惡世弘經二答三初總標四行章門佛告文殊師利至欲説是經當安住四法此標身口意誓願四安樂也二解釋修行方法四初身安樂行二初長行二初標行近一者安住菩薩行處親近處能為衆生演説是經此下初身安樂行也行名進趣近名修習又行處是忍辱衣近處是法空座忍辱必內懷至理歷緣耐事名之為行法空必體達外緣棲息真境目之為近妙樂云問初身業文但云行近何名為身答行近二文廣略異故行處指理略説即住忍辱地近處附事廣説即離十惱亂也離十惱亂正當於身當知住忍亦身住也二釋行近二初釋行處文殊師利云何名至是名菩薩摩訶薩行處約三法明行處初約一法二約二法三約三法初約一法者即直緣一實諦一實諦為一切所歸為一切作本而遍無分別一切所歸者即忍辱地也此地即中道諸法歸之故名為地衆行休息故名忍辱此即行不行之行合上如來衣也妙樂云所住之地謂實理也能住是行即依理起行行不行者理雖無行依理而行行得理息即名不行為一切作本者亦指忍地為一切本由住忍辱一地故具柔和等三如萬物得地而生以譬衆行得理而成若得理本在剛能柔在逆能順在暴能治在驚能安無量功德從中道地生地無所生指前實理而生功德即柔和等此即不行行之行合上如來室也不行行者依理不行而行于行也遍無分別者則不分別不行與行差別之相以行與不行性相無二見諸法實名不分別無不分別名亦不行不分別即非行非不行合上如來座也南嶽安樂行義云亦不行不分別者生死涅槃無一無異凡夫及佛無二法界故不可分別亦不見不二故言不行不分別不分別相不可得故文無三行而三行故名為行同一實諦故名為處此約一法釋行處明弘經方軌也二約二法者即生法二忍二忍即生法二空若開為四忍消文者柔和兩字為伏忍善順兩字為順忍又復於法等為無生忍亦不行等即寂滅忍合則前二忍是生後二忍是法若約圓教判四忍者從初發心圓伏五住煩惱至金剛頂皆名伏忍初後悉不違實相皆名順忍初後不起空有二邊心名無生忍初後皆為衆行休息名寂滅忍由心住忍地聞生死不忽卒畏苦聞涅槃不忽卒證樂故云不卒暴又聞佛常與無常聞生死涅槃異與不異聞佛道長短難易非長短非難易等皆不驚怖故云心亦不驚行此行者從始至終以二空理而忍諸法即著如來衣安住二空理即坐如來座愍諸衆生即入如來室二空四忍名為行理即是處此約二法釋行處是弘經方軌也三約三法者即不思議三諦也住忍辱地即總論三諦如有地可據方能忍辱也柔和善順者即善順真諦能忍虗妄見愛寒熱等故言善順也而不卒暴心不驚者即安於俗諦忍衆根緣稱適機宜故不卒暴體忍逆順二境故心不驚也於法無所行等者即安於中諦能忍二邊故云無所行正住中道中道即是實相故云觀諸法如實相而此中實亦不可得故云亦不行不分別此則據三諦之地名處忍五住之辱為行行亦為三謂止行即行不行合上如來衣也觀行即非行非不行合上如來座也慈悲行即不行行合上如來室也此約三法明行處是弘經方軌也二釋近處三初即遠而論近十初遠其豪勢云何名菩薩摩訶薩親近處至大臣官長此下釋近處明遠十惱亂乃即遠而論近也亦是附戒門助觀也行處即正行近處即助行今對十惱等事設觀以助照理之正觀也上直緣理住忍辱地今戒門廣出衆辱之緣應修遠離不同凡夫刀仗自防亦非二乘棄捨不觀但以正慧而遠離之即遠論近故云親近處此初遠豪勢故云不親國王等妙樂云恐人恃附失正道故初似小益久則大損二遠邪人法不親近諸外道梵志尼犍子等至逆路伽耶陀者此第二遠邪人法也人染邪法迷於正理正觀未成切須防斷不稟內教故名外道梵志即婆羅門此云淨行又翻淨裔其人種類自謂從梵天口生在家事梵天名為梵志出家外道通名尼犍尼犍此云離繫文筆者文謂歌詩之流筆謂銘賦之類讚咏者顯德謂之讚寄情謂之咏路伽耶此云惡論亦云破論逆路者逆君父之論又路伽耶名善論亦名師破弟子逆路伽耶名惡論亦名弟子破師慈恩基法師云路伽耶此云惡對答逆路伽耶此云惡徵問今雖令菩薩之人遠邪人法不習外典若欲禦外侮亦不妨習曉但不可忘棄本宗一味耽著耳三遠凶險戲亦不親近諸有凶戲至及那羅等種種變現之戲此第三遠凶戲也相扠相撲即凶戲也那羅此云力即是角力戲亦是設筋力戲也疏云那羅延者上伎戲亦云綵畫其身作變異之相又云緣橦倒擲之類妙樂云近凶戲者恐散逸故扠初佳切打也撲音雹挨也又普卜切小擊也四遠旃陀羅又不親近旃陀羅至則為説法無所希望此第四遠旃陀羅也旃陀羅此云屠者又云嚴熾謂以熾然惡業而自嚴飾也若親近之者令人無慈畜養豬羊雞狗畋獵漁捕者此等皆有殺害之心名惡律儀如是人來當為善巧説法回其殺害之心不可有於希望之意也畋獵者為田除害名畋獵即捷取之名白虎通云四時之畋總名為獵畋通作佃易曰以佃故漁注云取獸曰畋取魚曰漁五遠二乘衆又不親近求聲聞比丘至隨宜説法無所希求此第五遠二乘衆也二乘之人沉滯空寂不能發菩提心故須遠離也妙樂云近二乘人令人遠菩提故西方三乘人不雜處故云或來既未受大化不妨順其小志而説故云隨宜説法而亦不可有於希求之心也六遠欲想相文殊師利又菩薩至不與小女處女寡女等共語此第六遠欲想也欲想能殺害菩提心故輔行云欲想者為欲深防欲之過患也尚不起想況復形交或有染其形容姿態語笑威儀折旋俯仰皆能生於欲想須以九想觀治之處女者居處在家未嫁之女也寡女即無夫者阿含經云有一異學問薄拘羅汝於正法中曾行欲事否答云莫作是語我八十年未曾起欲想未曾視女人面未曾入尼房未曾與尼相問訊乃至道路中亦不與共語今之弘法者觀斯龜鑑可不慎之哉七遠不男人亦復不近五種不男之人以為親厚此第七遠不男也妙樂云不男壞亂菩提志故五不男者生劇妬變半也生謂從生以來便無男根劇謂以刀去勢妬謂因見他淫方有妬心淫欲即起變謂今生變作半謂半月能男半月不能男也亦有五種不女謂螺筋鼓角脈也八遠其危害不獨入他家若有因緣須獨入時但一心念佛此第八遠危害也妙樂云危害難處不合入故文阿難問佛如來滅後見女人云何佛言勿相見設相見勿共語當專心念佛九遠譏嫌事若為女人説法不露齒笑至猶不親厚況復餘事此第九遠譏嫌也露齒笑現臆增他不善之心為女説法當避譏嫌尚不宜親厚況復餘之事乎十遠樂畜養不樂畜年少弟子沙彌小兒亦不樂與同師此第十遠畜養也沙彌此云息慈謂息世染之人以慈濟羣生也又云初入佛法多存俗情故須息惡行慈也蓋畜養小兒妨修正業故須遠也自初遠豪勢至此遠畜養十種惱亂分為二邊九是生死一是涅槃二俱遠離即寂滅之異名耳如此法諸教皆然但不近二乘與諸教小異蓋今是名教行者弘通大乘獨妙之經故須遠離聲聞緣覺小乘之人也二即近論近處常好坐禪在於間處修攝其心至是名初親近處今修攝其心乃即近而論近亦是附定門助觀也前遠離十種惱亂即是修戒今常好坐禪即是修定次文觀一切法空即是修慧今修定中有三意妙樂云三意者定心定處定門也心謂能期之心期於破障顯理即修攝其心也處謂五緣中間居靜處即今在於間處也門謂修定要門乃五事中調心不沉不浮即今常好坐禪也未暇定論故二十五方便中隨要列二名耳如是三法皆令親近三非遠近論三初總標境智復次菩薩摩訶薩觀一切法空此觀一切法空即非遠非近而論近亦是附慧門助觀也初觀字標智即中道能觀之觀智也中間一切法三字標境即十法界所觀之境也後空字但是結成智境能觀之智所觀之境皆不可得即境智皆空二別釋境智如實相不顛倒至無量無邊無礙無障如實相三字別釋境也空假二邊對乎中道非一異名如非七方便之權名實以實為相故言如實相不顛等諸句別釋觀也不顛等者凡夫依正二報之法本是無常反執為常本是苦反執為樂本無我反執為我本不淨反執為淨此凡夫四倒也二乘於常樂我淨四德反執為苦無常無我不淨此二乘四倒也菩薩無此八倒故云不顛倒也不動者不為分段變易二種生死所動也不退者契寂滅理心心寂滅入薩婆若海也薩婆若此云一切智即果智也不轉者不如凡夫流轉生死不如二乘轉凡成聖也如虗空者虗空但有名字名字求不可得中道觀智亦但有名字亦求不可得妙樂云但有名字即性空名字亦無即相空無所有性者了一切法無自他共離四性之執此出性空之相也一切語言道斷者即絶言思為相空之相也不生者所破之惑能破之智悉皆稱理故不生也不出者如來所治全體即是故無可出不起者以入理故方便理教一切皆寂也此實相之理名不能名故性空相不能相故相空故云無名無相此重牒前無所有等也無所有者重歎中道觀智之體無二邊之有也無量者非陰界入諸數法故無邊者非如偏小有分限法故無礙者遍入諸法故無障者無能遮止故雖復多句秪是能觀無相無作與境合耳亦只是對一切法名一切空三結成境智但以因緣有至是名菩薩摩訶薩第二親近處但以因緣有者總結上諸句莫非因緣也上直明中道觀慧非解非惑絶二邊之相今明雙照二邊從惑因緣生生死從解因緣生涅槃此以因緣一句義開兩境也又因緣有有於涅槃照于緣生緣生故空空名涅槃從顛倒生者生於生死此則雙照意顯也常樂觀如是等法者即三諦等法也又但因緣有從顛倒生者結不思議三諦境也凡從因緣生顛倒之法皆妙境體也故説者不思議教也常樂觀者結不思議三觀也二偈頌三初頌標章爾時世尊欲重宣此義而説偈言若有菩薩於後惡世無怖畏心欲説是經頌上欲説是經當安住四法由住忍地心不驚怖故云無怖畏心二頌修行二初頌事遠近應入行處及親近處至貪著小乘三藏學者自應入行處下十四行頌上離十惱事約遠論近也增上慢者謂於最上人法而生慢易即未得謂得之類也三藏者佛在波羅奈最初為陳如等五人説修多羅藏又在羅閲祇最初為須那提説毗尼藏又在毗舍離獼猴池側最初為跋耆子説阿毗曇藏即小乘三藏也習近小乘妨弘大法故須遠也破戒比丘名字羅漢至諸優婆夷皆勿親近名字羅漢者謂假名阿羅漢非實證得也求現滅度幾近小乘非大法器故弘大乘經者即不得親近也若是人等以好心來至皆勿親近以為親厚不希望者如左溪尊者未嘗為利説一句法未嘗因法受一毫財如是存心方可謂之無希望也及諸不男彼名般吒者此翻黃門黃門者有男女形不能男女亦莫親近屠兒魁膾至如是之人皆勿親近屠殺也亦分割其肉曰屠膾細切肉也販者買賤而賣貴也衒自媒也此等皆非清淨之行故宜遠之凶險相撲種種嬉戲至以此二處能安樂説入里乞食者雜阿含經云有一羊往糞聚飽食還羣貢高我得好食比丘亦如是得四事供養已起染著想不知出要向諸比丘貢高毀蔑他人我得彼不能得是為羊比丘乞食若師子王遇大獸即噉不味不著得小獸即噉不鄙不薄比丘亦爾得四事供養已不起染著想自知出要無增減心是為師子王比丘乞食又比丘乞食未得食前應念為修道故補飢瘡須行乞食既得食已為報施恩念道不輟寶雲經云乞食作四分一分奉同梵行一分與丐一人分施鬼神一分自食二頌非遠近又復不行上中下法至是則名為菩薩行處上中下法者約教則以別教為上通教為中藏教為下約人或指三乘或三教菩薩今約廢權説故云不行等有為等者有為是世間法故不實無為是出世間法故實亦不分別等者觀音義疏以男女表對定慧慧表男定表女正引此二句以明定慧之法性本絶言不可分別故下即云不得諸法等一切諸法空無所有至常住一相是名近處此頌上常好坐禪及觀一切法空等文可見三頌明行成三初標若有比丘於我滅後至説斯經時無有怯弱此標行成事成則外儀無失理成則內心無滯故説經時無怯弱也二釋菩薩有時入於靜室至其心安隱無有怯弱此釋安樂之因因入靜室修禪定故止於過惡得人無我外則不損因正憶念修智慧故離諸取著得法無我內無顛倒是則心不怯弱不怯弱名安樂也三結文殊師利是名菩薩安住初法能於後世説法華經此頌長行總結初法即指身安樂行也二口安樂行二初長行二初標章又文殊師利如來滅後於末法中至應住安樂行此下第二口安樂行也今標章二行法二初止行四初不説過若口宣説若讀經時不樂説人及經典過此釋口安樂之行法有止行觀行今止行中初不樂説能聽人及所聽經典過者法華已前七方便之權法乃是佛為他機隨他意語名不了義人若聽受容有樂偏小之過法是隨機之説則有何過若言法有過者則是惱亂其聽受之人非口安樂行之相也二不輕慢亦不輕慢諸餘法師此言弘經者不可倚恃所弘法華之圓而輕蔑偏權小教之法師也妙樂云佛在世時尚以異方便及餘深法用助圓實之正道後學順教豈可固違須順佛意將護物機問佛世觀機恐物墮苦先以小接次以偏引末世弘法豈必然耶答恐弘經人倚圓蔑偏作如是説然弘經者隨其行位淺深若始行弘經之人遇求法者但以大乘而為解説不以小答也若深位弘經者始末弘法必以三藏等三方能顯於圓頓也三不歎毀不説他人好惡長短至亦不稱名讚歎其美初不説一切人次別舉聲聞不説他人長短者夫人惡聞其失故不談人短好譽者必善毀故不稱人長故日藏經云初中後夜減省睡眠精進坐禪誦經修道背捨生死向涅槃路不稱他短不説己長於聲聞等者聲聞根性不定若歎二乘或令彼退大取小若毀呰二乘或令其大小俱失所以毀讚俱不應也妙樂引大論云自讚自毀讚他毀他如是四法智者不為何以故自讚者是貢幻人自毀者是妖惑人讚他者是諂人毀他者是讒賊人智者應以四悉檀籌量而護自他四不怨嫌又亦不生怨嫌之心若謂其所承之人及所稟之法妨害我道即是怨心若謂其人法鄙劣即是嫌心心機一動聲説即發杜説過之源故不生怨嫌也妙樂云怨去聲損己則怨違情曰嫌安樂行者尚去順己之喜況搆無怨之恨大集經云過去世時有羅剎王於拘留孫佛法中出家發菩提心誦持大小乘法聚各八萬四千由意嫌頭陀比丘不誦經典猶如株杌由此墮獄受苦從獄出已受羅剎身於賢劫末樓至佛所方脫羅剎身常人尚爾況安樂行為弘大典將護小行怨嫌俱捨方稱正行此口安樂行中所言怨嫌心者心動則形於言是故制心即為制口二觀行善修如是安樂心故至而為解説令得一切種智上既觀諸法空心已住於畢竟空理無所取著必不執大而輕於小但隨順物情復不違於大乘法相或有難問則不説小乘法答但以大乘答者有二意若見其無大機而為説小但令得方便小益若不見其無大機而為説小則妨其大緣是故但為説大則無二者之咎一切種智如前釋增治云隨順物情即不逆其意尚不令順法而違物尚不許見無大而為説小妨其大緣況令違法相而復背機況復執大毀小而令大小俱失耶二偈頌三初頌標章爾時世尊欲重宣此義而説偈言菩薩常樂安隱説法至著新淨衣內外俱淨此二行頌上口安樂行中初標章也上總稱應住今頌中別出行相行相有三初半行欲令現前人得安隱道及果安隱道即涅槃因果即涅槃果即入如來室義次半行即坐如來座義後一行即著如來衣義以此三法導口業名安樂行也二頌行法二初頌止行四初頌不輕慢安處法座隨問為説此下五行半頌止行也今半行頌不輕慢若輕慢者則不隨問為説也二不説長短若有比丘及比丘尼至若有難問隨義而答但依妙義而説不談人之好惡難問隨義答者有二一可答二不可答若問答相詰難勝負則自知是為智者語若自放恣而問敢有違者誅之是為王者語若長短是非皆不知唯求己勝是為愚者語妙樂云智者語即可答王者語愚者語即不可答三不説人過因緣譬喻敷演分別至漸漸增益入於佛道若説人過生人毒念今不説其過故使發心入於佛道佛道從喜生故也四頌無怨嫌除懶惰意及懈怠想離諸憂惱慈心説法怨嫌心起則懈懶憂惱今以慈心説法頌無怨嫌者精進無憂故也上長行皆約止善説頌中皆約行善也二頌觀行晝夜常説無上道教至是則大利安樂供養此四行頌觀門也上長行中云但以大乘答今頌云説無上道上云令得一切種智今頌云願成佛道令衆亦爾者令他亦成佛道也三頌行成四初頌標行成我滅度後若有比丘能演説斯妙法華經此一行標口安樂行成也二無過難除心無嫉恚諸惱障礙至亦無擯出安住忍故此二行明內無過則外難不生如無臭物蠅則不來三有善行成智者如是善修其心能住安樂如我上説此內有善法所以行成也四格量功德其人功德千萬億劫算數譬喻説不能盡三意安樂行二初長行三初標章又文殊師利菩薩摩訶薩至受持讀誦斯經典者此下第三意安樂行也今標章二行法二初止行四初不嫉諂無懷嫉妬諂誑之心夫二乘欲出生死故先除貪欲菩薩欲化他故先除嗔見嫉是嗔垢諂是見垢嫉妬違慈悲之心非化他之法諂誑乖智慧之道非自行之法若智慧被障將何上求佛道若慈悲有妨將何下化衆生是故菩薩之人欲修意安樂行最須棄之二不輕罵亦勿輕罵學佛道者求其長短亦勿輕罵等者此戒菩薩之人不應自倚圓行而呵責別教行人學佛道者亦不自倚圓教之長求其權教之短知機呵責不知勿罵若其責罵容有退彼善根之義故云亦勿等也三不惱亂若比丘比丘尼至汝是放逸之人於道懈怠故比丘等四衆皆有三乘之機故云求聲聞等此戒不應以圓呵通教三乘者其本無大機強以圓呵乖心成惱通既被呵圓復未解前疑後悔大小俱失以去佛道迂回名甚遠此惱別教行人今文雖曰呵通以通教中復有別機故也若忩忩取證沉空滯寂不能得一切種智此惱通教行人厭生死懶化導名懈怠悲華經明小乘者為懈怠四不諍競又亦不應戲論諸法有所諍競嘲謔之論妨安樂行故須制也遺教經云若種種戲論其心則亂雖復出家猶不得脫是故比丘當須捨離此意同也二觀行四初起大悲心違於嫉諂當於一切衆生起大悲想此下四科明觀行也即約前四惡起於行善也二起慈父心違於輕罵於諸如來起慈父想凡求佛道即是學人敬學如佛不得輕罵諸者通三世此即未來如來也三起大師想違於惱亂於諸菩薩起大師想至常應深心恭敬禮拜以理論之三乘皆是菩薩有化訓之德皆是衆生之師應起師想勿言其短四平等説法違於諍論於一切衆生平等説法至亦不為多説平等破偏執之諍法本平等故云以順法也不多不少者量其機器之利鈍也三結成二初由止惡惡不能加文殊師利是菩薩摩訶薩至説是法時無能惱亂此結意安樂行也由止惡故惡不能加故云無能惱亂也二由觀行勝人來集得好同學共讀誦是經至供養經卷恭敬尊重讚歎由觀行故勝人來集得好同學也二偈頌二初頌行法二初頌止行四初頌不嫉諂爾時世尊欲重宣此義而説偈言若欲説是經當捨嫉恚慢諂誑邪偽心常修質直行二頌不輕罵不輕蔑於人三頌不諍競亦不戲論法四頌不惱亂不令他疑悔云汝不得佛二頌觀行四初頌於一切起大悲心是佛子説法常柔和能忍慈悲於一切不生懈怠心二頌於菩薩起大師想十方大菩薩愍衆故行道應生恭敬心是則我大師三頌於如來起慈父想於諸佛世尊生無上父想四頌平等説法息諍論破於憍慢心説法無障礙二頌行成第三法如是智者應守護一心安樂行無量衆所敬四誓安樂行二初長行二初明行法三初標章又文殊師利菩薩摩訶薩至有持是法華經者此下第四誓願安樂行也以身口意與慈悲俱即誓願安樂行發願流通此經故也二行法三初標誓願境二初慈誓境於在家出家人中生大慈心通取曾發方便心而未出三界者名在家斷見思惑盡出三界者名出家此攝得兩教二乘三教菩薩此輩既皆具無明有苦可拔亦應是大悲境但其皆曾發偏小之心與慈誓相應須與其圓道圓果之樂故言生大慈心以慈能與樂故也二悲誓境於非菩薩人中生大悲心通取未曾發方便心者名非菩薩此攝得三界內者既全不曾發小乘方便之心況復能發大乘真實之心則知此等皆是界內流轉生死之徒亦須與樂但其流轉無際正與悲誓相應宜拔其苦因苦果故言生大悲心以悲能拔苦故也二起誓願由二初起慈誓之由應作是念如是之人則為大失如來方便隨宜説法此即起慈之由也如是之人指上曾發方便心者由樂小故執佛方便以為真實不會圓道故言大失大失是慈誓之由也二起悲誓之由不聞不知不覺不問不信不解指上未曾發偏圓心者由未發偏圓之心不聞偏圓二道故以不聞偏道為無聞慧不知偏道為無思慧不覺偏道為無修慧又無圓三慧何者不問圓道故不聞不信圓道故不思不解圓道故不修偏圓三慧權實皆無甚可憐愍即起悲之由也妙樂中問云何得知前三是權後三是實答準正發誓文但牒後三而為是經故云其人雖不問不信不解是經三正立誓願其人雖不問不信不解是經至引之令得住是法中此正發誓願也彼人雖不問不信偏圓二道菩薩不約偏道發誓但欲與其圓道三慧故言雖不問不信不解此經我得三菩提引令得入也若誓願若菩提若神通若智慧皆由安樂行得之神通智慧二力秪是福智二嚴深觀如來座故得智慧力四辨莊嚴能以慧拔也深觀如來室如來衣得大善寂力不起滅定現諸威儀神通福德莊嚴先以定動也三結成三初總結無過失文殊師利是菩薩摩訶薩至説是法時無有過失此下結誓願安樂行也今總結無過失既無過失則是行成行云何成以其立大誓願故即入如來室行成以其知四衆失圓道故即坐如來座行成以其誓制其心不懈怠故即著如來衣行成三行具立故言行成無過失者慈悲成故無嗔垢失如來衣成故無懈怠失如來座成故無諂曲失以由此第四誓願行成故無諸失也二別結慈悲成常為比丘比丘尼至能令聽者皆得歡喜此別結慈悲行成也以慈成故攝得四衆人天供養聽法誓願成故感佛神通諸天衛護如來座成不著於法故聽者歡喜也三釋誓願行成所以者何此經是一切過去至諸佛神力所護故此釋誓願行成三世諸佛尚皆守護況諸天耶二歎經妙二初法説二初昔未顯説文殊師利是法華經至乃至名字不可得聞此昔未曾顯説故昔不得也二今日乃得何況得見受持讀誦二譬説二初不與珠譬昔未曾顯説二初開譬六初威伏諸國文殊師利譬如強力轉輪聖王欲以威勢降伏諸國翻譯名義引俱舍論云南洲人壽至八萬歲時有轉輪王生滅八萬時人壽損減衆惡漸盛故無輪王由輪旋轉應導威伏一切名轉輪王具足説之則有四種輪王謂金銀銅鐵輪從勝但説金輪故經言若王生在剎帝利種紹灌頂位於十五日受齋戒時東方忽有金輪寶現其輪千輻具足轂輞舒妙光明來應王所此王定是轉金輪王金輪王領四洲銀輪王領三洲銅輪王領二洲鐵輪王領一洲四種輪王威定諸方亦有差別慈恩云金輪望風順化銀輪遣使方降銅輪震威乃服鐵輪奮戈始定今以輪王譬如來化世降伏諸國譬降伏五陰十二入十八界諸境二小王不順而諸小王不順其命小王譬諸煩惱未得無漏智慧調伏名不順其命三起兵往伐時轉輪王起種種兵而往討伐起種種兵譬七賢中所修方法為前軍須陀洹斯陀含中所修方法為次軍阿那含阿羅漢中所修方法為後軍所破者是三毒等分八萬四千之冠盜能破者是八萬四千法門之官兵妙樂云言八萬等者秖是小乘八萬而已四有功歡喜王見兵衆戰有功者即大歡喜五隨功賞賜隨功賞賜或與田宅聚落城邑至奴婢人民田即三昧宅即智慧聚落即初果二果邑即三果城即四果涅槃衣服即慚忍善法嚴身之具即助道善法也種種七寶即七覺支等象馬車乘即二乘盡智無生智也奴婢即神通得有漏善法如人民即七賢位也輔行六下云隨功賞賜者隨其精進功能故佛輪王見小乘衆破見思賊有微功者賜事禪定無漏田宅若見大士應破大惑獲大功勳即賜以髻中明珠也六而不與珠唯髻中明珠不以與之至王諸眷屬必大驚怪髻喻權珠喻實言髻中明珠者實為權所隱也在頂上者譬極果所宗有出分段生死之機為小功勳有出變易生死之機為大功勳驚怪者未有大功忽賜髻珠諸臣皆疑怪譬衆生大機未動忽説此經二乘疑惑菩薩驚怪輔行六下云於實法界頂開同體權髻與實相明珠得法王記莂二合譬六初合威伏諸國文殊師利如來亦復如是至得法國土王於三界此下六科合上譬也二合小王不順而諸魔王不肯順伏三合起兵往伐如來賢聖諸將與之共戰四合有功歡喜其有功者心亦歡喜五合隨功賞賜於四衆中為説諸經至引導其心令皆歡喜根力者即三十七道品中五根五力也修此根力即不漏落六道生死故名無漏根力也涅槃此云滅度今即小乘真空涅槃也此真空涅槃能防見思之非禦生死之敵故名涅槃城六合而不與珠而不為説是法華經二與珠譬譬今日得聞二初開譬二初有勳文殊師利如轉輪王見諸兵衆有大功者心甚歡喜二與珠以此難信之珠久在髻中不妄與人而今與之珠在髻中者實為權所覆也解髻即開權與珠即顯實用譬法華開權顯實也四十餘年祕而不談故云不妄與人二合譬二初合有勳如來亦復如是於三界中至爾時如來亦大歡喜賢聖軍如上所明妙樂云見賢聖等者大集經云知苦壞陰魔斷集離煩惱魔證滅離死魔修道壞天主魔今不云天主魔者以小乘多斷三魔未壞天主魔然已有壞義成道必降魔故也有大功勳等者如來見此小乘賢聖已除界內苦集名與陰戰至般若後破無明出變易名大功勳故今三毒等且小乘中説三毒者貪嗔癡也在見惑中名邪三毒在思惑中名正三毒故知三毒不出見思二惑如來見諸賢聖已斷見思出三界外不為魔網所不久必當破無明之惑出變易生死之苦故通云歡喜也名義云天主魔者欲界天主也著樂邪見憎嫉一切賢聖涅槃道法名天主魔二合與珠此法華經能令衆生至乃與汝等而敷演之一切智者謂一切內法內名能知能解一切外法外名亦能知能解但不能以一切道起一切種故名一切智記云內法內名者謂理內所詮法相及能詮名字外法外名者即理外所詮法相及能詮名字空觀若成於此名相悉能體達多怨者如五千退席等如云如來現在猶多怨嫉是也難信者如中下根譬喻因緣二周之後方能信解是也於諸説中等者此經於已今當説最為第一故也明珠者明譬中道智珠喻圓實之理能令至一切智智即果名行始為因行終為果是行一也第一之説是教一祕密之藏是理一安置諸子祕密藏中我亦不久自住其中即兼人一二偈頌二初頌行法二初超頌行成爾時世尊欲重宣此義而説偈言常行忍辱哀愍一切乃能演説佛所讚經此下四行頌行成也上長行中總明行成今偈頌中別顯也常行忍辱頌著忍辱衣行成哀愍一切頌入慈悲室行成乃能演説頌坐法空座行成二追頌行法三初頌誓願境後末世時持此經者於家出家及非菩薩應生慈悲二頌誓願由斯等不聞不信是經則為大失三正立誓願我得佛道以諸方便為説此法令住其中二頌歎經二初頌開譬二初頌不與珠譬譬如強力轉輪之王至妓婢財物歡喜賜與二頌與髻珠譬如有勇健能為難事王解髻中明珠賜之輔行六下云力能趣實故云勇健依理而起精進之行故云能為難事今佛輪王解權賜實故云王解髻等二頌合譬二初頌合不與珠如來亦爾為諸法王至以大方便説此諸經二頌合與珠譬既知衆生得其力已至今正是時為汝等説上譬如強力至此凡十行半頌上歎經也其力即精進力也不妄開示者大機未熟也今正是時者正是開權顯實之時三總結行成之相三初結勸四行我滅度後求佛道者至應當親近如是四法此下二十三行是第三總結行成感徵之相以勸修行今結勸身口意誓願四行也二舉三報以勸亦名三障清淨三初報障轉轉現報讀是經者常無憂惱又無病痛顏色鮮白此下舉三報轉以勸持經今是報障轉轉現報也滅現世憂惱即除苦受之報此轉現報之心也無病痛顏色鮮白即轉現報之色也二業障轉轉生報不生貧窮卑賤醜陋此轉惡業也惡業之因應感惡果由持經力轉惡因而得好果即轉生報也不生即無惡生業現在持經不作貧窮業來世不生卑賤也三煩惱障轉轉後報二初別明三煩惱障轉三初別明貪障轉衆生樂見如慕賢聖天諸童子以為給使此衆生樂見至下如日之照三行是別明三煩惱障轉也今初明貪障轉多貪欲者為人忽慢又障生梵天今貪欲障轉故衆生樂見人不忽慢天童給使不障生梵天二別明嗔障轉刀杖不加毒不能害至遊行無畏如師子王此明嗔障轉也捨嗔則除內刀箭入陳則外刃不傷故云刀杖不加嗔是害慈悲之毒藥內既慈悲則外毒不能害嗔是惡口腑臟內既無嗔則入口閉塞不能惡罵既不為人加害惡罵故於遊行之處無所畏憚也三別明癡障轉智慧光明如日之照此明癡障轉也愚癡能障智慧今愚癡之障既轉則智慧之光如日之照二總明一切煩惱轉六初夢入十信二初正明慈悲報若於夢中但見妙事至數如恆沙恭敬合掌此下十六行總明一切煩惱障轉亦是後報轉也由身口意誓願四行功成兼以弘經之力化功歸己果相先彰故於夢中見種種事並是未來後報之相百千萬劫事在一念夢中用表妙法不可思議一中無量無量中一是相前現後當尅果從初十信乃至妙覺八相成佛皆以如來莊嚴而自莊嚴即忍辱報今此二行半正言慈悲報也二正見無癡報自見其身而為説法因無邪癡而得正見因正見故而有智慧因有智慧即能説法故科此二句為正見無癡報從前科若於夢中至此而為説法總是夢入圓教十信位也二夢入十住又見諸佛身相金色至亦有四衆合掌聽法此六行半偈明夢入十住也住中既云見佛表自當得八相初住便破一品無明分身百界作佛故也見身處中表入中道實相也聞法歡喜表初發心住見中道與初歡喜地等故亦云喜陀羅尼此云能持謂集種種善法能持令不散不失也又翻總持謂持善不失持惡不生也又翻遮持謂遮二邊之惡持中道之善也今云得陀羅尼即有三一旋陀羅尼二百千萬億旋陀羅尼三法音方便陀羅尼淨名疏釋云旋者轉也轉假入空得證真諦百千萬億者即是從空入假旋轉分別破塵沙惑顯出恆沙佛法法音方便者即是二觀方便得入中道也不退智者即三不退具如序品初釋既云證不退智即為授記者當知得入初住無生得記之位也三夢修十行又見自身在山林中修習善法夢入十住之後既云又見自身在山林等知是十行修習善法也妙樂云修習云行者前非無行不別而別至此最得行名故也四夢悟十向證諸實相既云證諸實相知是十回向正觀中道位也妙樂云證諸者諸言正表斷三十品無明也五夢入十地深入禪定十方佛深入禪定即第十地中無垢三昧入金剛定諸佛皆現摩頂受職也妙樂云言無垢者初住已得為順大經以無垢三昧對於初地故今且從初地以説若云入金剛定義當等覺今等覺合在十地中六夢入妙覺諸佛身金色百福相莊嚴至如煙盡燈滅既夢八相作佛則知是夢入妙覺也此中或是初住能八相成佛之相仍前次位寄談極果耳夢作國王即是降兜率托胎降生三相捨宮殿五欲詣道場即是出家之相成無上道成道必降魔即是成道降魔二相轉法輪入涅槃二相如文煙盡燈滅者煙譬機燈譬應妙樂云安樂既是如來之行故弘經者預表果成故知弘功其力不少三總結行成若後惡世中説是第一法是人得大利如上諸功德此總結行成也妙法蓮華經從地涌出品第十五師嚴道尊鞠躬祗奉如來一命四方奔踊故言從地涌出品此約世界悉檀釋也三世化導惠利無疆一月萬影孰能思量召過去以示現在弘妙經以益當來故言從地涌出品此約為人悉檀釋也虗空湛然無早無晚惑者執迹而暗其本召昔示今破近顯遠故言從地涌出品此約對治悉檀釋也寂場少父寂光老兒示其藥力咸令得知故言從地涌出品此此約第一義悉檀釋也妙樂自下升此故是世界也召本人示現人令現人生現善使本人弘現經令當人生當善故是為人也虗空等者約所表也虗空理也本迹事也事有本迹理無早晚惑者迷理而暗本迹故執近迹而失遠本所以召昔示今破執近惡故是對治也寂場舍那示始成故父少寂光菩薩行久著故兒老譬藥力者父久先服種智還年之藥父老而若少子亦久稟常住不死之方子少而若老故是第一義也大段第二本門開近顯遠亦名開師門之近迹顯佛地之遠本三初序段從此下至汝等自當因是得聞二正説段從爾時釋迦告彌勒下至分別功德品彌勒説十九行偈三流通段從偈後下十一品半經文今初從地涌出品初半品乃本門序段分二初湧出三初他方請弘爾時他方國土諸來菩薩至當於此土而廣説之他方菩薩既聞迹門流通弘經福大咸欲發願住此弘宣是故請也二如來不許爾時佛告諸菩薩摩訶薩衆至護持讀誦廣説此經如來止之凡有三義他方菩薩各各自有己任若住此土廢彼利益又他方菩薩於此土結緣事淺雖欲宣授必無巨益又若許之則不得召下方菩薩下方菩薩若不來此近迹不得破遠本不得顯為此三義故如來止之也召下方來亦有三義是我弟子應弘我法以緣深廣能遍此土益遍他方土益又得開近顯遠是故止彼而召下也三下方涌出二初經家敘相五初涌出佛説是時娑婆世界至菩薩摩訶薩同時涌出妙樂云地裂者地覆本眷屬如迹隱本今開迹顯本故裂地以表之二身相是諸菩薩身皆金色三十二相無量光明三住處先盡在此娑婆世界之下此界虗空中住住處者常寂光也常即常德寂即樂德光即淨我二德此四德祕密之藏是其住處以不住法住祕藏中下方者法性之淵底玄宗之極地故言下方在下不屬此空中不屬彼非彼非此即中道也又出此不在上亦不在此下不上不下住在空中亦是中道也妙樂云法性之淵底釋下也玄宗之極地釋方也玄理之宗故名玄宗宗謂宗致取果所期此諸菩薩分到所期且云極地在下不屬此者在下空故不屬此界下方空名下空空中不屬彼者住於下方空中故不屬彼界出此不在上者非上界也不在此下者言在此界之空中經云從地出已各詣虗空是也四聞命是諸菩薩聞釋迦牟尼佛所説音聲從下發來來之由者聞命故來弘法故來破執故來顯本故來皆如上説五眷屬一一菩薩皆是大衆唱導之首至所不能知所將眷屬者若人情往望謂領六萬五萬恆沙者為多領三二一者為少單己者隻獨若依文往尋六萬五萬者為少單己者為多故下偈文云單己獨處者其數轉過上若依法門者一一皆是導師能引衆人至於寶所當知一己非獨六萬非多一即一道清淨二即定慧三即戒定慧四即四諦五即五眼六即六度一一度具十法界界界互具成百法界界界十如即具千如如如十善即成萬善一度具萬六度即六萬法門多不為多一不為少非多非少而多而少多不多空也一不少假也雙非雙照中也此中明六度不同常途六度互嚴之説乃依妙境論六度耳妙樂云行依妙境故度成萬是也二大衆問訊五初三業供養是諸菩薩從地出已至欣樂瞻仰於二世尊樹下之座即分身諸佛所坐者也拜繞是身讚法是口瞻仰是意也是諸菩薩摩訶薩從初涌出至令諸大衆謂如半日五十小劫謂如半日四衆遍見此乃隱長而現短借猶與也其神力令狹而見廣俱是不可思議也五十小劫與半日者此是時節不可思議如來所見不以二相下方菩薩常面稱揚如來默然常受其讚解者即短而長謂五十小劫惑者即長而短謂如半日斯為本迹而作弄引如來未説則暗本而執迹佛若開顯則悟近而達遠亦知不思議一也妙樂云五十小劫令如半日此明如來不可思議延促之事顯於如來自在之力既云令諸大衆謂如半日即促彼長令其見短故云隱長廣狹亦爾此言即長而短也四衆遍見即下文四衆遍見菩薩也此言即狹而廣也有人云即生公也聽法之志而忘其長或云長短斯亡長短斯存此並得感而失應何以抑於如來神力耶如來所見等者佛眼觀之長短不二四眼觀之不無長短故赴長短機令見不一爾時四衆亦以佛神力故至百千萬億國土虗空四衆遍見菩薩者此是如來借其神力令即狹而見廣亦是不思議也夫肉眼天眼所見不遠而今所覩充滿虗空則知菩薩應相既多必並證得彌法界之真理也妙樂云肉天二眼任其自力所見不遙今忽見遠知非己力即知如來現此神變必説妙法二陳問訊詞二初標四導師是菩薩衆中有四導師至最為上首唱導之師但舉四人者欲擬開示悟入四十位耳如華嚴但舉法慧德林金幢金藏説四十位也妙樂云擬者比擬也亦對也如華嚴下引同彼此佛慧既同人法相望亦等但彼迹此本彼兼此獨本迹雖殊彼此俱四咸為導首故得例之唱導者補注云啓發法門名之為唱引接物機名之為導二正陳問詞二初長行二初問如來安樂在大衆前各共合掌至少病少惱安樂行不二問衆生易度所應度者受教易不不令世尊生疲勞耶二偈頌二初頌問如來安樂爾時四大菩薩而説偈言世尊安樂少病少惱教化衆生得無疲倦世尊已離世間有漏五陰豈有病惱蓋欲示同人法順土常儀故須問云病惱耳二頌問衆生易度又諸衆生受化易不不令世尊生疲勞耶三佛答安樂二初答安樂爾時世尊於菩薩大衆中至如來安樂少病少惱此答上初偈之問二答易度二初根利德厚諸衆生等易可化度至即皆信受入如來慧此答上次偈之問易度有二一根利德厚者世世已來常受大化始見我身即稟華嚴入如來慧果熟易零此一類衆生則易度也二根鈍德薄除先修習學小乘者至得聞是經入於佛慧此易度中二根鈍德薄者世世已來不受大化為此等人故須開頓説漸三藏方等般若而調伏之亦令此人今聞法華入於佛慧比前雖難於佛甚易根雖利鈍所入是同疏中略舉十意釋之第一始見今見乃至第十利根初熟始入佛慧鈍根後熟今入佛慧緣宜不同略為十異種智法界等無差別故今經云始見我身聞我所説即皆信受入如來慧除先修習學小乘者今聞此經入於佛慧明文在茲不須疑也舊云華嚴了義滿字常住法華不了義非滿非常今以此文並之若始入是了義今入是不了義者始入是佛慧今入非佛慧若佛慧既齊了義亦等滿字常住悉如是四偈頌隨喜爾時諸大菩薩而説偈言善哉善哉大雄世尊至聞已信行我等隨喜能問者即是華嚴中四大士法華中身子三請俱是能問也所問者即是問佛智慧也妙樂云聞已信行者即指能問諸菩薩所化之人聞菩薩説已而能信行我等隨喜者即上行等隨喜能問菩薩發起大利及隨喜菩薩所化之人也五如來述歎於時世尊讚歎上首至能於如來發隨喜心如來述歎與上大異何者上文隨喜能問之人皆是菩薩及所化之人聞已信行即是於菩薩等發隨喜心也今如來述歎何故却云汝等能於如來發隨喜心蓋能問者皆是古佛汝能隨喜即是隨喜如來是則菩薩隨喜其迹如來述歎其本此亦密表壽量妙樂云密表壽量者今歎菩薩尚是古佛密表今佛非今成也既非今成必有遠本未得彰灼故云密表二疑問二初此土菩薩疑二初長行疑念爾時彌勒菩薩及八千恆河沙至并欲自決所疑此下是第二疑問序彌勒及諸菩薩所以疑問者自初寂場説華嚴以來至今靈山説法華已往十方大士來會雖不可限我以補處智力悉見悉知而於此衆不識一人然我遊化十方覲奉諸佛諸佛大衆快所諳知今就彼履歷之處推之亦所不識又彼諸大士是前進先達彌勒是後番末學後不知前故所不識又彼等大士本實相底應現十方所有真應非彌勒境界是故不識又佛託弘經召諸大士密開壽量非時衆所知故言不識已上諸釋約四悉檀意也妙樂云初約來者次約去處來去異故識不識別以不識故無世界益也彌勒不知前進之喜則自善不生無為人益也化物本治物病彌勒不知真應無彼利物之道即不識病無對治益也密開壽量是第一義者即此一部最極之理豈非第一既時衆不知無第一義益也斯蓋彌勒為衆發起且云不識不知耳二偈頌正問五初問何處來合掌向佛以偈問曰無量千萬億大衆諸菩薩至是從何所來兩足者謂福慧二種莊嚴皆具足也二問何緣來以何因緣集巨身大神通至為從何所來三敘其數量一一諸菩薩所將諸眷屬至猶不能盡知四問其師誰是諸大威德精進菩薩衆至修習何佛道五彌勒結請五初結歎神力如是諸菩薩神通大智力二請答來處四方地振裂皆從中涌出至未曾見是衆三請答來緣我於此衆中乃不識一人忽然從地出願説其因緣四大會同請今此之大會無量百千億至本末之因緣五請答師主無量德世尊惟願決衆疑科云請答師主者即請答誰為其説法等二他土菩薩疑爾時釋迦牟尼分身諸佛至汝等自當因是得聞此他土菩薩疑也其佛侍者即他方菩薩是分身眷屬橫在十方與彌勒同疑俱不知如來本地成佛甚久於是各各以疑陳於己佛佛皆抑待彌勒故云彌勒已問斯事汝等自當因是得聞妙樂云抑待彌勒者分身諸佛自謂答問之益不在於我故不為答抑待釋迦答彌勒問故云待彌勒耳何者彌勒所問事迹不輕釋尊一代未曾顯説因茲答問廣顯長壽此一代玄祕在佛自開汝自當聞我不應答本門序分竟二此半品至彌勒説偈盡本門正説段二初誡許二初長行二初誡二初述讚爾時釋迦牟尼佛至乃能問佛如是大事此下本門正説分阿逸多此云無能勝即彌勒姓也二正誡汝等當共一心被精進鎧發堅固意一心誡勿亂被鎧誡勿怠堅固誡勿退也二許二初標示果智慧如來今欲顯發宣示諸佛智慧二三世開化教諸佛自在神通之力至諸佛威猛大勢之力科云開化教者宣示也自在神力者過去益物也師子奮迅者十方分身所被之處現在益物也大勢威猛者未來益物也章安私謂如來自在者我德也神通者樂德也師子奮迅奮迅除垢淨德也大勢威猛未來益物常德也妙樂云神通是菩薩遊戲故名為樂益盡未來故得是常二偈頌二初頌誡爾時世尊欲重宣此義而説偈言當精進一心我欲説此事勿得有疑悔二頌許二初頌智慧果佛智叵思議二頌三世化汝今出信力住於忍善中至汝等一心聽妙樂云頌三世者前師子等以明三世文中亦無三世之語但以義勢同三世耳今頌亦爾直以佛無不實語等半行偈文而用通之語既不虗則知三世益亦真實二正説二初一品半正開近顯遠二初此品末略開近顯遠動執生疑二初略開近顯遠二初長行二初雙答二初答師弟爾時世尊説此偈已至調伏其心令發道意此去盡壽量品正開近顯遠也二答處所此諸菩薩皆於是娑婆世界之下此界虗空中住此界指下方也下方空中住者釋論明有底散三昧應作四説有者三有也底者非想非非想也以深勝故為底又有者名相也底者空也以空寂故為底又有者二邊俗也底者邊際智滿故為底今經云下方空為底不是上界不是下界表中道為底此是約教分別妙樂云有底散者底者下也散者空也此但消名若出體狀即約教釋者是也非想等是有漏底空是真諦底邊際智是俗諦底皆以極釋也既云約教分別則初一是藏次一是通次一是別今經是圓以中為底於四釋中但云有底不云散者底即散故二雙釋二初釋師弟二初雙修智斷於諸經典讀誦通利思惟分別正憶念師知弟子修智斷二德於經分別是修智正憶念是修斷二雙證智斷阿逸多是諸善男子等至勤行精進未曾休息不樂在衆是證斷德勤行精進是證智德也三釋處所亦不依止人天而住至一心精進求無上慧不依止人天而住是釋處也人天是二邊不住不著也深智無礙者依不思議智也樂於佛法者樂不思議境也境智甚深微即非淺行菩薩也妙樂云不依止人天者言居止虗空並不依於上天下人也言人天是二邊者約所表釋人多滯著表有邊天住淨福表空邊居此空中以表中道二偈頌二初頌雙答二初答師弟爾時世尊欲重宣此義而説偈言阿逸汝當知是諸大菩薩至為求佛道故二答處所二初正答處所在娑婆世界下方空中住二歎菩薩德志念力堅固常勤求智慧説種種妙法其心無所畏二頌雙釋二初釋師弟我於伽耶城菩提樹下坐至汝等一心信二釋處所我從久遠來教化是等衆科云釋處妙樂云經不云處但云久遠教化之者前長行正答中已云在娑婆世界下方空中住竟故但以時而釋處也過去久遠於何處化化令入實即空中也二因疑更請二初長行二初疑爾時彌勒菩薩至令住阿耨多羅三藐三菩提彌勒等既聞上菩提樹下乃教化之今皆住不退又聞我從久遠來教化是等衆由聞此二説動執生疑二請二初法説三初執近疑遠即白佛言世尊至當成阿耨多羅三藐三菩提此疑成道近所化甚多執近而疑遠也伽耶此云山城去菩提道場約二十里西域記云城甚險固城西南五六里至伽耶山溪谷杳冥峯巒危險印度國俗稱曰靈山四十餘年者説法頌云阿含十二方等八二十二年般若談法華在般若後説故云四十餘年也二執遠疑近世尊此大菩薩衆至成就菩薩道常修梵行此所化既多行位深妙又執遠而疑近也妙樂云問彌勒既不知其數不識一人云何得知久植善根答秪由不知不識并由佛歎住處德業既多又深彌勒因疑此等菩薩豈近成道之佛之所化耶三難信結請世尊如此之事世所難信妙樂云結請中但舉難信者託物不信拒而擊佛令必有答也二譬説二初開譬三初譬成道近意譬如有人色美髮黑年二十五二譬所化多意指百歲人言是我子至言是我父生育我等三總結譬難信是事難信色美髮黑總在年少比如來是父譬上成道近意也指百歲人比地涌涌菩薩是子譬上所化甚多意也淮北諸師以譬釋譬譬父服還年藥貌同二十五雖老而少子不服藥形如百歲雖少而老若知藥力不疑子父不知者怪之今家合其譬云如來橫服垂迹之藥示伽耶始生諸菩薩直論本地久發道心今住不退若佛及佛快知此事自下不達不得不疑故結云是事難信妙樂云既云若佛及佛則顯彌勒不知言如來橫服垂應藥者智契深理由竪服於真諦之藥處處益物乃由橫服垂應之藥真諦藥者假即空故權即實故自行冥故垂應藥者空即假故實即權故化他起故二合譬三初合近譬佛亦如是得道已來其實未久二合遠譬而此大衆諸菩薩等至一切世間甚為希有此菩薩久種善根非止伽耶發心善入出住者九次第定是善入四禪四空及滅受想定師子奮迅三昧是善出超越三昧是善住藏通二教竟也從初地至十地名善入十地入重玄門再修凡夫事名善出妙覺遍滿名善住別教意也畢法性三昧名善入首楞嚴三昧名善出王三昧名善住圓教也意次第習諸善法者據因為善習就果為善入善答難問者具福慧二種莊嚴也七方便之尊故云人中寶也妙樂云九次第定是善入者從禪至禪無間入故奮迅是善出者從禪至禪皆經散心以散名出超越是善住者雖經超散住禪宛然畢法性為善入者畢者窮也窮法性故首楞嚴定能現威儀故王三昧者如王安國故三合請答三初舉佛語今日世尊方云得佛道時至乃能作此大功德事二明請意二初為現在我等雖復信佛隨宜所説至佛所知者皆悉通達彌勒自謂現在見聞我雖未達信而已矣二為未來然諸新發意菩薩於佛滅後至而起破法罪業因緣今所請者正為未來淺行新發意者喜生誹謗謗則墮於惡道不退者雖能信而不謗不能增道若為分別而説令謗者則生信信者則增道三正請答二初除我等疑唯然世尊願為解説除我等疑三除未來疑及未來世諸善男子聞此事已亦不生疑二偈頌二初頌法説三初頌執近爾時彌勒菩薩欲重宣此義而説偈言佛昔從釋種出家近伽耶坐於菩提樹爾來尚未久二頌疑遠此諸佛子等其數不可量至是事難思議三頌結請云何而可信佛得道甚近至如實分別説二頌譬説二初頌開譬譬如少壯人年始二十五至舉世所不信二頌合譬三初頌合近世尊亦如是得道來甚近二頌合遠是諸菩薩等志固無怯弱至於下空中住三頌合請我等從佛聞於此事無疑至而住不退地妙法蓮華經如來壽量品第十六如來者十方三世諸佛二佛三佛本佛迹佛之通號也壽量者詮量也詮量十方三世二佛三佛本佛迹佛之功德也今正詮量本地三佛功德故言如來壽量品如來義甚多且明二三如來餘例可解二如來者成論云乘如實道來成正覺故名如來乘是法如如智實是法如如境境智和合則有因果道是因覺是果道覺義成即是乘如實道來成正覺此即真身如來也以如實智乘如實道來生三界示成正覺者此即應身如來也三如來者法如如境非因非果有佛無佛性相常然遍一切處而無有異為如不動而至為來此法身如來也法如如智乘於如如真實之道來成正覺從理名如從智名來此報身如來也以如如境智合故即能處處示成正覺八相成道轉妙法輪此應身如來也法身如來名毗盧遮那此翻遍一切處報身如來名盧舍那此翻淨滿應身如來名釋迦牟尼此翻能仁寂默此三如來一必具三三即是一不一不異非縱非橫圓覽三法假名如來也次明壽量者即向三如來之壽量也壽者受之義也量者詮量也若真如不隔諸法故名受此詮量法身如來以如理為命不生不滅性相常然故經云非實非虗非如非異此法身之壽量也若境智相應故名受此詮量報身如來以智慧為命由如如智契如如境境既無量無邊常住不滅智亦如是故經云我智力如是久修業所得慧光照無量壽命無數劫此報身之壽量也若一期報得百年不斷故名受此詮量應身如來應同機緣為命緣長同長緣促同促故經云數數現生數數現滅等此應身之壽量也又須知法身非量非無量報身金剛前則有量金剛後則無量應身隨緣則有量應用不斷則無量是則三身各具量無量常無常之義自昔諸師或約無量明常有量是無常今家約義準經應具四解一者實有量而言無量如阿彌陀經説佛壽七百阿僧祇既有七百之數豈非實有限量雖有齊限人天莫數故名無量壽此是應身如來緣長同長之壽量也二者實無量而言量如此品詮量雖通明三身若從別意正在報身故經云我成佛已來甚大久遠等豈非實無量而品題但云壽量又如金光明經四佛為信相菩薩説偈云海滴山斤地塵空界可知其數無有能知如來壽者而彼品題亦但云壽量此是報身如來之壽量也三者實無量而言無量如涅槃經亦云唯佛與佛其壽無量此是法身如來之壽量也四者實有量而言量如今釋迦八十唱滅此是應身緣促同促之壽量也當知一佛身即具諸身壽命功德隨緣感見長短不同四句詮量其義已顯為未解者更以常等四句揀之非常非無常雙非理極即法身也常者以正智圓滿不生不滅即報身也亦常亦無常者應用無盡為亦常數唱涅槃名亦無常即應身也無常者金剛心已前智用增進乃至凡夫生死出沒皆是無常此約別教説也若圓説者一一如來悉備四句如疏具明豈可偏約常與無常量與無量而釋之耶又復應知佛本無身無壽亦無於量隨順世間而論三身亦隨順世間而論三壽此品正意雖論報身壽量報身智慧上冥下契三身義足如是三身種種功德悉是本時道場樹下先久成就名之為本中間今日寂滅道場所成就者名之為迹非本無以垂迹非迹無以顯本本迹雖殊不思議一也妙樂云問法報是本應身屬迹何以乃言本地三佛答若其未開法報非迹若顯遠已本迹各三二壽量品廣開近顯遠斷惑生信二初誡信四初三誡爾時佛告諸菩薩至汝等當信解如來誠諦之語將欲開近迹而顯遠本故先誡信佛旨嚴諭為誡衆機領受為信若迹門有三請一誡如方便品初三請之後但誡云汝今諦聽善思念之今本門乃有三誡三請重請重誡前後合五誡七請奇特大事殷勤鄭重也誡云汝等當信解等者不疑近成曰信明了遠本曰解誠是忠誠諦是審實不欺於物言則詣真昔為七方便人凡有所説皆是隨他意語非告誠實今法華純圓開顯之教即是隨自意語示之以要故言誠諦菩薩既奉誠誡不敢致疑聞必取信信受誠言也妙樂云請中既云如是三白已復言惟願説之即第四重請也佛於三請之後又云汝等諦聽即第四重誡也鄭重如前釋二三請是時菩薩大衆彌勒為首至如是三白已如來既垂三誡機衆乃伸三請三重請復言惟願説之我等當信受佛語既伸三請之後復云惟願説之乃成四請四重誡爾時世尊知諸菩薩三請不止而告之言汝等諦聽既垂三誡之後復告云汝等諦聽乃成四誡二正答二初長行二初法説二初三世益物二初過去益物二初出執近情三初出所迷法如來祕密神通之力二出能迷衆一切世間天人及阿修羅三出迷遠謂皆謂今釋迦牟尼佛至得阿耨多羅三藐三菩提前二科文於此併釋祕密者一身即三身名為祕三身即一身名為密又昔所不説名為祕唯佛自知名為密神通之力者三身之用也神是天然不動之理即法性身也通是無壅不思議慧即報身也力是幹用自在即應身也佛於三世等有三身於諸教中祕之不傳故一切世間天人修羅皆謂今佛始於道樹得此三身故執近以疑遠此本門法説中不復言及二乘但對菩薩菩薩攝在天人修羅三善道內餘三惡趣罪重根鈍少智不知故大品般若經云摩訶衍勝出天人阿修羅亦不言三惡道也菩薩有三種下方他方舊住是也下方即本日所化故無執近之謂他方舊住俱有二種一者從法身應生者往世先得無生法忍或已先聞發迹顯本設未得聞報盡受法性身於法身地自應得聞長遠之説是故應生菩薩多無執近之謂二者今生始得無生忍及未得者咸有此執近之情乃謂今佛始於道樹得此三身故執近以疑遠也二破近顯遠二初法譬顯遠二初法説顯遠然善男子我實成佛已來至百千萬億那由他劫此下明破執遣迷以顯久遠之本上文誠諦之誡即是此也今正明顯遠如來既説成佛甚大久遠則謂伽耶近成之執即破破近顯遠略有十意如法華玄義第九具出此文正用破近顯遠廢近顯遠二意破近謂之執情廢於今日之近教也二舉譬格量三初舉譬問譬如五百千萬億至思惟校計知其數不餘經明數多但以不可説塵沙等為喻以彼方此此則為多何者今經喻於遠壽直下塵被點之界已不可説況不下塵之界寧當可説下塵不下塵之界尚不可説下塵不下塵世界之塵豈可説耶況下文云復過於此又寧可説耶那由他此云萬億阿僧祇此云無數二答不知彌勒菩薩等俱白佛言至如是諸世界無量無邊答中舉三人不知也阿惟越致亦名阿跋致此云不退轉已如前釋三合顯遠爾時佛告大菩薩衆至百千萬億那由他阿僧祇劫此合顯出長遠也妙樂引僧傳云準羅什舊經無一塵一劫四字有齊高僧曇副誦經感夢云少一句後果得之若金光明云一切海水可知滴數無有能知如來之壽此亦明未來之壽非過去也若引證此殊不相應二益物所宜三初益物之處自從是來我常在此娑婆世界至導利衆生此過去益物所宜須顯處者上引譬中既言成佛甚久未審久居何處故云常在此土及餘他國而作佛事妙樂云益物處者此之娑婆即本應身所居之土今日迹居不移於本但今昔時異見燒者謂近照本者達遠故經云大火所燒時我此土安隱常在靈鷲山及餘諸住處豈離伽耶別求常寂非寂光外別有娑婆二拂迹上疑諸善男子於是中間至如是皆以方便分別昔見諸教所説處處行因不同即是疑因又見處處得記不同即是疑果如此行因得記之説皆不知是果後方便故生於疑也今拂除此疑故指然燈佛時行因即拂因疑又指然燈佛時得記及入涅槃即拂果疑如此因果非復一條皆成方便非實説也故名拂疑又復言其者即是中間施化之其耳蓋佛昔於然燈佛世為菩薩之時自入涅槃不得云是然燈涅槃也妙樂云經文先舉事竟結云皆是方便即名為拂昔於諸教雖見不同而生於疑乃不知是果後方便等及如是示差別意即説值然燈等及在然燈之世入涅槃也三正明益宜二初感應諸善男子若有衆生至諸根利鈍隨應度至我所者即是過去衆生漸頓兩機冥扣法身也佛眼觀者即是久已成佛用佛眼鑑照無有遺差將欲起於勝劣兩應而利益之善機凡有二力一感人天華報二感佛道果報若以法眼觀知衆生萬善緣其重輕各得華報不能究竟知其終得種智果報若以佛眼圓照衆生萬善即能知其始因末果此經一向明佛眼觀知衆生萬善究竟得佛一大事出世之正意也信等諸根者即信進念定慧五根也慧根即了因餘根即緣因此二善根各有利鈍通攝頓漸機緣頓機利鈍即是圓別二教之人漸機利鈍即是藏通二教之人又小乘根名鈍大乘根名利又小乘根名利人天根名鈍十法界衆生所有善根利鈍皆用為機不用惡法惡法非緣了二因故也如來悉照十界善機隨所應度而現形聲饒益也妙樂云問佛果既極如何亦得名生機處答此中論機及辨利鈍故佛法界未是佛果故彼玄文中十界交互以論機緣則果佛機通在十界故也二施化二初形聲兩益二初形益二初非生現生處處自説名字不同年紀大小處處者竪論即過去之處處行因國土也橫論即昔日十方國土也名字不同者形即現矣則有名字因名召體機有大小形有勝劣劣是劣應即三十二相之身被藏通二教之機勝是勝應即八萬四千相好之身被別圓二教之機此約示現佛法界身名字不同若現九法界身名字不同無量無邊可以意得年紀大小者此明壽命長短大即勝應小即劣應劣應現壽有量勝應現壽無量此皆隨所應度為其現身及命長短耳二非滅現滅亦復現言當入涅槃應以滅度而得度者即現滅度令其戀仰而得解脫也二聲益又以種種方便説微妙法小身短壽即是説於漸教故言種種方便大身長壽即是説於頓教故言説微妙法二得益歡喜能令衆生發歡喜心雖初用漸終令入大故言能令歡喜仍此歡喜即是施化得益佛依四悉檀施形聲兩益衆生獲於四利稱機則喜乖機則惱今既稱機得益故歡喜也二現在益物二初明機感諸善男子如來見諸衆生樂於小法德薄垢重者如來見者即佛眼照也諸衆生樂小法者即所見之機也南嶽師云樂小者非小乘人也乃是樂近説者為小耳今當通説之所謂貪愛二十五有即人天之機貪著涅槃求自解脫即二乘之機樂於漸次迂回佛道即三教菩薩之機此等衆機來至我所皆名樂小法也德薄者緣了二善功用微劣也垢重者見思二惑未除也此約迹門名樂小法若約本門説者樂聞出釋氏宮近成之小不欲樂聞長遠久成之大故言樂小此等小心非始今日若先樂大佛即不説始成説始成者皆為樂小法者耳妙樂云德薄垢重者其人未有實教二因故也二明應化二初非生現生二初正明二初現生為是人説我少出家得阿耨多羅三藐三菩提此文科云現生者迹現於生也前明利鈍之機來感法身今即現勝劣兩應劣應應鈍根勝應應利根此兩應並有生法二身生劣應生身生者以正慧託胎出生行七步乃至六年苦行已還是也劣應法身生者即三十四心斷結習盡所得五分法身是也勝應生身生者如華嚴等經説與諸菩薩處摩耶胎常説大乘之法出生十方各行七步是也勝應法身生者於寂滅道場金剛後心斷無明惑盡得妙覺相應慧窮照法性萬德種智圓明普備是也出家者劣應出分段生死家勝應出分段變易二種生死家也得菩提者劣應得有作四諦所發無漏盡無生智名為菩提勝應即照三諦一實之道一切種智為菩提也妙樂云若約兩處成相即曉藏通二身是劣應別圓二身是勝應也雖云兩應各有生法二身然劣應之上五分法身義同生身勝應之上雖云生身義同法身補注云小乘之教不談常住五分法身終歸灰滅故義同生身大乘既談常住應全法性而起法性不滅應亦常住故王宮誕迹非生現生鶴林澄神非滅現滅故義同法身二非生然我實成佛已來久遠若斯至令入佛道作如是説此文科云非生者非始爾生也然我實成下正明本實不生但天人修羅見此二種生法二身謂言始生此則不然然我久已得此生法二身今日之生非實生也故云久遠若斯若斯者如上譬之長久也但以方便下明既非實生何故現生但為利益樂小法人德薄垢重者使得佛道故言但以方便教化衆生等非生而現生故云作如是説二利益二初形聲益諸善男子如來所演經典至或示己事或示他事此明現生形聲益物也説即是聲教示即是形規形聲不出自他若説法身是説己身若説應身是説他身言值然燈佛即是説己身然燈佛是我師即是説他身隨自意語是説己身隨他意語是説他身示現正報是示己事示現依報是示他事二明不虗二初標不虗諸所言説皆實不虗言説不虗雖偏據聲益聲必兼形故須雙釋言不虗者漸頓二機稟此勝劣二應形聲之益不虗也若約迹本二門論虗實者昔方便行未得實道之益即是因虗執於近迹未得本地真實之益即是果虗今聞迹門之説同入實相即得因中實益聞本門之説即除執近之情得於長遠果地之實益今得二實對昔二虗故言皆實不虗二釋不虗二初照理不虗所以者何如來如實知見三界之相此下總釋益物不虗今先釋形益不虗此中六句顯於應身不離法身法身無形亦無起滅衆生有起滅之機感於法身如來願力應同起滅起滅之見出自衆生故約三界以明諸句言如實知見者即是實智如理而照三界之實實則無三界之因相也妙樂云此中六句明今日應身即是久成法身不思議一故云照理等無因相者若準下句無二死應云無二種三界之因相也無有生死無有分段變易二種生死之苦果也若退若出有五住集名退有二死果名出結上無二死家之因果也如來至此是第一句亦無在世及滅度者亦無在生死之世及入涅槃之滅此二俱滅故云亦無等此是第二句非實非虗非於滅度之實非於生死之虗也此是第三句非如非異非於世間之隔異非於出世之真如蓋六道衆生見三界為異二乘見三界為如如即空也佛見三界非如非異雙照如異如上四句是明中道也不如三界見於三界不如二種三界衆生所見三界之相妙樂云不如三界者如者同也佛具權實二智必不同彼二種三界衆生所見三界二邊因果之相二種三界者三界名通通界內外若界外立三界名者以外準內故也中理未窮通名見惑通三界也變易土中勝妙五塵名欲界思不思議法塵名上界思淨名疏中委出其相此是第五句如斯之事如來明見無有錯謬唯佛內具實智之用故如實窮照三界之實亦是隨自意語亦是或説己身之事故大品云第一義中無所分別也如來實智雖無分別不妨以權智如量知見三界之相即同三界衆生之見雖無二死而隨他意示二死身説有二死雖無退無出而隨他意説有退出雖亦無在世及滅度者而隨他意示生世間示入涅槃説有在世有得滅者雖無實而説涅槃之實雖無虗而説三界之虗雖無三世之異而説有異雖無真諦之如而説有如同於三界見於三界皆是隨他意語名為説他身事示他身事如來二智明審二諦所以形聲兩益皆實不虗也妙樂云既總云如斯覽前所照通成一見故皆重牒前五實句共成權實二智之相故前實智唯照實境今加權智隨物見權明非見而見即二智不二也二稱機不虗二初機感以諸衆生有種種性至種種憶想分別故以諸衆生根機利鈍漸頓不同性欲行智種種差別欲令增諸善根故説己他之教不虗因緣譬喻也性者漸頓根性各有種種故須用為人悉檀生諸善根善根猶是性欲者漸頓二機若種種欲樂不同此須用世界悉檀隨其樂欲皆令歡喜行者隨其樂欲而修諸行此須用為人悉檀生其宿善若行中好多愛著致有妨障此須用對治悉檀破其現惡憶想是智慧即相似解漸頓二機居內外凡位有諸善根故欲樂欲樂故修行修行故得相似解此須用第一義悉檀隨其所得憶想之解更為説法令得入理乃至初地欲樂修行二地之時亦憶想二地之境即是念想若發生二地真解即是念想觀除言語法滅乃至妙覺果佛方得究竟離於憶想獲常寂照耳妙樂云問應云初住何云初地答從漸頓來且寄地位耳二施化欲令生諸善根至所作佛事未曾暫廢此正對機施己他聲益欲令漸頓之機生種種善根故現若干己他身事若干己他聲教若干因緣譬喻也若對漸機以三藏四門若干因緣譬喻於一一門中復有若干通教四門亦如是若對頓機如別圓亦各四門若干種種如淨名三十二菩薩各説入不二法門華嚴中種種行類相貌皆為別圓根機施若干譬喻言辭説法也所作佛事未曾暫廢者總結不虗也如上若干己他形聲皆令衆生入佛知見不為人天二乘小事故云佛事若一人獨得滅度餘人不得者所作佛事即為有廢廢即衆生不得實益豈得云皆實不虗今七方便咸入一實所以得云皆實不虗佛事無廢二非滅現滅二初正明二初明本實不滅二初明果位常如是我成佛已來甚大久遠至常住不滅成佛是果甚大久遠等是常常故不滅既其不滅益至未來故寄此四字明未來大勢威猛常住益物也二舉因況果諸善男子我本行菩薩道至今猶未盡復倍上數此舉因況果以明常住也蓋佛修圓因登初住時已得常壽常壽叵盡已倍上無量阿僧祇劫之數況果壽耶譬如太子時祿已不可盡況登尊極祿用寧可盡乎妙樂云舉因況果者明佛本行菩薩道時所感因壽尚自未盡況果壽耶故知以不盡之因壽況不盡之果壽以明因果俱常也二明迹中唱滅然今非實滅度而便唱言當取滅度迹中三身並有非滅唱滅之義法身非滅唱滅者如淨名云法本不生故無可滅即是法身非滅義又云是寂滅義即是唱滅也報身非滅唱滅者誰有智慧誰有煩惱而言智慧能破即是報身非滅義衆生未了聞此便謂其即是佛而生憍恣不復修道故復唱言道能滅惑即是唱滅也應身非滅唱滅者應是法報之用體既無滅用豈有窮即應身非滅義但為衆生若常見佛則生憍恣故唱我於今夜當取滅度即是唱滅也二利益二初不滅衆生有損二初不滅有損如來以是方便教化衆生至入於憶想妄見網中此科云不滅有損者如前樂小法人見佛常在不種善根貧窮下賤不生真中二善故無益不斷見思無明二惡則有損五欲即思惑憶想即見惑由此衆生垢重故須唱滅不唱滅則二惡生而不滅二善損而不生也二廣釋不滅若見如來常在不滅至不能生難遭之想恭敬之心若見佛常在世便起憍怠故有損不能生恭敬故無益憍恣即增見惑厭怠即生思惑不生難遭想即不能生見諦解故不能斷見不恭敬即不能生思惟道故不能斷思為是義故宜應現滅也又若聞三佛不滅悉有憍恣義聞法身不滅者便謂衆生如彌勒如一如無二如由是生於憍心上慢謂一切煩惱本自不生今亦無滅何須修道即便恣情放逸為是唱言法身是寂滅義聞報身不滅者便謂一切衆生即涅槃相涅槃相即煩惱相由是復起慢恣不復修善懈怠放逸為是唱言報身智慧能滅煩惱應身非滅現滅易解衆生由聞此唱滅便於三佛生難遭想起恭敬心也二唱滅於物有益二初歎佛難值是故如來以方便説比丘當知諸佛出世難可值遇三佛並難值衆生樂著小法見思障重聞三身不滅則不修道故難得契會於佛也二釋難值意所以者何諸薄德人至雖不實滅而言滅度若見三佛其人多善少惡不為斯人唱滅是人見佛常在靈山也或不見佛其人障重善輕為説三佛難會衆生聞之便作是念三佛雖復非生非滅必須生善滅惡乃得證見此事不易故云難遭也心懷戀慕等者此明現滅無損滅於見思名無損種善根名有益也二總結不虗三初明先近後遠又善男子諸佛如來法皆如是此明諸佛出五濁必先三後一先近後遠也二明為化衆生為度衆生三明皆非虗妄皆實不虗二譬説二初開譬二初良醫治子譬譬上三世應化所宜三初醫遠行譬譬過去益物二初譬應化二初超譬應化譬如良醫智慧聰達明鍊方藥善治衆病此超譬上我以佛眼觀有能應之智也良醫者良善也喻佛內有三達五眼即是八術妙得藥性外識一切衆生起病之根源也智慧者權實二智深知二諦也聰達者五眼鑒機頓漸不差也十二部教文理甚深如明鍊方藥依四悉檀遍知頓漸衆生煩惱之病如善治衆病也醫有十種一者治病病增無損或時致死譬空見外道恣意行惡教人起邪見斷善根法身既亡慧命亦死二者治病不增不損譬有見苦行外道投巖赴火苦行行善不得禪定不能斷諸結使即是不損亦不能斷善即是不增也三者治病損而無增但世醫所治差已還復發即是修世禪斷結使之外道也四者治病能令差已不復發而所治不遍即二乘人止治一兩種有緣者不能遍治一切也五者雖能兼遍而無巧術用治苦痛釋論呼為拙度即是藏教六度菩薩慈悲廣治也六者治病妙術治無痛惱而不能治必死之人譬通教菩薩用體法空但治有反復凡夫不治焦種二乘也七者雖治難愈之病而不能一時治一切病即是別教地前菩薩也八者能一時治一切病而不能令平復如本即是圓教初心十信也九者能遍治一切亦能令其平復如本而不能令過本即是圓教初住乃至金剛心也十者一時治一切病即能令其平復又使過本即是如來前三種是舊醫後七並客醫妙樂云前之三種亦稱醫者佛未出時一切外道皆自謂出家各自領衆故也涅槃經中唯以如來對彼外道稱為新醫又佛未出世之先輪王以十善治世亦稱舊醫先舊為主後來稱客故名客醫無量義經云醫王大醫王者第八九醫通得名王唯第十醫獨名大王二追譬機感其人多諸子息若十二十乃至百數其人喻佛也多諸子息等者若十是聲聞二十是支佛百數是菩薩且置二乘別明菩薩之子凡有三種子義一正因之子就一切衆生皆有正緣了三因佛性即是佛子故云其中衆生悉是吾子又今文云多諸子息也約十心數法即有百子心王為正因佛性慧是了因佛性餘九相扶起屬緣因佛性一數起時九數扶助如是成百一切衆生雖具三因以了因未曾發心緣因未曾加行悉屬正因佛子也二緣因之子如十六王子覆講法華時聞法者亦生微解即成了因性在昔微能修行為緣因性正因性為本雖亦有三因且就昔日結緣並屬緣因資發今日一實之解故得結緣為佛子也百子之義此約十信一信起時即具餘九還有百信名百子也三了因之子即是今日聞法華經安住實智中我定當作佛從佛口生得佛法分名為真子此亦有三因今既顯了見於佛性並屬了因佛子百子之義還將十信相似之百入於初住為分證之百名百子也今文明百子不取了因子了因子自屬下不失心服藥中明之妙樂云入初住位名為了故發心已後訖至住前皆名為緣二譬現滅以有事緣遠至餘國此譬過去應化中現滅也以此土機生彼方緣熟此見應滅彼見應生名遠至餘國二還已復去譬現在應化二初譬機感諸子於後飲他毒藥藥發悶亂宛轉於地此下譬現在應化益物今正譬上機應相關見諸德薄垢重衆生於佛滅後樂著邪師之法故云飲他毒藥不知出世之要道故云悶亂輪轉諸趣墮在三界故云踠轉於地妙樂云望出世法故且云地二譬應化二初非生現生二初譬形聲益二初譬形益是時其父還來歸家至願見救療更賜壽命此下譬非生現生今譬形益父歸家者譬佛復應生此土也信受邪師之法名為飲毒失心者貪著三界五欲失先所種三乘善根不成大小機感佛為是人故非滅唱滅也又有雖著五欲而不失三乘善根有大小機感佛為是人故非生現生也遙見者明佛出世時衆生亦見佛色身但為見思障五分不得親奉法身故云遙也見聞佛出皆有喜敬之事故云皆大歡喜等經文梵王請等例是求救之辭也二譬聲益二初譬佛受請轉二諦法輪父見子等苦惱如是至搗篩和合與子令服科云轉二諦法輪應云三諦二諦名通三諦則別今捨別從通即頓中二諦也諸經方者即十二部教也藥草即教中所詮八萬法門也從佛出十二部經此出頓藥草也從佛出九部修多羅此出漸藥草也色者譬戒戒防身口事相彰顯故如色香者譬定功德妙香熏一切也味者譬慧能得理味也又色是般若照了法性之色分明無礙也香是解脫斷德離臭也味是法身理味也三法不縱不橫名祕密藏依教修行得入此藏也漸頓通皆具戒定慧今文從別且屬圓頓若漸教説三乘空三昧力如搗無相三昧如篩無作三昧如合一一三昧具戒定慧又空觀如搗假觀如篩中觀如合此三觀各不離戒定慧將此法與漸頓衆生修行故名令服也二譬佛將此誡勸兩門化二初勸門而作是言此大良藥色香美味皆悉具足汝等可服二誡門速除苦惱無復衆患佛將勸誡二教令諸衆生服法藥也二譬益不虗其諸子中不失心者至即便服之病盡除愈此云諸子即上所明三子中了因之子也既不失心服藥病差即譬上皆實不虗也二非滅現滅二初不久應死譬二初唱死之由譬餘失心者見其父來至如是好藥而不肯服此譬現滅之由正由衆生薄德見佛常在但增憍恣而不修行即是不肯服藥也二正唱應死譬二初擬去住譬我今當設方便令服此藥譬上住世有損現滅有益當設方便當即擬也二唱應死譬即作是言汝等當知至遣使還告汝父已死正譬現滅化期將竟故云衰老死時已至者當入涅槃也佛雖滅度留經教在世故云是好良藥今留在此復至他國者即是此方現滅他方現生也遣使等者四依菩薩語衆生云佛已滅度但留此法我今宣弘汝當受行也後時衆生若無四依傳述經法豈能自知佛已滅度故用四依是使人也二諸子醒悟譬二初現滅利益是時諸子聞父背喪至今者捨我遠喪他國衆生因知父喪方能醒悟以譬如來現滅衆生方修行也二未來機感自惟孤露無復恃怙至即取服之毒病皆愈良由如來滅後衆生醒悟服藥修行以作因緣能感未來應化如遺教經云其未度者皆悉已作得度因緣亦有現得感見非獨釋迦如普賢觀經云精進苦到得見釋迦分身多寶東方善德等及七佛世尊三尋後來歸譬未來應化其父聞子悉已得差尋便來歸咸使見之此譬未來益物父聞子差即成能感之機咸使見之是起未來之應方將形聲兩益也妙樂云得差之言不全惑斷但有三乘機及堪會者不論斷與不斷皆名得差二治子實益譬譬上三世益物不虗諸善男子於意云何至不也世尊二合譬三初合過去益物佛言我亦如是成佛已來至阿僧祇劫為衆生故二合現在益物以方便力言當滅度三合益物不虗亦無有能如法説我虗妄過者二偈頌三初頌法説二初頌三世益物三初頌過去三初頌成道已久爾時世尊欲重宣此義而説偈言自我得佛來所經諸劫數無量百千萬億載阿僧祗補注云百生千千生萬萬生億億生兆兆生京京生秭秭生垓垓生壤壤生溝溝生澗澗生正正生載也二頌中間益物常説法教化無數億衆生令入於佛道爾來無量劫三頌常住此處為度衆生故方便現涅槃至雖近而不見二頌現在二初頌非生現生衆見我滅度廣供養舍利至俱出靈鷲山二頌非滅現滅我時語衆生常在此不滅至但謂我滅度三頌未來四初頌未來機感我見諸衆生沒在於苦惱至乃出為説法此下頌未來上長行但寄常住不滅四字今偈頌則廣文為四科此一行半明未來機感二頌常住不滅神通力如是於阿僧祇劫至散佛及大衆常在靈鷲山此謂實報土也及餘諸住處者謂方便有餘土即上餘國義也天人充滿者住行向三十心是人十地是天擊天鼓者表佛無問自説也雨曼陀羅華者表説賢聖位次也妙樂云若準餘國指有餘土者報土須指他受用土若據常在之言即屬自受用土若準頌文寶莊嚴之言即是本時他受用土也他受用者即他報身所居之土名實報土屬事也他報是勝應身從機感見故名他報自受用土即自報身所居之土名常寂光屬理也自報是智慧經云久修業所得慧光照無量是也三明不見因緣我淨土不毀而衆見燒盡至不聞三寶名四明得見因緣諸有修功德柔和質直者至久修業所得妙樂云諸有修功德等者即指緣了二因具足者也則皆見我身見實報土他報身也或時為此衆等者亦初地初住也久乃見佛者即指五濁重者我智力如是總結大勢力也二頌皆實不虗汝等有智者勿於此生疑當斷令永盡佛語實不虗二頌譬説二初頌開譬三初頌過去如醫善方便二頌現在為治狂子故實在而言死三頌不虗無能説虗妄二頌合譬三初頌合過去我亦為世父救諸苦患者二頌合現在為凡夫顛倒實在而言滅至為説種種法三頌合不虗每自作是意以何令衆生得入無上慧速成就佛身開三顯一開近顯遠欲令衆生速得佛道此事必得不虗也妙法蓮華經分別功德品第十七佛説壽量時地涌過去弟子靈山現在弟子得種種益故言功德淺深不同故言分別品也此文是本門第二授記段若據聞經功德但屬餘殘今準當得菩提之言復同授記法華論分此文有法力修行力法力者由法而成故名為力有五一者證謂六百八十萬億得無生忍乃至一生得菩提二者信謂八世界微塵數菩薩發菩提心三者供養謂説是菩薩得大法利時於虗空中雨天華等此三如今品四者聞法如隨喜品五者讀誦持説讀誦如法師功德品持者追指法師安樂行勸持三品説者如神力囑纍二品修行力者苦行力如藥王品教化如妙音品護難如觀音陀羅尼二品示功德如妙莊嚴王品護法如普賢品二分別功德品初記領二初總受法身記三初經家總序爾時大會聞佛説壽命劫數長遠如是至得大饒益二如來分別於時世尊告彌勒菩薩摩訶薩至得無生法忍科云分別者即上品題下注云淺深不同之意也佛語圓妙指本迹二門不可用權位釋經故上迹門開示悟入佛之知見今本門諸菩薩增道損生皆約圓位解釋得無生法忍者入圓教十住位也故華嚴經云初發心住一發一切發得如來一身無量身清淨妙法身湛然應一切即此義也中論云諸法不自生亦不從他生不共不無因是故説無生又華嚴疏云阿者入無生義無生之理統該萬法菩薩得此無生達諸法空斷一切障也復有千倍菩薩摩訶薩得聞持陀羅尼門得聞持陀羅尼入十行位也大論明三陀羅尼一聞持陀羅尼得此陀羅尼者一切語言諸法耳所聞者皆不忘失即是名持二分別知陀羅尼三入音聲陀羅尼具見翻譯名義復有一世界微塵數菩薩摩訶薩得樂説無礙辨才得樂説等者入十向位華嚴回向品云菩薩得決定辨才無盡藏演説一切佛平等法是也復有一世界微塵數菩薩摩訶薩至無量旋陀羅尼得無量旋陀羅尼入初地也淨名疏云旋者轉也謂旋轉分別破塵沙惑顯出恆沙佛法也復有三千大千世界微塵數菩薩至能轉不退法輪不退義見前此入第二地也復有二千中國土微塵數菩薩至能轉清淨法輪此入第三地也復有小千國土至八生當得阿耨多羅三藐三菩提八生入第四地七生入第五地六生入第六地五生入第七地復有四四天下至四生當得阿耨多羅三藐三菩提四生入第八地也復有三四天下至三生當得阿耨多羅三藐三菩提三生入第九地也復有二四天下至二生當得阿耨多羅三藐三菩提二生入第十地也復有一四天下至一生當得阿耨多羅三藐三菩提一生入等覺金剛心也自初住至此等覺位位各破一品無明總四十一品更破一品微細無明入妙覺位若論位位增道損生皆約智德論增斷德論損增即法身生損即無明滅所謂增圓妙道損變易生也然本門得道數倍衆經非但數多又熏修日久元本垂迹處處開引中間相值數數成熟今世五味節節調伏收羅結撮歸會法華譬如田家春生夏長耕種耘治秋收冬藏一時穫刈自法華已後有得道者如捃拾耳妙樂云捃拾如涅槃自云八千聲聞於法華中得授記莂如秋收冬藏更無所作故知大穫須在法華捃均上聲法華開顯如大穫涅槃捃拾殘機如大穫之後取拾遺餘之穗名捃拾也復有八世界微塵數衆生至三菩提心八世界發心者六根清淨人初入十信位也故仁王經云十善菩薩發大心長別三界苦輪海即此義也妙樂云十善菩薩者此明十信信信通皆具足十善非謂專以人天不殺盜等用對十信也三時衆供養佛説是諸菩薩摩訶薩至歌無量頌讚歎諸佛時衆聞深遠法得大饒益欲報佛恩而設供養亦是寄事以表領解上迹門開權顯實菩薩亦悟而大事未畢所以不陳供養而表領解今本門開近顯遠既竟彌勒總申領解故以供養表之諸菩薩執持幡蓋次第而上至於梵天者幡者轉義蓋者覆義地者始義梵者淨義智斷番番轉慈悲番番覆高下深淺不失次第際於梵天表諸菩薩增道損生鄰於妙覺極於極淨也二彌勒申領解三初頌時衆得解爾時彌勒菩薩從座而起至合掌向佛而説偈言佛説希有法昔所未曾聞至歡喜充遍身二頌如來分別或住不退地或得陀羅尼至如虗空無邊隨數生成佛者頌四天下微塵數菩薩四生當得菩提乃至二天下微塵數菩薩二生當得菩提當成一切智者等覺一生之後成妙覺果佛之智也得無量無漏清淨之果報者揀異二乘有量故言無量妙因所感故言清淨無障礙土故言果報揀異二乘無報也三頌時衆供養雨天曼陀羅摩訶曼陀羅至以助無上心從此偈後至經盡凡十一品半並屬流通段分為二一從此下至不輕品凡三品半明弘經功德深以勸流通二從神力品下凡八品付囑流通此復二各有三初三者此半品及隨喜品明五品位中初品因功德勸流通二從法師功德品明五品位中初品果功德勸流通三不輕品引信毀罪福證勸流通後三者初神力囑纍二品囑纍流通二藥王下五品約化他勸流通三普賢品約自行勸流通若論十一品半生起次第者現在聞經得真似兩解之益如上説若直聞一句而生隨喜如現在四信格其功德未來無佛恐人疑福少故説滅後五品位中功德也因功德微密未若果功德彰灼故説法師功德品因果雙舉未若引證分明故説不輕品雖舉往人未若現其神變故説神力品雖示神力未若摩頂付囑故説囑纍品雖通途囑纍未若示其要術棄身存道故説藥王品雖誡能化未若誡其所化隨聞法處應生佛想故説妙音觀音二品若初心弘經既無神力當依內禁故説陀羅尼品復須外護故説嚴王普賢二品聯翩重疊使大法弘通耳就此偈後長行至品末大分為二一現在四信二滅後五品未來無佛等者恐人疑云如來滅後弘經豈若四信功德之多故云福少三此下盡經十一品半屬本門流通段二初下三品半明弘經功深勸流通三初此下至隨喜明初品因功德勸流通二初現在四信四初一念信解二初長行三初舉示其人爾時佛告彌勒菩薩摩訶薩至乃至能生一念信解此去至當知是為深信解相明現在四信四信者一一念信解未能演説二略解言趣三廣為他説四深信觀成言一念信解者謂隨所聞處豁爾開明隨悟而入無有罣礙信一切法皆是佛法又信佛法不隔一切法不得佛法不得一切法而見一切法亦見佛法即一而三即三而一如門前路通達一切東西南北𢄶呼陌切快也無壅礙眼耳鼻舌身意凡有所對悉亦如是無疑曰信明了曰解是為一念信解心也如是信解名鐵輪位又一説未是具足鐵輪乃是十信之初心其人未得六根清淨故非鐵輪正位也二明其功德二初總論無量所得功德無有限量二格量多少二初舉五度為格量本若有善男子善女人至除般若波羅蜜般若即是今校量五度之正慧故言除般若也二正格量多少不及以是功德比前功德至算數譬喻所不能知三位行不退若善男子善女人有如是功德至無有是處圓教十信初心聞壽量功德自外而資圓順信解自內而熏所以不退妙樂云位行不退者文判四信得為十信故初信至七信為位不退八信已去為行不退大品明別教菩薩退位有魔不退無魔圓教初心魔不得便況不退位故云無有是處二偈頌三初格量多少爾時世尊欲重宣此義而説偈言若人求佛慧至行此諸功德如上之所説二追頌人相有善男女等聞我説壽命至其福為如此三行位不退其有諸菩薩無量劫行道至於此無有疑無量劫行道者久修諸度也願我於未來等者起慈悲願也既聞長壽願當同之今始聞此經一念信解功等久行亦乃過之妙樂云言説壽亦如是者謂説常壽若得常壽盡未來世必當過此何但如是今如來壽從實成説故且爾許耳深心等者深謂窮理不二直謂始終一揆於此無有疑者此於本地圓門仍具五法方乃斷疑一者聞遠生信二者深心三者直心四者多聞心五者為他説是為五法也二略解言趣二初標人相又阿逸多若有聞佛壽命長遠解其言趣二正格量是人所得功德無有限量能起如來無上之慧此是第二信略解言趣前但信解未能敷説説涉名數須善方言今此具足故言解其言趣即是為他解説以説力故能起自他無上之慧也三廣為他説二初出人相何況廣聞是經若教人聞至供養經卷二正格量是人功德無量無邊能生一切種智此是第三信廣為他説謂廣聞廣解廣為他説廣修供養供養外資令內智疾入能生一切種智也四深信觀成阿逸多若善男子善女人至當知是為深信解相此是第四信深信觀成謂具上三信加修觀行入禪用慧想成相起能見有餘實報兩土相貌見佛共比丘僧常在耆山者方便有餘土相也又見娑婆純諸菩薩者實報土相也初二信是聞慧位廣聞廣説是思慧位觀行想成是修慧位自淺之深成六根清淨十信位也妙樂云想成相起者理具此相依理起想故此想成便見此相從初習觀但得想名觀行淺故但依此想漸深漸成入初住位任運遍見應用無方問稱理起想何須土想但觀一念妙理即足答前之三教用觀皆須破陰唯圓教即觀一念三千三諦具足是則一心一切心一身一切身一土一切土故觀成時一心見一切心一身見一切身一土見一切土十方諸佛身中現故故於自心常寂光中遍見十方一切身土即如天台大師親見靈山一會儼然未散是也二滅後五品二初列五品格量四品功德二初長行五初直起隨喜之心又復如來滅後若聞是經至當知已為深信解相此去明如來滅後五品五品者一直起隨喜心二加自受持讀誦三加勸他受持讀誦四加兼行六度五加正行六度此五人者通論皆自行化他故下隨喜品云五十人展轉相教也既皆有自行故通稱弟子皆有化他故通稱法師也若別論者前二人但自行後三人俱化他若作法師名之在三不在五自行既通所以皆稱弟子也今文是初隨喜品但標人相而已至第六卷隨喜品方校量功德何故爾答後四品於此粗格量初品於彼廣格量廣格量已况出勝者意謂初品功德尚爾況後之四品耶佛不煩文巧説若此二加自受持讀誦二初標人相何況讀誦受持之者以初品但直隨喜況出能受持讀誦者是為第二讀誦品二正格量斯人則為頂戴如來至作是供養已此格量第二品功德也慮恐初心之人世緣紛動妨修正業但專頌持此經則為頂戴如來乃至供養衆僧何者蓋此經是如來法身若專讀誦則為頂戴經文是能詮如塔能盛故不須起事塔實相是所詮即法身舍利故不須安生身舍利經文能容第一義僧故不須供養相從僧也廢事存理所益弘多從佛有法從法有僧名相從僧三勸他受持讀誦二初標人相阿逸多若我滅後聞是經典至若自書若教人書上但自誦持今復能教他是為第三品二正格量則為起立僧坊至及造僧坊供養衆僧此格量第三品功德也多羅舊名貝多此翻岸形如此方棕欄直而且高極高長八九十尺果熟赤色大如石榴人多食之又有人云一多羅樹高七仞七尺曰仞是則樹高四十九尺西域記云南印建那補羅國北不遠有多羅林三十餘里其葉長廣其色光潤諸國書寫莫不采用補注云八者表八正道園林表總持浴池表八解脫大涅槃為禪定窟柔和忍辱以為衣服法喜禪悅以為飲食等四加其兼行六度二初標人相況復有人能持是經至忍辱精進一心智慧初品至此理觀若熟涉外不妨內事資於道如油多火猛順流揚帆又加功力其勢轉疾妙玄云上但觀理未遑涉事今正觀稍明即旁兼利物能以少施與虗空法界等使一切法趣檀檀為法界餘五度亦如是事相雖少運懷甚大此則理觀為正事行為旁故言兼行六度是為第四品二正格量其德最勝無量無邊至疾至一切種智此格量第四品功德也五加其正行六度二初標人相若人讀誦受持是經至利根智慧善答問難妙玄云至第五品圓觀稍熟理事欲融涉事不妨理在理不隔事故具行六度若布施時無二邊取著十法界依正一捨一切捨財身及命無畏等施若持戒時性重譏嫌等無差別五部重輕無所觸犯若行忍時生法寂滅等忍荷負安耐若行精進心身俱淨無間無退若行禪時遊入諸禪靜散無妨若修慧時權實二智究了通達乃至世智治生産業皆與實相不相違背具足解釋佛之知見而於正觀如火益薪故云正行六度是為第五品六度中不舉布施者為他解釋即是法施義必兼也五品中前三人是聞慧位兼行六度是思慧位正行六度是修慧位都是十信前耳或云初隨喜品是入信心位分一品為兩心五品即十信心即是鐵輪六根清淨位也妙樂云問何故現在唯四信滅後立五品答其義既齊四五無別但是滅後加讀誦位為第二品耳二正格量阿逸多若我滅後諸善男子至皆應供養如佛之塔此格量第五品功德也已趣道場者行處也三菩提者近處也二偈頌四初頌第二品爾時世尊欲重宣此義而説偈言若我滅度後至則為已如上具足諸供養二頌第三品若能持此經則如佛現在至種種皆嚴好翻譯名義云旃檀義翻與藥慈恩傳云樹類白楊其質涼冷蛇多附之華嚴經云摩羅耶山出旃檀香名曰牛頭若以塗身設入火坑火不能燒正法念經云北洲有山名曰高山高山之峯多有牛頭旃檀若諸天與修羅戰時為刀所傷以牛頭旃檀塗之即愈以此山峯狀如牛頭於此峯中生旃檀樹故名牛頭三頌第四品若有信解心受持讀誦書至不嗔不惡口須曼具云須曼那又云蘇摩那此云善攝意其華色黃白而極香樹不至大高三四尺下垂如蓋簷蔔亦云薝博迦此云黃華華小而香阿提目多伽者妙樂云此云龍舐華又云善思夷華其草形如大麻赤華青葉子堪為油亦堪為香此頌第四品兼行六度不言精進者諸度行之不怠即是精進不言智慧者不嗔不惡口即是智慧有智慧人內則無嗔外無惡口故也四頌第五品恭敬於塔廟謙下諸丘至經行及坐臥生心如佛想者此第五品初依之人即號如來故也不久詣道樹者此第五品人其位已在十信鐵輪不久得入初住銅輪能八相作佛也此第五品與第四信齊同是修慧位若論入位同是六根清淨位也而有現未佛世滅後之異耳
